              </div>
            `)}
          </div>
        `}
      </div>
    </div>
  `;
}

function Reports({ plant, me, setTab }) {
  const [view, setView] = useState('catalog'); // 'catalog' | 'coverage'
  const [search, setSearch] = useState('');
  const [deptFilter, setDeptFilter] = useState('all');
  const [clauseFilter, setClauseFilter] = useState('all');
  const [freqFilter, setFreqFilter] = useState('all');
  const [activeReport, setActiveReport] = useState(null);

  // All unique clauses for filter dropdown
  const allClauses = [...new Set(REPORT_CATALOG.flatMap(r => r.clauses))].sort();

  // Filter logic
  let filtered = REPORT_CATALOG;
  if (deptFilter !== 'all') filtered = filtered.filter(r => r.dept === deptFilter);
  if (clauseFilter !== 'all') filtered = filtered.filter(r => r.clauses.includes(clauseFilter));
  if (freqFilter !== 'all') filtered = filtered.filter(r => r.frequency === freqFilter);
  if (search.trim()) {
    const q = search.trim().toLowerCase();
    filtered = filtered.filter(r =>
      r.title.toLowerCase().includes(q) ||
      r.desc.toLowerCase().includes(q) ||
      r.dept.toLowerCase().includes(q) ||
      r.clauses.some(c => c.includes(q))
    );
  }

  // Group by department for display
  const byDept = {};
  for (const r of filtered) {
    if (!byDept[r.dept]) byDept[r.dept] = [];
    byDept[r.dept].push(r);
  }
  const deptOrder = ['production','quality','maintenance','schedules','stocks','documents','people','cross'];

  if (activeReport) {
    return html`<${ReportConfig} plant=${plant} me=${me} report=${activeReport} onClose=${() => setActiveReport(null)} />`;
  }

  // ===== COVERAGE DASHBOARD COMPUTATION =====
  const totalRecords = IATF_RECORDS.length;
  const builtRecords = IATF_RECORDS.filter(r => r.block === 1);
  const builtCount = builtRecords.length;
  const overallCoverage = (builtCount / totalRecords * 100);

  // Group by block
  const byBlock = {};
  for (const r of IATF_RECORDS) {
    if (!byBlock[r.block]) byBlock[r.block] = [];
    byBlock[r.block].push(r);
  }

  // Group by clause
  const byClause = {};
  for (const r of IATF_RECORDS) {
    const clauseRoot = r.clause.split('.')[0];  // group by top-level "5", "8", "9", etc.
    if (!byClause[clauseRoot]) byClause[clauseRoot] = { built: 0, total: 0, items: [] };
    byClause[clauseRoot].total++;
    if (r.block === 1) byClause[clauseRoot].built++;
    byClause[clauseRoot].items.push(r);
  }

  // Group by department
  const byDeptCoverage = {};
  for (const r of IATF_RECORDS) {
    if (!byDeptCoverage[r.dept]) byDeptCoverage[r.dept] = { built: 0, total: 0, items: [] };
    byDeptCoverage[r.dept].total++;
    if (r.block === 1) byDeptCoverage[r.dept].built++;
    byDeptCoverage[r.dept].items.push(r);
  }

  // For coverage dashboard filtering
  const [covFilter, setCovFilter] = useState('all'); // 'all' | 'built' | 'coming'
  const [covGroupBy, setCovGroupBy] = useState('dept'); // 'dept' | 'clause' | 'block'

  return html`
    <div class="page-header">
      <div>
        <h1>📑 Reports & IATF Documents</h1>
        <div class="sub">${builtCount} live · ${totalRecords - builtCount} planned · ${totalRecords} total · ${overallCoverage.toFixed(0)}% coverage</div>
      </div>
    </div>

    <div class="auth-tabs" style="margin-bottom:16px">
      <button class=${'auth-tab' + (view === 'catalog' ? ' active' : '')} onClick=${() => setView('catalog')}>📋 Active Reports (${REPORT_CATALOG.length})</button>
      <button class=${'auth-tab' + (view === 'coverage' ? ' active' : '')} onClick=${() => setView('coverage')}>🗺️ IATF Coverage Map (${totalRecords})</button>
      <button class=${'auth-tab' + (view === 'docnums' ? ' active' : '')} onClick=${() => setView('docnums')}>🔖 Document Numbers</button>
      <button class=${'auth-tab' + (view === 'ai_audit' ? ' active' : '')} onClick=${() => setView('ai_audit')}>🤖 AI Auditor</button>
    </div>

    ${view === 'coverage' ? html`
      <!-- =================== COVERAGE DASHBOARD =================== -->
      <div class="card" style="background:linear-gradient(135deg, var(--teal-700), var(--teal-600));color:white;border:none;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <div>
            <div style="font-size:11px;opacity:0.85;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">OVERALL COVERAGE</div>
            <div style="font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1">${overallCoverage.toFixed(0)}<span style="font-size:18px">%</span></div>
            <div style="font-size:13px;opacity:0.9;margin-top:4px">${builtCount} of ${totalRecords} records active</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:11px;opacity:0.85;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">PLANNED</div>
            <div style="font-size:24px;font-weight:700;line-height:1">${totalRecords - builtCount}</div>
            <div style="font-size:11px;opacity:0.85">across blocks 2-5</div>
          </div>
        </div>
        <div style="background:rgba(255,255,255,0.2);height:10px;border-radius:5px;overflow:hidden">
          <div style="background:white;height:100%;width:${overallCoverage}%;border-radius:5px"></div>
        </div>
      </div>

      <!-- Block legend -->
      <div class="card" style="margin-bottom:14px">
        <div class="card-title">DELIVERY ROADMAP</div>
        ${[1,2,3,4,5].map(b => {
          const items = byBlock[b] || [];
          const isLive = b === 1;
          const pct = items.length > 0 ? (isLive ? 100 : 0) : 0;
          return html`
            <div key=${b} style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:0.5px solid var(--slate-100)">
              <div style="width:24px;height:24px;border-radius:50%;background:${isLive ? 'var(--emerald-500)' : 'var(--slate-200)'};color:${isLive ? 'white' : 'var(--slate-500)'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0">${b}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:600;color:var(--slate-900)">${BLOCK_LABELS[b]}</div>
                <div style="font-size:11px;color:var(--slate-500)">${items.length} records${isLive ? ' · all active' : ' · planned'}</div>
              </div>
              <span class=${'badge ' + (isLive ? 'emerald' : '')}>${isLive ? '✓ LIVE' : 'PLANNED'}</span>
            </div>
          `;
        })}
      </div>

      <!-- Filter / group controls -->
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
        <select value=${covGroupBy} onChange=${e => setCovGroupBy(e.target.value)} style="padding:7px 10px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px;background:white">
          <option value="dept">Group by Department</option>
          <option value="clause">Group by IATF Clause</option>
          <option value="block">Group by Block</option>
        </select>
        <select value=${covFilter} onChange=${e => setCovFilter(e.target.value)} style="padding:7px 10px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px;background:white">
          <option value="all">All records (${totalRecords})</option>
          <option value="built">Active only (${builtCount})</option>
          <option value="coming">Coming soon (${totalRecords - builtCount})</option>
        </select>
      </div>

      ${(() => {
        // Apply filter
        let visibleRecords = IATF_RECORDS;
        if (covFilter === 'built') visibleRecords = visibleRecords.filter(r => r.block === 1);
        else if (covFilter === 'coming') visibleRecords = visibleRecords.filter(r => r.block !== 1);

        // Build groups
        const groups = {};
        let groupOrder = [];
        if (covGroupBy === 'dept') {
          for (const r of visibleRecords) {
            const k = r.dept;
            if (!groups[k]) { groups[k] = []; groupOrder.push(k); }
            groups[k].push(r);
          }
          groupOrder = ['production','quality','maintenance','schedules','stocks','documents','people','cross'].filter(k => groups[k]);
        } else if (covGroupBy === 'clause') {
          for (const r of visibleRecords) {
            const k = 'Clause ' + r.clause.split('.')[0];
            if (!groups[k]) { groups[k] = []; groupOrder.push(k); }
            groups[k].push(r);
          }
          groupOrder.sort();
        } else {  // block
          for (const r of visibleRecords) {
            const k = 'Block ' + r.block;
            if (!groups[k]) { groups[k] = []; groupOrder.push(k); }
            groups[k].push(r);
          }
          groupOrder.sort();
        }

        if (visibleRecords.length === 0) {
          return html`<div class="card"><div class="empty">No records match this filter</div></div>`;
        }

        return groupOrder.map(g => {
          const items = groups[g];
          const groupBuilt = items.filter(r => r.block === 1).length;
          const groupTotal = items.length;
          const groupPct = (groupBuilt / groupTotal * 100);
          const groupLabel = covGroupBy === 'dept' ? (DEPT_LABELS[g] || g) : g;
          return html`
            <div key=${g} style="margin-bottom:18px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <div style="font-size:12px;font-weight:700;color:var(--slate-700);text-transform:uppercase;letter-spacing:0.05em">${groupLabel} · ${groupBuilt}/${groupTotal}</div>
                <div style="display:flex;align-items:center;gap:8px">
                  <div style="width:80px;background:var(--slate-100);height:5px;border-radius:3px;overflow:hidden">
                    <div style="background:${groupPct === 100 ? 'var(--emerald-500)' : groupPct > 50 ? 'var(--teal-500)' : groupPct > 0 ? 'var(--amber-500)' : 'var(--slate-300)'};height:100%;width:${groupPct}%"></div>
                  </div>
                  <span style="font-size:11px;color:var(--slate-500);font-weight:600;min-width:30px;text-align:right">${groupPct.toFixed(0)}%</span>
                </div>
              </div>
              <div class="grid-cards">
                ${items.map(r => {
                  const isLive = r.block === 1;
                  const reportObj = isLive ? REPORT_CATALOG.find(rc => rc.id === r.reportId) : null;
                  return html`
                    <div key=${r.name + r.clause} class="list-item" style="${isLive ? 'cursor:pointer;border-left:3px solid var(--emerald-500)' : 'opacity:0.75;cursor:default;border-left:3px solid var(--slate-300)'}"
                      onClick=${() => { if (isLive && reportObj) setActiveReport(reportObj); }}>
                      <div class="list-item-row" style="align-items:flex-start">
                        <div class="list-item-main">
                          <div style="display:flex;align-items:flex-start;gap:6px">
                            <div style="font-weight:600;color:var(--slate-900);font-size:13px;line-height:1.3;flex:1">${r.name}</div>
                            ${isLive ? html`<span class="badge emerald" style="font-size:9px;padding:2px 6px;flex-shrink:0">LIVE</span>` : html`<span style="background:var(--slate-100);color:var(--slate-500);font-size:9px;padding:2px 6px;border-radius:999px;font-weight:600;flex-shrink:0">B${r.block}</span>`}
                          </div>
                          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">
                            <span style="background:var(--teal-50);color:var(--teal-700);font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600">Clause ${r.clause}</span>
                            <span style="background:var(--slate-100);color:var(--slate-600);font-size:10px;padding:1px 6px;border-radius:4px">${DEPT_LABELS[r.dept] || r.dept}</span>
                          </div>
                          ${r.note && html`<div style="font-size:11px;color:var(--slate-500);margin-top:6px;line-height:1.4;font-style:italic">${r.note}</div>`}
                          ${isLive && reportObj && html`<div style="font-size:11px;color:var(--teal-700);margin-top:5px;font-weight:500">→ Tap to generate</div>`}
                        </div>
                      </div>
                    </div>
                  `;
                })}
              </div>
            </div>
          `;
        });
      })()}

    ` : view === 'docnums' ? html`
      <${DocNumberManager} plant=${plant} me=${me} />
    ` : view === 'ai_audit' ? html`
      <${AIAuditor} plant=${plant} me=${me} />
    ` : html`
      <!-- =================== ACTIVE CATALOG VIEW (existing) =================== -->
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
        <input type="search" value=${search} onChange=${e => setSearch(e.target.value)} placeholder="Search by name, description, IATF clause…" style="padding:9px 12px;border:1px solid var(--slate-200);border-radius:8px;font-size:13px" />
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <select value=${deptFilter} onChange=${e => setDeptFilter(e.target.value)} style="padding:7px 10px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px;background:white">
            <option value="all">All departments</option>
            ${Object.entries(DEPT_LABELS).map(([k, v]) => html`<option key=${k} value=${k}>${v}</option>`)}
          </select>
          <select value=${clauseFilter} onChange=${e => setClauseFilter(e.target.value)} style="padding:7px 10px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px;background:white">
            <option value="all">All IATF clauses</option>
            ${allClauses.map(c => html`<option key=${c} value=${c}>Clause ${c}</option>`)}
          </select>
          <select value=${freqFilter} onChange=${e => setFreqFilter(e.target.value)} style="padding:7px 10px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px;background:white">
            <option value="all">All frequencies</option>
            ${Object.entries(FREQ_LABELS).map(([k, v]) => html`<option key=${k} value=${k}>${v}</option>`)}
          </select>
          ${(search || deptFilter !== 'all' || clauseFilter !== 'all' || freqFilter !== 'all') && html`
            <button class="btn small ghost" onClick=${() => { setSearch(''); setDeptFilter('all'); setClauseFilter('all'); setFreqFilter('all'); }} style="padding:7px 12px;font-size:12px">Clear</button>
          `}
        </div>
        <div style="font-size:11px;color:var(--slate-500)">${filtered.length} of ${REPORT_CATALOG.length} active reports</div>
      </div>

      ${filtered.length === 0 ? html`<div class="card"><div class="empty"><div style="font-size:13px">No reports match these filters</div></div></div>` :
        deptOrder.filter(d => byDept[d]?.length).map(dept => html`
          <div key=${dept} style="margin-bottom:18px">
            <div class="section-h">${DEPT_LABELS[dept]} · ${byDept[dept].length}</div>
            <div class="grid-cards">
              ${byDept[dept].map(r => html`
                <div key=${r.id} class="list-item" onClick=${() => setActiveReport(r)}>
                  <div style="display:flex;gap:10px;align-items:flex-start">
                    <div style="font-size:24px;flex-shrink:0">${r.icon}</div>
                    <div style="flex:1;min-width:0">
                      <div style="font-weight:600;color:var(--slate-900);font-size:14px;line-height:1.3">${r.title}</div>
                      <div style="font-size:11px;color:var(--slate-500);margin-top:3px;line-height:1.4">${r.desc}</div>
                      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">
                        ${r.clauses.map(c => html`<span style="background:var(--teal-50);color:var(--teal-700);font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600">Clause ${c}</span>`)}
                        <span style="background:var(--slate-100);color:var(--slate-600);font-size:10px;padding:2px 6px;border-radius:4px">${FREQ_LABELS[r.frequency]}</span>
                      </div>
                    </div>
                  </div>
                </div>
              `)}
            </div>
          </div>
        `)
      }
    `}
  `;
}

// =================================================================
// REPORT CONFIG — pick filters/date range, then generate
// =================================================================
function ReportConfig({ plant, me, report, onClose }) {
  // Default: last 30 days
  const today = new Date().toISOString().slice(0, 10);
  const monthAgo = new Date(Date.now() - 30 * 86400000).toISOString().slice(0, 10);

  const [dateFrom, setDateFrom] = useState(monthAgo);
  const [dateTo, setDateTo] = useState(today);
  const [singleDate, setSingleDate] = useState(today);
  const [monthPick, setMonthPick] = useState(today.slice(0, 7));
  const [entityType, setEntityType] = useState('breakdown');
  const [entityId, setEntityId] = useState('');
  const [pickedItem, setPickedItem] = useState('');
  const [generating, setGenerating] = useState(false);

  // Auxiliary lookups
  const [items, setItems] = useState([]);  // for material traceability
  const [ncrs, setNcrs] = useState([]);    // for ncr_8d
  const [allEntities, setAllEntities] = useState([]);  // for audit_trail

  useEffect(() => {
    if (report.id === 'material_traceability') {
      sb.from('mcp_stocks_items').select('id, code, name').order('code').then(({ data }) => setItems(data || []));
    }
    if (report.id === 'ncr_8d') {
      sb.from('mcp_quality_ncrs').select('id, ncr_number, title').order('created_at', { ascending:false }).then(({ data }) => setNcrs(data || []));
    }
  }, [report.id]);

  // Load entities for audit trail when entity type changes
  useEffect(() => {
    if (report.id !== 'audit_trail') return;
    let q;
    if (entityType === 'breakdown') q = sb.from('mcp_maintenance_breakdowns').select('id, description, reported_at').order('reported_at', { ascending:false }).limit(100);
    else if (entityType === 'ncr') q = sb.from('mcp_quality_ncrs').select('id, ncr_number, title, created_at').order('created_at', { ascending:false }).limit(100);
    else if (entityType === 'task') q = sb.from('actions').select('id, title, created_at').order('created_at', { ascending:false }).limit(100);
    else if (entityType === 'schedule') q = sb.from('mcp_sched_schedules').select('id, schedule_month, customer_id, mcp_sched_customers(name)').order('schedule_month', { ascending:false }).limit(50);
    if (q) q.then(({ data }) => setAllEntities(data || []));
  }, [report.id, entityType]);

  const generate = async () => {
    setGenerating(true);
    try {
      // Fetch doc number for this report (if assigned) and inject into plant for shell
      const { data: docInfo } = await sb.from('report_doc_numbers').select('*').eq('report_id', report.id).maybeSingle();
      const plantWithDoc = { ...plant, _docInfo: docInfo || null };
      let html_content;
      switch (report.id) {
        case 'daily_production':       html_content = await genDailyProduction(plantWithDoc, singleDate); break;
        case 'reject_analysis':        html_content = await genRejectAnalysis(plantWithDoc, dateFrom, dateTo); break;
        case 'stage_summary':          html_content = await genStageSummary(plantWithDoc, dateFrom, dateTo); break;
        case 'ncr_register':           html_content = await genNcrRegister(plantWithDoc, dateFrom, dateTo); break;
        case 'ncr_8d':                 html_content = await genNcr8D(plantWithDoc, pickedItem); break;
        case 'breakdown_register':     html_content = await genBreakdownRegister(plantWithDoc, dateFrom, dateTo); break;
        case 'mtbf_mttr':              html_content = await genMtbfMttr(plantWithDoc, dateFrom, dateTo); break;
        case 'schedule_attainment':    html_content = await genScheduleAttainment(plantWithDoc, monthPick); break;
        case 'otd_report':             html_content = await genOtd(plantWithDoc, monthPick); break;
        case 'stock_movement':         html_content = await genStockMovement(plantWithDoc, dateFrom, dateTo); break;
        case 'material_traceability':  html_content = await genMaterialTraceability(plantWithDoc, pickedItem); break;
        case 'vendor_grn':             html_content = await genVendorGrn(plantWithDoc, dateFrom, dateTo); break;
        case 'document_index':         html_content = await genDocumentIndex(plantWithDoc, dateFrom, dateTo); break;
        case 'audit_trail':            html_content = await genAuditTrail(plantWithDoc, entityType, pickedItem); break;
        case 'team_snapshot':          html_content = await genTeamSnapshot(plantWithDoc); break;

        // NEW REPORTS
        case 'tool_life_consumption':    html_content = await genToolLifeConsumption(plantWithDoc, dateFrom, dateTo); break;
        case 'tool_change_frequency':    html_content = await genToolChangeFrequency(plantWithDoc, dateFrom, dateTo); break;
        case 'tool_demand_forecast':     html_content = await genToolDemandForecast(plantWithDoc); break;
        case 'tool_assignment_matrix':   html_content = await genToolAssignmentMatrix(plantWithDoc); break;
        case 'plan_vs_supply':           html_content = await genPlanVsSupply(plantWithDoc); break;
        case 'part_attainment_rollup':   html_content = await genPartAttainmentRollup(plantWithDoc); break;
        case 'ai_audit_history':         html_content = await genAiAuditHistory(plantWithDoc, dateFrom, dateTo); break;
        case 'interunit_transfers':      html_content = await genInterunitTransfers(plantWithDoc, dateFrom, dateTo); break;
        case 'entity_activity_timeline': html_content = await genEntityActivityTimeline(plantWithDoc, entityType, pickedItem); break;
        case 'per_unit_dashboard':       html_content = await genPerUnitDashboard(plantWithDoc, dateFrom, dateTo); break;
        case 'shift_segment_log':        html_content = await genShiftSegmentLog(plantWithDoc, dateFrom, dateTo); break;
        case 'operator_performance':     html_content = await genOperatorPerformance(plantWithDoc, dateFrom, dateTo); break;
        default: throw new Error('Unknown report');
      }
      // Open in new tab
      const w = window.open('', '_blank');
      if (!w) { alert('Please allow popups to open the report'); return; }
      w.document.open();
      w.document.write(html_content);
      w.document.close();
    } catch (err) {
      alert('Failed to generate report: ' + (err.message || err));
      console.error(err);
    } finally {
      setGenerating(false);
    }
  };

  // Decide which inputs to show
  const needsDateRange = ['reject_analysis','stage_summary','ncr_register','breakdown_register','mtbf_mttr','stock_movement','vendor_grn','document_index'].includes(report.id);
  const needsSingleDate = report.id === 'daily_production';
  const needsMonth = ['schedule_attainment','otd_report'].includes(report.id);
  const needsItemPick = report.id === 'material_traceability';
  const needsNcrPick = report.id === 'ncr_8d';
  const needsEntityPick = report.id === 'audit_trail';
  const needsNoInput = report.id === 'team_snapshot';

  const canGenerate = (
    (needsDateRange && dateFrom && dateTo) ||
    (needsSingleDate && singleDate) ||
    (needsMonth && monthPick) ||
    (needsItemPick && pickedItem) ||
    (needsNcrPick && pickedItem) ||
    (needsEntityPick && pickedItem) ||
    needsNoInput
  );

  return html`
    <div class="page-header" style="display:flex;align-items:center;gap:10px">
      <button class="btn ghost small" style="padding:6px 10px" onClick=${onClose}>← Back</button>
      <div style="flex:1;min-width:0">
        <h1 style="font-size:18px">${report.icon} ${report.title}</h1>
        <div class="sub">${report.desc}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">CONFIGURE</div>

      ${needsSingleDate && html`
        <div class="field"><label>Date *</label><input type="date" value=${singleDate} onChange=${e => setSingleDate(e.target.value)} /></div>
      `}

      ${needsDateRange && html`
        <div class="field-row">
          <div class="field"><label>From *</label><input type="date" value=${dateFrom} onChange=${e => setDateFrom(e.target.value)} /></div>

const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
const rpFmt = (n) => Number(n || 0).toLocaleString('en-IN');
const rpFmtDateTime = (s) => s ? new Date(s).toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' }) : '—';
const rpFmtDate = (s) => s ? new Date(s).toLocaleDateString('en-IN', { dateStyle:'medium' }) : '—';

// 1. DAILY PRODUCTION REPORT
async function genDailyProduction(plant, date) {
  const startOfDay = date + 'T00:00:00';
  const endOfDay = date + 'T23:59:59';
  const { data: shots } = await sb.from('mcp_pdc_shots')
    .select('*, units(name), shifts(name), machines(code), mcp_pdc_dies(code), mcp_pdc_parts(part_number, name), users:operator_user_id(full_name)')
    .gte('recorded_at', startOfDay).lte('recorded_at', endOfDay)
    .order('recorded_at');

  const totalGood = (shots || []).reduce((s, r) => s + (r.shots_good || 0), 0);
  const totalReject = (shots || []).reduce((s, r) => s + (r.shots_rejected || 0), 0);
  const total = totalGood + totalReject;
  const rejectPct = total > 0 ? (totalReject / total * 100).toFixed(2) : '0.00';

  const stats = `
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${shots?.length || 0}</div><div class="stat-lbl">Shots Logged</div></div>
      <div class="stat-box"><div class="stat-num">${rpFmt(totalGood)}</div><div class="stat-lbl">Good Qty</div></div>
      <div class="stat-box"><div class="stat-num">${rpFmt(totalReject)}</div><div class="stat-lbl">Reject Qty</div></div>
      <div class="stat-box"><div class="stat-num">${rejectPct}%</div><div class="stat-lbl">Reject %</div></div>
    </div>`;

  const rows = (shots || []).length === 0 ? '<div class="empty">No production shots logged on this date.</div>' :
    `<table class="data"><thead><tr>
      <th>Time</th><th>Shift</th><th>Unit</th><th>Machine</th><th>Die</th><th>Part</th>
      <th>Operator</th><th class="num">Good</th><th class="num">Reject</th><th class="num">Reject %</th>
    </tr></thead><tbody>
    ${shots.map(s => {
      const tot = (s.shots_good || 0) + (s.shots_rejected || 0);
      const rp = tot > 0 ? ((s.shots_rejected || 0) / tot * 100).toFixed(1) : '0';
      return `<tr>
        <td>${new Date(s.recorded_at).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'})}</td>
        <td>${esc(s.shifts?.name || '—')}</td>
        <td>${esc(s.units?.name || '—')}</td>
        <td>${esc(s.machines?.code || '—')}</td>
        <td>${esc(s.mcp_pdc_dies?.code || '—')}</td>
        <td>${esc(s.mcp_pdc_parts?.part_number || s.mcp_pdc_parts?.name || '—')}</td>
        <td>${esc(s.users?.full_name || '—')}</td>
        <td class="num">${rpFmt(s.shots_good)}</td>
        <td class="num">${rpFmt(s.shots_rejected)}</td>
        <td class="num">${rp}%</td>
      </tr>`;
    }).join('')}
    </tbody></table>`;

  return reportShell(plant, 'Daily Production Report', new Date(date).toLocaleDateString('en-IN', {dateStyle:'full'}),
    stats + '<h2 class="section">Shot-by-shot detail</h2>' + rows,
    { 'Report Date': new Date(date).toLocaleDateString('en-IN'), 'Total Shots': shots?.length || 0 });
}

// 2. REJECT ANALYSIS
async function genRejectAnalysis(plant, from, to) {
  const { data: shots } = await sb.from('mcp_pdc_shots')
    .select('shots_good, shots_rejected, recorded_at, machines(code), mcp_pdc_parts(part_number, name)')
    .gte('recorded_at', from).lte('recorded_at', to + 'T23:59:59');

  const byMachine = {}, byPart = {};
  let totalG = 0, totalR = 0;
  for (const s of (shots || [])) {
    const mc = s.machines?.code || '—';
    const pt = s.mcp_pdc_parts?.part_number || s.mcp_pdc_parts?.name || '—';
    if (!byMachine[mc]) byMachine[mc] = { good:0, reject:0 };
    if (!byPart[pt]) byPart[pt] = { good:0, reject:0 };
    byMachine[mc].good += s.shots_good || 0; byMachine[mc].reject += s.shots_rejected || 0;
    byPart[pt].good += s.shots_good || 0; byPart[pt].reject += s.shots_rejected || 0;
    totalG += s.shots_good || 0; totalR += s.shots_rejected || 0;
  }
  const total = totalG + totalR;
  const overallPct = total > 0 ? (totalR / total * 100).toFixed(2) : '0.00';

  const rowsM = Object.entries(byMachine).sort((a,b) => (b[1].reject/((b[1].good+b[1].reject)||1)) - (a[1].reject/((a[1].good+a[1].reject)||1))).map(([m, d]) => {
    const t = d.good + d.reject; const pct = t > 0 ? (d.reject/t*100).toFixed(2) : '0';
    return `<tr><td>${esc(m)}</td><td class="num">${rpFmt(d.good)}</td><td class="num">${rpFmt(d.reject)}</td><td class="num">${rpFmt(t)}</td><td class="num">${pct}%</td></tr>`;
  }).join('');
  const rowsP = Object.entries(byPart).sort((a,b) => (b[1].reject/((b[1].good+b[1].reject)||1)) - (a[1].reject/((a[1].good+a[1].reject)||1))).map(([p, d]) => {
    const t = d.good + d.reject; const pct = t > 0 ? (d.reject/t*100).toFixed(2) : '0';
    return `<tr><td>${esc(p)}</td><td class="num">${rpFmt(d.good)}</td><td class="num">${rpFmt(d.reject)}</td><td class="num">${rpFmt(t)}</td><td class="num">${pct}%</td></tr>`;
  }).join('');

  const body = `
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${rpFmt(totalG)}</div><div class="stat-lbl">Total Good</div></div>
      <div class="stat-box"><div class="stat-num">${rpFmt(totalR)}</div><div class="stat-lbl">Total Reject</div></div>
      <div class="stat-box"><div class="stat-num">${overallPct}%</div><div class="stat-lbl">Overall Reject %</div></div>
      <div class="stat-box"><div class="stat-num">${shots?.length || 0}</div><div class="stat-lbl">Shots</div></div>
    </div>
    <h2 class="section">By Machine</h2>
    ${rowsM ? '<table class="data"><thead><tr><th>Machine</th><th class="num">Good</th><th class="num">Reject</th><th class="num">Total</th><th class="num">Reject %</th></tr></thead><tbody>' + rowsM + '</tbody></table>' : '<div class="empty">No data</div>'}
    <h2 class="section">By Part</h2>
    ${rowsP ? '<table class="data"><thead><tr><th>Part</th><th class="num">Good</th><th class="num">Reject</th><th class="num">Total</th><th class="num">Reject %</th></tr></thead><tbody>' + rowsP + '</tbody></table>' : '<div class="empty">No data</div>'}`;

  return reportShell(plant, 'Reject Analysis', `${rpFmtDate(from)} to ${rpFmtDate(to)}`, body,
    { 'Period': `${rpFmtDate(from)} → ${rpFmtDate(to)}`, 'Overall Reject %': overallPct + '%' });
}

// 3. STAGE SUMMARY
async function genStageSummary(plant, from, to) {
  const { data: logs } = await sb.from('mcp_pdc_stage_log')
    .select('stage, qty_good, qty_rejected, log_date, mcp_pdc_parts(part_number, name)')
    .gte('log_date', from).lte('log_date', to);

  const byStage = {};
  for (const l of (logs || [])) {
    const s = l.stage || 'unknown';
    if (!byStage[s]) byStage[s] = { good:0, reject:0, count:0 };
    byStage[s].good += l.qty_good || 0; byStage[s].reject += l.qty_rejected || 0; byStage[s].count++;
  }
  const rows = Object.entries(byStage).map(([s, d]) => {
    const t = d.good + d.reject; const pct = t > 0 ? (d.reject/t*100).toFixed(2) : '0';
    return `<tr><td><b>${esc(s)}</b></td><td class="num">${d.count}</td><td class="num">${rpFmt(d.good)}</td><td class="num">${rpFmt(d.reject)}</td><td class="num">${pct}%</td></tr>`;
  }).join('');

  return reportShell(plant, 'Stage-wise Production Summary', `${rpFmtDate(from)} to ${rpFmtDate(to)}`,
    rows ? '<table class="data"><thead><tr><th>Stage</th><th class="num">Logs</th><th class="num">Good</th><th class="num">Reject</th><th class="num">Reject %</th></tr></thead><tbody>' + rows + '</tbody></table>' : '<div class="empty">No stage logs in this period</div>',
    { 'Period': `${rpFmtDate(from)} → ${rpFmtDate(to)}` });
}

// 4. NCR REGISTER
async function genNcrRegister(plant, from, to) {
  const { data: ncrs } = await sb.from('mcp_quality_ncrs')
    .select('*, raised_by_user:raised_by(full_name), assigned_to_user:assigned_to(full_name)')

  const closed = (ncrs || []).filter(n => n.status === 'closed').length;

  const rows = (ncrs || []).map(n => {
    const sev = n.severity ? `<span class="badge ${n.severity === 'major' ? 'rose' : n.severity === 'minor' ? 'amber' : 'slate'}">${esc(n.severity)}</span>` : '—';
    const st = `<span class="badge ${n.status === 'open' ? 'rose' : n.status === 'closed' ? 'green' : 'slate'}">${esc(n.status)}</span>`;
    return `<tr>
      <td><b>${esc(n.ncr_number)}</b></td>
      <td>${rpFmtDate(n.created_at)}</td>
      <td>${esc(n.title || '')}</td>
      <td>${esc(n.part_number || '—')}</td>
      <td class="num">${rpFmt(n.qty_affected)}</td>
      <td>${sev}</td>
      <td>${st}</td>
      <td>${esc(n.raised_by_user?.full_name || '—')}</td>
      <td>${esc(n.assigned_to_user?.full_name || '—')}</td>

  }).join('');

  const body = `
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${ncrs?.length || 0}</div><div class="stat-lbl">Total NCRs</div></div>
      <div class="stat-box"><div class="stat-num">${open}</div><div class="stat-lbl">Open</div></div>
      <div class="stat-box"><div class="stat-num">${closed}</div><div class="stat-lbl">Closed</div></div>
      <div class="stat-box"><div class="stat-num">${ncrs?.length > 0 ? Math.round(closed/ncrs.length*100) : 0}%</div><div class="stat-lbl">Closure Rate</div></div>
    </div>
    ${rows ? '<table class="data"><thead><tr><th>NCR #</th><th>Date</th><th>Title</th><th>Part</th><th class="num">Qty</th><th>Severity</th><th>Status</th><th>Raised By</th><th>Assigned</th></tr></thead><tbody>' + rows + '</tbody></table>' : '<div class="empty">No NCRs in this period</div>'}`;

  return reportShell(plant, 'NCR Register', `${rpFmtDate(from)} to ${rpFmtDate(to)}`, body,
    { 'Period': `${rpFmtDate(from)} → ${rpFmtDate(to)}` });
}

// 5. NCR 8D-style timeline
async function genNcr8D(plant, ncrId) {
  const [{ data: ncr }, { data: timeline }] = await Promise.all([
    sb.from('mcp_quality_ncrs').select('*, raised_by_user:raised_by(full_name), assigned_to_user:assigned_to(full_name)').eq('id', ncrId).single(),
    sb.rpc('get_timeline', { p_entity_type: 'ncr', p_entity_id: ncrId }),
  ]);
  if (!ncr) throw new Error('NCR not found');

  const tlRows = (timeline || []).map(t => {
    const isComment = t.event_kind === 'comment';
    const detail = isComment ? esc(t.body) :
      (t.event_type === 'status_changed' ? `${t.payload?.from || '?'} → ${t.payload?.to || '?'}` :
       t.event_type === 'created' ? 'NCR created' :
       t.event_type === 'assigned' ? 'Assignment changed' : esc(JSON.stringify(t.payload || {})));
    return `<tr><td>${rpFmtDateTime(t.created_at)}</td><td><b>${esc(t.actor_name || '—')}</b></td><td>${esc(t.event_type)}</td><td>${detail}</td></tr>`;
  }).join('');

  const meta = {
    'NCR Number': ncr.ncr_number,
    'Severity': ncr.severity || '—',
    'Status': ncr.status,
    'Raised By': ncr.raised_by_user?.full_name || '—',
    'Assigned To': ncr.assigned_to_user?.full_name || '—',
    'Part': ncr.part_number || '—',
    'Qty Affected': ncr.qty_affected || '—',
  };

  const body = `
    <h2 class="section">D1 — Problem Description</h2>
    <p style="font-size:12px;line-height:1.6">${esc(ncr.title || '—')}</p>
    <p style="font-size:11px;color:#475569;line-height:1.5">${esc(ncr.description || '')}</p>

    <h2 class="section">D2-D7 — Resolution Timeline</h2>
    ${tlRows ? '<table class="data"><thead><tr><th>When</th><th>Who</th><th>Event</th><th>Detail</th></tr></thead><tbody>' + tlRows + '</tbody></table>' : '<div class="empty">No timeline events recorded</div>'}

    <h2 class="section">D8 — Closure</h2>
    <p style="font-size:12px;line-height:1.6">Status: <span class="badge ${ncr.status === 'closed' ? 'green' : 'rose'}">${esc(ncr.status)}</span></p>
  `;

  return reportShell(plant, 'NCR Resolution Timeline (8D)', ncr.ncr_number + ' · ' + (ncr.title || ''), body, meta);
}

// 6. BREAKDOWN REGISTER
async function genBreakdownRegister(plant, from, to) {
  const { data: bds } = await sb.from('mcp_maintenance_breakdowns')
    .select('*, machines(code), reporter:reported_by(full_name), attendant:attended_by(full_name)')
    .gte('reported_at', from).lte('reported_at', to + 'T23:59:59')
    .order('reported_at', { ascending:false });

  const open = (bds || []).filter(b => b.status === 'open').length;
  const resolved = (bds || []).filter(b => b.status === 'resolved').length;
  const totalDowntime = (bds || []).reduce((s, b) => {
    if (b.resolved_at) return s + (new Date(b.resolved_at) - new Date(b.reported_at)) / 3600000;
    return s;
  }, 0);

  const rows = (bds || []).map(b => {
    const dur = b.resolved_at ? ((new Date(b.resolved_at) - new Date(b.reported_at)) / 3600000).toFixed(1) + ' hrs' : 'open';
    return `<tr>
      <td>${rpFmtDateTime(b.reported_at)}</td>

      <td>${rpFmtDateTime(b.resolved_at)}</td>

  }).join('');

  const body = `
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${bds?.length || 0}</div><div class="stat-lbl">Total Breakdowns</div></div>
      <div class="stat-box"><div class="stat-num">${open}</div><div class="stat-lbl">Open</div></div>
      <div class="stat-box"><div class="stat-num">${resolved}</div><div class="stat-lbl">Resolved</div></div>
      <div class="stat-box"><div class="stat-num">${totalDowntime.toFixed(1)}h</div><div class="stat-lbl">Total Downtime</div></div>
    </div>
    ${rows ? '<table class="data"><thead><tr><th>Reported</th><th>Machine</th><th>Description</th><th>Reporter</th><th>Attendant</th><th>Attended</th><th>Resolved</th><th>Duration</th><th>Status</th></tr></thead><tbody>' + rows + '</tbody></table>' : '<div class="empty">No breakdowns in this period</div>'}`;

  return reportShell(plant, 'Breakdown Register', `${rpFmtDate(from)} to ${rpFmtDate(to)}`, body,
    { 'Period': `${rpFmtDate(from)} → ${rpFmtDate(to)}`, 'Total Downtime': totalDowntime.toFixed(1) + ' hours' });
}

// 7. MTBF / MTTR
async function genMtbfMttr(plant, from, to) {
  const { data: bds } = await sb.from('mcp_maintenance_breakdowns')
    .select('machine_id, reported_at, resolved_at, machines(code)')
    .gte('reported_at', from).lte('reported_at', to + 'T23:59:59');

  const byMachine = {};
  for (const b of (bds || [])) {
    const mc = b.machines?.code || '—';
    if (!byMachine[mc]) byMachine[mc] = { count:0, totalRepair:0, repairCount:0, dates:[] };
    byMachine[mc].count++;
    byMachine[mc].dates.push(new Date(b.reported_at));
    if (b.resolved_at) {
      const repair = (new Date(b.resolved_at) - new Date(b.reported_at)) / 3600000;
      byMachine[mc].totalRepair += repair; byMachine[mc].repairCount++;
    }
  }

  const rows = Object.entries(byMachine).map(([mc, d]) => {
    d.dates.sort((a, b) => a - b);
    let mtbf = '—';
    if (d.dates.length >= 2) {
      const gaps = [];
      for (let i = 1; i < d.dates.length; i++) gaps.push((d.dates[i] - d.dates[i-1]) / 3600000);
      const avg = gaps.reduce((s, g) => s + g, 0) / gaps.length;
      mtbf = avg.toFixed(1) + ' hrs';
    }
    const mttr = d.repairCount > 0 ? (d.totalRepair / d.repairCount).toFixed(1) + ' hrs' : '—';
    return `<tr><td><b>${esc(mc)}</b></td><td class="num">${d.count}</td><td class="num">${mtbf}</td><td class="num">${mttr}</td></tr>`;
  }).join('');

  return reportShell(plant, 'MTBF / MTTR per Machine', `${rpFmtDate(from)} to ${rpFmtDate(to)}`,
    rows ? '<table class="data"><thead><tr><th>Machine</th><th class="num">Breakdowns</th><th class="num">MTBF</th><th class="num">MTTR</th></tr></thead><tbody>' + rows + '</tbody></table>' : '<div class="empty">No breakdowns to compute MTBF/MTTR</div>',
    { 'Period': `${rpFmtDate(from)} → ${rpFmtDate(to)}` });
}

  const monthDate = monthStr + '-01';
  const { data: rows } = await sb.from('v_schedule_status_current_month').select('*');
  // Note: view is current_month-only; for historic we'd need a different view
  // For now, only show if requested month matches current month
  const isCurrent = new Date().toISOString().slice(0,7) === monthStr;

  const tblRows = data.map(r => {

  }).join('');

  const body = `

  return reportShell(plant, 'Customer Schedule Attainment',

    { 'Month': new Date(monthDate).toLocaleDateString('en-IN', { month:'long', year:'numeric' }), 'Overall Attainment': overallPct + '%' });

// 9. OTD REPORT
async function genOtd(plant, monthStr) {
  const monthDate = monthStr + '-01';
  // Pull lines with their supplies for the month
  const { data: scheds } = await sb.from('mcp_sched_schedules').select('id, customer_id, mcp_sched_customers(name, short_code)').eq('schedule_month', monthDate).eq('status','active');
  const schedIds = (scheds || []).map(s => s.id);
  const { data: lines } = await sb.from('mcp_sched_lines').select('id, schedule_id, delivery_date, planned_qty, part_name_raw').in('schedule_id', schedIds.length ? schedIds : ['00000000-0000-0000-0000-000000000000']);
  const { data: supplies } = await sb.from('mcp_sched_supplies').select('schedule_line_id, dispatch_date, supplied_qty').in('schedule_id', schedIds.length ? schedIds : ['00000000-0000-0000-0000-000000000000']);

  const supByLine = {};
  for (const s of (supplies || [])) {
    if (!supByLine[s.schedule_line_id]) supByLine[s.schedule_line_id] = { qty:0, earliest: null };
    supByLine[s.schedule_line_id].qty += parseFloat(s.supplied_qty);
    if (!supByLine[s.schedule_line_id].earliest || s.dispatch_date < supByLine[s.schedule_line_id].earliest) supByLine[s.schedule_line_id].earliest = s.dispatch_date;
  }

  let onTime = 0, late = 0, pending = 0;
  const rows = (lines || []).map(l => {
    const sup = supByLine[l.id] || { qty: 0, earliest: null };
    const fulfilled = sup.qty >= parseFloat(l.planned_qty);
    let status = 'pending', cls = 'amber';
    if (fulfilled) {
      if (sup.earliest && sup.earliest <= l.delivery_date) { status = 'on-time'; cls = 'green'; onTime++; }
      else { status = 'late'; cls = 'rose'; late++; }
    } else {
      pending++;
      if (l.delivery_date < new Date().toISOString().slice(0,10)) { status = 'overdue'; cls = 'rose'; }
    }
    const sched = (scheds || []).find(s => s.id === l.schedule_id);
    return `<tr>
      <td>${esc(sched?.mcp_sched_customers?.short_code || sched?.mcp_sched_customers?.name || '—')}</td>
      <td>${rpFmtDate(l.delivery_date)}</td>
      <td>${esc(l.part_name_raw)}</td>
      <td class="num">${rpFmt(l.planned_qty)}</td>
      <td class="num">${rpFmt(sup.qty)}</td>
      <td>${sup.earliest ? rpFmtDate(sup.earliest) : '—'}</td>
      <td><span class="badge ${cls}">${status}</span></td>
    </tr>`;
  }).join('');

  const totalLines = (lines || []).length;
  const otdPct = (onTime + late) > 0 ? (onTime / (onTime + late) * 100).toFixed(1) : '—';

  const body = `
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${totalLines}</div><div class="stat-lbl">Delivery Lines</div></div>
      <div class="stat-box"><div class="stat-num">${onTime}</div><div class="stat-lbl">On Time</div></div>
      <div class="stat-box"><div class="stat-num">${late}</div><div class="stat-lbl">Late</div></div>
      <div class="stat-box"><div class="stat-num">${otdPct}%</div><div class="stat-lbl">OTD %</div></div>
    </div>
    ${rows ? '<table class="data"><thead><tr><th>Customer</th><th>Due Date</th><th>Part</th><th class="num">Planned</th><th class="num">Supplied</th><th>Earliest Dispatch</th><th>Status</th></tr></thead><tbody>' + rows + '</tbody></table>' : '<div class="empty">No schedule lines for this month</div>'}`;

  return reportShell(plant, 'On-Time Delivery (OTD)',
    new Date(monthDate).toLocaleDateString('en-IN', {month:'long', year:'numeric'}), body,
    { 'Month': new Date(monthDate).toLocaleDateString('en-IN', {month:'long', year:'numeric'}), 'OTD%': otdPct + '%' });
}

  const totOut = (txns || []).filter(t => !isInw(t.txn_type)).reduce((s, t) => s + Math.abs(parseFloat(t.qty)), 0);

      <div class="stat-box"><div class="stat-num">+${rpFmt(totIn)}</div><div class="stat-lbl">Total Inward</div></div>

  return reportShell(plant, 'Stock Movement Report', `${rpFmtDate(from)} to ${rpFmtDate(to)}`, body,
    { 'Period': `${rpFmtDate(from)} → ${rpFmtDate(to)}` });

// 14. AUDIT TRAIL (per entity)
async function genAuditTrail(plant, entityType, entityId) {
  const { data: timeline } = await sb.rpc('get_timeline', { p_entity_type: entityType, p_entity_id: entityId });
  // Get entity details for header
  let entityLabel = '—';
  try {
    if (entityType === 'breakdown') {
      const { data } = await sb.from('mcp_maintenance_breakdowns').select('description, machines(code), reported_at').eq('id', entityId).single();
      entityLabel = (data?.machines?.code || '?') + ' · ' + (data?.description || '');
    } else if (entityType === 'ncr') {
      const { data } = await sb.from('mcp_quality_ncrs').select('ncr_number, title').eq('id', entityId).single();
      entityLabel = (data?.ncr_number || '?') + ' · ' + (data?.title || '');
    } else if (entityType === 'task') {
      const { data } = await sb.from('actions').select('title').eq('id', entityId).single();
      entityLabel = data?.title || '—';
    } else if (entityType === 'schedule') {
      const { data } = await sb.from('mcp_sched_schedules').select('schedule_month, mcp_sched_customers(name)').eq('id', entityId).single();
      entityLabel = (data?.mcp_sched_customers?.name || '?') + ' · ' + (data?.schedule_month ? new Date(data.schedule_month).toLocaleDateString('en-IN', {month:'long',year:'numeric'}) : '');
    }
  } catch (e) { /* ignore */ }

  const rows = (timeline || []).map(t => {
    const isComment = t.event_kind === 'comment';
    const detail = isComment ? esc(t.body) :
      (t.event_type === 'status_changed' ? `${esc(t.payload?.from || '?')} → ${esc(t.payload?.to || '?')}` :
       t.event_type === 'created' ? esc(t.payload?.title || 'Created') :
       t.event_type === 'assigned' ? 'Assignment changed' :
       t.event_type === 'updated' ? esc(t.payload?.note || t.payload?.field || 'Updated') :
       esc(JSON.stringify(t.payload || {})));
    return `<tr><td>${rpFmtDateTime(t.created_at)}</td><td><b>${esc(t.actor_name || '—')}</b></td><td>${esc(t.event_type)}</td><td>${detail}</td></tr>`;
  }).join('');

  return reportShell(plant, 'Audit Trail', entityType.toUpperCase() + ' · ' + entityLabel,
    rows ? '<table class="data"><thead><tr><th>When</th><th>Who</th><th>Event</th><th>Detail</th></tr></thead><tbody>' + rows + '</tbody></table>' : '<div class="empty">No timeline events recorded</div>',
    { 'Entity': entityType, 'Reference': entityLabel });
}

// ========== NEW REPORTS (post-multi-unit) ==========

async function genToolLifeConsumption(plant, from, to) {
  const { data: tools } = await sb.from('tools_master').select('*').order('code');
  const { data: events } = await sb.from('tool_change_events').select('*').gte('event_at', from).lte('event_at', to + 'T23:59:59');
  const byTool = new Map();
  for (const t of tools || []) byTool.set(t.id, { tool: t, changes: 0, total_shots: 0, current_life: t.life_used || 0 });
  for (const e of events || []) {
    const r = byTool.get(e.tool_id);
    if (r) { r.changes++; r.total_shots += e.shots_at_change || 0; }
  }
  const rows = [...byTool.values()].sort((a,b) => b.changes - a.changes).map(r => `<tr>

async function genPartAttainmentRollup(plant) {
  const { data: rows } = await sb.from('v_plan_vs_supply').select('*');
  const byPart = new Map();
  for (const r of rows || []) {
    const k = r.part_number || r.part_name_raw || '?';
    if (!byPart.has(k)) byPart.set(k, { part: k, name: r.part_name, customers: new Set(), planned: 0, supplied: 0, lines: 0 });
    const p = byPart.get(k);
    p.customers.add(r.customer_name);
    p.planned += parseFloat(r.planned_qty || 0);
    p.supplied += parseFloat(r.supplied_qty || 0);
    p.lines++;
  }
  const arr = [...byPart.values()].sort((a,b) => (b.planned - b.supplied) - (a.planned - a.supplied));
  const trs = arr.map(p => {
    const gap = Math.max(p.planned - p.supplied, 0);
    const pct = p.planned > 0 ? ((p.supplied / p.planned) * 100).toFixed(0) : 0;
    return `<tr>
      <td><b>${esc(p.part)}</b>${p.name ? ` · ${esc(p.name)}` : ''}</td>
      <td>${[...p.customers].join(', ')}</td>
      <td>${p.lines}</td>
      <td style="text-align:right">${p.planned.toFixed(0)}</td>
      <td style="text-align:right">${p.supplied.toFixed(0)}</td>
      <td style="text-align:right;color:${gap > 0 ? '#be123c' : '#047857'}"><b>${gap.toFixed(0)}</b></td>
      <td>${pct}%</td>
    </tr>`;
  }).join('');
  return reportShell(plant, 'Part-Level Attainment Rollup', plant.name,
    trs ? `<table class="data"><thead><tr><th>Part</th><th>Customers</th><th>Lines</th><th>Planned</th><th>Supplied</th><th>Yet to Supply</th><th>%</th></tr></thead><tbody>${trs}</tbody></table>` : '<div class="empty">No schedule data</div>',
    { Total_parts: arr.length });
}

async function genPerUnitDashboard(plant, from, to) {
  const { data: units } = await sb.from('units').select('*').order('name');
  const sections = [];
  for (const u of units || []) {
    const [shotsRes, ncrRes, bdRes, supRes] = await Promise.all([
      sb.from('mcp_pdc_shots').select('shots_good, shots_rejected', { count: 'exact' }).eq('unit_id', u.id).gte('created_at', from).lte('created_at', to + 'T23:59:59'),
      sb.from('mcp_quality_ncrs').select('id', { count: 'exact', head: true }).eq('unit_id', u.id).gte('created_at', from).lte('created_at', to + 'T23:59:59'),
      sb.from('mcp_maint_breakdowns').select('id, downtime_minutes', { count: 'exact' }).eq('unit_id', u.id).gte('reported_at', from).lte('reported_at', to + 'T23:59:59'),
      sb.from('mcp_sched_supplies').select('supplied_qty').eq('unit_id', u.id).gte('dispatch_date', from).lte('dispatch_date', to),
    ]);
    const totalGood = (shotsRes.data || []).reduce((s, r) => s + (r.shots_good || 0), 0);
    const totalReject = (shotsRes.data || []).reduce((s, r) => s + (r.shots_rejected || 0), 0);
    const totalDowntime = (bdRes.data || []).reduce((s, r) => s + (r.downtime_minutes || 0), 0);
    const totalSupplied = (supRes.data || []).reduce((s, r) => s + parseFloat(r.supplied_qty || 0), 0);
    sections.push(`<tr>
      <td><b>${esc(u.name)}</b></td>
      <td style="text-align:right">${totalGood}</td>
      <td style="text-align:right">${totalReject}</td>
      <td style="text-align:right">${totalGood + totalReject > 0 ? ((totalReject/(totalGood+totalReject))*100).toFixed(1) : 0}%</td>
      <td style="text-align:right">${ncrRes.count || 0}</td>
      <td style="text-align:right">${bdRes.count || 0}</td>
      <td style="text-align:right">${(totalDowntime / 60).toFixed(1)}h</td>
      <td style="text-align:right">${totalSupplied.toFixed(0)}</td>
    </tr>`);
  }
  return reportShell(plant, 'Per-Unit Dashboard Rollup', `${from} to ${to}`,
    sections.length ? `<table class="data"><thead><tr><th>Unit</th><th>Good</th><th>Reject</th><th>Reject %</th><th>NCRs</th><th>Breakdowns</th><th>Downtime</th><th>Supplied</th></tr></thead><tbody>${sections.join('')}</tbody></table>` : '<div class="empty">No units</div>',
    { Period: `${from} to ${to}`, Units: units?.length || 0 });
}

async function genOperatorPerformance(plant, from, to) {
  const { data: shots } = await sb.from('mcp_pdc_shots').select('operator_user_id, shots_good, shots_rejected, users:operator_user_id(full_name)').gte('created_at', from).lte('created_at', to + 'T23:59:59');
  const byOp = new Map();
  for (const s of shots || []) {
    if (!s.operator_user_id) continue;
    if (!byOp.has(s.operator_user_id)) byOp.set(s.operator_user_id, { name: s.users?.full_name || '?', good: 0, reject: 0, shots: 0 });
    const o = byOp.get(s.operator_user_id);
    o.good += s.shots_good || 0; o.reject += s.shots_rejected || 0; o.shots++;
  }
  const arr = [...byOp.values()].sort((a,b) => b.good - a.good);
  const rows = arr.map(o => `<tr>
    <td><b>${esc(o.name)}</b></td>
    <td style="text-align:right">${o.shots}</td>
    <td style="text-align:right">${o.good}</td>
    <td style="text-align:right">${o.reject}</td>
    <td style="text-align:right">${o.good + o.reject > 0 ? ((o.reject/(o.good+o.reject))*100).toFixed(1) : 0}%</td>
  </tr>`).join('');
  return reportShell(plant, 'Operator Performance', `${from} to ${to}`,
    rows ? `<table class="data"><thead><tr><th>Operator</th><th>Shifts Logged</th><th>Good</th><th>Reject</th><th>Reject %</th></tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty">No operator data</div>',
    { Period: `${from} to ${to}`, Operators: arr.length });
}
