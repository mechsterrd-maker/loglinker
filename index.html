        payments.map(p => html`
          <div class="list-item" key=${p.id}>
            <div class="list-item-row">
              <div class="list-item-main">
                <div class="list-item-title">₹${fmtNum(p.amount)} · ${p.payment_mode}</div>
                <div class="list-item-sub">${p.payment_date} ${p.reference ? '· ' + p.reference : ''} ${p.bank_name ? '· ' + p.bank_name : ''} ${p.users?.full_name ? '· ' + p.users.full_name : ''}</div>
              </div>
              ${(me.role === 'plant_head' || me.role === 'admin' || p.recorded_by === me.id) && html`
                <button class="btn small danger" onClick=${async () => { if (confirm('Delete this payment?')) { await sb.from('mcp_logistics_payments').delete().eq('id', p.id); refresh(); } }}>×</button>
              `}
            </div>
          </div>
        `)
      }
    `}

    ${paymentModal && html`<${PaymentModal} plant=${plant} me=${me} doc=${doc} balance=${balance} onClose=${() => setPaymentModal(false)} onSaved=${() => { setPaymentModal(false); refresh(); }} />`}
    ${grnModal && html`<${GrnReceptionModal} plant=${plant} me=${me} doc=${doc} onClose=${() => setGrnModal(false)} onSaved=${() => { setGrnModal(false); refresh(); }} />`}
  `;
}

// ============= PAYMENT MODAL =============
function PaymentModal({ plant, me, doc, balance, onClose, onSaved }) {
  const [form, setForm] = useState({
    amount: balance > 0 ? balance : doc.total_value,
    payment_mode: 'upi',
    payment_date: new Date().toISOString().slice(0,10),
    reference: '', bank_name: '', notes: ''
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const { error } = await sb.from('mcp_logistics_payments').insert({
        plant_id: plant.id,
        doc_id: doc.id,
        amount: parseFloat(form.amount),
        payment_mode: form.payment_mode,
        payment_date: form.payment_date,
        reference: form.reference || null,
        bank_name: form.bank_name || null,
        notes: form.notes || null,
        recorded_by: me.id,
      });
      if (error) throw error;
      showToast('Payment recorded · status auto-updated');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Record Payment</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        <div class="card" style="background:var(--slate-50);margin-bottom:14px">
          <div class="card-row"><span class="label">Total</span><span class="value">₹${fmtNum(doc.total_value || 0)}</span></div>
          <div class="card-row"><span class="label">Already paid</span><span class="value">₹${fmtNum(doc.paid_amount || 0)}</span></div>
          <div class="card-row"><span class="label" style="font-weight:700">Balance</span><span class="value" style="font-weight:700">₹${fmtNum(balance)}</span></div>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field"><label>Amount * (₹)</label><input type="number" step="0.01" required value=${form.amount} onChange=${e => setForm({...form, amount: e.target.value})} /></div>
          <div class="field-row">
            <div class="field"><label>Mode *</label>
              <select required value=${form.payment_mode} onChange=${e => setForm({...form, payment_mode: e.target.value})}>
                <option value="upi">UPI</option>
                <option value="neft">NEFT</option>
                <option value="rtgs">RTGS</option>
                <option value="imps">IMPS</option>
                <option value="cheque">Cheque</option>
                <option value="cash">Cash</option>
                <option value="card">Card</option>
                <option value="adjustment">Adjustment</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="field"><label>Date *</label><input type="date" required value=${form.payment_date} onChange=${e => setForm({...form, payment_date: e.target.value})} /></div>
          </div>
          <div class="field"><label>Reference / Txn ID</label><input type="text" value=${form.reference} onChange=${e => setForm({...form, reference: e.target.value})} placeholder="UTR / Cheque# / UPI ref" /></div>
          ${['neft','rtgs','imps','cheque'].includes(form.payment_mode) && html`
            <div class="field"><label>Bank</label><input type="text" value=${form.bank_name} onChange=${e => setForm({...form, bank_name: e.target.value})} placeholder="HDFC / ICICI / etc" /></div>
          `}
          <div class="field"><label>Notes</label><textarea rows=${2} value=${form.notes} onChange=${e => setForm({...form, notes: e.target.value})}></textarea></div>
          <button class="btn" disabled=${loading}>${loading ? 'Saving…' : 'Record payment'}</button>
        </form>
      </div>
    </div>
  `;
}

// ============= DOCUMENT EDIT MODAL =============
function DocumentEditModal({ plant, me, doc, vendors, onClose, onSaved }) {
  const [form, setForm] = useState(doc ? {
    ...doc,
    doc_date: doc.doc_date || '',
    due_date: doc.due_date || '',
  } : {
    doc_type: 'invoice_in',
    doc_number: '', doc_date: new Date().toISOString().slice(0,10), due_date: '',
    vendor_id: '', vendor_name_raw: '', vendor_gstin_raw: '',
    taxable_value: '', tax_amount: '', total_value: '',
    status: 'pending', notes: '',
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const payload = {
        plant_id: plant.id,
        doc_type: form.doc_type,
        doc_number: form.doc_number || null,
        doc_date: form.doc_date || null,
        due_date: form.due_date || null,
        vendor_id: form.vendor_id || null,
        vendor_name_raw: form.vendor_name_raw || null,
        vendor_gstin_raw: form.vendor_gstin_raw || null,
        taxable_value: form.taxable_value ? parseFloat(form.taxable_value) : null,
        tax_amount: form.tax_amount ? parseFloat(form.tax_amount) : null,
        total_value: form.total_value ? parseFloat(form.total_value) : null,
        status: form.status,
        notes: form.notes || null,
      };
      let result;
      if (doc?.id) {
        result = await sb.from('mcp_logistics_documents').update(payload).eq('id', doc.id).select().single();
      } else {
        payload.created_by = me.id;
        result = await sb.from('mcp_logistics_documents').insert(payload).select().single();

      if (result.error) throw result.error;
      showToast(doc?.id ? 'Updated' : 'Document created');

    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>

              <option value="invoice_in">Invoice (received)</option>
              <option value="invoice_out">Invoice (issued)</option>

              <option value="dc_out">DC (issued)</option>

              <option value="po">PO</option>
              <option value="quote">Quote</option>
            </select>
          </div>
          <div class="field"><label>Vendor</label>
            <select value=${form.vendor_id || ''} onChange=${e => { const v = vendors.find(x => x.id === e.target.value); setForm({...form, vendor_id: e.target.value, vendor_name_raw: v?.name || form.vendor_name_raw}); }}>
              <option value="">— Select existing or type new below —</option>
              ${vendors.map(v => html`<option key=${v.id} value=${v.id}>${v.name}</option>`)}
            </select>
          </div>
          <div class="field"><label>Vendor Name (free text)</label><input type="text" value=${form.vendor_name_raw || ''} onChange=${e => setForm({...form, vendor_name_raw: e.target.value})} /></div>

            <div class="field"><label>Taxable</label><input type="number" step="0.01" value=${form.taxable_value || ''} onChange=${e => setForm({...form, taxable_value: e.target.value})} /></div>
            <div class="field"><label>Tax</label><input type="number" step="0.01" value=${form.tax_amount || ''} onChange=${e => setForm({...form, tax_amount: e.target.value})} /></div>
          </div>
          <div class="field"><label>Total *</label><input type="number" step="0.01" required value=${form.total_value || ''} onChange=${e => setForm({...form, total_value: e.target.value})} /></div>

    </div>
  `;

// ============= VENDOR DETAIL =============
function VendorDetail({ plant, me, vendor: initialVendor, jobworkStock, docs, onClose }) {
  const isNew = initialVendor?._new;
  const [editing, setEditing] = useState(isNew);
  const [vendor, setVendor] = useState(isNew ? null : initialVendor);

  if (isNew && editing) {
    return html`<${VendorEditModal} plant=${plant} me=${me} vendor=${null} onClose=${onClose} onSaved=${(v) => { setVendor(v); setEditing(false); }} />`;
  }
  if (!vendor) return html`<div class="loader"><div class="spinner"></div></div>`;

  if (editing) {
    return html`<${VendorEditModal} plant=${plant} me=${me} vendor=${vendor} onClose=${() => setEditing(false)} onSaved=${(v) => { setVendor(v); setEditing(false); }} />`;
  }

  const totalPayable = docs.filter(d => ['invoice_in','bill'].includes(d.doc_type) && ['pending','approved','partial'].includes(d.status))
    .reduce((sum, d) => sum + (parseFloat(d.total_value || 0) - parseFloat(d.paid_amount || 0)), 0);

  return html`
    <div class="page-header" style="display:flex;align-items:center;gap:10px">
      <button class="btn ghost small" style="padding:6px 10px" onClick=${onClose}>← Back</button>
      <div style="flex:1"><h1 style="font-size:18px">${vendor.name}</h1>
        <div class="sub">${vendor.is_jobwork_vendor ? '🔧 Job-work vendor' : 'Vendor'}</div>
      </div>
      <button class="btn small ghost" onClick=${() => setEditing(true)}>Edit</button>
    </div>

    <div class="card">
      ${vendor.gstin && html`<div class="card-row"><span class="label">GSTIN</span><span class="value mono">${vendor.gstin}</span></div>`}
      ${vendor.phone && html`<div class="card-row"><span class="label">Phone</span><span class="value mono">${vendor.phone}</span></div>`}
      ${vendor.city && html`<div class="card-row"><span class="label">Location</span><span class="value">${vendor.city}${vendor.state ? ', ' + vendor.state : ''}</span></div>`}
      <div class="card-row"><span class="label">Payment terms</span><span class="value">${vendor.payment_terms_days || 30} days</span></div>
      <div class="card-row"><span class="label">Outstanding</span><span class="value" style="color:${totalPayable > 0 ? 'var(--rose-500)' : 'var(--emerald-600)'};font-weight:700">₹${fmtNum(totalPayable)}</span></div>
    </div>

    ${jobworkStock.length > 0 && html`
      <div class="section-h">Stock at this vendor (job-work)</div>
      ${jobworkStock.map(s => html`
        <div class="list-item" key=${s.item_name}>
          <div class="list-item-row">
            <div class="list-item-main">
              <div class="list-item-title">${s.item_name}</div>
              <div class="list-item-sub">${s.process || ''} · Sent ${fmtNum(s.total_sent)} · Got back ${fmtNum(s.total_received)}</div>
            </div>
            <span class="badge amber">${fmtNum(s.pending_at_vendor)} ${s.uom || ''}</span>
          </div>
        </div>
      `)}
    `}

    <div class="section-h">Documents · ${docs.length}</div>
    ${docs.length === 0 ? html`<div class="empty"><div style="font-size:13px">No documents yet for this vendor</div></div>` :
      docs.slice(0, 50).map(d => html`
        <div class="list-item" key=${d.id}>
          <div class="list-item-row">
            <div class="list-item-main">
              <div class="list-item-title">${d.doc_number || '?'} · ${d.doc_type?.replace('_',' ')}</div>
              <div class="list-item-sub">${d.doc_date || '?'} · ₹${fmtNum(d.total_value || 0)}</div>
            </div>
            <span class=${'badge ' + (d.status === 'paid' ? 'emerald' : d.status === 'partial' ? 'amber' : '')}>${d.status}</span>
          </div>
        </div>
      `)
    }
  `;
}

        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field"><label>Name *</label><input type="text" required value=${form.name} onChange=${e => setForm({...form, name: e.target.value})} /></div>
          <div class="field"><label>Legal Name</label><input type="text" value=${form.legal_name || ''} onChange=${e => setForm({...form, legal_name: e.target.value})} /></div>
          <div class="field-row">
            <div class="field"><label>GSTIN</label><input type="text" maxLength=${15} value=${form.gstin || ''} onChange=${e => setForm({...form, gstin: e.target.value.toUpperCase()})} /></div>
            <div class="field"><label>PAN</label><input type="text" maxLength=${10} value=${form.pan || ''} onChange=${e => setForm({...form, pan: e.target.value.toUpperCase()})} /></div>
          </div>
          <div class="field-row">
            <div class="field"><label>Phone</label><input type="tel" value=${form.phone || ''} onChange=${e => setForm({...form, phone: e.target.value})} /></div>
            <div class="field"><label>Email</label><input type="email" value=${form.email || ''} onChange=${e => setForm({...form, email: e.target.value})} /></div>
          </div>
          <div class="field"><label>Address</label><input type="text" value=${form.address || ''} onChange=${e => setForm({...form, address: e.target.value})} /></div>
          <div class="field-row">
            <div class="field"><label>City</label><input type="text" value=${form.city || ''} onChange=${e => setForm({...form, city: e.target.value})} /></div>
            <div class="field"><label>State</label><input type="text" value=${form.state || ''} onChange=${e => setForm({...form, state: e.target.value})} /></div>
          </div>
          <div class="field"><label>Payment Terms (days)</label><input type="number" value=${form.payment_terms_days || 30} onChange=${e => setForm({...form, payment_terms_days: e.target.value})} /></div>
          <div class="toggle-row"><div class="toggle-label">Vendor (we buy from)</div><div class=${'toggle' + (form.is_vendor ? ' active' : '')} onClick=${() => setForm({...form, is_vendor: !form.is_vendor})}></div></div>
          <div class="toggle-row"><div class="toggle-label">Customer (we sell to)</div><div class=${'toggle' + (form.is_customer ? ' active' : '')} onClick=${() => setForm({...form, is_customer: !form.is_customer})}></div></div>
          <div class="toggle-row"><div class="toggle-label">Job-work vendor</div><div class=${'toggle' + (form.is_jobwork_vendor ? ' active' : '')} onClick=${() => setForm({...form, is_jobwork_vendor: !form.is_jobwork_vendor})}></div></div>
          <div class="field"><label>Notes</label><textarea rows=${2} value=${form.notes || ''} onChange=${e => setForm({...form, notes: e.target.value})}></textarea></div>
          <button class="btn" disabled=${loading}>${loading ? 'Saving…' : (vendor?.id ? 'Update' : 'Create')}</button>
        </form>
      </div>
    </div>
  `;
}

// ============= STAGE LOG (per-stage daily log with reconciliation) =============
function StageLog({ plant, me, parts, machines, dies, units, shifts, users }) {
  const STAGES = ['pdc','trimming','cnc','vmc','lathe','press','drilling','tapping','deflashing','shot_blast','plating','painting','heat_treat','inspection','packing','dispatch','outsource','other'];
  const [logs, setLogs] = useState([]);
  const [summary, setSummary] = useState([]);
  const [filterDate, setFilterDate] = useState(new Date().toISOString().slice(0,10));
  const [filterPart, setFilterPart] = useState('all');
  const [filterStatus, setFilterStatus] = useState('all');
  const [logTarget, setLogTarget] = useState(null);
  const [overrideTarget, setOverrideTarget] = useState(null);
  const [bulkOpen, setBulkOpen] = useState(false);
  const [loading, setLoading] = useState(true);

  const refresh = useCallback(async () => {
    setLoading(true);
    let q = sb.from('mcp_pdc_stage_log')
      .select('*, mcp_pdc_parts(part_number, name), shifts(name), units(name), users:operator_user_id(full_name), entered:entered_by(full_name)')
      .eq('log_date', filterDate)
      .order('part_id').order('stage');
    if (filterPart !== 'all') q = q.eq('part_id', filterPart);
    if (filterStatus !== 'all') q = q.eq('status', filterStatus);
    const { data: s } = await sb.from('v_daily_production_summary').select('*').eq('log_date', filterDate);
    const { data } = await q;
    setLogs(data || []);
    setSummary(s || []);
    setLoading(false);
  }, [filterDate, filterPart, filterStatus]);

  useEffect(() => { refresh(); }, [refresh]);

  // Live updates
  useEffect(() => {
    if (!plant?.id) return;
    const channel = sb.channel('stagelog-' + plant.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_pdc_stage_log', filter:'plant_id=eq.' + plant.id }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id, refresh]);

  // Group logs by part for display
  const byPart = {};
  for (const l of logs) {
    const key = l.part_id;
    if (!byPart[key]) byPart[key] = { part: l.mcp_pdc_parts, stages: {} };
    if (!byPart[key].stages[l.stage]) byPart[key].stages[l.stage] = [];
    byPart[key].stages[l.stage].push(l);
  }

  const totals = summary.reduce((acc, s) => {
    acc.good += parseFloat(s.total_good || 0);
    acc.rejected += parseFloat(s.total_rejected || 0);
    acc.pending += parseInt(s.pending_count || 0);
    acc.anomaly += parseInt(s.anomaly_count || 0);
    return acc;
  }, { good:0, rejected:0, pending:0, anomaly:0 });

  return html`
    <div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat teal"><div class="stat-num">${fmtNum(totals.good)}</div><div class="stat-label">Good</div></div>
      <div class="stat amber"><div class="stat-num">${fmtNum(totals.rejected)}</div><div class="stat-label">Reject</div></div>
      <div class="stat ${totals.pending > 0 ? 'amber' : 'teal'}"><div class="stat-num">${totals.pending}</div><div class="stat-label">Pending</div></div>
      <div class="stat ${totals.anomaly > 0 ? 'rose' : 'teal'}"><div class="stat-num">${totals.anomaly}</div><div class="stat-label">Anomaly</div></div>
    </div>

    <div class="card" style="margin-bottom:10px">
      <div class="field-row">
        <div class="field"><label>Date</label><input type="date" value=${filterDate} onChange=${e => setFilterDate(e.target.value)} /></div>
        <div class="field"><label>Part</label>
          <select value=${filterPart} onChange=${e => setFilterPart(e.target.value)}>
            <option value="all">All parts</option>
            ${parts.map(p => html`<option key=${p.id} value=${p.id}>${p.part_number} · ${p.name}</option>`)}
          </select>
        </div>
      </div>
      <div class="field"><label>Status</label>
        <select value=${filterStatus} onChange=${e => setFilterStatus(e.target.value)}>
          <option value="all">All</option>
          <option value="filled">Filled</option>
          <option value="pending">Pending</option>
          <option value="anomaly">Anomaly (overdue)</option>
          <option value="locked">Locked (>48h)</option>
          <option value="overridden">Overridden</option>
        </select>
      </div>
    </div>

    <div class="section-h">Stage Log · ${filterDate}
      <span style="margin-left:auto;display:flex;gap:6px">
        <button class="btn small ghost" onClick=${() => setBulkOpen(true)} disabled=${parts.length === 0 || machines.length === 0}>📋 Bulk Log</button>
        <button class="btn small" onClick=${() => setLogTarget({})} disabled=${parts.length === 0}>+ Log entry</button>
      </span>
    </div>

    ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
      logs.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">📋</div>No entries for this date. Tap "+ Log entry" to record production.${parts.length === 0 ? ' Add a part first.' : ''}</div></div>` :
      Object.entries(byPart).map(([partId, info]) => html`
        <details key=${partId} open style="margin-bottom:8px">
          <summary style="cursor:pointer;padding:10px 12px;background:var(--slate-100);border-radius:10px;font-weight:600;font-size:14px">
            🔩 ${info.part?.part_number} · ${info.part?.name}
          </summary>
          <div style="margin-top:6px">
            ${Object.entries(info.stages).sort(([a],[b]) => STAGES.indexOf(a) - STAGES.indexOf(b)).map(([stage, entries]) => html`
              ${entries.map(l => {
                const isPending = l.status === 'pending';
                const isAnomaly = l.status === 'anomaly';
                const isLocked = l.status === 'locked';
                const isOverridden = l.status === 'overridden';
                const total = parseFloat(l.qty_good || 0) + parseFloat(l.qty_rejected || 0);
                return html`
                  <div class="list-item" key=${l.id} onClick=${() => isLocked ? setOverrideTarget(l) : setLogTarget(l)}>
                    <div class="list-item-row">
                      <div class="list-item-main">
                        <div class="list-item-title">
                          <span class="badge teal" style="margin-right:6px">${stage.toUpperCase()}</span>
                          ${l.shifts?.name || '?'}${l.units?.name ? ' · ' + l.units.name : ''}
                        </div>
                        <div class="list-item-sub">
                          ${isPending ? '⏰ Pending — downstream logged ' + (l.triggered_by_stage || '?') :
                            isAnomaly ? '🚨 ANOMALY · entry overdue >48h' :
                            isLocked ? '🔒 Locked · plant head can override' :
                            isOverridden ? '🔓 Overridden by plant head' :
                            (l.users?.full_name || l.entered?.full_name || '?') + (total > 0 ? ' · ' + fmtNum(total) + ' pcs' : '')}
                        </div>
                      </div>
                      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
                        ${isPending || isAnomaly ? html`<button class="btn small" onClick=${(e) => { e.stopPropagation(); setLogTarget(l); }}>Log now</button>` :
                          html`<span class="badge ${isAnomaly ? 'rose' : isLocked ? '' : isPending ? 'amber' : 'emerald'}">${fmtNum(l.qty_good || 0)}${l.qty_rejected > 0 ? ' / ' + l.qty_rejected : ''}</span>`}
                      </div>
                    </div>
                  </div>
                `;
              })}
            `)}
          </div>
        </details>
      `)
    }

    ${logTarget && html`<${StageLogModal} plant=${plant} me=${me} pendingEntry=${logTarget.id ? logTarget : null} parts=${parts} machines=${machines} dies=${dies} units=${units} shifts=${shifts} users=${users} defaultDate=${filterDate} onClose=${() => setLogTarget(null)} onSaved=${() => { setLogTarget(null); refresh(); }} />`}
    ${bulkOpen && html`<${BulkLogModal} plant=${plant} me=${me} parts=${parts} machines=${machines} units=${units} shifts=${shifts} users=${users} defaultDate=${filterDate} onClose=${() => setBulkOpen(false)} onSaved=${() => { setBulkOpen(false); refresh(); }} />`}
    ${overrideTarget && html`<${StageOverrideModal} plant=${plant} me=${me} entry=${overrideTarget} onClose=${() => setOverrideTarget(null)} onSaved=${() => { setOverrideTarget(null); refresh(); }} />`}
  `;
}

// ============= STAGE LOG ENTRY MODAL =============
// =================================================================
// BULK LOG MODAL — log production for ALL machines in a category at once
// Pick Date + Shift + Category → see all machines as rows → fill qty → submit
// =================================================================
function BulkLogModal({ plant, me, parts, machines, units, shifts, users, defaultDate, onClose, onSaved }) {
  const [logDate, setLogDate] = useState(defaultDate || new Date().toISOString().slice(0,10));
  const [shiftId, setShiftId] = useState(shifts[0]?.id || '');
  const [unitId, setUnitId] = useState(units[0]?.id || '');
  const [category, setCategory] = useState('');
  const [tools, setTools] = useState([]);
  const [routeSteps, setRouteSteps] = useState([]);
  const [segments, setSegments] = useState([]);
  const [toolChangeFor, setToolChangeFor] = useState(null); // segment _localId being edited
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [results, setResults] = useState(null);

  const categories = [...new Set(machines.map(m => m.category || 'pdc'))].sort();
  const CAT_LABELS = {
    pdc:'Pressure Die Casting', cnc:'CNC', vmc:'VMC', lathe:'Lathe',
    press:'Press', trimming:'Trimming', drilling:'Drilling',
    grinding:'Grinding', heat_treatment:'Heat Treatment',
    injection_moulding:'Injection Moulding', welding:'Welding',
    assembly:'Assembly', inspection:'Inspection', painting:'Painting',
    plating:'Plating', testing:'Testing', other:'Other',
  };

  // Load tools master + route steps once
  useEffect(() => {
    (async () => {
      const [tRes, rsRes] = await Promise.all([
        sb.from('tools_master').select('*').eq('is_active', true).order('code'),
        sb.from('v_part_route_steps').select('*').order('part_id').order('op_seq'),
      ]);
      setTools(tRes.data || []);
      setRouteSteps(rsRes.data || []);
    })();
  }, []);

  let _idCounter = useMemo(() => ({n:0}), []);
  const newLocalId = () => `seg-${++_idCounter.n}-${Date.now()}`;

  // When category changes, populate one row per machine in that category
  useEffect(() => {
    if (!category) { setSegments([]); return; }
    const catMachines = machines.filter(m => (m.category || 'pdc') === category);
    setSegments(catMachines.map(m => ({
      _localId: newLocalId(),
      machine_id: m.id,
      machine_code: m.code,
      machine_display: m.display_name ? `${m.code} (${m.display_name})` : m.code,
      supervisor_id: m.default_supervisor_id || null,
      part_id: '',
      route_step_id: '',
      op_number: '',
      op_name: '',
      qty_good: '',
      qty_rejected: '',
      reject_reason: '',
      operator_user_id: m.default_supervisor_id || me.id,
      operator_2_user_id: '',
      setup_change: false,
      setup_time_min: '',
      previous_part_id: '',
      notes: '',
      tool_changes: [],
    })));
  }, [category, machines.length]);

  const updateSeg = (localId, patch) => {
    setSegments(segs => segs.map(s => s._localId === localId ? { ...s, ...patch } : s));
  };

  const addRunForMachine = (machineId) => {
    const lastForMachine = [...segments].reverse().find(s => s.machine_id === machineId);
    if (!lastForMachine) return;
    const newSeg = {
      ...lastForMachine,
      _localId: newLocalId(),
      part_id: '',
      route_step_id: '',
      op_number: '',
      op_name: '',
      qty_good: '',
      qty_rejected: '',
      reject_reason: '',
      setup_change: true,                              // new run usually means setup change
      setup_time_min: '',
      previous_part_id: lastForMachine.part_id || '',  // pre-fill prev part
      notes: '',
      tool_changes: [],
    };
    // Insert after the last segment for this machine
    setSegments(segs => {
      const out = [];
      let inserted = false;
      for (let i = 0; i < segs.length; i++) {
        out.push(segs[i]);
        const next = segs[i+1];
        if (segs[i].machine_id === machineId && (!next || next.machine_id !== machineId) && !inserted) {
          out.push(newSeg);
          inserted = true;
        }
      }
      if (!inserted) out.push(newSeg);
      return out;
    });
  };

  const removeRun = (localId) => {
    setSegments(segs => segs.filter(s => s._localId !== localId));
  };

  // Tool changes for a specific segment
  const segBeingEdited = segments.find(s => s._localId === toolChangeFor);

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true); setResults(null);
    try {
      const filled = segments.filter(s => parseFloat(s.qty_good || 0) > 0 || parseFloat(s.qty_rejected || 0) > 0);
      if (filled.length === 0) throw new Error('No quantities entered');
      const missingPart = filled.filter(s => !s.part_id);
      if (missingPart.length > 0) throw new Error(`Part required for: ${missingPart.map(s => s.machine_code).join(', ')}`);
      const missingOp = filled.filter(s => !s.route_step_id);
      if (missingOp.length > 0) throw new Error(`Operation must be picked from route for: ${missingOp.map(s => s.machine_code).join(', ')}. Add a route step in the part's routing if it's missing.`);
      const missingOperator = filled.filter(s => !s.operator_user_id);
      if (missingOperator.length > 0) throw new Error(`Operator required for: ${missingOperator.map(s => s.machine_code).join(', ')}`);

      // Build payload — strip _localId and machine_code (server doesn't need them)
      const payload = filled.map(s => ({
        machine_id: s.machine_id,
        part_id: s.part_id,
        route_step_id: s.route_step_id || null,
        op_number: s.op_number || null,
        op_name: s.op_name || null,
        qty_good: parseFloat(s.qty_good || 0),
        qty_rejected: parseFloat(s.qty_rejected || 0),
        reject_reason: s.reject_reason || null,
        setup_change: !!s.setup_change,
        setup_time_min: s.setup_time_min ? parseInt(s.setup_time_min) : null,
        previous_part_id: s.previous_part_id || null,
        operator_user_id: s.operator_user_id,
        operator_2_user_id: s.operator_2_user_id || null,
        category_attrs: {},
        notes: s.notes || null,
        tool_changes: (s.tool_changes || []).map(tc => ({
          tool_id: tc.tool_id,
          change_reason: tc.change_reason || 'life_expired',
          corner_to: tc.corner_to || null,
          pieces_done: tc.pieces_done ? parseFloat(tc.pieces_done) : null,
          minutes_used: tc.minutes_used ? parseFloat(tc.minutes_used) : null,
          consumed_from_stock: !!tc.consumed_from_stock,
          qty_consumed: tc.qty_consumed ? parseFloat(tc.qty_consumed) : 1,
          notes: tc.notes || null,
        })),
      }));

      const { data, error: err } = await sb.rpc('submit_shift_segments', {
        p_log_date: logDate,
        p_shift_id: shiftId,
        p_unit_id: unitId,
        p_category: category,
        p_segments: payload,
      });
      if (err) throw err;
      if (!data?.success) throw new Error(data?.error || 'Submit failed');

      const successCount = (data.results || []).filter(r => r.status === 'success').length;
      const failedCount = (data.results || []).filter(r => r.status === 'failed').length;
      const skippedCount = (data.results || []).filter(r => r.status === 'skipped').length;
      setResults({ success: successCount, failed: failedCount, skipped: skippedCount, details: data.results || [] });
      showToast(`✓ ${successCount} segments logged${failedCount > 0 ? ` · ${failedCount} failed` : ''}`);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  // === Results view ===
  if (results) {
    return html`
      <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onSaved(); }}>
        <div class="modal" style="max-width:520px">
          <div class="modal-header">
            <div class="modal-title">📋 Bulk log results</div>
            <button class="close-btn" onClick=${onSaved}>×</button>
          </div>
          <div class="card-row" style="background:var(--emerald-50);padding:8px 12px;border-radius:6px;margin-bottom:6px"><span class="label">✓ Logged</span><span class="value" style="font-weight:700;color:var(--emerald-700)">${results.success}</span></div>
          ${results.failed > 0 && html`<div class="card-row" style="background:var(--rose-50);padding:8px 12px;border-radius:6px;margin-bottom:6px"><span class="label">✗ Failed</span><span class="value" style="font-weight:700;color:var(--rose-700)">${results.failed}</span></div>`}
          ${results.skipped > 0 && html`<div class="card-row" style="background:var(--slate-50);padding:8px 12px;border-radius:6px;margin-bottom:6px"><span class="label">— Skipped (empty)</span><span class="value">${results.skipped}</span></div>`}
          ${results.failed > 0 && html`
            <div style="margin-top:14px">
              <div style="font-size:11px;font-weight:700;color:var(--rose-700);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Failures</div>
              ${results.details.filter(d => d.status === 'failed').map(d => {
                const m = machines.find(mm => mm.id === d.machine_id);
                return html`<div key=${d.idx} style="font-size:12px;color:var(--slate-700);padding:6px 10px;background:var(--rose-50);border-radius:4px;margin-bottom:4px">
                  <b>${m?.code || '?'}${d.op_number ? ' Op' + d.op_number : ''}</b>: ${d.error}
                </div>`;
              })}
            </div>
          `}
          <button class="btn" onClick=${onSaved} style="margin-top:14px">Done</button>
        </div>
      </div>
    `;
  }

  // === Tool change modal (overlay on top of bulk log) ===
  if (toolChangeFor && segBeingEdited) {
    return html`
      <${ToolChangeModal}
        segment=${segBeingEdited}
        tools=${tools}
        machines=${machines}
        onSave=${(updatedChanges) => {
          updateSeg(toolChangeFor, { tool_changes: updatedChanges });
          setToolChangeFor(null);
        }}
        onClose=${() => setToolChangeFor(null)}
      />
    `;
  }

  // === Group rendering by machine ===
  // Group segments by machine_id, preserving order
  const segsByMachine = (() => {
    const map = new Map();
    for (const s of segments) {
      if (!map.has(s.machine_id)) map.set(s.machine_id, []);
      map.get(s.machine_id).push(s);
    }
    return map;
  })();

  const filledCount = segments.filter(s => parseFloat(s.qty_good || 0) > 0 || parseFloat(s.qty_rejected || 0) > 0).length;

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal" style="max-width:880px">
        <div class="modal-header">
          <div class="modal-title">📋 Bulk Log Production</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field-row">
            <div class="field"><label>Date *</label><input type="date" required value=${logDate} onChange=${e => setLogDate(e.target.value)} /></div>
            <div class="field"><label>Shift *</label>
              <select required value=${shiftId} onChange=${e => setShiftId(e.target.value)}>
                ${shifts.map(s => html`<option key=${s.id} value=${s.id}>${s.name}</option>`)}
              </select>
            </div>
          </div>
          <div class="field"><label>Category *</label>
            <select required value=${category} onChange=${e => setCategory(e.target.value)}>
              <option value="">— Pick category —</option>
              ${categories.map(c => html`<option key=${c} value=${c}>${CAT_LABELS[c] || c} (${machines.filter(m => (m.category || 'pdc') === c).length})</option>`)}
            </select>
          </div>

          ${segments.length > 0 && html`
            <div style="font-size:11px;color:var(--slate-500);margin:8px 0;padding:8px 10px;background:var(--teal-50);border-radius:6px;border-left:3px solid var(--teal-500)">
              💡 One row per (machine × operation). Tap <b>+ Add another run</b> below a machine if you ran a different part / operation on it later in the shift. Leave Good/Reject blank for machines that didn't run.
            </div>

            <div style="display:flex;flex-direction:column;gap:14px">
              ${[...segsByMachine.entries()].map(([machineId, segs]) => {
                const m = machines.find(mm => mm.id === machineId);
                const machineLabel = m?.display_name ? `${m.code} (${m.display_name})` : m?.code;
                return html`
                  <div key=${machineId} style="border:1px solid var(--slate-200);border-radius:10px;padding:10px;background:white">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                      <div style="font-weight:700;color:var(--slate-800);font-size:13px">⚙️ ${machineLabel}</div>

                        </div>
                        <div class="field-row" style="margin-bottom:6px">
                          <div class="field" style="margin:0;flex:2"><label style="font-size:11px">Part *</label>
                            <select value=${s.part_id} onChange=${e => updateSeg(s._localId, { part_id: e.target.value, route_step_id: '', op_number: '', op_name: '' })} style="font-size:12px;padding:5px 8px">
                              <option value="">— Pick part —</option>
                              ${parts.map(p => html`<option key=${p.id} value=${p.id}>${p.part_number}${p.name ? ' · ' + p.name : ''}</option>`)}
                            </select>
                          </div>
                          <div class="field" style="margin:0;flex:3"><label style="font-size:11px">Operation *</label>
                            ${(() => {
                              if (!s.part_id) {
                                return html`<select disabled style="font-size:12px;padding:5px 8px;color:var(--slate-400)"><option>— Pick part first —</option></select>`;
                              }
                              // Filter route steps for this part, matching the selected category
                              const partSteps = routeSteps.filter(rs => rs.part_id === s.part_id);
                              const matchingSteps = partSteps.filter(rs => {
                                // Map heat_treatment ↔ heat_treat
                                const cat = category === 'heat_treatment' ? 'heat_treat' : category;
                                return rs.op_type === cat;
                              });
                              if (matchingSteps.length === 0) {
                                return html`
                                  <select value="" disabled style="font-size:12px;padding:5px 8px;color:var(--slate-400)">
                                    <option>${partSteps.length === 0 ? '— No route defined for this part —' : '— No ' + (CAT_LABELS[category] || category) + ' op in this part route —'}</option>
                                  </select>
                                `;
                              }
                              return html`
                                <select value=${s.route_step_id || ''} onChange=${e => {
                                  const stepId = e.target.value;
                                  const step = matchingSteps.find(x => x.route_step_id === stepId);
                                  updateSeg(s._localId, {
                                    route_step_id: stepId,
                                    op_number: step ? String(step.op_seq) : '',
                                    op_name: step ? step.op_name : '',
                                  });
                                }} style="font-size:12px;padding:5px 8px">
                                  <option value="">— Pick operation —</option>
                                  ${matchingSteps.map(rs => html`<option key=${rs.route_step_id} value=${rs.route_step_id}>Op ${rs.op_seq} · ${rs.op_name}${rs.cycle_time_sec ? ' (' + rs.cycle_time_sec + 's)' : ''}</option>`)}
                                </select>
                              `;
                            })()}
                          </div>
                        </div>
                        <div class="field-row" style="margin-bottom:6px">
                          <div class="field" style="margin:0"><label style="font-size:11px">Good</label>
                            <input type="number" min="0" step="0.01" value=${s.qty_good} onChange=${e => updateSeg(s._localId, { qty_good: e.target.value })} placeholder="0" style="text-align:right;font-size:12px;padding:5px 8px" />
                          </div>
                          <div class="field" style="margin:0"><label style="font-size:11px">Reject</label>
                            <input type="number" min="0" step="0.01" value=${s.qty_rejected} onChange=${e => updateSeg(s._localId, { qty_rejected: e.target.value })} placeholder="0" style="text-align:right;font-size:12px;padding:5px 8px" />
                          </div>
                          <div class="field" style="margin:0;flex:2"><label style="font-size:11px">Operator *</label>

                          </div>
                        </div>
                        ${parseFloat(s.qty_rejected || 0) > 0 && html`
                          <div class="field" style="margin:0 0 6px"><label style="font-size:11px">Reject reason</label>
                            <select value=${s.reject_reason} onChange=${e => updateSeg(s._localId, { reject_reason: e.target.value })} style="font-size:12px;padding:5px 8px">
                              <option value="">— Select —</option>
                              <option>Dimension</option><option>Surface</option><option>Tool wear</option>
                              <option>Setup</option><option>Programming</option><option>Crash</option><option>Other</option>
                            </select>
                          </div>
                        `}
                        <div style="display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap">
                          <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--slate-700);cursor:pointer;margin:0">
                            <input type="checkbox" checked=${!!s.setup_change} onChange=${e => updateSeg(s._localId, { setup_change: e.target.checked })} style="width:auto" />
                            Setup change
                          </label>
                          ${s.setup_change && html`
                            <input type="number" placeholder="Setup mins" value=${s.setup_time_min} onChange=${e => updateSeg(s._localId, { setup_time_min: e.target.value })} style="font-size:11px;padding:3px 6px;width:90px" />
                          `}
                          <button type="button" class="btn small ghost" style="padding:3px 8px;font-size:11px;margin-left:auto" onClick=${() => setToolChangeFor(s._localId)}>
                            🔧 ${s.tool_changes?.length > 0 ? `${s.tool_changes.length} tool change${s.tool_changes.length > 1 ? 's' : ''}` : 'Record tool change'}
                          </button>
                        </div>
                      </div>
                    `)}
                  </div>
                `;
              })}
            </div>

            <div style="font-size:11px;color:var(--slate-500);margin:14px 0 6px;text-align:center">
              ${filledCount} of ${segments.length} runs will be logged
            </div>
          `}

          ${segments.length === 0 && category && html`<div class="card"><div class="empty">No machines in this category</div></div>`}

          <button class="btn" disabled=${loading || filledCount === 0} style="margin-top:8px">${loading ? 'Saving…' : `Log ${filledCount} run${filledCount === 1 ? '' : 's'}`}</button>
        </form>
      </div>
    </div>
  `;
}

// ============= TOOL CHANGE MODAL (overlay inside bulk log) =============
function ToolChangeModal({ segment, tools, machines, onSave, onClose }) {
  const [changes, setChanges] = useState(segment.tool_changes || []);
  const [error, setError] = useState('');

  // Filter tools applicable to this machine (or no machine restriction)
  const machine = machines.find(m => m.id === segment.machine_id);
  const machineCat = machine?.category || 'pdc';
  const applicableTools = tools.filter(t => {
    const okMachine = !t.applicable_machines?.length || t.applicable_machines.includes(segment.machine_id);
    const okCat = !t.applicable_categories?.length || t.applicable_categories.includes(machineCat);
    return okMachine && okCat;
  });

  const addChange = () => {
    setChanges(c => [...c, {
      _localId: `tc-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
      tool_id: '',
      change_reason: 'life_expired',
      corner_to: '',
      pieces_done: '',
      minutes_used: '',
      consumed_from_stock: false,
      qty_consumed: 1,
      notes: '',
    }]);
  };

  const updateChange = (idx, patch) => {
    setChanges(c => c.map((x, i) => i === idx ? { ...x, ...patch } : x));
  };

  const removeChange = (idx) => {
    setChanges(c => c.filter((_, i) => i !== idx));
  };

  const save = () => {
    setError('');
    const valid = changes.filter(c => c.tool_id);
    if (valid.length !== changes.length) {
      setError('Each change must have a tool selected');
      return;
    }
    onSave(valid);
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal" style="max-width:600px">
        <div class="modal-header">
          <div class="modal-title">🔧 Tool changes for ${machine?.code} ${segment.op_number ? '· Op ' + segment.op_number : ''}</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}

        ${applicableTools.length === 0 && html`
          <div class="alert" style="background:var(--amber-50);color:var(--amber-700);padding:10px 14px;border-radius:8px;margin-bottom:10px">
            ⚠️ No tools yet. Add tools in Production → 🔧 Tools tab first.
          </div>
        `}

        ${changes.length === 0 ? html`
          <div class="empty" style="padding:20px;text-align:center;color:var(--slate-500);font-size:13px">No tool changes recorded for this run yet.</div>
        ` : html`
          <div style="display:flex;flex-direction:column;gap:10px">
            ${changes.map((c, idx) => {
              const tool = tools.find(t => t.id === c.tool_id);
              const isInsert = tool?.kind === 'insert';
              return html`
                <div key=${c._localId || idx} style="border:1px solid var(--slate-200);border-radius:8px;padding:10px;background:var(--slate-50)">
                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                    <div style="font-size:11px;font-weight:700;color:var(--slate-700);text-transform:uppercase;letter-spacing:0.05em">Change ${idx + 1}</div>
                    <button type="button" class="btn small ghost" style="padding:2px 6px;font-size:10px;color:var(--rose-600)" onClick=${() => removeChange(idx)}>✕ Remove</button>
                  </div>
                  <div class="field" style="margin-bottom:6px"><label style="font-size:11px">Tool *</label>
                    <select value=${c.tool_id} onChange=${e => updateChange(idx, { tool_id: e.target.value })} style="font-size:12px">
                      <option value="">— Pick tool —</option>
                      ${applicableTools.map(t => html`<option key=${t.id} value=${t.id}>${t.code} · ${t.name}${t.kind === 'insert' && t.corners_per_insert > 1 ? ` (${t.corners_per_insert} corners)` : ''}</option>`)}
                    </select>
                  </div>
                  <div class="field-row" style="margin-bottom:6px">
                    <div class="field" style="margin:0"><label style="font-size:11px">Reason</label>
                      <select value=${c.change_reason} onChange=${e => updateChange(idx, { change_reason: e.target.value })} style="font-size:12px">
                        <option value="life_expired">Life expired (normal)</option>
                        <option value="corner_rotated">Corner rotated (no new insert)</option>
                        <option value="tool_broken">Tool broken</option>
                        <option value="wear_excessive">Excessive wear</option>
                        <option value="changeover">Part changeover</option>
                        <option value="setup">New setup</option>
                        <option value="other">Other</option>
                      </select>
                    </div>
                    ${isInsert && html`
                      <div class="field" style="margin:0"><label style="font-size:11px">Corner now in use</label>
                        <select value=${c.corner_to} onChange=${e => updateChange(idx, { corner_to: e.target.value })} style="font-size:12px">
                          <option value="">—</option>
                          ${Array.from({length: tool?.corners_per_insert || 1}, (_, i) => html`<option key=${i+1} value=${i+1}>Corner ${i+1}</option>`)}
                        </select>
                      </div>
                    `}
                  </div>
                  <div class="field-row" style="margin-bottom:6px">
                    <div class="field" style="margin:0"><label style="font-size:11px">Pieces produced before change</label>
                      <input type="number" min="0" step="0.01" value=${c.pieces_done} onChange=${e => updateChange(idx, { pieces_done: e.target.value })} placeholder=${tool?.life_value || ''} style="font-size:12px;padding:5px 8px" />
                    </div>
                    ${tool?.life_unit === 'minutes' && html`
                      <div class="field" style="margin:0"><label style="font-size:11px">Runtime (min)</label>
                        <input type="number" min="0" step="0.1" value=${c.minutes_used} onChange=${e => updateChange(idx, { minutes_used: e.target.value })} style="font-size:12px;padding:5px 8px" />
                      </div>
                    `}
                  </div>
                  ${c.change_reason !== 'corner_rotated' && tool?.stock_item_id && html`
                    <div style="background:var(--teal-50);padding:6px 10px;border-radius:6px;margin-top:6px">
                      <label style="display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer;margin:0">
                        <input type="checkbox" checked=${c.consumed_from_stock} onChange=${e => updateChange(idx, { consumed_from_stock: e.target.checked })} style="width:auto" />
                        📦 Take from stock (auto-decrements)
                      </label>
                      ${c.consumed_from_stock && html`
                        <div style="display:flex;gap:6px;align-items:center;margin-top:4px">
                          <span style="font-size:11px;color:var(--slate-600)">Qty consumed:</span>
                          <input type="number" min="0" step="0.01" value=${c.qty_consumed} onChange=${e => updateChange(idx, { qty_consumed: e.target.value })} style="font-size:11px;padding:2px 6px;width:60px" />
                        </div>
                      `}
                    </div>
                  `}
                  ${c.change_reason !== 'corner_rotated' && !tool?.stock_item_id && tool && html`
                    <div style="font-size:10px;color:var(--slate-500);margin-top:4px">No stock item linked — event recorded only.</div>
                  `}
                  <div class="field" style="margin:6px 0 0"><label style="font-size:11px">Notes (optional)</label>
                    <input type="text" value=${c.notes} onChange=${e => updateChange(idx, { notes: e.target.value })} placeholder="Worn earlier than expected" style="font-size:12px;padding:5px 8px" />
                  </div>
                </div>
              `;
            })}
          </div>
        `}

        <div style="display:flex;gap:8px;margin-top:14px">
          <button type="button" class="btn ghost" onClick=${addChange} style="flex:1" disabled=${applicableTools.length === 0}>+ Add tool change</button>
          <button type="button" class="btn" onClick=${save} style="flex:1">Save</button>
        </div>
      </div>
    </div>
  `;
}

function StageLogModal({ plant, me, pendingEntry, parts, machines, dies, units, shifts, users, defaultDate, onClose, onSaved }) {
  const STAGE_OPTIONS = Object.entries(LOG_TEMPLATES).map(([v, t]) => ({ v, l: t.label }));

  // If filling pendingEntry, prefill from it; else default
  const isReconcile = !!pendingEntry?.id;
  const [form, setForm] = useState(isReconcile ? {
    log_date: pendingEntry.log_date,
    shift_id: pendingEntry.shift_id,
    unit_id: pendingEntry.unit_id || (units[0]?.id || ''),
    part_id: pendingEntry.part_id,
    stage: pendingEntry.stage,
    qty_good: pendingEntry.qty_good || '',
    qty_rejected: pendingEntry.qty_rejected || '',
    reject_reason: pendingEntry.reject_reason || '',
    machine_id: pendingEntry.machine_id || '',
    die_id: pendingEntry.die_id || '',
    operator_user_id: pendingEntry.operator_user_id || me.id,
    notes: pendingEntry.notes || '',
    category_attrs: pendingEntry.category_attrs || {},
  } : {
    log_date: defaultDate || new Date().toISOString().slice(0,10),
    shift_id: shifts[0]?.id || '',
    unit_id: units[0]?.id || '',
    part_id: parts[0]?.id || '',
    stage: 'pdc',
    qty_good: '',
    qty_rejected: '',
    reject_reason: '',
    machine_id: '',
    die_id: '',
    operator_user_id: me.id,
    notes: '',
    category_attrs: {},
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const { data, error } = await sb.rpc('log_stage_entry', {
        p_log_date: form.log_date,
        p_shift_id: form.shift_id,
        p_unit_id: null,
        p_part_id: form.part_id,
        p_stage: form.stage,
        p_qty_good: parseFloat(form.qty_good) || 0,
        p_qty_rejected: parseFloat(form.qty_rejected) || 0,
        p_reject_reason: form.reject_reason || null,
        p_machine_id: form.machine_id || null,
        p_die_id: form.die_id || null,
        p_operator_user_id: form.operator_user_id || null,
        p_notes: form.notes || null,
        p_category_attrs: form.category_attrs || {},
      });
      if (error) throw error;
      if (!data?.success) throw new Error(data?.error || 'Failed');
      showToast(isReconcile ? 'Entry reconciled' : 'Entry logged');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  // Resolve current template (fallback to 'other' if unknown stage)
  const tpl = LOG_TEMPLATES[form.stage] || LOG_TEMPLATES.other;
  const setAttr = (k, v) => setForm({ ...form, category_attrs: { ...form.category_attrs, [k]: v } });

  // Auto-detect stage from part route on part change (for new entries)
  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${isReconcile ? '⏰ Log pending entry' : 'Log production'}</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${isReconcile && html`
          <div class="alert info" style="margin-bottom:14px">
            Downstream stage <strong>${pendingEntry.triggered_by_stage}</strong> already logged. Enter your <strong>${pendingEntry.stage.toUpperCase()}</strong> count for ${pendingEntry.log_date}.
          </div>
        `}
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field-row">
            <div class="field"><label>Date *</label><input type="date" required value=${form.log_date} disabled=${isReconcile} onChange=${e => setForm({...form, log_date: e.target.value})} /></div>
            <div class="field"><label>Shift *</label>
              <select required value=${form.shift_id} disabled=${isReconcile} onChange=${e => setForm({...form, shift_id: e.target.value})}>
                ${shifts.map(s => html`<option key=${s.id} value=${s.id}>${s.name}</option>`)}
              </select>
            </div>
          </div>
          <div class="field"><label>Part *</label>
            <select required value=${form.part_id} disabled=${isReconcile} onChange=${e => setForm({...form, part_id: e.target.value})}>
              ${parts.map(p => html`<option key=${p.id} value=${p.id}>${p.part_number} · ${p.name}</option>`)}
            </select>
          </div>
          <div class="field"><label>Stage *</label>
            <select required value=${form.stage} disabled=${isReconcile} onChange=${e => setForm({...form, stage: e.target.value, category_attrs: {}, reject_reason: ''})}>
              ${STAGE_OPTIONS.map(s => html`<option key=${s.v} value=${s.v}>${s.l}</option>`)}
            </select>
          </div>
          ${(tpl.showMachine || tpl.showDie) && html`
            <div class="field-row">
              ${tpl.showMachine && html`
                <div class="field"><label>Machine</label>
                  <select value=${form.machine_id} onChange=${e => setForm({...form, machine_id: e.target.value})}>
                    <option value="">— None —</option>
                    ${machines.map(m => html`<option key=${m.id} value=${m.id}>${m.code}${m.category && m.category !== 'pdc' ? ' (' + m.category + ')' : ''}</option>`)}
                  </select>
                </div>
              `}
              ${tpl.showDie && html`
                <div class="field"><label>Die</label>
                  <select value=${form.die_id} onChange=${e => setForm({...form, die_id: e.target.value})}>
                    <option value="">— None —</option>
                    ${dies.map(d => html`<option key=${d.id} value=${d.id}>${d.code}</option>`)}
                  </select>
                </div>
              `}
            </div>
          `}
          <div class="field"><label>Operator * <span style="font-size:11px;color:var(--slate-500);font-weight:400">(person who ran the entry)</span></label>
            <select required value=${form.operator_user_id} onChange=${e => setForm({...form, operator_user_id: e.target.value})}>
              <option value="">— Select operator —</option>
              ${users.map(u => html`<option key=${u.id} value=${u.id}>${u.full_name}</option>`)}
            </select>
          </div>
          ${(form.stage === 'pdc' || form.category_attrs?.show_op2 || form.category_attrs?.operator_2_user_id) && html`
            <div class="field"><label>2nd Operator (optional) <span style="font-size:11px;color:var(--slate-500);font-weight:400">${form.stage === 'pdc' ? '— PDC often runs with 2 operators' : ''}</span></label>
              <select value=${form.category_attrs?.operator_2_user_id || ''} onChange=${e => setAttr('operator_2_user_id', e.target.value)}>
                <option value="">— None —</option>
                ${users.filter(u => u.id !== form.operator_user_id).map(u => html`<option key=${u.id} value=${u.id}>${u.full_name}</option>`)}
              </select>
            </div>
          `}
          ${form.stage !== 'pdc' && !form.category_attrs?.show_op2 && !form.category_attrs?.operator_2_user_id && html`
            <button type="button" class="btn small ghost" style="padding:4px 10px;font-size:11px;margin-bottom:8px" onClick=${() => setAttr('show_op2', true)}>+ Add 2nd operator</button>
          `}
          <div class="field" style="background:${form.category_attrs?.setup_change ? 'var(--amber-50)' : 'var(--slate-50)'};padding:10px 12px;border-radius:8px;border-left:3px solid ${form.category_attrs?.setup_change ? 'var(--amber-500)' : 'var(--slate-300)'}">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:0">
              <input type="checkbox" checked=${!!form.category_attrs?.setup_change} onChange=${e => setAttr('setup_change', e.target.checked)} style="width:auto" />
              <span style="font-size:13px;color:var(--slate-800)">⚙️ <b>Setup change</b> happened for this entry</span>
            </label>
            ${form.category_attrs?.setup_change && html`
              <div class="field-row" style="margin-top:8px">
                <div class="field" style="margin:0"><label style="font-size:11px">Setup time (min)</label><input type="number" value=${form.category_attrs?.setup_time_min || ''} onChange=${e => setAttr('setup_time_min', e.target.value)} placeholder="30" /></div>
                <div class="field" style="margin:0"><label style="font-size:11px">Previous part</label><input type="text" value=${form.category_attrs?.previous_part || ''} onChange=${e => setAttr('previous_part', e.target.value)} placeholder="Part code" /></div>
              </div>
            `}
          </div>
          <div class="field-row">
            <div class="field"><label>${tpl.qtyLabel} *</label><input type="number" required min=${0} step="0.01" value=${form.qty_good} onChange=${e => setForm({...form, qty_good: e.target.value})} /></div>
            <div class="field"><label>${tpl.rejectLabel}</label><input type="number" min=${0} step="0.01" value=${form.qty_rejected} onChange=${e => setForm({...form, qty_rejected: e.target.value})} /></div>
          </div>
          ${parseFloat(form.qty_rejected) > 0 && html`
            <div class="field"><label>Reject reason</label>
              <select value=${form.reject_reason} onChange=${e => setForm({...form, reject_reason: e.target.value})}>
                <option value="">— Select —</option>
                ${tpl.rejectReasons.map(r => html`<option key=${r} value=${r}>${r}</option>`)}
              </select>
            </div>
          `}
          ${tpl.extraFields.length > 0 && html`
            <div style="background:var(--slate-50);padding:10px 12px;border-radius:8px;margin:8px 0">
              <div style="font-size:11px;color:var(--slate-500);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">${tpl.label} details</div>
              <div class="field-row" style="flex-wrap:wrap">
                ${tpl.extraFields.map(f => html`
                  <div key=${f.k} class="field" style="flex:1;min-width:140px;margin-bottom:0">
                    <label>${f.label}</label>
                    ${f.type === 'select' ? html`
                      <select value=${form.category_attrs?.[f.k] || ''} onChange=${e => setAttr(f.k, e.target.value)}>
                        <option value="">—</option>
                        ${f.options.map(o => html`<option key=${o} value=${o}>${o}</option>`)}
                      </select>
                    ` : html`
                      <input type=${f.type} value=${form.category_attrs?.[f.k] || ''} onChange=${e => setAttr(f.k, e.target.value)} placeholder=${f.placeholder || ''} />
                    `}
                  </div>
                `)}
              </div>
            </div>
          `}
          <div class="field"><label>Notes</label><textarea rows=${2} value=${form.notes} onChange=${e => setForm({...form, notes: e.target.value})}></textarea></div>
          <button class="btn" disabled=${loading}>${loading ? 'Saving…' : (isReconcile ? 'Reconcile entry' : 'Log entry')}</button>
        </form>
      </div>
    </div>
  `;
}

// ============= STAGE OVERRIDE (plant head only) =============
function StageOverrideModal({ plant, me, entry, onClose, onSaved }) {
  const [reason, setReason] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const { data, error } = await sb.rpc('override_unlock_stage', {
        p_log_id: entry.id,
        p_reason: reason,
      });
      if (error) throw error;
      if (!data?.success) throw new Error(data?.error || 'Failed');
      showToast('Unlocked · broadcast posted to chat');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">🔓 Override lock</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${me.role !== 'plant_head' && me.role !== 'admin' ? html`
          <div class="alert error">Only plant head/admin can override locks.</div>
          <button class="btn ghost" onClick=${onClose}>Close</button>
        ` : html`
          <div class="card" style="background:var(--slate-50);margin-bottom:14px">
            <div class="card-row"><span class="label">Stage</span><span class="value">${entry.stage}</span></div>
            <div class="card-row"><span class="label">Date</span><span class="value">${entry.log_date}</span></div>
            <div class="card-row"><span class="label">Locked at</span><span class="value">${fmtDate(entry.locked_at)}</span></div>
          </div>
          <div class="alert info">Unlocking will be posted to the Logistics chat group with your reason. The entry can then be edited.</div>
          ${error && html`<div class="alert error">${error}</div>`}
          <form onSubmit=${submit}>
            <div class="field"><label>Reason for override *</label><textarea required rows=${3} value=${reason} onChange=${e => setReason(e.target.value)} placeholder="e.g. Operator forgot to log; vendor claim mismatch; audit correction"></textarea></div>
            <button class="btn danger" disabled=${loading}>${loading ? 'Unlocking…' : 'Unlock + broadcast'}</button>
          </form>
        `}
      </div>
    </div>
  `;
}

// ============= GRN RECEPTION MODAL — verify mappings, edit qty, accept into stock =============
function GrnReceptionModal({ plant, me, doc, onClose, onSaved }) {
  const [lines, setLines] = useState([]);
  const [stockItems, setStockItems] = useState([]);
  const [notes, setNotes] = useState('');
  const [loading, setLoading] = useState(true);
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');
  const [createItemModal, setCreateItemModal] = useState(null); // line index when creating new item

  // Load suggested mappings + all stock items
  useEffect(() => { load(); }, []);

  const load = async () => {
    setLoading(true);
    const [s, m] = await Promise.all([
      sb.rpc('suggest_grn_mappings', { p_doc_id: doc.id }),
      sb.from('mcp_stocks_items').select('*').order('name'),
    ]);
    if (s.error) { setError(s.error.message); setLoading(false); return; }
    const suggestions = s.data?.lines || [];
    setStockItems(m.data || []);
    setLines(suggestions.map(line => ({
      ...line,
      // mutable fields
      received_qty: line.invoice_qty,
      rejected_qty: 0,
      reject_reason: '',
      stock_item_id: line.matched_stock_id,
      notes: '',
    })));
    setLoading(false);
  };

  const updateLine = (idx, patch) => {
    setLines(prev => prev.map((l, i) => i === idx ? {...l, ...patch} : l));
  };

  const onCreateNewItem = (idx, newItem) => {
    setStockItems(prev => [...prev, newItem]);
    updateLine(idx, {
      stock_item_id: newItem.id,
      matched_stock_code: newItem.code,
      matched_stock_name: newItem.name,
      matched_stock_uom: newItem.uom,
      match_source: 'created',
      match_confidence: 'high',
    });
    setCreateItemModal(null);
  };

  const allMapped = lines.every(l => !!l.stock_item_id);
  const totalInvoice = lines.reduce((s, l) => s + parseFloat(l.invoice_qty || 0), 0);
  const totalReceived = lines.reduce((s, l) => s + parseFloat(l.received_qty || 0), 0);
  const shortagePct = totalInvoice > 0 ? ((totalInvoice - totalReceived) / totalInvoice) * 100 : 0;
  const willRaiseNcr = shortagePct > 5;

  const submit = async () => {
    setError(''); setSubmitting(true);
    try {
      // Validate
      for (let i = 0; i < lines.length; i++) {
        const l = lines[i];
        if (!l.stock_item_id) {
          throw new Error('Line ' + (i+1) + ' has no stock item mapped');
        }
        if (parseFloat(l.received_qty || 0) < 0) {
          throw new Error('Line ' + (i+1) + ': received qty cannot be negative');
        }
      }

      const payload = lines.map(l => ({
        stock_item_id: l.stock_item_id,
        vendor_item_name: l.invoice_name,
        invoice_qty: parseFloat(l.invoice_qty || 0),
        received_qty: parseFloat(l.received_qty || 0),
        rejected_qty: parseFloat(l.rejected_qty || 0),
        rate: parseFloat(l.invoice_rate || 0),
        uom: l.invoice_uom || l.matched_stock_uom || 'nos',
        reject_reason: l.reject_reason || null,
        notes: l.notes || null,
      }));

      const { data, error } = await sb.rpc('accept_grn_reception', {
        p_doc_id: doc.id,
        p_lines: payload,
        p_notes: notes || null,
      });
      if (error) throw error;
      if (!data?.success) throw new Error(data?.error || 'Failed');

      const msg = data.shortage_detected
        ? '✅ Stock added · ⚠️ Shortage NCR ' + data.ncr_number + ' raised + follow-up task created'
        : '✅ ' + data.lines_processed + ' line(s) added to stock';
      showToast(msg);
      onSaved();
    } catch (err) { setError(err.message); } finally { setSubmitting(false); }
  };

  if (loading) return html`
    <div class="modal-backdrop active"><div class="modal"><div class="loader"><div class="spinner"></div></div></div></div>
  `;

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal" style="max-width:720px">
        <div class="modal-header">
          <div class="modal-title">📥 Receive into Stock</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>

        <div class="card" style="background:var(--slate-50);margin-bottom:14px">
          <div class="card-row"><span class="label">Vendor</span><span class="value">${doc.vendor_name_raw || '?'}</span></div>
          <div class="card-row"><span class="label">Invoice #</span><span class="value mono">${doc.doc_number || '—'}</span></div>
          <div class="card-row"><span class="label">Date</span><span class="value">${doc.doc_date || '—'}</span></div>
          <div class="card-row"><span class="label">Amount</span><span class="value">₹${fmtNum(doc.total_value || 0)}</span></div>
        </div>

        ${error && html`<div class="alert error">${error}</div>`}

        ${shortagePct > 5 && html`
          <div class="alert info" style="background:var(--amber-50);border-color:var(--amber-200);color:var(--amber-700)">
            ⚠️ Shortage detected: ${shortagePct.toFixed(1)}%. NCR + vendor follow-up task will be auto-raised on accept.
          </div>
        `}

        <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--slate-700)">Items to receive (${lines.length})</div>

        ${lines.map((line, idx) => html`
          <div key=${idx} class="card" style="margin-bottom:10px;padding:12px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px">
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:600;line-height:1.3">${line.invoice_name || '(no name)'}</div>
                <div style="font-size:11px;color:var(--slate-500);margin-top:2px">Invoice: ${fmtNum(line.invoice_qty)} ${line.invoice_uom} × ₹${fmtNum(line.invoice_rate)}${line.invoice_hsn ? ' · HSN ' + line.invoice_hsn : ''}</div>
              </div>
              ${line.match_confidence === 'high' && html`<span class="badge emerald" style="flex-shrink:0;font-size:10px">${line.match_source === 'memory' ? '🧠 Remembered' : line.match_source === 'created' ? '🆕 Created' : '✓ Match'}</span>`}
              ${line.match_confidence === 'low' && html`<span class="badge amber" style="flex-shrink:0;font-size:10px">~ Fuzzy</span>`}
              ${line.match_confidence === 'none' && html`<span class="badge rose" style="flex-shrink:0;font-size:10px">No match</span>`}
            </div>

            <div class="field" style="margin-bottom:8px">
              <label style="font-size:11px">Map to stock item *</label>
              <div style="display:flex;gap:6px">
                <select required value=${line.stock_item_id || ''} onChange=${e => {
                  const it = stockItems.find(s => s.id === e.target.value);
                  updateLine(idx, {
                    stock_item_id: e.target.value || null,
                    matched_stock_code: it?.code,
                    matched_stock_name: it?.name,
                    matched_stock_uom: it?.uom,
                    match_source: 'manual',
                    match_confidence: e.target.value ? 'high' : 'none',
                  });
                }} style="flex:1">
                  <option value="">— Pick stock item —</option>
                  ${stockItems.map(s => html`<option key=${s.id} value=${s.id}>${s.code} · ${s.name} (${s.uom})</option>`)}
                </select>
                <button type="button" class="btn small ghost" onClick=${() => setCreateItemModal(idx)} style="flex-shrink:0">+ New</button>
              </div>
              ${line.stock_item_id && html`<div style="font-size:11px;color:var(--slate-500);margin-top:4px">Current stock: ${fmtNum(line.matched_current_qty || stockItems.find(s => s.id === line.stock_item_id)?.current_qty || 0)} ${stockItems.find(s => s.id === line.stock_item_id)?.uom}</div>`}
            </div>

            <div class="field-row" style="margin-bottom:8px">
              <div class="field">
                <label style="font-size:11px">Received qty *</label>
                <input type="number" step="0.001" min=${0} required value=${line.received_qty} onChange=${e => updateLine(idx, { received_qty: e.target.value })} style=${parseFloat(line.received_qty) < parseFloat(line.invoice_qty) ? 'border-color:var(--amber-400)' : ''} />
                ${parseFloat(line.received_qty) < parseFloat(line.invoice_qty) && html`<div style="font-size:10px;color:var(--amber-600);margin-top:2px">⚠️ Short by ${fmtNum(line.invoice_qty - line.received_qty)}</div>`}
              </div>
              <div class="field">
                <label style="font-size:11px">Rejected (damage)</label>
                <input type="number" step="0.001" min=${0} value=${line.rejected_qty} onChange=${e => updateLine(idx, { rejected_qty: e.target.value })} />
              </div>
            </div>

            ${parseFloat(line.rejected_qty) > 0 && html`
              <div class="field" style="margin-bottom:8px">
                <label style="font-size:11px">Reject reason</label>
                <input type="text" value=${line.reject_reason} onChange=${e => updateLine(idx, { reject_reason: e.target.value })} placeholder="Damaged in transit / wrong size / etc" />
              </div>
            `}

            <div class="field" style="margin-bottom:0">
              <label style="font-size:11px">Notes</label>
              <input type="text" value=${line.notes} onChange=${e => updateLine(idx, { notes: e.target.value })} placeholder="Optional" />
            </div>
          </div>
        `)}

        <div class="field" style="margin-top:14px">
          <label>Overall notes</label>
          <textarea rows=${2} value=${notes} onChange=${e => setNotes(e.target.value)} placeholder="Receipt remarks, signing person, etc"></textarea>
        </div>

        <div class="card" style="background:var(--slate-50);margin:14px 0">
          <div class="card-row" style="border:none;padding:4px 0"><span class="label">Total invoice qty</span><span class="value">${fmtNum(totalInvoice)}</span></div>
          <div class="card-row" style="border:none;padding:4px 0"><span class="label">Total received</span><span class="value" style=${shortagePct > 0 ? 'color:var(--amber-600)' : 'color:var(--emerald-600)'}>${fmtNum(totalReceived)}</span></div>
          ${shortagePct > 0 && html`<div class="card-row" style="border:none;padding:4px 0"><span class="label">Shortage</span><span class="value" style="color:${shortagePct > 5 ? 'var(--rose-500)' : 'var(--amber-600)'};font-weight:700">${shortagePct.toFixed(1)}%</span></div>`}
        </div>

        <button class="btn" onClick=${submit} disabled=${submitting || !allMapped} style="font-size:15px;padding:14px">
          ${submitting ? 'Adding to stock…' : !allMapped ? 'Map all items first' : '✅ Accept & add to stock'}
        </button>
        <button class="btn ghost" style="margin-top:8px;width:100%" onClick=${onClose}>Cancel</button>

        ${createItemModal !== null && html`<${QuickItemCreateModal} plant=${plant} prefillName=${lines[createItemModal].invoice_name} prefillUom=${lines[createItemModal].invoice_uom} onClose=${() => setCreateItemModal(null)} onSaved=${(item) => onCreateNewItem(createItemModal, item)} />`}
      </div>
    </div>
  `;
}

// ============= QUICK ITEM CREATE (for inline new item from GRN) =============
function QuickItemCreateModal({ plant, prefillName, prefillUom, onClose, onSaved }) {
  const [form, setForm] = useState({
    code: '',
    name: prefillName || '',
    category: 'raw_material',
    uom: prefillUom || 'nos',
    reorder_level: '',
    unit_cost: '',
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const { data, error } = await sb.from('mcp_stocks_items').insert({
        plant_id: plant.id,
        code: form.code,
        name: form.name,
        category: form.category,
        uom: form.uom,
        current_qty: 0,
        reorder_level: form.reorder_level ? parseFloat(form.reorder_level) : null,
        unit_cost: form.unit_cost ? parseFloat(form.unit_cost) : null,
      }).select().single();
      if (error) throw error;
