              </div>
            </div>
          `;
        }}
        ctaLabel="Open Schedules tab"
        onCtaClick=${() => { setTab('schedules'); setDrilldown(false); }}
        onClose=${() => setDrilldown(false)}
      />
    `}
  `;
}

// 3. MATERIAL BURN RATE — days of stock left at current consumption
function MaterialBurnRateCard({ plant, setTab }) {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [drilldown, setDrilldown] = useState(false);

  const refresh = async () => {
    // Only show items that have recent consumption (otherwise prediction is meaningless)
    const { data: rows } = await sb.from('v_material_burn_rate')
      .select('*')
      .gt('consumed_7d', 0)
      .order('days_of_stock_left', { ascending: true, nullsFirst: false })
      .limit(20);
    setData(rows || []);
    setLoading(false);
  };
  useEffect(() => { refresh(); }, []);

  if (loading) return html`<div class="card"><div class="card-title">⚙️ Material Burn Rate</div><div class="loader"><div class="spinner"></div></div></div>`;

  // Top 5 most at risk
  const atRisk = data.filter(r => ['out_of_stock','critical','warning'].includes(r.risk_level)).slice(0, 5);
  const safe = data.filter(r => r.risk_level === 'safe' || r.risk_level === 'low');

  if (data.length === 0) return html`
    <div class="card" onClick=${() => setTab('stocks')} style="cursor:pointer">
      <div class="card-title">⚙️ Material Burn Rate</div>
      <div class="empty" style="padding:14px"><div style="font-size:12px">No consumption recorded in last 7 days. Burn rate will appear once issues are logged.</div></div>
    </div>
  `;

  return html`
    <div class="card" onClick=${() => setDrilldown(true)} style="cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="card-title" style="margin:0">⚙️ Material Burn Rate</div>
        <span style="font-size:11px;color:var(--slate-500)">${atRisk.length} at risk · ${safe.length} safe · tap for details ▸</span>
      </div>
      ${atRisk.length === 0 ? html`
        <div style="font-size:12px;color:var(--emerald-700);padding:8px 0">✓ All ${data.length} active items have safe stock buffers</div>
      ` : html`
        <div style="display:flex;flex-direction:column;gap:6px">
          ${atRisk.map(r => {
            const isOut = r.risk_level === 'out_of_stock';
            const isCrit = r.risk_level === 'critical';
            const color = isOut || isCrit ? 'var(--rose-600)' : 'var(--amber-700)';
            const bg = isOut || isCrit ? 'var(--rose-50)' : 'var(--amber-50)';
            const daysLabel = isOut ? 'OUT' : (parseFloat(r.days_of_stock_left) < 1 ? '<1d' : Math.round(r.days_of_stock_left) + 'd');
            return html`
              <div key=${r.item_id} style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:${bg};border-radius:6px;font-size:12px">
                <div style="flex:1;min-width:0">
                  <div style="font-weight:600;color:var(--slate-800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.code} · ${r.name}</div>
                  <div style="font-size:10px;color:var(--slate-500);margin-top:1px">${fmtNum(r.current_qty)} ${r.uom} · using ${fmtNum(r.daily_avg_consumption)}/${r.uom}/day</div>
                </div>
                <div style="text-align:right;flex-shrink:0">
                  <div style="font-size:14px;font-weight:700;color:${color};line-height:1.1">${daysLabel}</div>
                  <div style="font-size:9px;color:var(--slate-500);text-transform:uppercase;letter-spacing:0.05em">${r.risk_level.replace('_', ' ')}</div>
                </div>
              </div>
            `;
          })}
        </div>
      `}
    </div>

    ${drilldown && html`
      <${DrillDownDrawer}
        title="⚙️ Material Burn Rate — All items"
        subtitle="Last 7 days consumption · ${atRisk.length} at risk · ${data.length} active items"
        items=${data}
        renderItem=${(r) => {
          const isOut = r.risk_level === 'out_of_stock';
          const isCrit = r.risk_level === 'critical';
          const isWarn = r.risk_level === 'warning';
          const sty = isOut ? { color:'var(--rose-700)', bg:'var(--rose-50)', border:'var(--rose-500)', label:'OUT' } :
                      isCrit ? { color:'var(--rose-700)', bg:'var(--rose-50)', border:'var(--rose-500)', label:'CRITICAL' } :
                      isWarn ? { color:'var(--amber-700)', bg:'var(--amber-50)', border:'var(--amber-500)', label:'WARNING' } :
                      { color:'var(--emerald-700)', bg:'var(--emerald-50)', border:'var(--emerald-500)', label:r.risk_level.toUpperCase() };
          const daysLabel = isOut ? 'OUT' : (r.days_of_stock_left == null ? '—' : Math.round(r.days_of_stock_left) + ' days');
          return html`
            <div key=${r.item_id} style="padding:10px 12px;background:${sty.bg};border-left:3px solid ${sty.border};border-radius:6px">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
                <div style="flex:1;min-width:0">
                  <div style="font-weight:600;color:var(--slate-900);font-size:13px">${r.code} · ${r.name}</div>
                  <div style="font-size:11px;color:var(--slate-600);margin-top:4px">
                    Current: <b>${fmtNum(r.current_qty)} ${r.uom || ''}</b>
                    ${r.daily_avg_consumption ? ' · Daily burn: ' + fmtNum(r.daily_avg_consumption) + '/day' : ''}
                    ${r.consumed_7d ? ' · 7-day: ' + fmtNum(r.consumed_7d) : ''}
                  </div>
                </div>
                <div style="text-align:right;flex-shrink:0">
                  <span style="background:${sty.color};color:white;font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px">${sty.label}</span>
                  <div style="font-size:14px;font-weight:700;color:${sty.color};margin-top:4px">${daysLabel}</div>
                </div>
              </div>
            </div>
          `;
        }}
        ctaLabel="Open Stocks tab"
        onCtaClick=${() => { setTab('stocks'); setDrilldown(false); }}
        onClose=${() => setDrilldown(false)}
      />
    `}
  `;
}

// 4. STAGE TRACKING LAG — what hasn't been logged
function StageLagCard({ plant, me, setTab }) {
  const [summary, setSummary] = useState(null);
  const [details, setDetails] = useState([]);
  const [loading, setLoading] = useState(true);
  const [drilldown, setDrilldown] = useState(false);

  const refresh = async () => {
    const [sumRes, detRes] = await Promise.all([
      sb.from('v_stage_lag_summary').select('*').single(),
      sb.from('mcp_pdc_stage_log')
        .select('id, log_date, stage, status, mcp_pdc_parts(part_number, name), shifts(name)')
        .in('status', ['pending','provisional'])
        .gte('log_date', new Date(Date.now() - 3 * 86400000).toISOString().slice(0, 10))
        .order('log_date', { ascending: false })
        .limit(50),
    ]);
    setSummary(sumRes.data);
    setDetails(detRes.data || []);
    setLoading(false);
  };
  useEffect(() => { refresh(); }, []);

  if (loading) return html`<div class="card"><div class="card-title">📋 Stage Tracking</div><div class="loader"><div class="spinner"></div></div></div>`;

  if (!summary || summary.total_slots === 0) return html`
    <div class="card" onClick=${() => setTab('production')} style="cursor:pointer">
      <div class="card-title">📋 Stage Tracking</div>
      <div class="empty" style="padding:14px"><div style="font-size:12px">No routing steps defined yet. Add stages in Production → Parts.</div></div>
    </div>
  `;

  const total = parseInt(summary.total_slots);
  const unlogged = parseInt(summary.unlogged_slots);
  const logged = total - unlogged;
  const pct = total > 0 ? (logged / total) * 100 : 0;
  const unloggedToday = parseInt(summary.unlogged_today || 0);
  const unloggedYesterday = parseInt(summary.unlogged_yesterday || 0);

  return html`
    <div class="card" onClick=${() => setDrilldown(true)} style="cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="card-title" style="margin:0">📋 Stage Tracking · last 3 days</div>
        <span style="font-size:11px;color:var(--slate-500)">tap for details ▸</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div>
          <div style="font-size:11px;color:var(--slate-500)">COMPLIANCE</div>
          <div style="font-size:24px;font-weight:700;color:${pct >= 80 ? 'var(--emerald-700)' : pct >= 50 ? 'var(--amber-700)' : 'var(--rose-600)'}">${pct.toFixed(0)}%</div>
          <div style="font-size:11px;color:var(--slate-500)">${logged} of ${total} slots logged</div>
        </div>
        <div style="text-align:right">
          ${unloggedToday > 0 && html`
            <div style="font-size:11px;color:var(--slate-500)">TODAY MISSING</div>
            <div style="font-size:18px;font-weight:700;color:${unloggedToday > 0 ? 'var(--amber-700)' : 'var(--emerald-700)'}">${unloggedToday}</div>
          `}
          ${unloggedYesterday > 0 && html`
            <div style="font-size:11px;color:var(--rose-600);margin-top:4px">⚠️ Y'day: ${unloggedYesterday} missed</div>
          `}
        </div>
      </div>
      <div style="background:var(--slate-100);height:6px;border-radius:3px;overflow:hidden">
        <div style="background:${pct >= 80 ? 'var(--emerald-500)' : pct >= 50 ? 'var(--amber-500)' : 'var(--rose-500)'};height:100%;width:${pct}%"></div>
      </div>
    </div>

    ${drilldown && html`
      <${DrillDownDrawer}
        title="📋 Stage Tracking — Pending entries"
        subtitle="${pct.toFixed(0)}% compliance · ${unlogged} slot${unlogged === 1 ? '' : 's'} unlogged in last 3 days"
        items=${details}
        emptyMsg="${unlogged === 0 ? '✓ All caught up — no pending entries' : 'No detail rows. The summary shows ' + unlogged + ' missing — open Production tab to investigate.'}"
        renderItem=${(d) => {
          const isYesterday = d.log_date < new Date().toISOString().slice(0, 10);
          const sty = isYesterday ? { color:'var(--rose-700)', bg:'var(--rose-50)', border:'var(--rose-500)' } : { color:'var(--amber-700)', bg:'var(--amber-50)', border:'var(--amber-500)' };
          return html`
            <div key=${d.id} style="padding:10px 12px;background:${sty.bg};border-left:3px solid ${sty.border};border-radius:6px">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
                <div style="flex:1;min-width:0">
                  <div style="font-weight:600;color:var(--slate-900);font-size:13px">${d.mcp_pdc_parts?.part_number || '?'} · ${d.stage}</div>

// =================================================================
// DRILL-DOWN DRAWER — bottom-sheet that shows specific records inline
// without navigating away. Any insight card can open it.
// =================================================================
function DrillDownDrawer({ title, subtitle, items, renderItem, ctaLabel, onCtaClick, onClose, emptyMsg }) {
  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal" style="max-width:520px">
        <div class="modal-header">
          <div>
            <div class="modal-title">${title}</div>
            ${subtitle && html`<div style="font-size:12px;color:var(--slate-500);font-weight:400;margin-top:2px">${subtitle}</div>`}
          </div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${items && items.length > 0 ? html`
          <div style="display:flex;flex-direction:column;gap:8px;max-height:50vh;overflow-y:auto;margin-bottom:14px">
            ${items.map((item, idx) => renderItem(item, idx))}
          </div>
        ` : html`
          <div class="empty" style="padding:20px;text-align:center;color:var(--slate-500);font-size:13px">${emptyMsg || 'Nothing to show'}</div>
        `}
        ${ctaLabel && onCtaClick && html`
          <button class="btn" onClick=${onCtaClick} style="width:100%">${ctaLabel} →</button>
        `}
      </div>
    </div>
  `;
}

function StockAlerts({ plant, setTab }) {
  const [alerts, setAlerts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [collapsed, setCollapsed] = useState(false);
  const [drillItem, setDrillItem] = useState(null);

  useEffect(() => { load(); }, [plant?.id]);

  const load = async () => {
    setLoading(true);
    const { data } = await sb.from('mcp_stocks_items')
      .select('id, code, name, current_qty, reorder_level, uom, category')
      .not('reorder_level', 'is', null)
      .order('name');
    const lows = (data || []).filter(i => i.current_qty <= i.reorder_level);
    setAlerts(lows);
    setLoading(false);
  };

  // Live updates
  useEffect(() => {
    if (!plant?.id) return;
    const channel = sb.channel('stock-alerts-' + plant.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_stocks_items', filter:'plant_id=eq.' + plant.id }, () => load())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id]);

  if (loading || alerts.length === 0) return null;

  const critical = alerts.filter(a => parseFloat(a.current_qty) === 0).length;
  const lblMap = { raw_material:'Raw', die_spares:'Die', consumables:'Cons.', tools:'Tools', packing:'Pack', bought_out:'Bought-out', general:'General' };

  return html`
    <div class="card" style="background:${critical > 0 ? 'var(--rose-50)' : 'var(--amber-50)'};border-color:${critical > 0 ? 'var(--rose-200)' : 'var(--amber-200)'};margin-bottom:14px">
      <div onClick=${() => setCollapsed(!collapsed)} style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:700;color:${critical > 0 ? 'var(--rose-700)' : 'var(--amber-700)'}">
          ${critical > 0 ? '🚨' : '⚠️'} Stock alerts · ${alerts.length} item${alerts.length > 1 ? 's' : ''}${critical > 0 ? ' · ' + critical + ' OUT OF STOCK' : ''}
        </div>
        <span style="color:var(--slate-500);font-size:18px">${collapsed ? '›' : '▼'}</span>
      </div>
      ${!collapsed && html`
        <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
          ${alerts.slice(0, 12).map(a => {
            const isOut = parseFloat(a.current_qty) === 0;
            return html`
              <div key=${a.id} onClick=${() => setDrillItem(a)} style="background:white;padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px">
                <div style="flex:1;min-width:0">
                  <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.code} · ${a.name}</div>
                  <div style="font-size:11px;color:var(--slate-500)">${lblMap[a.category || 'general']} · reorder at ${a.reorder_level}</div>
                </div>
                <span class=${'badge ' + (isOut ? 'rose' : 'amber')} style="flex-shrink:0">${isOut ? 'OUT' : fmtNum(a.current_qty) + ' ' + a.uom}</span>
              </div>
            `;
          })}
          ${alerts.length > 12 && html`<div style="font-size:11px;color:var(--slate-500);text-align:center;padding:6px">+ ${alerts.length - 12} more — tap any item for details</div>`}
          <button class="btn small ghost" style="margin-top:6px" onClick=${() => setTab('stocks')}>Open Stocks →</button>
        </div>
      `}
    </div>

    ${drillItem && html`
      <${DrillDownDrawer}
        title="📦 ${drillItem.code} · ${drillItem.name}"
        subtitle=${parseFloat(drillItem.current_qty) === 0 ? 'OUT OF STOCK' : 'Below reorder level'}
        items=${[drillItem]}
        renderItem=${(it) => {
          const isOut = parseFloat(it.current_qty) === 0;
          const sty = isOut ? { color:'var(--rose-700)', bg:'var(--rose-50)', border:'var(--rose-500)' } : { color:'var(--amber-700)', bg:'var(--amber-50)', border:'var(--amber-500)' };
          return html`
            <div style="padding:12px 14px;background:${sty.bg};border-left:3px solid ${sty.border};border-radius:6px">
              <div class="card-row"><span class="label">Current qty</span><span class="value" style="font-weight:700;color:${sty.color}">${fmtNum(it.current_qty)} ${it.uom || ''}</span></div>
              <div class="card-row"><span class="label">Reorder level</span><span class="value">${it.reorder_level} ${it.uom || ''}</span></div>
              <div class="card-row"><span class="label">Category</span><span class="value">${lblMap[it.category || 'general']}</span></div>
              <div class="card-row"><span class="label">Status</span><span class="value" style="font-weight:700;color:${sty.color}">${isOut ? '🚨 OUT OF STOCK' : '⚠️ Below reorder · need to procure'}</span></div>
            </div>
          `;
        }}
        ctaLabel="Open in Stocks tab"
        onCtaClick=${() => { setTab('stocks'); setDrillItem(null); }}
        onClose=${() => setDrillItem(null)}
      />
    `}
  `;
}

// ============= STAGE PENDING BANNER (blocks supervisors with overdue entries) =============
function StagePendingBanner({ plant, me, setTab }) {
  const [pending, setPending] = useState([]);
  const [loading, setLoading] = useState(true);
  const [logTarget, setLogTarget] = useState(null);

  useEffect(() => { load(); }, [plant?.id]);

  const load = async () => {
    setLoading(true);
    const { data } = await sb.from('v_my_pending_stage_entries')
      .select('*')
      .eq('plant_id', plant.id)
      .order('log_date');
    setPending(data || []);
    setLoading(false);
  };

  useEffect(() => {
    if (!plant?.id) return;
    const channel = sb.channel('stage-pending-' + plant.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_pdc_stage_log', filter:'plant_id=eq.' + plant.id }, () => load())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id]);

  if (loading || pending.length === 0) return null;

  // Anything past 11am next day is escalated
  const escalated = pending.filter(p => p.hours_past_11am > 0);
  const justPending = pending.filter(p => p.hours_past_11am <= 0);

  return html`
    <div class="card" style="background:${escalated.length > 0 ? 'var(--rose-50)' : 'var(--amber-50)'};border-color:${escalated.length > 0 ? 'var(--rose-200)' : 'var(--amber-200)'};margin-bottom:14px">
      <div style="font-weight:700;color:${escalated.length > 0 ? 'var(--rose-700)' : 'var(--amber-700)'};margin-bottom:8px">
        ${escalated.length > 0 ? '🚨 OVERDUE entries · ' + escalated.length : '⏰ Pending entries · ' + pending.length}
      </div>
      <div style="font-size:12px;color:var(--slate-700);margin-bottom:10px">
        ${escalated.length > 0
          ? 'These are past 11 AM next day. System will lock at 48 hours. Log now or contact Plant Head.'
          : 'Downstream stage logged. Need your count to reconcile.'}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${pending.slice(0, 10).map(p => {
          const isEscalated = p.hours_past_11am > 0;
          const hoursToLock = 48 - p.hours_pending;
          return html`
            <div key=${p.id} onClick=${() => setLogTarget(p)} style="background:white;padding:10px 12px;border-radius:8px;cursor:pointer">
              <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
                <div style="flex:1;min-width:0">
                  <div style="font-size:13px;font-weight:600">${p.stage.toUpperCase()} · ${p.part_label}</div>
                  <div style="font-size:11px;color:var(--slate-500)">${p.shift_name} · ${p.log_date} · downstream: ${p.triggered_by_stage || 'manual'}</div>
                </div>
                <span class=${'badge ' + (isEscalated ? 'rose' : 'amber')} style="flex-shrink:0;font-size:10px">
                  ${isEscalated ? 'OVERDUE' : Math.max(0, Math.round(hoursToLock)) + 'h to lock'}
                </span>
              </div>
            </div>
          `;
        })}
      </div>
      <button class="btn small ghost" style="width:100%;margin-top:10px" onClick=${() => setTab('production')}>Open Production →</button>

      ${logTarget && html`<${StageLogModal} plant=${plant} me=${me} pendingEntry=${logTarget} onClose=${() => setLogTarget(null)} onSaved=${() => { setLogTarget(null); load(); }} />`}
    </div>
  `;
}

// ============= DAILY DIGEST (Tasks reminder) =============
function DailyDigest({ me, setTab }) {
  const [digest, setDigest] = useState([]);
  const [loading, setLoading] = useState(true);
  const [collapsed, setCollapsed] = useState(false);

  useEffect(() => { load(); }, []);

  const load = async () => {
    setLoading(true);
    const { data } = await sb.from('v_user_daily_digest')
      .select('*')
      .or('owner_id.eq.' + me.id + ',owner_id.is.null')
      .order('digest_state', { ascending: true })
      .order('due_at', { ascending: true });
    setDigest(data || []);
    setLoading(false);
  };

  const markComplete = async (id) => {
    await sb.from('actions').update({ status: 'completed', completed_at: new Date().toISOString() }).eq('id', id);
    load();
  };

  const pending = digest.filter(d => d.digest_state === 'pending' && d.owner_id === me.id);
  const completedToday = digest.filter(d => d.digest_state === 'completed_today' && d.owner_id === me.id);
  const teamPending = digest.filter(d => d.digest_state === 'pending' && d.owner_id !== me.id && (me.role === 'plant_head' || me.role === 'admin'));

  if (loading) return null;
  if (pending.length === 0 && completedToday.length === 0 && teamPending.length === 0) return null;

  return html`
    <div class="card" style="background:var(--teal-50);border-color:var(--teal-100);margin-bottom:14px">
      <div onClick=${() => setCollapsed(!collapsed)} style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:700;color:var(--teal-700)">📋 Today's Tasks · ${pending.length} pending${completedToday.length > 0 ? ' · ' + completedToday.length + ' done' : ''}</div>
        <span style="color:var(--teal-600);font-size:18px">${collapsed ? '›' : '▼'}</span>
      </div>
      ${!collapsed && html`
        <div style="margin-top:12px">
          ${pending.length > 0 && html`
            <div style="font-size:11px;color:var(--slate-600);font-weight:600;margin:8px 0 4px">PENDING (you)</div>
            ${pending.map(t => {
              const overdue = t.due_at && new Date(t.due_at) < new Date();

// ============= UNIT ACCESS MODAL (manager+) =============
function UnitAccessModal({ plant, me, onClose }) {
  const [units, setUnits] = useState([]);
  const [users, setUsers] = useState([]);
  const [grants, setGrants] = useState([]);
  const [loading, setLoading] = useState(true);
  const [pickUser, setPickUser] = useState('');
  const [pickUnit, setPickUnit] = useState('');
  const [pickRole, setPickRole] = useState('operator');
  const [error, setError] = useState('');

  const load = async () => {
    setLoading(true);
    const [uRes, peopleRes, gRes] = await Promise.all([
      sb.from('units').select('id, name').order('name'),
      sb.from('users').select('id, full_name, role, status').eq('status','active').order('full_name'),
      sb.from('user_unit_access').select('id, user_id, unit_id, role, granted_at, granted_by'),
    ]);
    setUnits(uRes.data || []);
    setUsers(peopleRes.data || []);
    setGrants(gRes.data || []);
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const grant = async () => {
    setError('');
    if (!pickUser || !pickUnit) { setError('Pick user + unit'); return; }
    const { data, error: err } = await sb.rpc('grant_unit_access', { p_user_id: pickUser, p_unit_id: pickUnit, p_role: pickRole });
    if (err || !data?.success) { setError(err?.message || data?.error || 'Failed'); return; }
    showToast('Access granted');
    setPickUser(''); setPickUnit(''); setPickRole('operator');
    load();
  };

  const revoke = async (userId, unitId) => {
    if (!confirm('Revoke this access?')) return;
    const { data, error: err } = await sb.rpc('revoke_unit_access', { p_user_id: userId, p_unit_id: unitId });
    if (err || !data?.success) { setError(err?.message || data?.error || 'Failed'); return; }
    showToast('Revoked');
    load();
  };

  if (loading) return html`<div class="modal-backdrop active"><div class="modal"><div class="loader"><div class="spinner"></div></div></div></div>`;

  // Group grants by user
  const grantsByUser = new Map();
  for (const g of grants) {
    if (!grantsByUser.has(g.user_id)) grantsByUser.set(g.user_id, []);
    grantsByUser.get(g.user_id).push(g);
  }

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal" style="max-width:580px">
        <div class="modal-header">
          <div class="modal-title">🔐 Unit Access Management</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}

        <div class="card" style="background:var(--teal-50);padding:10px 12px;margin-bottom:12px;border-left:3px solid var(--teal-500)">
          <div style="font-size:11px;font-weight:700;color:var(--teal-700);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">+ GRANT ACCESS</div>
          <div class="field-row" style="margin-bottom:6px">
            <div class="field" style="margin:0"><label style="font-size:11px">User</label>
              <select value=${pickUser} onChange=${e => setPickUser(e.target.value)} style="font-size:12px">
                <option value="">— Pick user —</option>
                ${users.map(u => html`<option key=${u.id} value=${u.id}>${u.full_name}</option>`)}
              </select>
            </div>
            <div class="field" style="margin:0"><label style="font-size:11px">Unit</label>
              <select value=${pickUnit} onChange=${e => setPickUnit(e.target.value)} style="font-size:12px">
                <option value="">— Pick unit —</option>
                ${units.map(u => html`<option key=${u.id} value=${u.id}>${u.name}</option>`)}
              </select>
            </div>
          </div>
          <div class="field-row" style="margin-bottom:0">
            <div class="field" style="margin:0;flex:2"><label style="font-size:11px">Role in this unit</label>
              <select value=${pickRole} onChange=${e => setPickRole(e.target.value)} style="font-size:12px">
                <option value="operator">Operator (entry only)</option>
                <option value="supervisor">Supervisor</option>
                <option value="manager">Manager (can grant access)</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <button class="btn small" onClick=${grant} style="font-size:12px;align-self:flex-end;margin-bottom:0">Grant</button>
          </div>
        </div>

        <div style="font-size:11px;font-weight:700;color:var(--slate-700);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">CURRENT GRANTS</div>
        ${grantsByUser.size === 0 ? html`<div class="empty" style="padding:14px;text-align:center;font-size:12px;color:var(--slate-500)">No grants yet</div>` :
          html`<div style="max-height:40vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px">
            ${[...grantsByUser.entries()].map(([userId, gs]) => {
              const u = users.find(x => x.id === userId);
              return html`
                <div key=${userId} style="border:1px solid var(--slate-200);border-radius:8px;padding:10px 12px">
                  <div style="font-weight:600;font-size:13px;color:var(--slate-800);margin-bottom:4px">${u?.full_name || 'Unknown'}</div>
                  <div style="display:flex;flex-direction:column;gap:4px">
                    ${gs.map(g => {
                      const unit = units.find(u => u.id === g.unit_id);
                      return html`
                        <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0">
                          <span style="color:var(--slate-700)">${unit?.name || '?'} · <span class="badge ${g.role === 'manager' || g.role === 'admin' ? 'teal' : ''}">${g.role}</span></span>
                          <button class="btn small ghost" style="padding:2px 8px;font-size:10px;color:var(--rose-600)" onClick=${() => revoke(g.user_id, g.unit_id)}>Revoke</button>
                        </div>
                      `;
                    })}
                  </div>
                </div>
              `;
            })}
          </div>`
        }
      </div>
    </div>
  `;
}

// ============= PUSH NOTIFICATION SETTING =============
function PushNotifSetting({ me, plant }) {
  const [perm, setPerm] = useState(typeof Notification !== 'undefined' ? Notification.permission : 'unsupported');
  const [subscribed, setSubscribed] = useState(false);
  const [busy, setBusy] = useState(false);

  useEffect(() => { (async () => {
    if (!('serviceWorker' in navigator) || !swRegistration) return;
    try {
      const sub = await swRegistration.pushManager.getSubscription();
      setSubscribed(!!sub);
    } catch (_) {}
  })(); }, []);

  const toggle = async () => {
    setBusy(true);
    try {
      if (subscribed) {
        await disablePushNotifications();
        setSubscribed(false);
        showToast('Push notifications disabled on this device');
      } else {
        const r = await enablePushNotifications(me.id, plant.id);
        if (r.success) {
          setPerm('granted');
          setSubscribed(true);
          showToast('Push notifications enabled');
        } else {
          if (r.reason === 'denied') alert('You blocked notifications. Enable in browser settings to use this.');
          else if (r.reason === 'unsupported') alert('Your browser does not support push notifications.');
          else if (r.reason === 'vapid_not_set') alert('Push not configured on server (admin: set VAPID_PUBLIC_KEY).');
          else alert('Failed: ' + (r.reason || 'unknown'));
        }
      }
    } finally { setBusy(false); }
  };

  return html`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;font-size:14px">🔔 Push notifications</div>
          <div style="font-size:11px;color:var(--slate-500)">${subscribed ? 'Enabled on this device — chat, tasks, alerts' : 'Get alerts even when Loglinkr is closed'}</div>
        </div>
        <button class=${'btn small ' + (subscribed ? 'danger' : '')} onClick=${toggle} disabled=${busy}>${subscribed ? 'Disable' : 'Enable'}</button>
      </div>
    </div>
  `;
}

// =================================================================
// ACTIVITY TIMELINE + COMMENTS — generic component for any entity
// Usage: <${EntityTimeline} entityType="breakdown" entityId=${id} plant=${plant} me=${me} />
// =================================================================
function EntityTimeline({ entityType, entityId, plant, me, allowComments = true }) {
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [draft, setDraft] = useState('');
  const [posting, setPosting] = useState(false);

  const refresh = async () => {
    const { data, error } = await sb.rpc('get_timeline', { p_entity_type: entityType, p_entity_id: entityId });
    if (error) console.error('timeline:', error);
    setEvents(data || []);
    setLoading(false);
  };
  useEffect(() => { refresh(); }, [entityType, entityId]);

  // Realtime: refresh on any new activity_log or comment for this entity
  useEffect(() => {
    if (!entityId) return;
    const channel = sb.channel('timeline-' + entityType + '-' + entityId)
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'activity_log', filter:'entity_id=eq.' + entityId }, () => refresh())
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'entity_comments', filter:'entity_id=eq.' + entityId }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [entityType, entityId]);

  const postComment = async () => {
    if (!draft.trim()) return;
    setPosting(true);
    try {
      const { error } = await sb.rpc('post_comment', { p_entity_type: entityType, p_entity_id: entityId, p_body: draft.trim() });
      if (error) throw error;
      setDraft('');
    } catch (err) { alert('Failed: ' + err.message); }
    finally { setPosting(false); }
  };

  const fmtRelTime = (ts) => {
    const d = new Date(ts);
    return d.toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' });
  };

  // Map event to display
  const renderEvent = (e) => {
    const actorInitials = (e.actor_name || '?').split(' ').filter(Boolean).slice(0,2).map(s=>s[0]).join('').toUpperCase() || '?';
    const isComment = e.event_kind === 'comment';

    let icon, iconBg, label, detail;
    if (isComment) {
      icon = '💬'; iconBg = 'var(--teal-100)';
      label = e.actor_name || 'Someone';
      detail = e.body;
    } else {
      switch (e.event_type) {
        case 'created':
          icon = '📌'; iconBg = 'var(--slate-100)';
          label = (e.actor_name || 'Someone') + ' created this';
          detail = e.payload?.title ? '"' + e.payload.title + '"' : '';
          break;
        case 'status_changed':
          const to = e.payload?.to;
          const from = e.payload?.from;
          icon = to === 'resolved' || to === 'closed' ? '✅' : (to === 'attended' || to === 'in_progress' ? '🟡' : '🔄');
          iconBg = to === 'resolved' || to === 'closed' ? 'var(--emerald-100)' : 'var(--amber-100)';
          label = (e.actor_name || 'Someone') + ' changed status';
          detail = (from || '?') + ' → ' + (to || '?');
          break;
        case 'assigned':
          icon = '👤'; iconBg = 'var(--indigo-50)';
          label = (e.actor_name || 'Someone') + ' changed assignment';
          detail = e.payload?.to ? 'Assigned to ' + e.payload.to : 'Unassigned';
          break;
        case 'updated':
          icon = '✏️'; iconBg = 'var(--slate-100)';
          label = (e.actor_name || 'Someone') + ' updated';
          if (e.payload?.field === 'resolution_notes') {
            label = (e.actor_name || 'Someone') + ' added resolution notes';
            detail = e.payload?.note || '';
          } else {
            detail = e.payload?.field || '';
          }
          break;
        default:
          icon = '•'; iconBg = 'var(--slate-100)';
          label = (e.actor_name || 'Someone') + ' · ' + e.event_type;
          detail = '';
      }
    }

    return html`
      <div key=${e.event_id} style="display:flex;gap:10px;align-items:flex-start;padding:8px 0">
        <div style="width:28px;height:28px;border-radius:50%;background:${iconBg};display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">${icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;color:var(--slate-700);line-height:1.4">
            <span style="font-weight:600;color:var(--slate-900)">${label}</span>
          </div>
          ${detail && html`<div style="font-size:13px;color:var(--slate-700);margin-top:3px;${isComment ? 'background:var(--teal-50);padding:8px 10px;border-radius:8px;border-left:3px solid var(--teal-500);white-space:pre-wrap' : ''}">${detail}</div>`}
          <div style="font-size:11px;color:var(--slate-500);margin-top:3px">${fmtRelTime(e.created_at)}</div>
        </div>
      </div>
    `;
  };

  return html`
    <div style="border-top:1px solid var(--slate-200);margin-top:14px;padding-top:14px">
      <div style="font-size:11px;font-weight:700;color:var(--slate-500);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">
        Activity · ${events.length}
      </div>
      ${loading ? html`<div style="padding:14px;text-align:center"><div class="spinner" style="margin:0 auto"></div></div>` :
       events.length === 0 ? html`<div style="font-size:12px;color:var(--slate-500);padding:8px 0">No activity yet.</div>` :
       html`<div style="position:relative;padding-left:14px;border-left:2px solid var(--slate-200);margin-left:14px">${events.map(renderEvent)}</div>`
      }
      ${allowComments && html`
        <div style="margin-top:14px;display:flex;gap:8px;align-items:flex-end">
          <textarea
            value=${draft}
            onChange=${e => setDraft(e.target.value)}
            placeholder="Add an update or note…"
            rows=${2}
            style="flex:1;padding:8px 10px;font-size:13px;border:1px solid var(--slate-200);border-radius:8px;font-family:inherit;resize:vertical;min-height:38px"
          ></textarea>
          <button
            class="btn small"
            onClick=${postComment}
            disabled=${posting || !draft.trim()}
            style="padding:8px 14px;flex-shrink:0;height:38px;background:var(--teal-600);color:white"
          >${posting ? '…' : 'Post'}</button>
        </div>
      `}
    </div>
  `;
}

function NcrModal({ plant, me, editTarget, onClose, onSaved }) {
  const [form, setForm] = useState(editTarget ? {...editTarget} : {
    title:'', description:'', severity:'minor', source:'manual',
    part_number:'', qty_affected:'', root_cause:'', corrective_action:''
  });
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => {
    sb.from('users').select('*').then(({ data }) => setUsers(data || []));
  }, []);

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      if (editTarget) {
        const updates = {
          title: form.title, description: form.description,
          severity: form.severity, status: form.status,
          part_number: form.part_number || null,
          qty_affected: form.qty_affected ? parseInt(form.qty_affected) : null,
          root_cause: form.root_cause || null,
          corrective_action: form.corrective_action || null,
          assigned_to: form.assigned_to || null,
        };
        if (form.status === 'closed' && !editTarget.closed_at) {
          updates.closed_at = new Date().toISOString();
          updates.closed_by = me.id;
        }
        const { error } = await sb.from('mcp_quality_ncrs').update(updates).eq('id', editTarget.id);
        if (error) throw error;
      } else {
        const { data: existing } = await sb.from('mcp_quality_ncrs').select('id', { count:'exact', head:true });
        const num = 'NCR-' + new Date().toISOString().slice(2,7).replace('-','') + '-' + String((existing?.count || 0) + 1).padStart(4,'0');
        const { error } = await sb.from('mcp_quality_ncrs').insert({
          plant_id: plant.id,
          ncr_number: num,
          source: form.source || 'manual',
          title: form.title,
          description: form.description || null,
          severity: form.severity,
          raised_by: me.id,
          assigned_to: form.assigned_to || null,
          part_number: form.part_number || null,
          qty_affected: form.qty_affected ? parseInt(form.qty_affected) : null,
        });
        if (error) throw error;
      }
      showToast(editTarget ? 'NCR updated' : 'NCR raised');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${editTarget ? editTarget.ncr_number : 'Raise NCR'}</div>

        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>

          <div class="field"><label>Description</label><textarea rows=${3} value=${form.description || ''} onChange=${e => setForm({...form, description: e.target.value})}></textarea></div>
          <div class="field-row">
            <div class="field"><label>Part Number</label><input type="text" value=${form.part_number || ''} onChange=${e => setForm({...form, part_number: e.target.value})} /></div>
            <div class="field"><label>Qty Affected</label><input type="number" value=${form.qty_affected || ''} onChange=${e => setForm({...form, qty_affected: e.target.value})} /></div>
          </div>
          <div class="field"><label>Severity</label>
            <select value=${form.severity} onChange=${e => setForm({...form, severity: e.target.value})}>
              <option value="minor">Minor</option><option value="major">Major</option><option value="critical">Critical</option>
            </select>

                <option value="verification">Verification</option><option value="closed">Closed</option>
                <option value="cancelled">Cancelled</option>

            <div class="field"><label>Corrective Action</label><textarea rows=${2} value=${form.corrective_action || ''} onChange=${e => setForm({...form, corrective_action: e.target.value})}></textarea></div>

        </form>
        ${editTarget && html`<${EntityTimeline} entityType="ncr" entityId=${editTarget.id} plant=${plant} me=${me} />`}

    </div>
  `;
}

function Maintenance({ plant, me }) {
  const [breakdowns, setBreakdowns] = useState([]);
  const [machines, setMachines] = useState([]);
  const [users, setUsers] = useState([]);
  const [modal, setModal] = useState(null);
  const [editTarget, setEditTarget] = useState(null);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('open');

  const refresh = useCallback(async () => {
    setLoading(true);
    let q = sb.from('mcp_maintenance_breakdowns').select('*, machines(code), reported_by_user:reported_by(full_name), attended_by_user:attended_by(full_name)').order('reported_at', { ascending:false });
    if (filter === 'open') q = q.neq('status', 'resolved').neq('status', 'cancelled');
    else if (filter === 'resolved') q = q.eq('status', 'resolved');
    const [b, m, u] = await Promise.all([
      q.limit(100),
      sb.from('machines').select('*').order('code'),
      sb.from('users').select('*').order('full_name')
    ]);
    setBreakdowns(b.data || []);
    setMachines(m.data || []);
    setUsers(u.data || []);

  }, [filter]);

  useEffect(() => { refresh(); }, [refresh]);

  const machinesDown = machines.filter(m => m.status === 'breakdown').length;

  return html`
    <div class="page-header"><div><h1>Maintenance</h1><div class="sub">Breakdowns, machine status</div></div></div>

    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">

      <div class="stat ${machinesDown > 0 ? 'rose' : 'teal'}"><div class="stat-num">${machinesDown}</div><div class="stat-label">Machines Down</div></div>
      <div class="stat teal"><div class="stat-num">${breakdowns.filter(b => b.status === 'resolved').length}</div><div class="stat-label">Resolved</div></div>

    <div class="auth-tabs" style="margin-bottom:14px">

      <button class=${'auth-tab' + (filter === 'resolved' ? ' active' : '')} onClick=${() => setFilter('resolved')}>Resolved</button>
      <button class=${'auth-tab' + (filter === 'all' ? ' active' : '')} onClick=${() => setFilter('all')}>All</button>
    </div>

    <div class="section-h">Breakdowns · ${breakdowns.length}<button class="btn small ghost" onClick=${() => { setEditTarget(null); setModal('breakdown'); }} disabled=${machines.length === 0}>+ Report</button></div>
    ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
      breakdowns.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">✓</div>No breakdowns ${machines.length === 0 ? '— add machines first' : ''}</div></div>` :
      breakdowns.map(b => html`
        <div class="list-item" key=${b.id} onClick=${() => { setEditTarget(b); setModal('breakdown'); }}>
          <div class="list-item-row">
            <div class="list-item-main">
              <div class="list-item-title">${b.machines?.code || 'unknown'} · ${b.description.slice(0,50)}</div>
              <div class="list-item-sub">By ${b.reported_by_user?.full_name || '?'}${b.attended_by_user ? ' · attended by ' + b.attended_by_user.full_name : ''} · ${fmtDate(b.reported_at)}</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
              <span class=${'badge ' + (b.status === 'resolved' ? 'emerald' : b.status === 'attended' ? 'amber' : 'rose')}>${b.status}</span>
              ${b.downtime_minutes && html`<span style="font-size:10px;color:var(--slate-500)">${b.downtime_minutes}m down</span>`}
            </div>
          </div>
        </div>
      `)
    }

    <div class="section-h">Machine Status</div>
    ${machines.map(m => html`
      <div class="list-item" key=${m.id}>
        <div class="list-item-row">
          <div class="list-item-main">
            <div class="list-item-title">${m.code} · ${m.make || ''} ${m.tonnage ? '· ' + m.tonnage + 'T' : ''}</div>
          </div>
          <span class=${'badge ' + (m.status === 'running' ? 'emerald' : m.status === 'breakdown' ? 'rose' : m.status === 'maintenance' ? 'amber' : '')}>${m.status}</span>
        </div>
      </div>

    ${modal === 'breakdown' && html`<${BreakdownModal} plant=${plant} me=${me} machines=${machines} users=${users} editTarget=${editTarget} onClose=${() => { setModal(null); setEditTarget(null); }} onSaved=${() => { setModal(null); setEditTarget(null); refresh(); }} />`}
  `;
}

    setLoading(true);

      sb.from('mcp_stocks_items').select('*').order('name'),
      sb.from('mcp_stocks_transactions').select('*, mcp_stocks_items(code,name,uom,category), users:performed_by(full_name)').order('created_at', { ascending:false }).limit(500),
    ]);
    setItems(i.data || []);
    setTransactions(t.data || []);
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  // Live updates on stock changes
  useEffect(() => {
    if (!plant?.id) return;

      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_stocks_items', filter:'plant_id=eq.' + plant.id }, () => refresh())
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_stocks_transactions', filter:'plant_id=eq.' + plant.id }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id, refresh]);

  const lowStockCount = items.filter(i => i.reorder_level && i.current_qty <= i.reorder_level).length;

  // Filter by category + search
  let filteredItems = items;
  if (categoryFilter !== 'all') filteredItems = filteredItems.filter(i => (i.category || 'general') === categoryFilter);

  // Group by category for category view

    const c = i.category || 'general';

    byCategory[c].push(i);
  }

  // Get unique category list with counts
  const categoryCounts = items.reduce((acc, i) => {
    const c = i.category || 'general';
    acc[c] = (acc[c] || 0) + 1;
    return acc;
  }, {});

  const categoryLabels = {
    raw_material: 'Raw Material',
    die_spares: 'Die Spares',
    consumables: 'Consumables',
    tools: 'Tools',
    packing: 'Packing',
    bought_out: 'Bought-out',
    general: 'General',

              <button class="btn small" onClick=${(e) => { e.stopPropagation(); setEditTarget({...i, _txnHint:'grn'}); setModal('txn'); }} style="background:var(--emerald-600);color:white;padding:4px 10px">+ In</button>
              <button class="btn small ghost" onClick=${(e) => { e.stopPropagation(); setEditTarget({...i, _txnHint:'issue'}); setModal('txn'); }} style="padding:4px 10px">− Out</button>
