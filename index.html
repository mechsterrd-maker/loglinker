function ScheduleAddModal({ plant, me, customers, parts, onClose, onSaved }) {
  const [mode, setMode] = useState('upload');
  const [customerId, setCustomerId] = useState('');
  const [scheduleMonth, setScheduleMonth] = useState(() => {
    const d = new Date(); d.setDate(1);
    return d.toISOString().slice(0, 7);
  });
  const [customerRef, setCustomerRef] = useState('');
  const [notes, setNotes] = useState('');
  const [lines, setLines] = useState([
    { part_name_raw:'', customer_part_number:'', delivery_date:'', planned_qty:'', uom:'nos' }
  ]);
  const [file, setFile] = useState(null);
  const [extracting, setExtracting] = useState(false);
  const [extracted, setExtracted] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const onPickFile = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    setFile(f); setExtracted(null); setError('');
  };

  const runExtraction = async () => {
    if (!file) return;
    setExtracting(true); setError('');
    try {
      const reader = new FileReader();
      const dataUrl = await new Promise((resolve, reject) => {
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      const base64 = dataUrl.split(',')[1];
      const mediaType = file.type || 'image/jpeg';

      const { data: { session } } = await sb.auth.getSession();
      const resp = await fetch(SUPABASE_URL + '/functions/v1/extract-schedule', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + (session?.access_token || SUPABASE_ANON_KEY),
        },
        body: JSON.stringify({ image_base64: base64, media_type: mediaType }),
      });
      const result = await resp.json();
      if (!resp.ok || !result.success) throw new Error(result.error || 'Extraction failed');

      const ex = result.data;
      setExtracted(ex);

      if (ex.schedule_month) setScheduleMonth(ex.schedule_month.slice(0, 7));
      if (ex.customer_ref) setCustomerRef(ex.customer_ref);
      if (ex.notes) setNotes(ex.notes);

      if (ex.customer_name && !customerId) {
        const match = customers.find(c =>
          c.name.toLowerCase() === ex.customer_name.toLowerCase() ||
          c.short_code?.toLowerCase() === ex.customer_short_code?.toLowerCase() ||
          c.name.toLowerCase().includes(ex.customer_name.toLowerCase()) ||
          ex.customer_name.toLowerCase().includes(c.name.toLowerCase())
        );
        if (match) setCustomerId(match.id);
      }

      if (Array.isArray(ex.lines) && ex.lines.length > 0) {
        setLines(ex.lines.map(l => ({
          part_name_raw: l.part_name_raw || '',
          customer_part_number: l.customer_part_number || '',
          delivery_date: l.delivery_date || '',
          planned_qty: l.planned_qty || '',
          uom: l.uom || 'nos',
          rate: l.rate || '',
        })));
        setMode('manual');
      }
    } catch (err) { setError('AI extract failed: ' + err.message); }
    finally { setExtracting(false); }
  };

  const updateLine = (idx, patch) => setLines(prev => prev.map((l, i) => i === idx ? {...l, ...patch} : l));
  const addLine = () => setLines(prev => [...prev, { part_name_raw:'', customer_part_number:'', delivery_date:'', planned_qty:'', uom:'nos' }]);
  const removeLine = (idx) => setLines(prev => prev.filter((_, i) => i !== idx));

  // Group lines by part for compact display
  const groupedByPart = (() => {
    const g = {};
    lines.forEach((l, idx) => {
      const key = l.part_name_raw + '|' + (l.customer_part_number || '');
      if (!g[key]) g[key] = { part_name: l.part_name_raw, customer_code: l.customer_part_number, indices: [] };
      g[key].indices.push(idx);
    });
    return Object.values(g);
  })();

  const submit = async () => {
    setError(''); setLoading(true);
    try {
      if (!customerId) throw new Error('Pick a customer');
      const validLines = lines.filter(l => l.part_name_raw.trim() && parseFloat(l.planned_qty || 0) > 0);
      if (validLines.length === 0) throw new Error('Add at least one part with quantity');

      const monthDate = scheduleMonth + '-01';
      const { data, error } = await sb.rpc('create_schedule_with_lines', {
        p_customer_id: customerId,
        p_schedule_month: monthDate,
        p_lines: validLines.map(l => ({
          part_name_raw: l.part_name_raw.trim(),
          customer_part_number: l.customer_part_number?.trim() || null,
          delivery_date: l.delivery_date || null,
          planned_qty: parseFloat(l.planned_qty),
          uom: l.uom || 'nos',
          rate: l.rate ? parseFloat(l.rate) : null,
        })),
        p_source_type: extracted ? 'upload' : 'manual',
        p_customer_ref: customerRef || null,
        p_notes: notes || null,
      });
      if (error) throw error;
      if (!data?.success) throw new Error(data?.error || 'Failed');
      showToast(data.replaced ? 'Schedule replaced ✓ ' + data.lines_inserted + ' lines' : 'Schedule created ✓ ' + data.lines_inserted + ' lines');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal" style="max-width:760px">
        <div class="modal-header">
          <div class="modal-title">📅 New Schedule</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>

        ${error && html`<div class="alert error">${error}</div>`}

        <div class="auth-tabs" style="margin-bottom:14px">
          <button class=${'auth-tab' + (mode === 'upload' ? ' active' : '')} onClick=${() => setMode('upload')}>📎 Upload + AI</button>
          <button class=${'auth-tab' + (mode === 'manual' ? ' active' : '')} onClick=${() => setMode('manual')}>✏️ Manual</button>
        </div>

        ${mode === 'upload' && html`
          <div class="card" style="background:var(--teal-50);border-color:var(--teal-200);margin-bottom:14px">
            <div style="font-size:13px;color:var(--slate-700);margin-bottom:10px">Upload customer's schedule (PDF/image/Excel screenshot). Claude (Sonnet 4.5) will read each (part × date × qty) cell and pre-fill below.</div>
            <input type="file" accept="image/*,application/pdf" onChange=${onPickFile} style="font-size:13px" />
            ${file && html`
              <div style="margin-top:10px;font-size:12px;color:var(--slate-600)">📎 ${file.name} · ${(file.size/1024).toFixed(0)} KB</div>
              <button class="btn small" style="margin-top:10px" onClick=${runExtraction} disabled=${extracting}>${extracting ? 'Reading carefully (15-30s)…' : '🔍 Extract with AI'}</button>
            `}
            ${extracted && html`
              <div style="margin-top:10px;padding:10px;background:white;border-radius:8px;font-size:12px">
                <div style="font-weight:600;color:var(--emerald-700);margin-bottom:4px">✓ Extracted (${extracted.confidence})</div>
                <div>Customer: ${extracted.customer_name || '?'}</div>
                <div>Month: ${extracted.schedule_month || '?'}</div>
                <div>Format detected: ${extracted.format_detected || '?'}</div>
                <div>Lines: ${extracted.lines?.length || 0} (${extracted.extraction_summary?.total_parts || '?'} parts)</div>
                <div>Total qty: ${fmtNum(extracted.extraction_summary?.total_qty || 0)}</div>
                <div style="font-size:11px;color:var(--slate-500);margin-top:6px">Switch to ✏️ Manual to verify before saving.</div>
              </div>
            `}
          </div>
        `}

        ${mode === 'manual' && html`
          <div class="field-row">
            <div class="field"><label>Customer *</label>
              <select required value=${customerId} onChange=${e => setCustomerId(e.target.value)}>
                <option value="">— Select —</option>
                ${customers.map(c => html`<option key=${c.id} value=${c.id}>${c.name}${c.short_code ? ' · ' + c.short_code : ''}</option>`)}
              </select>
            </div>
            <div class="field"><label>Month *</label><input type="month" required value=${scheduleMonth} onChange=${e => setScheduleMonth(e.target.value)} /></div>
          </div>

          <div class="field"><label>Customer Ref / PO</label><input type="text" value=${customerRef} onChange=${e => setCustomerRef(e.target.value)} /></div>

          <div class="field"><label>Notes</label><textarea rows=${1} value=${notes} onChange=${e => setNotes(e.target.value)}></textarea></div>

          <div class="section-h" style="margin-top:14px">
            Lines · ${lines.length} (${groupedByPart.length} parts)
            <button class="btn small ghost" onClick=${addLine} type="button">+ Add line</button>
          </div>

          ${lines.map((l, idx) => html`
            <div key=${idx} style="display:flex;gap:6px;margin-bottom:6px;align-items:flex-end;padding:8px;background:var(--slate-50);border-radius:8px">
              <div style="flex:2">
                <div style="font-size:10px;color:var(--slate-500);margin-bottom:2px">Part</div>
                <input type="text" required value=${l.part_name_raw} onChange=${e => updateLine(idx, { part_name_raw: e.target.value })} placeholder="Part name" style="width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--slate-200);border-radius:6px" />
              </div>
              <div style="flex:0.8">
                <div style="font-size:10px;color:var(--slate-500);margin-bottom:2px">Code</div>
                <input type="text" value=${l.customer_part_number || ''} onChange=${e => updateLine(idx, { customer_part_number: e.target.value })} placeholder="Cust code" style="width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--slate-200);border-radius:6px" />
              </div>
              <div style="flex:1">
                <div style="font-size:10px;color:var(--slate-500);margin-bottom:2px">Date *</div>
                <input type="date" required value=${l.delivery_date || ''} onChange=${e => updateLine(idx, { delivery_date: e.target.value })} style="width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--slate-200);border-radius:6px" />
              </div>
              <div style="flex:0.8">
                <div style="font-size:10px;color:var(--slate-500);margin-bottom:2px">Qty *</div>
                <input type="number" required step="0.001" min=${0} value=${l.planned_qty} onChange=${e => updateLine(idx, { planned_qty: e.target.value })} placeholder="Qty" style="width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--slate-200);border-radius:6px" />
              </div>
              <button type="button" class="btn small ghost" onClick=${() => removeLine(idx)} style="color:var(--rose-600);padding:4px 8px;flex-shrink:0">×</button>
            </div>
          `)}

          <button class="btn" onClick=${submit} disabled=${loading} style="margin-top:14px">${loading ? 'Saving…' : '✓ Save schedule (' + lines.filter(l=>l.part_name_raw.trim() && parseFloat(l.planned_qty||0)>0).length + ' lines)'}</button>
        `}
      </div>
    </div>
  `;
}

// ============= SCHEDULE DETAIL — date-first, 3 views =============
function ScheduleDetail({ plant, me, schedule, onClose }) {
  const [view, setView] = useState('today');  // 'today' | 'week' | 'month'
  const [progress, setProgress] = useState([]);
  const [supplies, setSupplies] = useState([]);
  const [loading, setLoading] = useState(true);
  const [supplyModal, setSupplyModal] = useState(null);  // null | line_object
  const [confirmDelete, setConfirmDelete] = useState(false);

  const refresh = async () => {
    setLoading(true);
    const [p, s] = await Promise.all([
      sb.from('v_sched_line_progress').select('*').eq('schedule_id', schedule.id).order('delivery_date'),
      sb.from('mcp_sched_supplies').select('*, recorded_user:recorded_by(full_name)').eq('schedule_id', schedule.id).order('dispatch_date', { ascending: false }),
    ]);
    setProgress(p.data || []);
    setSupplies(s.data || []);
    setLoading(false);
  };
  useEffect(() => { refresh(); }, [schedule.id]);

  useEffect(() => {
    const channel = sb.channel('sched-detail-' + schedule.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_sched_supplies', filter:'schedule_id=eq.' + schedule.id }, () => refresh())
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_sched_lines', filter:'schedule_id=eq.' + schedule.id }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [schedule.id]);

  const deleteSchedule = async () => {
    const { error } = await sb.from('mcp_sched_schedules').delete().eq('id', schedule.id);
    if (error) { alert('Failed: ' + error.message); return; }
    showToast('Schedule deleted');
    onClose();
  };

  if (loading) return html`<div class="loader"><div class="spinner"></div></div>`;

  const totalPlanned = progress.reduce((s, l) => s + parseFloat(l.planned_qty || 0), 0);
  const totalSupplied = progress.reduce((s, l) => s + parseFloat(l.supplied_qty || 0), 0);
  const overallPct = totalPlanned > 0 ? Math.min(100, (totalSupplied / totalPlanned) * 100) : 0;
  const overallGap = totalPlanned - totalSupplied;

  // Today's deliveries
  const todayStr = new Date().toISOString().slice(0, 10);
  const todayLines = progress.filter(l => l.delivery_date === todayStr);
  const overdueLines = progress.filter(l => l.delivery_date < todayStr && parseFloat(l.gap_qty || 0) > 0);

  // Week ahead (next 7 days)
  const weekDates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    weekDates.push(d.toISOString().slice(0, 10));
  }
  const weekLines = progress.filter(l => weekDates.includes(l.delivery_date));

  // Group lines for month matrix
  const allDates = [...new Set(progress.map(l => l.delivery_date).filter(Boolean))].sort();
  const partsByName = {};
  for (const p of progress) {
    const key = p.part_name_raw + '|' + (p.customer_part_number || '');
    if (!partsByName[key]) partsByName[key] = { part_name: p.part_name_raw, customer_code: p.customer_part_number, byDate: {}, totalP: 0, totalS: 0 };
    partsByName[key].byDate[p.delivery_date] = p;
    partsByName[key].totalP += parseFloat(p.planned_qty || 0);
    partsByName[key].totalS += parseFloat(p.supplied_qty || 0);
  }
  const partList = Object.values(partsByName);

  const fmtDay = (dStr) => {
    if (!dStr) return '?';
    const d = new Date(dStr);
    return d.getDate() + ' ' + d.toLocaleString('en-IN', { month: 'short' });
  };

  return html`
    <div class="page-header" style="display:flex;align-items:center;gap:10px">
      <button class="btn ghost small" style="padding:6px 10px" onClick=${onClose}>← Back</button>
      <div style="flex:1;min-width:0">
        <h1 style="font-size:18px">${schedule.customer?.name || schedule.customer_id}</h1>
        <div class="sub">${new Date(schedule.schedule_month).toLocaleDateString('en-IN', { month:'long', year:'numeric' })}${schedule.customer_ref ? ' · ' + schedule.customer_ref : ''}</div>
      </div>
      ${(me.role === 'plant_head' || me.role === 'admin') && html`<button class="btn small ghost" style="color:var(--rose-600)" onClick=${() => setConfirmDelete(true)}>🗑️</button>`}
    </div>

    <div class="card" style="background:${overallPct >= 90 ? 'var(--emerald-50)' : overallPct >= 60 ? 'var(--teal-50)' : 'var(--amber-50)'};border-color:${overallPct >= 90 ? 'var(--emerald-200)' : overallPct >= 60 ? 'var(--teal-200)' : 'var(--amber-200)'}">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px">
        <div>
          <div style="font-size:12px;color:var(--slate-600);font-weight:600">OVERALL</div>
          <div style="font-size:24px;font-weight:700;color:${overallPct >= 90 ? 'var(--emerald-700)' : overallPct >= 60 ? 'var(--teal-700)' : 'var(--amber-700)'}">${overallPct.toFixed(1)}%</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--slate-500)">SUPPLIED / PLANNED</div>
          <div style="font-size:14px;font-weight:600">${fmtNum(totalSupplied)} / ${fmtNum(totalPlanned)}</div>
          ${overallGap > 0 && html`<div style="font-size:12px;color:var(--rose-600);font-weight:600">⚠️ ${fmtNum(overallGap)} short</div>`}
        </div>
      </div>
      <div style="background:white;height:8px;border-radius:4px;overflow:hidden">
        <div style="background:${overallPct >= 90 ? 'var(--emerald-500)' : overallPct >= 60 ? 'var(--teal-500)' : 'var(--amber-500)'};height:100%;width:${overallPct}%"></div>
      </div>
    </div>

    <div class="auth-tabs" style="margin-top:14px;margin-bottom:14px">
      <button class=${'auth-tab' + (view === 'today' ? ' active' : '')} onClick=${() => setView('today')}>Today (${todayLines.length}${overdueLines.length > 0 ? ' + ' + overdueLines.length + '⚠️' : ''})</button>
      <button class=${'auth-tab' + (view === 'week' ? ' active' : '')} onClick=${() => setView('week')}>7 Days</button>
      <button class=${'auth-tab' + (view === 'month' ? ' active' : '')} onClick=${() => setView('month')}>Month Matrix</button>
    </div>

    ${view === 'today' && html`
      ${overdueLines.length > 0 && html`
        <div class="section-h" style="color:var(--rose-600)">⚠️ Overdue · ${overdueLines.length}</div>
        ${overdueLines.map(l => html`
          <div class="list-item" key=${l.line_id} style="border-left:3px solid var(--rose-500)">
            <div class="list-item-row">
              <div class="list-item-main">
                <div class="list-item-title">${l.part_name_raw}${l.customer_part_number ? ' · ' + l.customer_part_number : ''}</div>
                <div class="list-item-sub" style="color:var(--rose-600)">Was due ${fmtDay(l.delivery_date)} · ${fmtNum(l.gap_qty)} pending</div>
              </div>
              <button class="btn small" onClick=${(e) => { e.stopPropagation(); setSupplyModal(l); }}>+ Log</button>
            </div>
          </div>
        `)}
      `}

      <div class="section-h" style="color:var(--teal-700)">📅 Today · ${todayLines.length}</div>
      ${todayLines.length === 0 ? html`<div class="empty"><div style="font-size:13px">No deliveries scheduled for today.</div></div>` :
        todayLines.map(l => html`
          <div class="list-item" key=${l.line_id} style="border-left:3px solid ${l.urgency === 'done' ? 'var(--emerald-500)' : 'var(--amber-500)'}">
            <div class="list-item-row">
              <div class="list-item-main">
                <div class="list-item-title">${l.part_name_raw}${l.customer_part_number ? ' · ' + l.customer_part_number : ''}</div>
                <div class="list-item-sub">Plan ${fmtNum(l.planned_qty)} · Supplied ${fmtNum(l.supplied_qty)} ${l.gap_qty > 0 ? '· ⚠️ ' + fmtNum(l.gap_qty) + ' pending' : '· ✓ done'}</div>
              </div>
              ${l.gap_qty > 0 && html`<button class="btn small" onClick=${(e) => { e.stopPropagation(); setSupplyModal(l); }}>+ Log</button>`}
              ${l.gap_qty <= 0 && html`<span class="badge emerald">✓</span>`}
            </div>
          </div>
        `)
      }
    `}

    ${view === 'week' && html`
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--slate-200);border-radius:10px;background:white">
        <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:540px">
          <thead style="background:var(--slate-50)">
            <tr>
              <th style="text-align:left;padding:8px 10px;border-bottom:1px solid var(--slate-200);position:sticky;left:0;background:var(--slate-50);z-index:1;min-width:140px">Part</th>
              ${weekDates.map(d => {
                const isToday = d === todayStr;
                return html`<th key=${d} style="padding:6px 4px;border-bottom:1px solid var(--slate-200);background:${isToday ? 'var(--teal-100)' : 'var(--slate-50)'};font-weight:${isToday ? 700 : 600}">${fmtDay(d)}</th>`;
              })}
            </tr>
          </thead>
          <tbody>
            ${partList.map((p, i) => {
              const hasAnyInWeek = weekDates.some(d => p.byDate[d]);
              if (!hasAnyInWeek) return null;
              return html`
                <tr key=${i} style="border-bottom:1px solid var(--slate-100)">
                  <td style="padding:6px 10px;position:sticky;left:0;background:white;font-weight:500;font-size:11px">
                    <div>${p.part_name}</div>
                    ${p.customer_code && html`<div style="font-size:9px;color:var(--slate-500)">${p.customer_code}</div>`}
                  </td>
                  ${weekDates.map(d => {
                    const cell = p.byDate[d];
                    if (!cell) return html`<td key=${d} style="padding:4px;text-align:center;color:var(--slate-300)">—</td>`;
                    const cellPct = cell.planned_qty > 0 ? (cell.supplied_qty / cell.planned_qty) * 100 : 0;
                    const bg = cellPct >= 100 ? 'var(--emerald-50)' : cellPct > 0 ? 'var(--amber-50)' : (cell.urgency === 'overdue' ? 'var(--rose-50)' : 'transparent');
                    return html`
                      <td key=${d} style="padding:4px;text-align:center;background:${bg};cursor:pointer" onClick=${() => cell.gap_qty > 0 && setSupplyModal(cell)}>
                        <div style="font-weight:600">${fmtNum(cell.planned_qty)}</div>
                        ${cell.supplied_qty > 0 && html`<div style="font-size:9px;color:var(--emerald-600)">+${fmtNum(cell.supplied_qty)}</div>`}
                        ${cell.gap_qty > 0 && cell.urgency === 'overdue' && html`<div style="font-size:9px;color:var(--rose-600)">⚠️</div>`}
                      </td>
                    `;
                  })}
                </tr>
              `;
            })}
          </tbody>
        </table>
      </div>
      <div style="font-size:11px;color:var(--slate-500);margin-top:8px;text-align:center">Tap any cell with pending qty to log a supply</div>
    `}

    ${view === 'month' && html`
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--slate-200);border-radius:10px;background:white">
        <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:${100 + allDates.length * 60}px">
          <thead style="background:var(--slate-50)">
            <tr>
              <th style="text-align:left;padding:8px;border-bottom:1px solid var(--slate-200);position:sticky;left:0;background:var(--slate-50);z-index:1;min-width:120px">Part</th>
              ${allDates.map(d => html`<th key=${d} style="padding:6px 4px;border-bottom:1px solid var(--slate-200);font-weight:600;${d === todayStr ? 'background:var(--teal-100)' : ''}">${fmtDay(d)}</th>`)}
              <th style="padding:6px 4px;border-bottom:1px solid var(--slate-200);background:var(--slate-100);font-weight:700">Total</th>
            </tr>
          </thead>
          <tbody>
            ${partList.map((p, i) => html`
              <tr key=${i} style="border-bottom:1px solid var(--slate-100)">
                <td style="padding:6px 8px;position:sticky;left:0;background:white;font-weight:500;font-size:11px">
                  <div>${p.part_name}</div>
                  ${p.customer_code && html`<div style="font-size:9px;color:var(--slate-500)">${p.customer_code}</div>`}
                </td>
                ${allDates.map(d => {
                  const cell = p.byDate[d];
                  if (!cell) return html`<td key=${d} style="padding:4px;text-align:center;color:var(--slate-300)">—</td>`;
                  const cellPct = cell.planned_qty > 0 ? (cell.supplied_qty / cell.planned_qty) * 100 : 0;
                  const bg = cellPct >= 100 ? 'var(--emerald-50)' : cellPct > 0 ? 'var(--amber-50)' : 'transparent';
                  return html`
                    <td key=${d} style="padding:4px;text-align:center;background:${bg}">
                      <div style="font-weight:600">${fmtNum(cell.planned_qty)}</div>
                      ${cell.supplied_qty > 0 && html`<div style="font-size:9px;color:var(--emerald-600)">+${fmtNum(cell.supplied_qty)}</div>`}
                    </td>
                  `;
                })}
                <td style="padding:6px 4px;text-align:center;background:var(--slate-50);font-weight:700;min-width:90px">
                  <div style="font-size:12px;color:var(--slate-800)">${fmtNum(p.totalP)}</div>
                  ${p.totalS > 0 ? html`
                    <div style="font-size:10px;color:var(--emerald-700);font-weight:600;margin-top:2px">+${fmtNum(p.totalS)} supplied</div>
                    ${p.totalP > p.totalS && html`<div style="font-size:10px;color:var(--rose-700);font-weight:600;margin-top:1px">−${fmtNum(p.totalP - p.totalS)} short</div>`}
                    <div style="font-size:9px;color:${p.totalS >= p.totalP ? 'var(--emerald-600)' : 'var(--amber-600)'};margin-top:1px">${((p.totalS/p.totalP)*100).toFixed(0)}%</div>
                  ` : html`
                    <div style="font-size:10px;color:var(--rose-700);font-weight:600;margin-top:2px">${fmtNum(p.totalP)} pending</div>
                    <div style="font-size:9px;color:var(--slate-400);margin-top:1px">0%</div>
                  `}
                </td>
              </tr>
            `)}
          </tbody>
        </table>
      </div>
    `}

    <div class="section-h">Supplies · ${supplies.length}</div>
    ${supplies.length === 0 ? html`<div class="empty"><div style="font-size:13px">No supplies yet.</div></div>` :
      supplies.slice(0, 20).map(s => html`
        <div class="list-item" key=${s.id}>
          <div class="list-item-row">
            <div class="list-item-main">
              <div class="list-item-title">${fmtNum(s.supplied_qty)} ${s.dc_number ? '· DC ' + s.dc_number : ''}</div>
              <div class="list-item-sub">${new Date(s.dispatch_date).toLocaleDateString('en-IN')} · ${s.recorded_user?.full_name || '?'}${s.vehicle_number ? ' · ' + s.vehicle_number : ''}</div>
            </div>
          </div>
        </div>
      `)
    }

    ${supplyModal && html`<${SupplyEntryModal} plant=${plant} me=${me} schedule=${schedule} progress=${progress} prefillLine=${supplyModal} onClose=${() => setSupplyModal(null)} onSaved=${() => { setSupplyModal(null); refresh(); }} />`}
    ${confirmDelete && html`
      <div class="modal-backdrop active">
        <div class="modal" style="max-width:380px">
          <div class="modal-header"><div class="modal-title">Delete schedule?</div><button class="close-btn" onClick=${() => setConfirmDelete(false)}>×</button></div>
          <div style="font-size:13px;margin-bottom:14px;color:var(--slate-700)">This will delete the schedule and all ${progress.length} lines. Supply records will be deleted too. Cannot be undone.</div>
          <div style="display:flex;gap:8px">
            <button class="btn ghost" onClick=${() => setConfirmDelete(false)} style="flex:1">Cancel</button>
            <button class="btn danger" onClick=${deleteSchedule} style="flex:1">🗑️ Delete</button>
          </div>
        </div>
      </div>
    `}
  `;
}

// ============= LOG SUPPLY MODAL (date-aware) =============
function SupplyEntryModal({ plant, me, schedule, progress, prefillLine, onClose, onSaved }) {
  const [form, setForm] = useState({
    line_id: prefillLine?.line_id || '',
    part_name: prefillLine?.part_name_raw || '',
    supplied_qty: prefillLine ? (prefillLine.gap_qty || prefillLine.planned_qty) : '',
    dispatch_date: new Date().toISOString().slice(0, 10),
    dc_number: '',
    invoice_number: '',
    vehicle_number: '',
    notes: '',
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const partOptions = [...new Set(progress.map(p => p.part_name_raw))];

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const { data, error } = await sb.rpc('record_supply', {
        p_customer_id: schedule.customer_id,
        p_part_name: form.part_name.trim(),
        p_supplied_qty: parseFloat(form.supplied_qty),
        p_dispatch_date: form.dispatch_date,
        p_dc_number: form.dc_number || null,
        p_invoice_number: form.invoice_number || null,
        p_vehicle_number: form.vehicle_number || null,
        p_notes: form.notes || null,
        p_target_line_id: form.line_id || null,
      });
      if (error) throw error;
      if (!data?.success) throw new Error(data?.error || 'Failed');
      const dt = new Date(data.matched_delivery_date).toLocaleDateString('en-IN');
      showToast('Supply logged · matched ' + dt);
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">📦 Log Supply</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${prefillLine && html`
          <div class="card" style="background:var(--teal-50);border-color:var(--teal-200);margin-bottom:12px">
            <div style="font-size:12px;color:var(--teal-700);font-weight:600">Crediting to:</div>
            <div style="font-size:13px;font-weight:500">${prefillLine.part_name_raw} · ${new Date(prefillLine.delivery_date).toLocaleDateString('en-IN')}</div>
            <div style="font-size:11px;color:var(--slate-600)">Plan ${fmtNum(prefillLine.planned_qty)} · Pending ${fmtNum(prefillLine.gap_qty)}</div>
          </div>
        `}
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          ${!prefillLine && html`
            <div class="field"><label>Part *</label>
              <input type="text" required list="schedparts-${schedule.id}" value=${form.part_name} onChange=${e => setForm({...form, part_name: e.target.value})} placeholder="Part name or code" />
              <datalist id=${'schedparts-' + schedule.id}>
                ${partOptions.map(p => html`<option key=${p} value=${p} />`)}
              </datalist>
            </div>
          `}
          <div class="field-row">
            <div class="field"><label>Supplied Qty *</label><input type="number" required step="0.001" min=${0.001} value=${form.supplied_qty} onChange=${e => setForm({...form, supplied_qty: e.target.value})} /></div>
            <div class="field"><label>Dispatch Date *</label><input type="date" required value=${form.dispatch_date} onChange=${e => setForm({...form, dispatch_date: e.target.value})} /></div>
          </div>
          <div class="field-row">
            <div class="field"><label>DC Number</label><input type="text" value=${form.dc_number} onChange=${e => setForm({...form, dc_number: e.target.value})} /></div>
            <div class="field"><label>Invoice #</label><input type="text" value=${form.invoice_number} onChange=${e => setForm({...form, invoice_number: e.target.value})} /></div>
          </div>
          <div class="field"><label>Vehicle Number</label><input type="text" value=${form.vehicle_number} onChange=${e => setForm({...form, vehicle_number: e.target.value})} /></div>
          <div class="field"><label>Notes</label><textarea rows=${1} value=${form.notes} onChange=${e => setForm({...form, notes: e.target.value})}></textarea></div>
          <button class="btn" disabled=${loading}>${loading ? 'Logging…' : 'Log supply'}</button>
        </form>
      </div>
    </div>
  `;
}

// =================================================================
// AI AUDITOR — runs an AI-powered audit pass and shows findings
// =================================================================
const AUDIT_TYPES = {
  quick: {
    label: 'Quick Audit',
    icon: '⚡',
    desc: 'Last 48 hours · uses Haiku 4.5 · fast turnaround',
    cost_range: '₹4–10',
    duration: '15–30 sec',
    best_for: 'Daily morning check, on-demand',
  },
  weekly: {
    label: 'Weekly Deep Audit',
    icon: '📊',
    desc: 'Last 7 days · uses Sonnet 4.5 · deeper reasoning',
    cost_range: '₹15–30',
    duration: '30–60 sec',
    best_for: 'Monday weekly review',
  },
  pre_iatf: {
    label: 'Pre-IATF Audit',
    icon: '🎯',
    desc: 'Last 90 days · uses Sonnet 4.5 · comprehensive',
    cost_range: '₹40–80',
    duration: '60–120 sec',
    best_for: 'Before quarterly/annual IATF audit',
  },
};

const VERDICT_STYLES = {
  green:  { color:'#047857', bg:'#d1fae5', label:'GREEN · Healthy', emoji:'✅' },
  yellow: { color:'#b45309', bg:'#fef3c7', label:'YELLOW · Watch', emoji:'⚠️' },
  orange: { color:'#c2410c', bg:'#ffedd5', label:'ORANGE · Action needed', emoji:'🟠' },
  red:    { color:'#be123c', bg:'#fecaca', label:'RED · Audit risk', emoji:'🚨' },
};

const SEVERITY_STYLES = {
  critical: { color:'#be123c', bg:'#fecaca', label:'CRITICAL', icon:'🚨' },
  warning:  { color:'#b45309', bg:'#fef3c7', label:'WARNING',  icon:'⚠️' },
  info:     { color:'#475569', bg:'#f1f5f9', label:'INFO',     icon:'ℹ️' },
  positive: { color:'#047857', bg:'#d1fae5', label:'POSITIVE', icon:'✓' },
};

function AIAuditor({ plant, me }) {
  const [audits, setAudits] = useState([]);
  const [loading, setLoading] = useState(true);
  const [running, setRunning] = useState(false);
  const [error, setError] = useState('');
  const [confirmType, setConfirmType] = useState(null);  // 'quick' | 'weekly' | 'pre_iatf'
  const [activeRun, setActiveRun] = useState(null);

  const refresh = async () => {
    const { data } = await sb.from('ai_audit_runs').select('*').order('created_at', { ascending: false }).limit(20);
    setAudits(data || []);
    setLoading(false);
  };
  useEffect(() => { refresh(); }, []);

  // Realtime updates
  useEffect(() => {
    const ch = sb.channel('audit-runs')
      .on('postgres_changes', { event:'*', schema:'public', table:'ai_audit_runs' }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(ch); };
  }, []);

  const runAudit = async (auditType) => {
    setError(''); setRunning(true); setConfirmType(null);
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (!session?.access_token) {
        throw new Error('No active session — please log out and log back in');
      }
      const res = await fetch(SUPABASE_URL + '/functions/v1/run-ai-audit', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + session.access_token,
          'apikey': SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({ audit_type: auditType }),
      });
      // Try to parse JSON; if status is not OK and body isn't JSON, show raw
      let data;
      const text = await res.text();
      try { data = JSON.parse(text); }
      catch { throw new Error('Server returned: ' + res.status + ' ' + text.slice(0, 200)); }
      if (!res.ok || !data.success) throw new Error(data.error || ('HTTP ' + res.status));
      // Show the run we just completed
      setActiveRun(data.run_id);
      await refresh();
    } catch (e) {
      setError(e.message);
    } finally {
      setRunning(false);
    }
  };

  const lastAudit = audits[0];
  const lastByType = {};
  for (const a of audits) {
    if (a.status === 'completed' && !lastByType[a.audit_type]) lastByType[a.audit_type] = a;
  }

  if (activeRun) {
    const run = audits.find(a => a.id === activeRun);
    if (run) return html`<${AuditDetailView} run=${run} onBack=${() => setActiveRun(null)} />`;
  }

  return html`
    <div class="card" style="background:linear-gradient(135deg, var(--teal-700), var(--teal-600));color:white;border:none;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:11px;opacity:0.85;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">🤖 AI AUDITOR</div>
          <div style="font-size:22px;font-weight:700;line-height:1.2;margin-top:4px">Let Claude review your plant</div>
          <div style="font-size:12px;opacity:0.9;margin-top:6px">Pick an audit type below. Claude reads your plant data and returns IATF-style findings with evidence.</div>
        </div>
      </div>
    </div>

    ${error && html`
      <div class="card" style="background:var(--rose-50);border-color:var(--rose-200);margin-bottom:14px">
        <div style="font-size:13px;color:var(--rose-700)">${error}</div>
      </div>
    `}

    <div class="section-h">RUN AN AUDIT</div>
    <div class="grid-cards" style="margin-bottom:18px">
      ${Object.entries(AUDIT_TYPES).map(([key, cfg]) => {
        const last = lastByType[key];
        return html`
          <div key=${key} class="list-item" style="cursor:pointer" onClick=${() => !running && setConfirmType(key)}>
            <div style="display:flex;gap:12px;align-items:flex-start">
              <div style="font-size:28px;flex-shrink:0">${cfg.icon}</div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:600;color:var(--slate-900);font-size:14px">${cfg.label}</div>
                <div style="font-size:11px;color:var(--slate-500);margin-top:2px;line-height:1.5">${cfg.desc}</div>
                <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
                  <span style="background:var(--teal-50);color:var(--teal-700);font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600">~${cfg.cost_range}/audit</span>
                  <span style="background:var(--slate-100);color:var(--slate-600);font-size:10px;padding:2px 6px;border-radius:4px">${cfg.duration}</span>
                </div>
                ${last && html`
                  <div style="font-size:11px;color:var(--slate-500);margin-top:8px">
                    Last run: ${new Date(last.created_at).toLocaleDateString('en-IN', {dateStyle:'medium'})} ·
                    <span style="color:${VERDICT_STYLES[last.verdict]?.color || 'inherit'};font-weight:600">${VERDICT_STYLES[last.verdict]?.emoji || ''} ${last.verdict?.toUpperCase() || ''}</span>
                  </div>
                `}
              </div>
            </div>
          </div>
        `;
      })}
    </div>

    <div class="section-h">RECENT AUDITS</div>
    ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
     audits.length === 0 ? html`<div class="card"><div class="empty"><div style="font-size:13px">No audits yet. Tap one of the cards above to run your first.</div></div></div>` :
     html`
      <div style="display:flex;flex-direction:column;gap:8px">
        ${audits.map(a => {
          const verdict = VERDICT_STYLES[a.verdict] || VERDICT_STYLES.yellow;
          const findings = a.findings || [];
          const critical = findings.filter(f => f.severity === 'critical').length;
          const warnings = findings.filter(f => f.severity === 'warning').length;
          return html`
            <div key=${a.id} class="list-item" onClick=${() => a.status === 'completed' && setActiveRun(a.id)} style=${a.status === 'completed' ? 'cursor:pointer' : 'opacity:0.7'}>
              <div style="display:flex;gap:10px;align-items:flex-start">
                <div style="font-size:22px;flex-shrink:0">${AUDIT_TYPES[a.audit_type]?.icon || '📋'}</div>
                <div style="flex:1;min-width:0">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
                    <div style="flex:1;min-width:0">
                      <div style="font-weight:600;color:var(--slate-900);font-size:13px">${AUDIT_TYPES[a.audit_type]?.label || a.audit_type}</div>
                      <div style="font-size:11px;color:var(--slate-500);margin-top:2px">${new Date(a.created_at).toLocaleString('en-IN', {dateStyle:'medium', timeStyle:'short'})} · by ${a.triggered_by_name || 'system'}</div>
                    </div>
                    ${a.status === 'completed' && a.verdict ? html`
                      <span style="background:${verdict.bg};color:${verdict.color};font-size:11px;padding:3px 8px;border-radius:999px;font-weight:700;flex-shrink:0">${verdict.emoji} ${a.verdict.toUpperCase()}</span>
                    ` : a.status === 'running' ? html`<span class="badge amber">⏳ running</span>` : a.status === 'failed' ? html`<span class="badge rose">✗ failed</span>` : ''}
                  </div>
                  ${a.status === 'completed' && a.summary && html`<div style="font-size:12px;color:var(--slate-700);margin-top:6px;line-height:1.5">${a.summary}</div>`}
                  ${a.status === 'completed' && html`
                    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:var(--slate-500)">
                      ${critical > 0 && html`<span style="color:var(--rose-600);font-weight:600">${critical} critical</span>`}
                      ${warnings > 0 && html`<span style="color:var(--amber-700);font-weight:600">${warnings} warning${warnings>1?'s':''}</span>`}
                      <span>${findings.length} total findings</span>
                      <span>·</span>
                      <span>₹${a.estimated_cost_inr || '—'}</span>
                    </div>
                  `}
                  ${a.status === 'failed' && html`<div style="font-size:11px;color:var(--rose-600);margin-top:4px">${a.error_message || 'Unknown error'}</div>`}
                </div>
              </div>
            </div>
          `;
        })}
      </div>
     `
    }

    ${confirmType && html`<${AuditConfirmModal} type=${confirmType} running=${running} onConfirm=${runAudit} onClose=${() => setConfirmType(null)} />`}
  `;
}

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal" onClick=${e => e.stopPropagation()} style="max-width:460px">
        <div class="modal-header">
          <div class="modal-title">${cfg.icon} Run ${cfg.label}?</div>
          <button class="close-x" onClick=${onClose}>×</button>
        </div>

        <div style="background:var(--teal-50);border-left:3px solid var(--teal-500);padding:12px 14px;border-radius:6px;margin-bottom:14px">
          <div style="font-size:12px;color:var(--slate-700);line-height:1.5">${cfg.desc}</div>
        </div>

        <div class="card-row"><span class="label">Estimated cost</span><span class="value" style="font-weight:700">${cfg.cost_range}</span></div>
        <div class="card-row"><span class="label">Time</span><span class="value">${cfg.duration}</span></div>
        <div class="card-row"><span class="label">Best for</span><span class="value">${cfg.best_for}</span></div>

        <div style="font-size:11px;color:var(--slate-500);margin:14px 0;line-height:1.5">
          Claude will read up to the last ${type === 'quick' ? '2 days' : type === 'weekly' ? '7 days' : '90 days'} of plant data (production, NCRs, breakdowns, schedules, stocks) and return findings as a JSON report. Cost is approximate — actual usage will be logged.
        </div>

        <div style="display:flex;gap:8px;margin-top:14px">

}

// =================================================================
// AUDIT DETAIL VIEW — full findings of one audit
// =================================================================
function AuditDetailView({ run, onBack }) {
  const findings = run.findings || [];
  const verdict = VERDICT_STYLES[run.verdict] || VERDICT_STYLES.yellow;

  // Group by severity
  const bySeverity = { critical: [], warning: [], info: [], positive: [] };
  for (const f of findings) {
    if (bySeverity[f.severity]) bySeverity[f.severity].push(f);
  }

  return html`
    <div class="page-header" style="display:flex;align-items:center;gap:10px">
      <button class="btn ghost small" style="padding:6px 10px" onClick=${onBack}>← Back</button>
      <div style="flex:1;min-width:0">
        <h1 style="font-size:18px">${AUDIT_TYPES[run.audit_type]?.icon} ${AUDIT_TYPES[run.audit_type]?.label}</h1>
        <div class="sub">${new Date(run.created_at).toLocaleString('en-IN', {dateStyle:'long', timeStyle:'short'})}</div>
      </div>
    </div>

    <div class="card" style="background:${verdict.bg};border:none;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <div style="font-size:11px;font-weight:700;color:${verdict.color};text-transform:uppercase;letter-spacing:0.05em">VERDICT</div>
          <div style="font-size:24px;font-weight:700;color:${verdict.color};margin-top:2px">${verdict.emoji} ${verdict.label}</div>
          ${run.summary && html`<div style="font-size:13px;color:var(--slate-800);margin-top:8px;line-height:1.5">${run.summary}</div>`}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:11px;color:var(--slate-600)">Cost</div>
          <div style="font-size:18px;font-weight:700;color:var(--slate-900)">₹${run.estimated_cost_inr || '—'}</div>
          <div style="font-size:10px;color:var(--slate-500)">${run.input_tokens || 0} in · ${run.output_tokens || 0} out</div>
        </div>
      </div>
    </div>

    ${run.records_examined && Object.keys(run.records_examined).length > 0 && html`
      <div class="card" style="margin-bottom:14px">
        <div class="card-title">DATA EXAMINED</div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:12px">
          ${Object.entries(run.records_examined).map(([k, v]) => html`<div><span style="color:var(--slate-500)">${k}:</span> <b>${v}</b></div>`)}
        </div>
      </div>
    `}

    ${findings.length === 0 ? html`<div class="card"><div class="empty">No findings returned</div></div>` :
      html`
        ${['critical', 'warning', 'info', 'positive'].map(sev => {
          const items = bySeverity[sev];
          if (items.length === 0) return null;
          const style = SEVERITY_STYLES[sev];
          return html`
            <div key=${sev} style="margin-bottom:18px">
              <div class="section-h" style="color:${style.color}">${style.icon} ${style.label} · ${items.length}</div>
              <div style="display:flex;flex-direction:column;gap:8px">
                ${items.map((f, i) => html`
                  <div key=${i} class="list-item" style="border-left:3px solid ${style.color}">
                    <div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start">
                      <div style="flex:1;min-width:0">
                        <div style="font-weight:600;color:var(--slate-900);font-size:13px">${f.title}</div>
                        <div style="font-size:12px;color:var(--slate-700);margin-top:6px;line-height:1.5">${f.detail}</div>
                        ${f.refs && f.refs.length > 0 && html`
                          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px">
                            ${f.refs.map(r => html`<span style="background:var(--slate-100);color:var(--slate-700);font-size:10px;padding:2px 6px;border-radius:4px;font-family:monospace;font-weight:600">${r}</span>`)}
                          </div>
                        `}
                        ${f.recommendation && html`
                          <div style="background:var(--teal-50);border-left:2px solid var(--teal-500);padding:8px 10px;border-radius:4px;margin-top:8px;font-size:12px;color:var(--teal-900);line-height:1.5">
                            <b>Recommended action:</b> ${f.recommendation}
                          </div>
                        `}
                      </div>
                      <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
                        ${f.department && html`<span style="background:var(--slate-100);color:var(--slate-600);font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500">${f.department}</span>`}
                        ${f.clause && html`<span style="background:var(--teal-50);color:var(--teal-700);font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600">Clause ${f.clause}</span>`}
                      </div>
                    </div>
                  </div>
                `)}
              </div>
            </div>
          `;
        })}
      `
    }
  `;
}

function DocNumberManager({ plant, me }) {
  const [docNums, setDocNums] = useState({});  // { report_id: {doc_number, revision, ...} }
  const [loading, setLoading] = useState(true);
  const [editTarget, setEditTarget] = useState(null);
  const [historyTarget, setHistoryTarget] = useState(null);
  const [showBulk, setShowBulk] = useState(false);

  const refresh = async () => {
    const { data } = await sb.from('report_doc_numbers').select('*');
    const map = {};
    for (const r of (data || [])) map[r.report_id] = r;
    setDocNums(map);
    setLoading(false);
  };
  useEffect(() => { refresh(); }, []);

  // Stable unique key for any record — uses reportId for active, slug for coming-soon
  const recordKey = (r) => r.reportId || ('iatf__' + (r.name + '_' + r.clause).toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, ''));

  // ALL records get doc numbers (active + coming-soon)
  const allRecords = IATF_RECORDS;

  // Filter view
  const [statusFilter, setStatusFilter] = useState('all'); // 'all' | 'active' | 'coming'
  let visibleRecords = allRecords;
  if (statusFilter === 'active') visibleRecords = allRecords.filter(r => r.block === 1);
  else if (statusFilter === 'coming') visibleRecords = allRecords.filter(r => r.block !== 1);

  // Group by department
  const byDept = {};
  for (const r of visibleRecords) {
    if (!byDept[r.dept]) byDept[r.dept] = [];
    byDept[r.dept].push(r);
  }

  const totalAssigned = allRecords.filter(r => docNums[recordKey(r)]).length;
  const totalRecords = allRecords.length;
  const activeAssigned = allRecords.filter(r => r.block === 1 && docNums[recordKey(r)]).length;
  const activeTotal = allRecords.filter(r => r.block === 1).length;

  return html`
    <div class="card" style="background:linear-gradient(135deg, var(--teal-700), var(--teal-600));color:white;border:none;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:11px;opacity:0.85;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">DOCUMENT NUMBERS</div>
          <div style="font-size:32px;font-weight:700;line-height:1">${totalAssigned} <span style="font-size:14px;opacity:0.85">of ${totalRecords}</span></div>
          <div style="font-size:12px;opacity:0.9;margin-top:4px">${activeAssigned}/${activeTotal} live · ${totalAssigned - activeAssigned}/${totalRecords - activeTotal} planned numbered</div>
        </div>
        <button class="btn" style="background:white;color:var(--teal-700);font-weight:600" onClick=${() => setShowBulk(true)}>⚡ Bulk Setup</button>
      </div>
    </div>

    <div style="font-size:11px;color:var(--slate-500);margin-bottom:14px;line-height:1.5">
      Permanent document numbers for the full IATF master register (all ${totalRecords} records). Active reports include the doc number/rev/date in every generated PDF. Coming-soon records reserve their numbers for when the future block ships. Tap any record to edit, 🕒 for revision history.
    </div>

    <div style="display:flex;gap:6px;margin-bottom:14px">
      <button class=${'btn small ' + (statusFilter === 'all' ? '' : 'ghost')} onClick=${() => setStatusFilter('all')} style="padding:6px 12px;font-size:12px">All ${totalRecords}</button>
      <button class=${'btn small ' + (statusFilter === 'active' ? '' : 'ghost')} onClick=${() => setStatusFilter('active')} style="padding:6px 12px;font-size:12px">Live ${activeTotal}</button>
      <button class=${'btn small ' + (statusFilter === 'coming' ? '' : 'ghost')} onClick=${() => setStatusFilter('coming')} style="padding:6px 12px;font-size:12px">Coming soon ${totalRecords - activeTotal}</button>
    </div>

    ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
      Object.entries(byDept).map(([dept, reports]) => html`
        <div key=${dept} style="margin-bottom:18px">
          <div class="section-h">${DEPT_LABELS[dept] || dept} · ${reports.length}</div>
          <div class="grid-cards">
            ${reports.map(rec => {
              const key = recordKey(rec);
              const reportObj = REPORT_CATALOG.find(rc => rc.id === rec.reportId);
              const docInfo = docNums[key];
              const isLive = rec.block === 1;
              const borderColor = docInfo ? 'var(--emerald-500)' : (isLive ? 'var(--amber-400)' : 'var(--slate-300)');
              return html`
                <div key=${key} class="list-item" style="border-left:3px solid ${borderColor}; ${!isLive ? 'background:var(--slate-50)' : ''}">
                  <div style="display:flex;gap:10px;align-items:flex-start">
                    <div style="font-size:20px;flex-shrink:0;${!isLive ? 'opacity:0.6' : ''}">${reportObj?.icon || '📄'}</div>
                    <div style="flex:1;min-width:0">
                      <div style="display:flex;align-items:flex-start;gap:6px">
                        <div style="font-weight:600;color:var(--slate-900);font-size:13px;line-height:1.3;flex:1">${rec.name}</div>
                        ${isLive ? html`<span class="badge emerald" style="font-size:9px;padding:2px 6px;flex-shrink:0">LIVE</span>` : html`<span style="background:var(--slate-100);color:var(--slate-500);font-size:9px;padding:2px 6px;border-radius:999px;font-weight:600;flex-shrink:0">B${rec.block}</span>`}
                      </div>
                      ${docInfo ? html`
                        <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
                          <span style="background:var(--emerald-50);color:var(--emerald-800);font-weight:700;font-size:12px;padding:3px 8px;border-radius:4px;font-family:monospace">${docInfo.doc_number}</span>
                          <span style="font-size:11px;color:var(--slate-700);font-weight:600">Rev ${docInfo.revision}</span>
                          <span style="font-size:11px;color:var(--slate-500)">${docInfo.effective_date ? new Date(docInfo.effective_date).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'2-digit'}) : '—'}</span>
                        </div>
                        ${docInfo.issued_by && html`<div style="font-size:11px;color:var(--slate-500);margin-top:3px">Issued by: ${docInfo.issued_by}</div>`}
                      ` : html`
                        <div style="margin-top:6px;font-size:11px;color:${isLive ? 'var(--amber-700)' : 'var(--slate-500)'};font-weight:600">${isLive ? '⚠ Not assigned yet' : 'Number not reserved yet'}</div>
                      `}
                      <div style="display:flex;gap:8px;margin-top:8px">
                        <button class="btn small" style="padding:4px 10px;font-size:11px" onClick=${() => setEditTarget({...rec, _key: key})}>${docInfo ? 'Edit' : (isLive ? 'Assign' : 'Reserve')}</button>
                        ${docInfo && html`<button class="btn small ghost" style="padding:4px 10px;font-size:11px" onClick=${() => setHistoryTarget({...rec, _key: key})}>🕒 History</button>`}
                      </div>
                    </div>
                  </div>
                </div>
              `;
            })}
          </div>
        </div>
      `)
    }

    ${showBulk && html`<${BulkDocNumberModal} plant=${plant} me=${me} reports=${allRecords} existing=${docNums} recordKey=${recordKey} onClose=${() => setShowBulk(false)} onSaved=${() => { setShowBulk(false); refresh(); }} />`}
    ${editTarget && html`<${DocNumberEditModal} plant=${plant} me=${me} record=${editTarget} existing=${docNums[editTarget._key]} onClose=${() => setEditTarget(null)} onSaved=${() => { setEditTarget(null); refresh(); }} />`}
    ${historyTarget && html`<${DocNumberHistoryModal} plant=${plant} record=${historyTarget} onClose=${() => setHistoryTarget(null)} />`}
  `;
}

// ============= BULK DOC NUMBER MODAL =============
function BulkDocNumberModal({ plant, me, reports, existing, recordKey, onClose, onSaved }) {
  // Default prefixes by dept
  const [prefixes, setPrefixes] = useState({
    production: 'PRD', quality: 'QA', maintenance: 'MTC',
    schedules: 'SCH', stocks: 'STK', documents: 'DOC',
    people: 'HR', cross: 'GEN'
  });
  const [overwrite, setOverwrite] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  // Build report_meta payload — use record-name+clause as report_id key (matches IATF_RECORDS uniqueness)
  // But for active reports, use reportId (which matches REPORT_CATALOG)
  const reportPayload = reports.map(r => ({ report_id: recordKey(r), dept: r.dept }));

  // Existing assigned for this plant
  const alreadyAssigned = reports.filter(r => existing[recordKey(r)]).length;

  // Distinct depts in this set
  const depts = [...new Set(reports.map(r => r.dept))];

  // Preview: how doc numbers will look
  const preview = useMemo(() => {
    const seqByDept = {};
    // Initialize from existing
    for (const dept of depts) {
      const prefix = prefixes[dept] || dept.slice(0,3).toUpperCase();
      let count = 0;
      for (const repId of Object.keys(existing)) {
        const dn = existing[repId];
        if (dn.doc_number && dn.doc_number.startsWith(prefix + '-FRM-')) count++;
      }
      seqByDept[dept] = count;
    }
    return reports.map(r => {
      const existingFor = existing[recordKey(r)];
      if (existingFor && !overwrite) {
        return { ...r, preview: existingFor.doc_number, status: 'kept' };
      }
      const prefix = prefixes[r.dept] || r.dept.slice(0,3).toUpperCase();
      seqByDept[r.dept] = (seqByDept[r.dept] || 0) + 1;
      const num = prefix + '-FRM-' + String(seqByDept[r.dept]).padStart(3, '0');
      return { ...r, preview: num, status: existingFor ? 'overwrite' : 'new' };
    });
  }, [prefixes, overwrite, reports, existing, depts]);

  const submit = async () => {
    setLoading(true); setError('');
    try {
      const { data, error: err } = await sb.rpc('bulk_assign_doc_numbers', {
        p_prefixes: prefixes,
        p_reports: reportPayload,
        p_overwrite: overwrite
      });
      if (err) throw err;
      if (data && !data.success) throw new Error(data.error || 'Bulk assignment failed');
      onSaved();
    } catch (e) {
      setError(e.message);
      setLoading(false);
    }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal" onClick=${e => e.stopPropagation()} style="max-width:720px;max-height:90vh;overflow-y:auto">
        <div class="modal-header">
          <div class="modal-title">⚡ Bulk Document Number Setup</div>
          <button class="close-x" onClick=${onClose}>×</button>
        </div>

        <div style="font-size:12px;color:var(--slate-600);margin-bottom:14px;line-height:1.5">
          Set department prefixes once — Loglinkr auto-numbers all <b>${reports.length} reports</b> with sequential doc numbers like <code style="background:var(--slate-100);padding:1px 4px;border-radius:3px">QA-FRM-001</code>. You can edit any individually later.
        </div>

        <div class="section-h">DEPARTMENT PREFIXES</div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px">
          ${depts.map(dept => html`
            <div key=${dept} class="field" style="margin:0">
              <label style="font-size:11px">${DEPT_LABELS[dept] || dept}</label>
              <input
                type="text"
                value=${prefixes[dept] || ''}
                onChange=${e => setPrefixes({...prefixes, [dept]: e.target.value.toUpperCase()})}
                placeholder=${dept.slice(0,3).toUpperCase()}
                style="text-transform:uppercase;font-family:monospace"
                maxLength="6"
              />
            </div>
          `)}
        </div>

        ${alreadyAssigned > 0 && html`
          <div style="background:var(--amber-50);border:1px solid var(--amber-200);border-radius:6px;padding:10px 12px;margin-bottom:14px">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--amber-900)">
              <input type="checkbox" checked=${overwrite} onChange=${e => setOverwrite(e.target.checked)} />
              <span><b>${alreadyAssigned}</b> reports already have doc numbers. Check this box to <b>overwrite them</b>. Otherwise they'll be kept as-is.</span>
            </label>
          </div>
        `}

        <div class="section-h">PREVIEW</div>
        <div style="max-height:280px;overflow-y:auto;border:0.5px solid var(--slate-200);border-radius:6px">
          <table style="width:100%;font-size:12px;border-collapse:collapse">
            <thead style="position:sticky;top:0;background:var(--slate-50)">
              <tr>
                <th style="text-align:left;padding:8px 10px;border-bottom:0.5px solid var(--slate-200);font-size:10px;text-transform:uppercase;color:var(--slate-600)">Report</th>
                <th style="text-align:left;padding:8px 10px;border-bottom:0.5px solid var(--slate-200);font-size:10px;text-transform:uppercase;color:var(--slate-600)">Doc Number</th>
                <th style="text-align:left;padding:8px 10px;border-bottom:0.5px solid var(--slate-200);font-size:10px;text-transform:uppercase;color:var(--slate-600)">Status</th>
              </tr>
            </thead>
            <tbody>
              ${preview.map(p => html`
                <tr key=${recordKey(p)} style="border-bottom:0.5px solid var(--slate-100)">
                  <td style="padding:6px 10px">${p.name}</td>
                  <td style="padding:6px 10px;font-family:monospace;font-weight:600">${p.preview}</td>
                  <td style="padding:6px 10px">
                    ${p.status === 'kept' ? html`<span class="badge slate" style="font-size:10px">kept</span>` :
                      p.status === 'overwrite' ? html`<span class="badge amber" style="font-size:10px">overwrite</span>` :
                      html`<span class="badge emerald" style="font-size:10px">new</span>`}
                  </td>
                </tr>
              `)}
            </tbody>
          </table>
        </div>

        ${error && html`<div style="color:var(--rose-600);font-size:12px;margin-top:10px">${error}</div>`}

        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="btn ghost" onClick=${onClose} style="flex:1">Cancel</button>
          <button class="btn" onClick=${submit} disabled=${loading} style="flex:2">${loading ? 'Assigning…' : '✓ Apply to All ' + reports.length + ' Reports'}</button>
        </div>
      </div>
    </div>
  `;
}

// ============= EDIT INDIVIDUAL DOC NUMBER =============
function DocNumberEditModal({ plant, me, record, existing, onClose, onSaved }) {
  const [docNumber, setDocNumber] = useState(existing?.doc_number || '');
  const [revision, setRevision] = useState(existing?.revision || '00');
  const [effectiveDate, setEffectiveDate] = useState(existing?.effective_date || new Date().toISOString().slice(0, 10));
  const [issuedBy, setIssuedBy] = useState(existing?.issued_by || me.full_name || '');
  const [approvedBy, setApprovedBy] = useState(existing?.approved_by || '');
  const [notes, setNotes] = useState(existing?.notes || '');
  const [bumpRev, setBumpRev] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  // Auto-bump revision suggestion when editing
  useEffect(() => {
    if (bumpRev && existing) {
      const cur = parseInt(existing.revision) || 0;
      setRevision(String(cur + 1).padStart(2, '0'));
      setEffectiveDate(new Date().toISOString().slice(0, 10));
    } else if (!bumpRev && existing) {
      setRevision(existing.revision);
    }
  }, [bumpRev]);

  const submit = async () => {
    if (!docNumber.trim()) { setError('Doc number required'); return; }
    setLoading(true); setError('');
    try {
      const { data, error: err } = await sb.rpc('set_doc_number', {
        p_report_id: record._key || record.reportId,
        p_doc_number: docNumber.trim(),
        p_revision: revision.trim() || '00',
        p_effective_date: effectiveDate,
        p_issued_by: issuedBy.trim() || null,
        p_approved_by: approvedBy.trim() || null,
        p_notes: notes.trim() || null,
      });
      if (err) throw err;
      if (data && !data.success) throw new Error(data.error || 'Save failed');
      onSaved();
    } catch (e) {
      setError(e.message);
      setLoading(false);
    }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal" onClick=${e => e.stopPropagation()} style="max-width:520px">
        <div class="modal-header">
          <div class="modal-title">${existing ? 'Edit' : 'Assign'} Document Number</div>
          <button class="close-x" onClick=${onClose}>×</button>
        </div>

        <div style="font-size:12px;color:var(--slate-600);margin-bottom:14px">
          <b>${record.name}</b>
          <div style="font-size:11px;color:var(--slate-500);margin-top:2px">Clause ${record.clause} · ${DEPT_LABELS[record.dept]}</div>
        </div>

        ${existing && html`
          <label style="display:flex;align-items:center;gap:8px;background:var(--teal-50);padding:8px 10px;border-radius:6px;font-size:12px;cursor:pointer;margin-bottom:14px">
            <input type="checkbox" checked=${bumpRev} onChange=${e => setBumpRev(e.target.checked)} />
            <span>Bump revision (current: <b>Rev ${existing.revision}</b>) — auto-set today's date</span>
          </label>
        `}

        <div class="field-row">
          <div class="field" style="flex:2">
            <label>Document Number *</label>
            <input
              type="text"
              value=${docNumber}
              onChange=${e => setDocNumber(e.target.value.toUpperCase())}
              placeholder="QA-FRM-001"
              style="font-family:monospace;text-transform:uppercase"
            />
          </div>
          <div class="field" style="flex:1">
            <label>Revision *</label>
            <input
              type="text"
              value=${revision}
              onChange=${e => setRevision(e.target.value)}
              placeholder="00"
              maxLength="4"
              style="font-family:monospace"
            />
          </div>
        </div>

        <div class="field">
          <label>Effective Date *</label>
          <input type="date" value=${effectiveDate} onChange=${e => setEffectiveDate(e.target.value)} />
        </div>

        <div class="field-row">
          <div class="field"><label>Issued By</label>
            <input type="text" value=${issuedBy} onChange=${e => setIssuedBy(e.target.value)} placeholder="Name / Role" />
          </div>
          <div class="field"><label>Approved By</label>
            <input type="text" value=${approvedBy} onChange=${e => setApprovedBy(e.target.value)} placeholder="Name / Role" />
          </div>
        </div>

        <div class="field">
          <label>${bumpRev ? 'Reason for Revision *' : 'Notes (optional)'}</label>
          <textarea value=${notes} onChange=${e => setNotes(e.target.value)} placeholder=${bumpRev ? 'Why is this revision being raised?' : 'Optional notes…'} rows="2"></textarea>
        </div>

        ${error && html`<div style="color:var(--rose-600);font-size:12px;margin-top:6px">${error}</div>`}

        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="btn ghost" onClick=${onClose} style="flex:1">Cancel</button>
          <button class="btn" onClick=${submit} disabled=${loading} style="flex:2">${loading ? 'Saving…' : '✓ Save'}</button>
        </div>
      </div>
    </div>
  `;
}

// ============= REVISION HISTORY MODAL =============

      .select('*')
      .eq('report_id', record._key || record.reportId)
      .order('changed_at', { ascending: false })
      .then(({ data }) => { setHistory(data || []); setLoading(false); });

    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
