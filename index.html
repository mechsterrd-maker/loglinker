// ============= PART DETAIL (Route + BOM) =============
function PartDetail({ plant, me, part, machines, dies, parts, onClose }) {
  const [tab, setTab] = useState('route');
  const [route, setRoute] = useState(null);
  const [steps, setSteps] = useState([]);
  const [bom, setBom] = useState([]);
  const [whereUsed, setWhereUsed] = useState([]);
  const [stockItems, setStockItems] = useState([]);
  const [modal, setModal] = useState(null);
  const [editTarget, setEditTarget] = useState(null);
  const [loading, setLoading] = useState(true);

  const refresh = useCallback(async () => {
    setLoading(true);
    const [r, b, w, s] = await Promise.all([
      sb.from('mcp_pdc_routes').select('*').eq('part_id', part.id).eq('is_active', true).maybeSingle(),
      sb.from('mcp_pdc_bom').select('*, child_part:child_part_id(part_number,name,revision), child_item:child_item_id(code,name,uom)').eq('parent_part_id', part.id),
      sb.from('v_bom_where_used').select('*').eq('part_id', part.id),
      sb.from('mcp_stocks_items').select('*').order('name'),
    ]);
    setRoute(r.data);
    if (r.data) {
      const { data: stps } = await sb.from('mcp_pdc_route_steps').select('*, machines(code)').eq('route_id', r.data.id).order('seq');
      setSteps(stps || []);
    } else {
      setSteps([]);
    }
    setBom(b.data || []);
    setWhereUsed(w.data || []);
    setStockItems(s.data || []);
    setLoading(false);
  }, [part.id]);

  useEffect(() => { refresh(); }, [refresh]);

  const createRoute = async () => {
    const { data, error } = await sb.from('mcp_pdc_routes').insert({
      plant_id: plant.id, part_id: part.id, version: 1, is_active: true, created_by: me.id
    }).select().single();
    if (error) { alert(error.message); return; }
    setRoute(data);
    refresh();
  };

  const deleteStep = async (id) => {
    if (!confirm('Delete this step?')) return;
    await sb.from('mcp_pdc_route_steps').delete().eq('id', id);
    refresh();
  };

  const deleteBom = async (id) => {
    if (!confirm('Delete this BOM line?')) return;
    await sb.from('mcp_pdc_bom').delete().eq('id', id);
    refresh();
  };

  if (loading) return html`<div class="loader"><div class="spinner"></div></div>`;

  return html`
    <div class="page-header" style="display:flex;align-items:center;gap:10px">
      <button class="btn ghost small" style="padding:6px 10px" onClick=${onClose}>← Back</button>
      <div style="flex:1;min-width:0">
        <h1 style="font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${part.part_number} · Rev ${part.revision}</h1>
        <div class="sub">${part.name}</div>
      </div>
      <button class="btn small ghost" onClick=${() => { setEditTarget(part); setModal('part'); }}>Edit</button>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-row"><span class="label">Type</span><span class="value"><span class="badge teal">${part.part_type}</span></span></div>
      <div class="card-row"><span class="label">Status</span><span class="value"><span class=${'badge ' + (part.status === 'active' ? 'emerald' : 'amber')}>${part.status}</span></span></div>
      ${part.customer && html`<div class="card-row"><span class="label">Customer</span><span class="value">${part.customer}</span></div>`}
      ${part.weight_kg && html`<div class="card-row"><span class="label">Weight</span><span class="value">${part.weight_kg} kg</span></div>`}
    </div>

    <div class="auth-tabs" style="margin-bottom:14px">
      <button class=${'auth-tab' + (tab === 'route' ? ' active' : '')} onClick=${() => setTab('route')}>Route</button>
      <button class=${'auth-tab' + (tab === 'bom' ? ' active' : '')} onClick=${() => setTab('bom')}>BOM</button>
      <button class=${'auth-tab' + (tab === 'whereused' ? ' active' : '')} onClick=${() => setTab('whereused')}>Where Used</button>
    </div>

    ${tab === 'route' && html`
      ${!route ? html`
        <div class="card">
          <div class="empty">
            <div class="icon">🛣️</div>
            <div style="margin-bottom:14px">No route defined for this part yet</div>
            <button class="btn" onClick=${createRoute}>Create route</button>
          </div>
        </div>
      ` : html`
        <div class="section-h">Route v${route.version} · ${steps.length} step${steps.length !== 1 ? 's' : ''}<button class="btn small ghost" onClick=${() => { setEditTarget(null); setModal('step'); }}>+ Add Step</button></div>
        ${steps.length === 0 ? html`<div class="card"><div class="empty">No steps yet. Add the first operation in the route.</div></div>` :
          steps.map((s, idx) => html`
            <div class="list-item" key=${s.id} onClick=${() => { setEditTarget(s); setModal('step'); }}>
              <div class="list-item-row">
                <div class="list-item-main">
                  <div class="list-item-title">
                    <span style="display:inline-block;width:24px;height:24px;background:var(--teal-600);color:white;border-radius:50%;text-align:center;line-height:24px;font-size:11px;font-weight:700;margin-right:8px">${s.seq}</span>
                    ${s.op_name}
                  </div>
                  <div class="list-item-sub">
                    <span class="badge teal">${s.op_type}</span>
                    ${s.machines?.code ? ' · ' + s.machines.code : ''}
                    ${s.cycle_time_sec ? ' · ' + s.cycle_time_sec + 's cycle' : ''}
                    ${s.outsource_vendor ? ' · ' + s.outsource_vendor : ''}
                    ${s.inspection_required ? ' · 🔍 inspection' : ''}
                  </div>
                </div>
                <button class="btn small danger" onClick=${(e) => { e.stopPropagation(); deleteStep(s.id); }}>×</button>
              </div>
            </div>
          `)
        }
      `}
    `}

    ${tab === 'bom' && html`
      <div class="section-h">BOM · ${bom.length} item${bom.length !== 1 ? 's' : ''}<button class="btn small ghost" onClick=${() => { setEditTarget(null); setModal('bom'); }}>+ Add Item</button></div>
      ${bom.length === 0 ? html`<div class="card"><div class="empty">No BOM defined. Add raw materials, sub-assemblies, or bought-out parts.</div></div>` :
        bom.map(b => {
          const isPart = b.child_type === 'part';
          const childName = isPart ? (b.child_part?.part_number + ' · Rev ' + b.child_part?.revision + ' · ' + b.child_part?.name) : (b.child_item?.code + ' · ' + b.child_item?.name);
          const uom = isPart ? b.uom : (b.child_item?.uom || b.uom);
          return html`
            <div class="list-item" key=${b.id}>
              <div class="list-item-row">
                <div class="list-item-main">
                  <div class="list-item-title">${childName}</div>
                  <div class="list-item-sub">
                    <span class=${'badge ' + (isPart ? 'teal' : '')}>${isPart ? 'Sub-part' : 'Stock'}</span>
                    · ${b.qty_per_assy} ${uom} per assy
                    ${b.scrap_pct > 0 ? ' · +' + b.scrap_pct + '% scrap' : ''}
                  </div>
                </div>
                <button class="btn small danger" onClick=${() => deleteBom(b.id)}>×</button>
              </div>
            </div>
          `;
        })
      }
    `}

    ${tab === 'whereused' && html`
      <div class="section-h">Used in · ${whereUsed.length} parent part${whereUsed.length !== 1 ? 's' : ''}</div>
      ${whereUsed.length === 0 ? html`<div class="card"><div class="empty">This part is not used in any other assembly.</div></div>` :
        whereUsed.map(w => html`
          <div class="list-item" key=${w.used_in_part_id}>
            <div class="list-item-row">
              <div class="list-item-main">
                <div class="list-item-title">${w.used_in_part_number} · Rev ${w.used_in_revision}</div>
                <div class="list-item-sub">${w.used_in_name} · depth ${w.depth}</div>
              </div>
            </div>
          </div>
        `)
      }
    `}

    ${modal === 'step' && html`<${RouteStepModal} plant=${plant} route=${route} machines=${machines} editTarget=${editTarget} nextSeq=${steps.length > 0 ? Math.max(...steps.map(s => s.seq)) + 10 : 10} onClose=${() => { setModal(null); setEditTarget(null); }} onSaved=${() => { setModal(null); setEditTarget(null); refresh(); }} />`}
    ${modal === 'bom' && html`<${BomModal} plant=${plant} parentPart=${part} parts=${parts} stockItems=${stockItems} onClose=${() => setModal(null)} onSaved=${() => { setModal(null); refresh(); }} />`}
    ${modal === 'part' && html`<${PartModal} plant=${plant} me=${me} dies=${dies} editTarget=${editTarget} onClose=${() => { setModal(null); setEditTarget(null); }} onSaved=${() => { setModal(null); setEditTarget(null); onClose(); }} />`}
  `;
}

// ============= BOM MODAL =============
function BomModal({ plant, parentPart, parts, stockItems, onClose, onSaved }) {
  const [form, setForm] = useState({
    child_type: 'stock_item',
    child_part_id: '', child_item_id: '',
    qty_per_assy: '1', uom: 'nos', scrap_pct: '0', notes: ''
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      if (form.child_type === 'part' && !form.child_part_id) throw new Error('Pick a sub-part');
      if (form.child_type === 'stock_item' && !form.child_item_id) throw new Error('Pick a stock item');
      if (form.child_type === 'part' && form.child_part_id === parentPart.id) throw new Error("Can't add part to its own BOM");
      const payload = {
        plant_id: plant.id,
        parent_part_id: parentPart.id,
        child_type: form.child_type,
        child_part_id: form.child_type === 'part' ? form.child_part_id : null,
        child_item_id: form.child_type === 'stock_item' ? form.child_item_id : null,
        qty_per_assy: parseFloat(form.qty_per_assy),
        uom: form.uom,
        scrap_pct: parseFloat(form.scrap_pct) || 0,
        notes: form.notes || null,
      };
      const { error } = await sb.from('mcp_pdc_bom').insert(payload);
      if (error) throw error;
      showToast('BOM line added');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  // Auto-set UOM when picking stock item
  const onPickStockItem = (id) => {
    const item = stockItems.find(s => s.id === id);
    setForm({...form, child_item_id: id, uom: item?.uom || form.uom});
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Add BOM Item</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        <p style="font-size:13px;color:var(--slate-600);margin-bottom:12px">Adding to: <strong>${parentPart.part_number} · ${parentPart.name}</strong></p>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field"><label>Item Type</label>
            <div class="auth-tabs">
              <button type="button" class=${'auth-tab' + (form.child_type === 'stock_item' ? ' active' : '')} onClick=${() => setForm({...form, child_type: 'stock_item', child_part_id: ''})}>Stock Item</button>
              <button type="button" class=${'auth-tab' + (form.child_type === 'part' ? ' active' : '')} onClick=${() => setForm({...form, child_type: 'part', child_item_id: ''})}>Sub-Part</button>
            </div>
          </div>
          ${form.child_type === 'stock_item' ? html`
            <div class="field"><label>Stock Item *</label>
              <select required value=${form.child_item_id} onChange=${e => onPickStockItem(e.target.value)}>
                <option value="">— Select —</option>
                ${stockItems.map(s => html`<option key=${s.id} value=${s.id}>${s.code} · ${s.name} (${s.uom})</option>`)}
              </select>
              ${stockItems.length === 0 && html`<div style="font-size:11px;color:var(--slate-500);margin-top:4px">No stock items yet. Add some in Stocks tab first.</div>`}
            </div>
          ` : html`
            <div class="field"><label>Sub-Part *</label>
              <select required value=${form.child_part_id} onChange=${e => setForm({...form, child_part_id: e.target.value})}>
                <option value="">— Select —</option>
                ${parts.map(p => html`<option key=${p.id} value=${p.id}>${p.part_number} · Rev ${p.revision} · ${p.name}</option>`)}
              </select>
              ${parts.length === 0 && html`<div style="font-size:11px;color:var(--slate-500);margin-top:4px">No other parts yet.</div>`}
            </div>
          `}
          <div class="field-row">
            <div class="field"><label>Qty per Assy *</label><input type="number" step="0.0001" required value=${form.qty_per_assy} onChange=${e => setForm({...form, qty_per_assy: e.target.value})} /></div>
            <div class="field"><label>UOM</label>
              <select value=${form.uom} onChange=${e => setForm({...form, uom: e.target.value})}>
                <option value="nos">Nos</option><option value="kg">Kg</option><option value="g">g</option><option value="ml">ml</option><option value="l">L</option><option value="mtr">m</option><option value="set">Set</option>
              </select>
            </div>
          </div>
          <div class="field"><label>Scrap %</label><input type="number" step="0.1" value=${form.scrap_pct} onChange=${e => setForm({...form, scrap_pct: e.target.value})} placeholder="0" /></div>
          <div class="field"><label>Notes</label><textarea rows=${2} value=${form.notes} onChange=${e => setForm({...form, notes: e.target.value})}></textarea></div>
          <button class="btn" disabled=${loading}>${loading ? 'Saving…' : 'Add to BOM'}</button>
        </form>
      </div>
    </div>
  `;
}

function MachineModal({ plant, units, users, editTarget, onClose, onSaved }) {

    e.preventDefault();

// Paste a list of machine codes, pick category once, all created in one go.
function MachineBulkAddModal({ plant, units, users, onClose, onSaved }) {
  const [category, setCategory] = useState('cnc');
  const [codes, setCodes] = useState('');
  const [unitId, setUnitId] = useState(units[0]?.id || '');
  const [supervisorId, setSupervisorId] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [results, setResults] = useState(null);

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true); setResults(null);
    try {
      // Parse codes — split on newline or comma, trim, dedupe
      const list = codes.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
      if (list.length === 0) throw new Error('No machine codes entered');
      if (list.length > 50) throw new Error('Maximum 50 machines per bulk add');

      const payload = list.map(code => ({
        plant_id: plant.id,
        code,
        category,
        unit_id: unitId,
        status: 'idle',
        default_supervisor_id: supervisorId || null,
        attributes: {},
      }));

      const { data, error: err } = await sb.from('machines').insert(payload).select('id, code');
      if (err) throw err;

      setResults({ created: data.length, codes: data.map(d => d.code) });
      showToast(`${data.length} machines added`);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  if (results) {
    return html`
      <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onSaved(); }}>
        <div class="modal">
          <div class="modal-header">
            <div class="modal-title">✅ ${results.created} machines added</div>
            <button class="close-btn" onClick=${onSaved}>×</button>
          </div>
          <div class="card" style="background:var(--emerald-50);border-color:var(--emerald-200)">
            <div style="font-size:12px;color:var(--slate-700);line-height:1.6">
              ${results.codes.join(' · ')}
            </div>
          </div>
          <button class="btn" onClick=${onSaved} style="margin-top:14px">Done</button>
        </div>
      </div>
    `;
  }

  const previewCount = codes.split(/[\n,]+/).map(s => s.trim()).filter(Boolean).length;

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">+ Add Many Machines</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field"><label>Category *</label>
            <select required value=${category} onChange=${e => setCategory(e.target.value)}>
              <option value="pdc">Pressure Die Casting</option>
              <option value="cnc">CNC</option>
              <option value="vmc">VMC</option>
              <option value="lathe">Lathe</option>
              <option value="press">Press</option>
              <option value="trimming">Trimming</option>
              <option value="drilling">Drilling</option>
              <option value="grinding">Grinding</option>
              <option value="heat_treatment">Heat treatment</option>
              <option value="injection_moulding">Injection moulding</option>
              <option value="welding">Welding</option>
              <option value="assembly">Assembly</option>
              <option value="inspection">Inspection</option>
              <option value="painting">Painting</option>
              <option value="plating">Plating</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="field"><label>Default Supervisor</label>
            <select value=${supervisorId} onChange=${e => setSupervisorId(e.target.value)}>
              <option value="">— None —</option>
              ${(users || []).map(u => html`<option key=${u.id} value=${u.id}>${u.full_name}</option>`)}
            </select>
          </div>
          <div class="field"><label>Machine codes <span style="font-size:11px;color:var(--slate-500);font-weight:400">(one per line, or comma-separated)</span></label>
            <textarea rows=${8} value=${codes} onChange=${e => setCodes(e.target.value)} placeholder=${'CNC-01\nCNC-02\nCNC-03'} style="font-family:monospace;font-size:13px"></textarea>
          </div>
          <div style="font-size:11px;color:var(--slate-500);margin-bottom:10px">
            ${previewCount} machine${previewCount === 1 ? '' : 's'} will be added · all in <b>${category}</b> category · same supervisor · current unit
          </div>
          <button class="btn" disabled=${loading || previewCount === 0}>${loading ? 'Adding…' : `Add ${previewCount} machine${previewCount === 1 ? '' : 's'}`}</button>
        </form>
      </div>
    </div>
  `;
}

// ============= DIE MODAL =============
function DieModal({ plant, me, parts, editTarget, onClose, onSaved }) {
  const [form, setForm] = useState(editTarget || { code:'', part_number:'', customer_name:'', max_strokes:300000, corepin_count:0, ejector_pin_count:0, status:'active', default_part_id:'' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [history, setHistory] = useState([]);
  const [spares, setSpares] = useState([]);
  const [stockItems, setStockItems] = useState([]);
  const [spareModal, setSpareModal] = useState(false);
  const [replaceModal, setReplaceModal] = useState(null); // spare row to replace

  const refreshSpares = async () => {
    if (!editTarget) return;
    const { data } = await sb.from('mcp_pdc_die_spares').select('*, mcp_stocks_items(code, name, uom, current_qty, reorder_level)').eq('die_id', editTarget.id);
    setSpares(data || []);
  };

  useEffect(() => {
    if (editTarget) {
      sb.from('mcp_pdc_die_history').select('*, users:performed_by_user_id(full_name)').eq('die_id', editTarget.id).order('event_date', { ascending:false }).then(({ data }) => setHistory(data || []));
      refreshSpares();
      sb.from('mcp_stocks_items').select('*').order('name').then(({ data }) => setStockItems(data || []));
    }
  }, [editTarget]);

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const payload = {
        plant_id: plant.id,
        code: form.code,
        part_number: form.part_number,
        customer_name: form.customer_name || null,
        max_strokes: parseInt(form.max_strokes) || 300000,
        corepin_count: parseInt(form.corepin_count) || 0,
        ejector_pin_count: parseInt(form.ejector_pin_count) || 0,
        status: form.status,
        default_part_id: form.default_part_id || null,
      };
      const { error } = editTarget
        ? await sb.from('mcp_pdc_dies').update(payload).eq('id', editTarget.id)
        : await sb.from('mcp_pdc_dies').insert(payload);
      if (error) throw error;
      showToast(editTarget ? 'Die updated' : 'Die added');
      onSaved();
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  const removeSpare = async (id) => {
    if (!confirm('Unlink this spare from the die?')) return;
    await sb.from('mcp_pdc_die_spares').delete().eq('id', id);
    refreshSpares();
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${editTarget ? 'Edit' : 'Add'} Die</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        ${editTarget && html`
          <div class="card" style="background:var(--slate-50)">
            <div class="card-row"><span class="label">Strokes</span><span class="value">${fmtNum(editTarget.current_stroke_count)} / ${fmtNum(editTarget.max_strokes)}</span></div>
            <div class="life-bar" style="margin-top:0"><div class="life-bar-fill" style=${'width:' + Math.min(100,(editTarget.current_stroke_count/editTarget.max_strokes)*100) + '%'}></div></div>
          </div>
        `}
        <form onSubmit=${submit}>
          <div class="field"><label>Die Code *</label><input type="text" required value=${form.code} onChange=${e => setForm({...form, code: e.target.value})} placeholder="FH-21" /></div>
          <div class="field"><label>Part Number *</label><input type="text" required value=${form.part_number} onChange=${e => setForm({...form, part_number: e.target.value})} placeholder="Filterhead" /></div>
          <div class="field"><label>Customer</label><input type="text" value=${form.customer_name || ''} onChange=${e => setForm({...form, customer_name: e.target.value})} placeholder="Bosch" /></div>
          <div class="field"><label>Max Strokes</label><input type="number" value=${form.max_strokes} onChange=${e => setForm({...form, max_strokes: e.target.value})} placeholder="300000" /></div>
          <div class="field-row">
            <div class="field"><label>Corepins</label><input type="number" value=${form.corepin_count} onChange=${e => setForm({...form, corepin_count: e.target.value})} /></div>
            <div class="field"><label>Ejector Pins</label><input type="number" value=${form.ejector_pin_count} onChange=${e => setForm({...form, ejector_pin_count: e.target.value})} /></div>
          </div>
          <div class="field"><label>Status</label>
            <select value=${form.status} onChange=${e => setForm({...form, status: e.target.value})}>
              <option value="active">Active</option><option value="repair">Repair</option><option value="retired">Retired</option>
            </select>
          </div>
          ${parts && parts.length > 0 && html`
            <div class="field"><label>Default Part (auto-fills part on shot logging)</label>
              <select value=${form.default_part_id || ''} onChange=${e => setForm({...form, default_part_id: e.target.value})}>
                <option value="">— None —</option>
                ${parts.map(p => html`<option key=${p.id} value=${p.id}>${p.part_number} · Rev ${p.revision} · ${p.name}</option>`)}
              </select>
            </div>
          `}
          <button class="btn" disabled=${loading}>${loading ? 'Saving…' : (editTarget ? 'Update' : 'Add')}</button>
        </form>

        ${editTarget && html`
          <div style="margin-top:24px">
            <div class="section-h">Die Spares · ${spares.length}<button type="button" class="btn small ghost" onClick=${() => setSpareModal(true)}>+ Link spare</button></div>
            ${spares.length === 0 ? html`<div class="empty"><div style="font-size:13px">No spares linked yet. Link corepins, ejector pins, etc. — replacements will auto-deduct from stock.</div></div>` :
              spares.map(s => {
                const isLow = s.mcp_stocks_items?.reorder_level && s.mcp_stocks_items.current_qty <= s.mcp_stocks_items.reorder_level;
                return html`
                  <div class="list-item" key=${s.id}>
                    <div class="list-item-row">
                      <div class="list-item-main">
                        <div class="list-item-title">${s.spare_type} · ${s.mcp_stocks_items?.code || '?'} · ${s.mcp_stocks_items?.name || ''}</div>
                        <div class="list-item-sub">${s.qty_in_die} in die · stock: ${fmtNum(s.mcp_stocks_items?.current_qty || 0)} ${s.mcp_stocks_items?.uom || ''} ${isLow ? '· ⚠️ low' : ''}</div>
                      </div>
                      <div style="display:flex;gap:6px">
                        <button class="btn small" type="button" onClick=${() => setReplaceModal(s)}>Replace</button>
                        <button class="btn small danger" type="button" onClick=${() => removeSpare(s.id)}>×</button>
                      </div>
                    </div>
                  </div>
                `;
              })
            }
          </div>

          <div style="margin-top:24px">
            <div class="section-h">Die History · ${history.length}</div>
            ${history.length === 0 ? html`<div class="empty"><div style="font-size:13px">No events yet</div></div>` :
              history.slice(0, 10).map(ev => html`
                <div class="list-item" key=${ev.id}>
                  <div class="list-item-row">
                    <div class="list-item-main">
                      <div class="list-item-title">${ev.event_type.replace(/_/g, ' ')}</div>
                      <div class="list-item-sub">${ev.users?.full_name || 'Unknown'} · ${ev.notes || ''}</div>
                    </div>
                    <div class="list-item-meta">${fmtDate(ev.event_date)}<br/>${fmtNum(ev.stroke_count_at_event)} str</div>
                  </div>
                </div>
              `)
            }
          </div>
        `}

        ${spareModal && html`<${DieSpareLinkModal} plant=${plant} die=${editTarget} stockItems=${stockItems} existing=${spares} onClose=${() => setSpareModal(false)} onSaved=${() => { setSpareModal(false); refreshSpares(); }} />`}
        ${replaceModal && html`<${DieSpareReplaceModal} plant=${plant} me=${me} die=${editTarget} spare=${replaceModal} onClose=${() => setReplaceModal(null)} onSaved=${() => { setReplaceModal(null); refreshSpares(); }} />`}
      </div>
    </div>
  `;
}

function DieSpareReplaceModal({ plant, me, die, spare, onClose, onSaved }) {
  const [form, setForm] = useState({

    reason: 'Broken',

  const [error, setError] = useState('');

        die_id: die.id,

        item_id: spare.item_id,

        notes: form.notes || null,

      if (error) throw error;
      showToast('Replaced · stock auto-deducted · die history updated');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`

          <div class="card-row"><span class="label">In stock</span><span class="value">${fmtNum(stock)} ${spare.mcp_stocks_items?.uom}</span></div>

          <button class="btn" disabled=${loading || insufficient}>${loading ? 'Replacing…' : 'Replace · Deduct stock'}</button>
        </form>
      </div>
    </div>
  `;
}

// ============= SHOT MODAL =============
function ShotModal({ plant, me, units, shifts, machines, dies, parts, users, onClose, onSaved }) {
  const defaultDie = dies[0];
  const defaultPartFromDie = defaultDie?.default_part_id || '';

  const [form, setForm] = useState({
    unit_id: units[0]?.id || '',
    shift_id: shifts[0]?.id || '',
    machine_id: machines[0]?.id || '',
    die_id: defaultDie?.id || '',
    part_id: defaultPartFromDie,
    operator_user_id: me.id,
    shots_good: 0,
    shots_rejected: 0,
    reject_reason: '',
    metal_alloy: 'ADC-12',
    metal_consumed_kg: '',
    notes: '',
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  // Auto-update part when die is changed
  const onDieChange = (newDieId) => {
    const die = dies.find(d => d.id === newDieId);
    setForm({...form, die_id: newDieId, part_id: die?.default_part_id || form.part_id});
  };

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const payload = {
        plant_id: plant.id,
        shift_id: form.shift_id,
        machine_id: form.machine_id,
        die_id: form.die_id,
        part_id: form.part_id || null,
        operator_user_id: form.operator_user_id || null,
        shots_good: parseInt(form.shots_good) || 0,
        shots_rejected: parseInt(form.shots_rejected) || 0,
        reject_reason: form.reject_reason || null,
        metal_alloy: form.metal_alloy || null,
        metal_consumed_kg: form.metal_consumed_kg ? parseFloat(form.metal_consumed_kg) : null,
        notes: form.notes || null,
        recorded_by_user_id: me.id,
        recorded_at: new Date().toISOString(),
      };
      const { error } = await sb.from('mcp_pdc_shots').insert(payload);
      if (error) throw error;
      const msg = form.part_id ? 'Shot logged · die strokes + BOM stock updated' : 'Shot logged · die strokes updated (no part linked, no BOM consumed)';
      showToast(msg);
      onSaved();
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Log PDC Shot</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field"><label>Shift *</label>
            <select required value=${form.shift_id} onChange=${e => setForm({...form, shift_id: e.target.value})}>
              ${shifts.map(s => html`<option key=${s.id} value=${s.id}>${s.name}</option>`)}
            </select>
          </div>
          <div class="field"><label>Machine *</label>
            <select required value=${form.machine_id} onChange=${e => setForm({...form, machine_id: e.target.value})}>
              ${machines.map(m => html`<option key=${m.id} value=${m.id}>${m.code} · ${m.make || ''}</option>`)}
            </select>
          </div>
          <div class="field"><label>Die *</label>
            <select required value=${form.die_id} onChange=${e => onDieChange(e.target.value)}>
              ${dies.map(d => html`<option key=${d.id} value=${d.id}>${d.code} · ${d.part_number}</option>`)}
            </select>
          </div>
          <div class="field"><label>Part Made ${form.part_id ? '— BOM will auto-consume stock' : '— optional'}</label>
            <select value=${form.part_id || ''} onChange=${e => setForm({...form, part_id: e.target.value})}>
              <option value="">— None / unknown —</option>
              ${parts.map(p => html`<option key=${p.id} value=${p.id}>${p.part_number} · Rev ${p.revision} · ${p.name}</option>`)}
            </select>
          </div>
          <div class="field"><label>Operator</label>
            <select value=${form.operator_user_id} onChange=${e => setForm({...form, operator_user_id: e.target.value})}>
              ${users.map(u => html`<option key=${u.id} value=${u.id}>${u.full_name}</option>`)}
            </select>
          </div>
          <div class="field-row">
            <div class="field"><label>Good *</label><input type="number" required min=${0} value=${form.shots_good} onChange=${e => setForm({...form, shots_good: e.target.value})} /></div>
            <div class="field"><label>Rejected</label><input type="number" min=${0} value=${form.shots_rejected} onChange=${e => setForm({...form, shots_rejected: e.target.value})} /></div>
          </div>
          ${form.shots_rejected > 0 && html`
            <div class="field"><label>Reject Reason</label>
              <select value=${form.reject_reason} onChange=${e => setForm({...form, reject_reason: e.target.value})}>
                <option value="">— Select —</option>
                <option>Dimension</option><option>Surface</option><option>Crack</option><option>Cold-shut</option><option>Porosity</option><option>Flash</option><option>Other</option>
              </select>
            </div>
          `}
          <div class="field-row">
            <div class="field"><label>Alloy</label><input type="text" value=${form.metal_alloy} onChange=${e => setForm({...form, metal_alloy: e.target.value})} /></div>
            <div class="field"><label>Metal (kg)</label><input type="number" step="0.01" value=${form.metal_consumed_kg} onChange=${e => setForm({...form, metal_consumed_kg: e.target.value})} placeholder="850" /></div>
          </div>
          <div class="field"><label>Notes</label><textarea rows=${2} value=${form.notes} onChange=${e => setForm({...form, notes: e.target.value})}></textarea></div>
          <button class="btn" disabled=${loading}>${loading ? 'Logging…' : 'Submit'}</button>
        </form>
      </div>
    </div>
  `;
}

// ============= CHAT =============
function Chat({ plant, me, user }) {
  const [groups, setGroups] = useState([]);
  const [activeGroup, setActiveGroup] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(true);
  const [attachment, setAttachment] = useState(null); // { file, previewUrl, type }
  const [uploading, setUploading] = useState(false);
  const [notifPerm, setNotifPerm] = useState(typeof Notification !== 'undefined' ? Notification.permission : 'unsupported');
  const [taskFromMsg, setTaskFromMsg] = useState(null);
  const [groupModal, setGroupModal] = useState(false);
  const [msgMenu, setMsgMenu] = useState(null);
  const [editMsgTarget, setEditMsgTarget] = useState(null);
  const [forwardMsgTarget, setForwardMsgTarget] = useState(null);
  const [groupSettingsTarget, setGroupSettingsTarget] = useState(null);
  const [newTaskInGroup, setNewTaskInGroup] = useState(false);

  useEffect(() => { loadGroups(); }, []);
  // Global plant-wide subscription — notifications work even when not on chat tab
  useEffect(() => {
    if (!plant?.id) return;

    const channel = sb.channel('plant-msgs-' + plant.id)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'chat_messages',
        filter: 'plant_id=eq.' + plant.id
      }, async (payload) => {
        const newMsg = payload.new;
        if (newMsg.sender_id === user.id) return;

        // Refresh group list so badges + previews update
        loadGroups();

        // If we're in the active group already, per-group handler shows the message
        if (activeGroup && newMsg.group_id === activeGroup.id) return;

        // Check the user is a member of the message's group
        const { data: group } = await sb.from('chat_groups').select('name, members').eq('id', newMsg.group_id).maybeSingle();
        if (!group || !group.members?.includes(user.id)) return;

        const { data: sender } = await sb.from('users').select('full_name').eq('id', newMsg.sender_id).maybeSingle();

        playNotificationSound();
        const preview = newMsg.body || (Array.isArray(newMsg.attachments) && newMsg.attachments.length ? '📎 ' + (newMsg.attachments[0].name || 'attachment') : '');
        showNotification((sender?.full_name || 'Someone') + ' · ' + group.name, preview);
      })
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id, user.id, activeGroup?.id]);

  useEffect(() => {
    if (!activeGroup) return;
    loadMessages(activeGroup.id);

    // Ask for notification permission on first chat open
    requestNotificationPermission();

    const channel = sb.channel('messages-' + activeGroup.id)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'chat_messages',
        filter: 'group_id=eq.' + activeGroup.id
      }, async (payload) => {
        const newMsg = payload.new;
        // Don't notify for own messages
        if (newMsg.sender_id === user.id) return;

        // Get sender name
        const { data: sender } = await sb.from('users').select('full_name').eq('id', newMsg.sender_id).maybeSingle();
        setMessages(prev => {
          if (prev.some(m => m.id === newMsg.id)) return prev;
          return [...prev, { ...newMsg, users: sender }];
        });
        setTimeout(() => {
          const wrap = document.getElementById('threadMessages');
          if (wrap) wrap.scrollTop = wrap.scrollHeight;
        }, 50);

        // Mark this group as read since user is actively viewing it
        markRead(activeGroup.id);

        // Sound + notification (notification only if tab not visible)
        playNotificationSound();
        if (document.visibilityState !== 'visible') {
          const senderName = sender?.full_name || 'Someone';
          const preview = newMsg.body || (Array.isArray(newMsg.attachments) && newMsg.attachments.length ? '📎 ' + (newMsg.attachments[0].name || 'attachment') : '');
          showNotification(senderName + ' · ' + activeGroup.name, preview);
        }
      })
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'chat_messages',
        filter: 'group_id=eq.' + activeGroup.id
      }, (payload) => {
        // edited message — update local copy
        setMessages(prev => prev.map(m => m.id === payload.new.id ? { ...m, ...payload.new } : m));
      })
      .on('postgres_changes', {
        event: 'DELETE',
        schema: 'public',
        table: 'chat_messages',
        filter: 'group_id=eq.' + activeGroup.id
      }, (payload) => {
        // hard-deleted message — remove from local list
        setMessages(prev => prev.filter(m => m.id !== payload.old.id));
      })
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [activeGroup]);

  // Live extraction status updates (refetch messages for the active group when extraction completes)
  useEffect(() => {
    if (!plant?.id || !activeGroup) return;
    const channel = sb.channel('extract-' + activeGroup.id)
      .on('postgres_changes', { event:'UPDATE', schema:'public', table:'mcp_logistics_extraction_queue', filter:'group_id=eq.' + activeGroup.id }, () => {
        loadMessages(activeGroup.id);
      })
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id, activeGroup?.id]);

  const lastReadKey = (groupId) => 'loglinkr_lastread_' + user.id + '_' + groupId;
  const getLastRead = (groupId) => parseInt(localStorage.getItem(lastReadKey(groupId)) || '0');
  const markRead = (groupId) => localStorage.setItem(lastReadKey(groupId), Date.now().toString());

  const loadGroups = async () => {
    setLoading(true);
    const { data: groupsData } = await sb.from('chat_groups').select('*').contains('members', [user.id]);
    const groupsList = groupsData || [];

    // Get unread count + last message preview for each group
    const enriched = await Promise.all(groupsList.map(async (g) => {
      const lastRead = getLastRead(g.id);
      const lastReadIso = new Date(lastRead || 0).toISOString();

      // Count unread (messages newer than lastRead, not from self)
      const { count } = await sb.from('chat_messages')
        .select('id', { count: 'exact', head: true })
        .eq('group_id', g.id)
        .gt('created_at', lastReadIso)
        .neq('sender_id', user.id);

      // Last message — without users join to avoid RLS issues
      const { data: lastMsgRaw } = await sb.from('chat_messages')
        .select('body, attachments, created_at, sender_id')
        .eq('group_id', g.id)
        .order('created_at', { ascending: false })
        .limit(1)
        .maybeSingle();
      let lastMsg = null;
      if (lastMsgRaw) {
        lastMsg = { ...lastMsgRaw, users: null };
        if (lastMsgRaw.sender_id) {
          const { data: sender } = await sb.from('users').select('full_name').eq('id', lastMsgRaw.sender_id).maybeSingle();
          lastMsg.users = sender;
        }
      }

      return { ...g, unread: count || 0, lastMsg };
    }));

    // Sort: groups with unread first, then by last message time
    enriched.sort((a, b) => {
      if ((b.unread > 0) !== (a.unread > 0)) return (b.unread > 0) - (a.unread > 0);
      const at = a.lastMsg?.created_at || a.created_at;
      const bt = b.lastMsg?.created_at || b.created_at;
      return new Date(bt) - new Date(at);
    });

    setGroups(enriched);
    setLoading(false);
  };

  const loadMessages = async (groupId) => {
    // Load messages WITHOUT the join to avoid RLS-on-users blocking the read
    const { data: msgs, error: msgErr } = await sb.from('chat_messages')
      .select('*')
      .eq('group_id', groupId)
      .order('created_at')
      .limit(100);

    if (msgErr) {
      console.error('[Loglinkr] loadMessages error:', msgErr);
      setMessages([]);
      return;
    }
    const messages = msgs || [];

    // Manually fetch sender names (only from active users in our plant)
    const senderIds = [...new Set(messages.map(m => m.sender_id).filter(Boolean))];
    const senderMap = {};
    if (senderIds.length > 0) {
      const { data: senders } = await sb.from('users').select('id, full_name').in('id', senderIds);
      (senders || []).forEach(u => { senderMap[u.id] = u; });
    }
    for (const m of messages) {
      m.users = m.sender_id ? (senderMap[m.sender_id] || { full_name: 'Unknown user' }) : null;
    }

    // Fetch extraction status for these messages (if any have images)
    if (messages.length > 0) {
      const msgIds = messages.map(m => m.id);
      const { data: queue } = await sb.from('mcp_logistics_extraction_queue')
        .select('message_id, status, classification, result_doc_id')
        .in('message_id', msgIds);
      const statusMap = (queue || []).reduce((acc, q) => { acc[q.message_id] = q; return acc; }, {});

      // Fetch resulting docs
      const docIds = (queue || []).filter(q => q.result_doc_id).map(q => q.result_doc_id);
      const docMap = {};
      if (docIds.length > 0) {
        const { data: docs } = await sb.from('mcp_logistics_documents')
          .select('id, doc_type, doc_number, vendor_name_raw, total_value, status')
          .in('id', docIds);
        (docs || []).forEach(d => { docMap[d.id] = d; });
      }

      // Attach to messages
      for (const m of messages) {
        if (statusMap[m.id]) {
          m._extraction = statusMap[m.id];
          if (statusMap[m.id].result_doc_id && docMap[statusMap[m.id].result_doc_id]) {
            m._doc = docMap[statusMap[m.id].result_doc_id];
          }
        }
      }
    }

    setMessages(messages);
    markRead(groupId);
    setTimeout(() => {
      const wrap = document.getElementById('threadMessages');
      if (wrap) wrap.scrollTop = wrap.scrollHeight;
    }, 50);
  };

  const onPickFile = async (e) => {
    const original = e.target.files?.[0];
    if (!original) return;
    if (original.size > 20 * 1024 * 1024) {
      alert('File too large. Max 20 MB.');
      return;
    }
    e.target.value = '';
    const isImage = original.type.startsWith('image/');
    // Resize images to cut API + upload cost
    const file = isImage ? await resizeImageFile(original, 1600, 0.82) : original;
    setAttachment({
      file,
      previewUrl: isImage ? URL.createObjectURL(file) : null,
      type: file.type,
      name: file.name
    });
  };

  const triggerExtraction = async (msg, imageUrl) => {
    try {
      const { data: queueId, error } = await sb.rpc('enqueue_chat_image_for_extraction', {
        p_message_id: msg.id,
        p_group_id: activeGroup.id,
        p_image_url: imageUrl,
      });
      if (error) { alert(error.message); return; }
      if (!queueId) { alert('Already queued'); return; }
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        showToast('Extracting…');
        fetch(SUPABASE_URL + '/functions/v1/extract-document', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + session.access_token,
            'apikey': SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({
            queue_id: queueId,
            image_url: imageUrl,
            plant_name: plant.name,
          }),
        }).catch(e => console.warn('Extract failed:', e));
      }
    } catch (e) { alert(e.message); }
  };

  const send = async () => {
    if ((!input.trim() && !attachment) || !activeGroup || uploading) return;
    const body = input.trim();
    let attachments = [];

    if (attachment) {
      setUploading(true);
      try {
        const ext = attachment.name.split('.').pop().toLowerCase();
        const path = plant.id + '/' + activeGroup.id + '/' + user.id + '-' + Date.now() + '.' + ext;
        const { error: upErr } = await sb.storage.from('chat-attachments').upload(path, attachment.file, {
          cacheControl: '3600',
          upsert: false
        });
        if (upErr) {
          alert('Upload failed: ' + upErr.message);
          setUploading(false);
          return;
        }
        const { data: { publicUrl } } = sb.storage.from('chat-attachments').getPublicUrl(path);
        attachments = [{
          url: publicUrl,
          path: path,
          type: attachment.type,
          name: attachment.name,
          isImage: attachment.type.startsWith('image/')
        }];
      } catch (err) {
        alert('Upload failed: ' + err.message);
        setUploading(false);
        return;
      }
      setUploading(false);
    }

    const localId = 'local-' + Date.now();
    const optimisticMsg = {
      id: localId,
      plant_id: plant.id,
      group_id: activeGroup.id,
      sender_id: user.id,
      body: body || null,
      attachments,
      users: { full_name: me.full_name },
      created_at: new Date().toISOString(),
      _pending: true
    };

    // Show immediately
    setMessages(prev => [...prev, optimisticMsg]);
    setInput('');
    setAttachment(null);
    setTimeout(() => {
      const wrap = document.getElementById('threadMessages');
      if (wrap) wrap.scrollTop = wrap.scrollHeight;
    }, 30);

    // Send to server
    const { data: inserted, error } = await sb.from('chat_messages').insert({
      plant_id: plant.id,
      group_id: activeGroup.id,
      sender_id: user.id,
      body: body || null,
      attachments: attachments
    }).select().single();

    if (error) {
      // Mark as failed
      setMessages(prev => prev.map(m => m.id === localId ? {...m, _failed: true, _pending: false} : m));
      return;
    }

    // Replace optimistic with real (so realtime won't double-add)
    setMessages(prev => prev.map(m => m.id === localId ? {...inserted, users: { full_name: me.full_name }} : m));

    // Auto-extract documents — ONLY in groups with AI flag enabled (saves API cost)
    if (inserted && attachments.length > 0 && attachments[0].isImage && activeGroup?.ai_logistics_enabled) {
      try {
        const { data: queueId, error: enqErr } = await sb.rpc('enqueue_chat_image_for_extraction', {
          p_message_id: inserted.id,
          p_group_id: activeGroup.id,
          p_image_url: attachments[0].url,
        });
        if (queueId && !enqErr) {
          // Fire-and-forget call to Edge Function
          const { data: { session } } = await sb.auth.getSession();
          if (session) {
            fetch(SUPABASE_URL + '/functions/v1/extract-document', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + session.access_token,
                'apikey': SUPABASE_ANON_KEY,
              },
              body: JSON.stringify({
                queue_id: queueId,
                image_url: attachments[0].url,
                plant_name: plant.name,
              }),
            }).catch(e => console.warn('Extract call failed (will retry on next image):', e));
          }
        }
      } catch (e) {
        console.warn('Enqueue failed:', e);
      }
    }
  };

  if (activeGroup) {
    return html`
      <div class="chat-thread">
        <div class="thread-header">
          <button class="thread-back" onClick=${() => setActiveGroup(null)}>←</button>
          <div class="chat-avatar" onClick=${() => setGroupSettingsTarget(activeGroup)} style="cursor:pointer">${activeGroup.name[0] === '#' ? '#' : activeGroup.name[0]}</div>
          <div style="flex:1;cursor:pointer" onClick=${() => setGroupSettingsTarget(activeGroup)}>
            <div style="font-weight:600;font-size:14px">${activeGroup.name}</div>
            <div style="font-size:11px;color:var(--slate-500)">${activeGroup.members.length} member${activeGroup.members.length > 1 ? 's' : ''} · tap for settings</div>
          </div>
          <button class="thread-back" onClick=${() => setGroupSettingsTarget(activeGroup)}>⚙️</button>
        </div>
        ${groupSettingsTarget && html`<${GroupSettingsModal} plant=${plant} me=${me} user=${user} group=${groupSettingsTarget} onClose=${() => setGroupSettingsTarget(null)} onChanged=${(updatedGroup) => {
          if (updatedGroup === null) {
            // Group deleted or user left
            setGroupSettingsTarget(null);
            setActiveGroup(null);
            loadGroups();
          } else {
            setGroupSettingsTarget(updatedGroup);
            setActiveGroup(updatedGroup);
            loadGroups();
          }
        }} />`}
        <div class="thread-messages" id="threadMessages">
          ${messages.length === 0 ? html`<div class="empty"><div class="icon">💬</div><div style="font-size:13px">No messages yet. Say hi.</div></div>` :
            messages.map(m => {
              const isOut = m.sender_id === user.id;
              const atts = Array.isArray(m.attachments) ? m.attachments : [];
              const ex = m._extraction;
              const doc = m._doc;
              const hasImage = atts.length > 0 && atts[0].isImage;
              const canEdit = isOut;
              const canDelete = isOut || me.role === 'plant_head' || me.role === 'admin';
              return html`
                <div class=${'msg ' + (isOut ? 'out' : 'in')} key=${m.id}>
                  ${!isOut && html`<div class="who">${m.users?.full_name || '?'}</div>`}
                  ${m.forwarded_from_message_id && html`<div style="font-size:10px;opacity:0.7;font-style:italic">↪️ Forwarded</div>`}
                  ${m.body && html`<div>${m.body}</div>`}
                  ${atts.map((a, i) => a.isImage
                    ? html`<a href=${a.url} target="_blank" rel="noopener" key=${i}><img class="attached-img" src=${a.url} alt=${a.name || 'image'} /></a>`
                    : html`<a href=${a.url} target="_blank" rel="noopener" class="file-attached" key=${i}>📎 ${a.name || 'file'}</a>`
                  )}
                  ${ex && html`
                    <div class="extract-badge ${ex.status}">
                      ${ex.status === 'pending' || ex.status === 'processing' ? html`<span>🔍 Reading…</span>` :
                        ex.status === 'completed' && doc ? html`
                          <span>📄 ${doc.doc_type.replace('_',' ')} · ${doc.vendor_name_raw || '?'} ${doc.total_value ? '· ₹' + fmtNum(doc.total_value) : ''}</span>
                        ` :
                        ex.status === 'duplicate' ? html`<span>⚠️ Already captured</span>` :
                        ex.status === 'skipped' ? html`<span>📷 ${ex.classification || 'skipped'}</span>` :
                        ex.status === 'failed' ? html`<span>✗ Extract failed</span>` : ''}
                    </div>
                  `}
                  ${hasImage && !ex && html`
                    <button class="msg-action-btn" style="margin-top:6px" onClick=${() => triggerExtraction(m, atts[0].url)} title="Extract document">📄 Extract as document</button>
                  `}
                  <div class="ts">
                    ${fmtDate(m.created_at)}${m.edited_at ? ' · edited' : ''}
                    <button class="msg-action-btn" onClick=${() => setMsgMenu(m)} title="More">⋯</button>
                  </div>
                </div>
              `;
            })
          }
        </div>
        ${attachment && html`
          <div class="thread-attach-preview">
            ${attachment.previewUrl ? html`<img src=${attachment.previewUrl} />` : html`<span>📎</span>`}
            <span>${attachment.name}</span>
            <button onClick=${() => setAttachment(null)}>×</button>
          </div>
        `}
        <div class="thread-input">
          <input type="file" id="chatFileInput" accept="image/*,video/*,audio/*,application/pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.zip,.rar,.dwg,.dxf,.step,.stp,.iges,.igs,.stl" style="display:none" onChange=${onPickFile} />
          <button class="attach" onClick=${() => document.getElementById('chatFileInput').click()} disabled=${uploading} title="Attach">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button class="attach" onClick=${() => setNewTaskInGroup(true)} disabled=${uploading} title="Create task" style="background:var(--teal-50);color:var(--teal-700)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <input type="text" value=${input} onChange=${e => setInput(e.target.value)} onKeyPress=${e => { if (e.key === 'Enter' && !e.shiftKey) send(); }} placeholder=${uploading ? 'Uploading…' : 'Message…'} disabled=${uploading} />
          <button onClick=${send} disabled=${uploading || (!input.trim() && !attachment)}>${uploading ? '…' : '→'}</button>
        </div>
        ${taskFromMsg && html`<${AssignTaskFromMsgModal} plant=${plant} me=${me} message=${taskFromMsg} group=${activeGroup} onClose=${() => setTaskFromMsg(null)} onSaved=${() => setTaskFromMsg(null)} />`}
        ${newTaskInGroup && html`<${QuickTaskInGroupModal} plant=${plant} me=${me} group=${activeGroup} onClose=${() => setNewTaskInGroup(false)} onSaved=${() => setNewTaskInGroup(false)} />`}
        ${msgMenu && html`<${MessageActionMenu}
          message=${msgMenu} me=${me} group=${activeGroup}
          onClose=${() => setMsgMenu(null)}
          onAssignTask=${() => { setTaskFromMsg(msgMenu); setMsgMenu(null); }}
          onEdit=${() => { setEditMsgTarget(msgMenu); setMsgMenu(null); }}
          onDelete=${async () => {
            if (!confirm('Delete this message? This cannot be undone.')) return;
            const { data, error } = await sb.rpc('delete_chat_message', { p_message_id: msgMenu.id });
            if (error || !data?.success) { alert(error?.message || data?.error || 'Failed'); return; }
            setMsgMenu(null);
            loadMessages(activeGroup.id);
          }}
          onForward=${() => { setForwardMsgTarget(msgMenu); setMsgMenu(null); }}
        />`}
        ${editMsgTarget && html`<${MessageEditModal} message=${editMsgTarget} onClose=${() => setEditMsgTarget(null)} onSaved=${() => { setEditMsgTarget(null); loadMessages(activeGroup.id); }} />`}
        ${forwardMsgTarget && html`<${MessageForwardModal} plant=${plant} me=${me} message=${forwardMsgTarget} currentGroupId=${activeGroup.id} onClose=${() => setForwardMsgTarget(null)} onSaved=${() => { setForwardMsgTarget(null); }} />`}
      </div>
    `;
  }

  return html`
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Chat</h1><div class="sub">Plant communication</div></div><button class="btn small" onClick=${() => setGroupModal(true)} style="margin-top:6px">+ New Group</button></div>
    ${notifPerm === 'default' && html`
      <div class="setup-banner" style="margin-bottom:14px">
        <div class="setup-banner-title">🔔 Enable notifications</div>
        <p style="font-size:13px;color:var(--slate-700);margin-bottom:10px">Get instant alerts when teammates message you, even when Loglinkr isn't open.</p>
        <button class="btn small" onClick=${async () => {
          const ok = await requestNotificationPermission();
          setNotifPerm(Notification.permission);
          if (ok) showToast('Notifications enabled');
        }}>Enable notifications</button>
      </div>
    `}
    ${notifPerm === 'denied' && html`
      <div class="alert info" style="margin-bottom:14px">
        🔕 Notifications blocked. Enable them in your browser settings to get alerts.
      </div>
    `}
    ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
      groups.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">💬</div>No chat groups yet</div></div>` :
      html`<div class="chat-list">
        ${groups.map(g => {
          const last = g.lastMsg;
          const lastWho = last?.users?.full_name?.split(' ')[0];
          const lastBody = last?.body || (Array.isArray(last?.attachments) && last.attachments.length ? '📎 ' + (last.attachments[0].name || 'attachment') : '');
          const preview = last ? (lastWho ? lastWho + ': ' + lastBody : lastBody) : g.members.length + ' member' + (g.members.length > 1 ? 's' : '');
          return html`
            <div class="chat-item" key=${g.id} onClick=${() => setActiveGroup(g)}>
              <div class="chat-avatar">${g.name[0] === '#' ? '#' : g.name[0]}</div>
              <div class="chat-info">
                <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
                  <div class="chat-name" style=${g.unread > 0 ? 'font-weight:700' : ''}>${g.name}${g.ai_logistics_enabled ? html` <span style="font-size:10px;background:var(--teal-100);color:var(--teal-700);padding:1px 6px;border-radius:999px;font-weight:600;vertical-align:middle">🤖 AI</span>` : ''}</div>
                  ${last && html`<div style="font-size:11px;color:var(--slate-400);flex-shrink:0">${fmtDate(last.created_at)}</div>`}
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:2px">
                  <div class="chat-preview" style=${g.unread > 0 ? 'color:var(--slate-700);font-weight:500' : ''}>${preview}</div>
                  ${g.unread > 0 && html`<span style="background:var(--teal-600);color:white;font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;min-width:20px;text-align:center;flex-shrink:0">${g.unread}</span>`}
                </div>
              </div>
            </div>
          `;
        })}
      </div>`
    }

    ${taskFromMsg && html`<${AssignTaskFromMsgModal} plant=${plant} me=${me} message=${taskFromMsg} group=${activeGroup} onClose=${() => setTaskFromMsg(null)} onSaved=${() => setTaskFromMsg(null)} />`}
    ${groupModal && html`<${GroupCreateModal} plant=${plant} me=${me} user=${user} onClose=${() => setGroupModal(false)} onSaved=${() => { setGroupModal(false); loadGroups(); }} />`}
  `;
}

// ============= PEOPLE (Units, Users, Shifts) =============
function People({ plant, me }) {
  const [view, setView] = useState('units');
  const [units, setUnits] = useState([]);
  const [users, setUsers] = useState([]);
  const [shifts, setShifts] = useState([]);
  const [invites, setInvites] = useState([]);
  const [modal, setModal] = useState(null);
  const [editTarget, setEditTarget] = useState(null);
  const [loading, setLoading] = useState(true);

  const refresh = async () => {
    setLoading(true);
    const [u, us, sh, inv] = await Promise.all([
      sb.from('units').select('*').order('created_at'),
      sb.from('users').select('*').order('created_at'),
      sb.from('shifts').select('*').order('start_time'),
      sb.from('user_invites').select('*').eq('status', 'pending').order('created_at', { ascending:false }),
    ]);
    setUnits(u.data || []);
    setUsers(us.data || []);
    setShifts(sh.data || []);
    setInvites(inv.data || []);
    setLoading(false);
  };

  useEffect(() => { refresh(); }, []);

  if (loading) return html`<div class="loader"><div class="spinner"></div></div>`;

  return html`
    <div class="page-header"><div><h1>People</h1><div class="sub">Units, team, shifts</div></div></div>

    <div class="auth-tabs" style="margin-bottom:16px">
      <button class=${'auth-tab' + (view === 'units' ? ' active' : '')} onClick=${() => setView('units')}>Units</button>
      <button class=${'auth-tab' + (view === 'users' ? ' active' : '')} onClick=${() => setView('users')}>Team</button>
      <button class=${'auth-tab' + (view === 'shifts' ? ' active' : '')} onClick=${() => setView('shifts')}>Shifts</button>
    </div>

    ${view === 'units' && html`
      <div class="section-h">Units · ${units.length}<button class="btn small ghost" onClick=${() => setModal('unit')}>+ Add</button></div>
      ${units.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">🏭</div>No units yet</div></div>` :
        units.map(u => html`
          <div class="list-item" key=${u.id} onClick=${() => { setEditTarget(u); setModal('unit'); }}>
            <div class="list-item-row">
              <div class="list-item-main">
                <div class="list-item-title">${u.name}</div>
                <div class="list-item-sub">${u.address || '—'}</div>
              </div>
            </div>
          </div>
        `)
      }
    `}

    ${view === 'users' && html`
      ${invites.length > 0 && html`
        <div class="section-h">Pending Invites · ${invites.length}</div>
        ${invites.map(i => html`
          <div class="list-item" key=${i.id} onClick=${() => { setEditTarget(i); setModal('inviteView'); }}>
            <div class="list-item-row">
              <div class="list-item-main">
                <div class="list-item-title">${i.full_name}</div>
                <div class="list-item-sub">${i.role} · code: <span class="mono" style="color:var(--teal-700);font-weight:600">${i.invite_code}</span></div>
              </div>
              <span class="badge amber">Pending</span>
            </div>
          </div>
        `)}
      `}
      <div class="section-h">Team · ${users.length}<button class="btn small ghost" onClick=${() => setModal('invite')}>+ Invite</button></div>
      ${users.map(u => {
        const canRemove = (me.role === 'plant_head' || me.role === 'admin') && u.id !== me.id && u.status !== 'inactive';
        return html`
          <div class="list-item" key=${u.id}>
            <div class="list-item-row">
              <div class="list-item-main">
                <div class="list-item-title">${u.full_name}${u.id === me.id ? ' (you)' : ''}${u.status === 'inactive' ? ' · inactive' : ''}</div>
                <div class="list-item-sub">${u.phone} · ${u.email || 'no email'}</div>
              </div>
              <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
                <span class=${'badge ' + (u.role === 'plant_head' ? 'teal' : u.status === 'inactive' ? '' : '')}>${u.role}</span>
                ${canRemove && html`<button class="btn small danger" onClick=${async () => {
                  const reason = prompt('Reason for removal (recorded in audit log):', '');
                  if (reason === null) return;
                  const { data, error } = await sb.rpc('remove_user_from_plant', { p_user_id: u.id, p_reason: reason || 'No reason provided' });
                  if (error || !data?.success) { alert(error?.message || data?.error || 'Failed'); return; }
                  showToast('Removed from organization');
                  refresh();
                }}>Remove</button>`}
              </div>
            </div>
          </div>
        `;
      })}
    `}

    ${view === 'shifts' && html`
      <div class="section-h">Shifts · ${shifts.length}<button class="btn small ghost" onClick=${() => setModal('shift')}>+ Add</button></div>
      ${shifts.map(s => html`
        <div class="list-item" key=${s.id} onClick=${() => { setEditTarget(s); setModal('shift'); }}>
          <div class="list-item-row">
            <div class="list-item-main">
              <div class="list-item-title">${s.name}</div>
              <div class="list-item-sub mono">${s.start_time.slice(0,5)} – ${s.end_time.slice(0,5)}</div>
            </div>
            <span class=${'badge ' + (s.is_active ? 'emerald' : '')}>${s.is_active ? 'Active' : 'Inactive'}</span>
          </div>
        </div>
      `)}
    `}

    ${modal === 'unit' && html`<${UnitModal} plant=${plant} editTarget=${editTarget} onClose=${() => { setModal(null); setEditTarget(null); }} onSaved=${() => { setModal(null); setEditTarget(null); refresh(); }} />`}
    ${modal === 'shift' && html`<${ShiftModal} plant=${plant} editTarget=${editTarget} onClose=${() => { setModal(null); setEditTarget(null); }} onSaved=${() => { setModal(null); setEditTarget(null); refresh(); }} />`}
    ${modal === 'invite' && html`<${InviteModal} plant=${plant} me=${me} units=${units} onClose=${() => setModal(null)} onSaved=${() => { setModal(null); refresh(); }} />`}
    ${modal === 'inviteView' && html`<${InviteViewModal} invite=${editTarget} onClose=${() => { setModal(null); setEditTarget(null); }} onCancel=${async () => { await sb.from('user_invites').delete().eq('id', editTarget.id); setModal(null); setEditTarget(null); refresh(); showToast('Invite cancelled'); }} />`}
  `;
}

function UnitModal({ plant, editTarget, onClose, onSaved }) {
  const [form, setForm] = useState(editTarget || { name:'', address:'' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const payload = { plant_id: plant.id, name: form.name, address: form.address || null };
      const { error } = editTarget
        ? await sb.from('units').update(payload).eq('id', editTarget.id)
        : await sb.from('units').insert(payload);
      if (error) throw error;
      showToast(editTarget ? 'Unit updated' : 'Unit added');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  const remove = async () => {
    if (!confirm('Delete this unit? All machines and dies in it will be deleted too.')) return;
    const { error } = await sb.from('units').delete().eq('id', editTarget.id);
    if (error) { setError(error.message); return; }
    showToast('Unit deleted');
    onSaved();
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${editTarget ? 'Edit' : 'Add'} Unit</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field"><label>Unit Name *</label><input type="text" required value=${form.name} onChange=${e => setForm({...form, name: e.target.value})} placeholder="Unit 1" /></div>
          <div class="field"><label>Address</label><input type="text" value=${form.address || ''} onChange=${e => setForm({...form, address: e.target.value})} placeholder="Optional" /></div>
          <button class="btn" disabled=${loading}>${loading ? 'Saving…' : (editTarget ? 'Update' : 'Add')}</button>
          ${editTarget && html`<button class="btn danger" type="button" style="margin-top:8px" onClick=${remove}>Delete</button>`}
        </form>
      </div>
    </div>
  `;
}

// 1. TODAY'S PRODUCTION — good/reject % + 7-day sparkline
function TodaysProductionCard({ plant, setTab }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  const refresh = async () => {
    const { data: rows } = await sb.from('v_production_7day').select('*').order('prod_date');
    setData(rows || []);
    setLoading(false);
  };
  useEffect(() => { refresh(); }, []);

  if (loading) return html`<div class="card"><div class="card-title">📊 Today's Production</div><div class="loader"><div class="spinner"></div></div></div>`;

  const todayStr = new Date().toISOString().slice(0, 10);
  const today = data.find(r => r.prod_date === todayStr) || { good_qty:0, reject_qty:0, reject_pct:0, shot_count:0 };

  // Build 7-day series with zero-fill
  const series = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0, 10);
    const row = data.find(r => r.prod_date === ds);
    series.push({
      date: ds,
      label: d.toLocaleDateString('en-IN', { weekday: 'short' }).slice(0, 1),
      good: row?.good_qty || 0,
      reject: row?.reject_qty || 0,
      total: (row?.good_qty || 0) + (row?.reject_qty || 0),
    });
  }
  const maxBar = Math.max(1, ...series.map(s => s.total));

  return html`
    <div class="card" onClick=${() => setTab('production')} style="cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="card-title" style="margin:0">📊 Today's Production</div>
        <span style="font-size:11px;color:var(--slate-500)">last 7 days →</span>
      </div>
      <div style="display:flex;gap:14px;align-items:flex-end;margin-bottom:12px">
        <div>
          <div style="font-size:11px;color:var(--slate-500)">GOOD</div>
          <div style="font-size:22px;font-weight:700;color:var(--emerald-700);font-variant-numeric:tabular-nums">${fmtNum(today.good_qty)}</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--slate-500)">REJECT</div>
          <div style="font-size:22px;font-weight:700;color:var(--rose-600);font-variant-numeric:tabular-nums">${fmtNum(today.reject_qty)}</div>
        </div>
        <div style="margin-left:auto;text-align:right">
          <div style="font-size:11px;color:var(--slate-500)">REJECT %</div>
          <div style="font-size:22px;font-weight:700;color:${parseFloat(today.reject_pct) > 3 ? 'var(--rose-600)' : 'var(--emerald-700)'}">${parseFloat(today.reject_pct).toFixed(1)}%</div>
        </div>
      </div>
      <div style="display:flex;gap:4px;align-items:flex-end;height:56px;padding:4px 0">
        ${series.map(s => {
          const barH = Math.max(2, (s.total / maxBar) * 50);
          const goodPct = s.total > 0 ? (s.good / s.total) * 100 : 0;
          const isToday = s.date === todayStr;
          return html`
            <div key=${s.date} style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
              <div title=${'Good ' + s.good + ' / Reject ' + s.reject} style="width:100%;max-width:30px;height:${barH}px;background:linear-gradient(to top, var(--rose-400) 0%, var(--rose-400) ${100-goodPct}%, var(--emerald-500) ${100-goodPct}%, var(--emerald-500) 100%);border-radius:3px 3px 0 0;opacity:${isToday ? 1 : 0.7};border:${isToday ? '2px solid var(--teal-600)' : 'none'}"></div>
              <div style="font-size:9px;color:${isToday ? 'var(--teal-700)' : 'var(--slate-500)'};font-weight:${isToday ? 600 : 400}">${s.label}</div>
            </div>
          `;
        })}
      </div>
    </div>
  `;
}

// 2. SCHEDULE STATUS — current month attainment per customer
function ScheduleStatusCard({ plant, setTab }) {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [drilldown, setDrilldown] = useState(false);

  const refresh = async () => {
    const { data: rows } = await sb.from('v_schedule_status_current_month').select('*').order('pct_attainment');
    setData(rows || []);
    setLoading(false);
  };
  useEffect(() => { refresh(); }, []);

  if (loading) return html`<div class="card"><div class="card-title">📅 Schedule Status</div><div class="loader"><div class="spinner"></div></div></div>`;

  if (data.length === 0) return html`
    <div class="card" onClick=${() => setTab('schedules')} style="cursor:pointer">
      <div class="card-title">📅 Schedule Status</div>
      <div class="empty" style="padding:14px"><div style="font-size:12px">No active schedules this month. Tap to create one.</div></div>
    </div>
  `;

  const totalPlanned = data.reduce((s, r) => s + parseFloat(r.total_planned || 0), 0);
  const totalSupplied = data.reduce((s, r) => s + parseFloat(r.total_supplied || 0), 0);
  const overallPct = totalPlanned > 0 ? (totalSupplied / totalPlanned) * 100 : 0;
  const overdueTotal = data.reduce((s, r) => s + parseInt(r.overdue_lines || 0), 0);

  return html`
    <div class="card" onClick=${() => setDrilldown(true)} style="cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="card-title" style="margin:0">📅 Schedule Status · This month</div>
        <span style="font-size:11px;color:var(--slate-500)">${data.length} customer${data.length === 1 ? '' : 's'} · tap for details ▸</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>
          <div style="font-size:11px;color:var(--slate-500)">ATTAINMENT</div>
          <div style="font-size:24px;font-weight:700;color:${overallPct >= 90 ? 'var(--emerald-700)' : overallPct >= 60 ? 'var(--teal-700)' : 'var(--amber-700)'};font-variant-numeric:tabular-nums">${overallPct.toFixed(1)}%</div>
          <div style="font-size:11px;color:var(--slate-500)">${fmtNum(totalSupplied)} / ${fmtNum(totalPlanned)}</div>
        </div>
        ${overdueTotal > 0 && html`
          <div style="text-align:right">
            <div style="font-size:11px;color:var(--rose-600);font-weight:600">⚠️ OVERDUE</div>
            <div style="font-size:18px;font-weight:700;color:var(--rose-600)">${overdueTotal}</div>
            <div style="font-size:10px;color:var(--slate-500)">delivery slots</div>
          </div>
        `}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${data.slice(0, 4).map(r => {
          const pct = parseFloat(r.pct_attainment || 0);
          const color = pct >= 90 ? 'var(--emerald-500)' : pct >= 60 ? 'var(--teal-500)' : 'var(--amber-500)';
          return html`
            <div key=${r.schedule_id} style="display:flex;align-items:center;gap:8px;font-size:12px">
              <div style="flex:0 0 90px;font-weight:500;color:var(--slate-700);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.customer_code || r.customer_name}</div>
              <div style="flex:1;background:var(--slate-100);height:6px;border-radius:3px;overflow:hidden">
                <div style="background:${color};height:100%;width:${Math.min(100, pct)}%"></div>
              </div>
              <div style="flex:0 0 40px;text-align:right;font-weight:600;color:${color};font-size:11px">${pct.toFixed(0)}%</div>
              ${parseInt(r.overdue_lines || 0) > 0 && html`<span style="color:var(--rose-600);font-size:11px;font-weight:600">${r.overdue_lines}⚠</span>`}
            </div>
          `;
        })}
      </div>
    </div>

    ${drilldown && html`
      <${DrillDownDrawer}
        title="📅 Schedule Status — All customers"
        subtitle="${overallPct.toFixed(1)}% attainment · ${overdueTotal > 0 ? overdueTotal + ' overdue lines' : 'on track'}"
        items=${data}
        renderItem=${(r) => {
          const pct = parseFloat(r.pct_attainment || 0);
          const color = pct >= 90 ? 'var(--emerald-700)' : pct >= 60 ? 'var(--teal-700)' : 'var(--amber-700)';
          const bg = pct >= 90 ? 'var(--emerald-50)' : pct >= 60 ? 'var(--teal-50)' : 'var(--amber-50)';
          const overdue = parseInt(r.overdue_lines || 0);
          return html`
            <div key=${r.schedule_id} style="padding:10px 12px;background:${bg};border-left:3px solid ${color};border-radius:6px">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
                <div style="flex:1;min-width:0">
                  <div style="font-weight:600;color:var(--slate-900);font-size:13px">${r.customer_name}${r.customer_code ? ' · ' + r.customer_code : ''}</div>
                  <div style="font-size:11px;color:var(--slate-600);margin-top:4px">
                    Planned: <b>${fmtNum(r.total_planned)}</b> ·
                    Supplied: <b>${fmtNum(r.total_supplied)}</b>
                    ${parseInt(r.due_today_lines || 0) > 0 ? ' · ' + r.due_today_lines + ' due today' : ''}
                  </div>
                  ${overdue > 0 && html`<div style="font-size:11px;color:var(--rose-700);font-weight:600;margin-top:4px">⚠️ ${overdue} overdue line${overdue > 1 ? 's' : ''}</div>`}
