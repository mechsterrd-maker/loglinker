    ${view === 'items' && html`
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <input type="search" value=${search} onChange=${e => setSearch(e.target.value)} placeholder="Search items…" style="flex:1;padding:8px 12px;border:1px solid var(--slate-200);border-radius:8px;font-size:13px" />
        <button class="btn small ${layout === 'list' ? '' : 'ghost'}" onClick=${() => setLayout('list')}>List</button>
        <button class="btn small ${layout === 'by_category' ? '' : 'ghost'}" onClick=${() => setLayout('by_category')}>By Category</button>
      </div>

      ${layout === 'list' && html`
        <div class="auth-tabs" style="margin-bottom:14px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch">
          <button class=${'auth-tab' + (categoryFilter === 'all' ? ' active' : '')} onClick=${() => setCategoryFilter('all')}>All · ${items.length}</button>
          ${Object.keys(categoryLabels).map(c => categoryCounts[c] > 0 && html`
            <button key=${c} class=${'auth-tab' + (categoryFilter === c ? ' active' : '')} onClick=${() => setCategoryFilter(c)}>${lbl(c)} · ${categoryCounts[c]}</button>
          `)}
        </div>
      `}

      <div class="section-h">Items · ${filteredItems.length}<button class="btn small ghost" onClick=${() => { setEditTarget(null); setModal('item'); }}>+ Add</button></div>

      ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
        filteredItems.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">📦</div>${items.length === 0 ? 'No items yet' : 'No items match this filter'}</div></div>` :
        layout === 'by_category' ? html`
          ${Object.entries(byCategory).sort((a,b) => b[1].length - a[1].length).map(([cat, list]) => html`
            <details key=${cat} open style="margin-bottom:8px">
              <summary style="cursor:pointer;padding:10px 12px;background:var(--slate-100);border-radius:10px;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center">
                <span>📦 ${lbl(cat)}</span>
                <span style="background:var(--teal-600);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px">${list.length}</span>
              </summary>
              <div style="margin-top:6px">
                ${list.map(i => html`<${ItemRow} i=${i} />`)}
              </div>
            </details>
          `)}
        ` : html`
          ${filteredItems.map(i => html`<${ItemRow} i=${i} />`)}
        `
      }
    `}

    ${view === 'transactions' && html`
      ${(() => {
        const INWARD_TYPES = ['grn','return','opening','adjustment_in'];
        const OUTWARD_TYPES = ['issue','consumption','scrap','adjustment_out'];
        const TYPE_LABEL = {
          grn:'GRN', return:'Return', opening:'Opening', adjustment_in:'Adj+',
          issue:'Issue', consumption:'Consumption', scrap:'Scrap', adjustment_out:'Adj−',
        };

        // Apply filters
        let filtered = transactions;

        if (txnTypeFilter === 'inward') filtered = filtered.filter(t => INWARD_TYPES.includes(t.txn_type));
        else if (txnTypeFilter === 'outward') filtered = filtered.filter(t => OUTWARD_TYPES.includes(t.txn_type));
        else if (txnTypeFilter !== 'all') filtered = filtered.filter(t => t.txn_type === txnTypeFilter);

        if (txnDateFrom) filtered = filtered.filter(t => t.created_at >= txnDateFrom);
        if (txnDateTo) filtered = filtered.filter(t => t.created_at <= (txnDateTo + 'T23:59:59'));

        if (txnSearch.trim()) {
          const q = txnSearch.trim().toLowerCase();
          filtered = filtered.filter(t =>
            (t.mcp_stocks_items?.code || '').toLowerCase().includes(q) ||
            (t.mcp_stocks_items?.name || '').toLowerCase().includes(q) ||
            (t.reference || '').toLowerCase().includes(q) ||
            (t.notes || '').toLowerCase().includes(q) ||
            (t.users?.full_name || '').toLowerCase().includes(q)
          );
        }

        // Compute totals from filtered
        const totalIn = filtered.filter(t => INWARD_TYPES.includes(t.txn_type)).reduce((s, t) => s + parseFloat(t.qty || 0), 0);
        const totalOut = filtered.filter(t => OUTWARD_TYPES.includes(t.txn_type)).reduce((s, t) => s + parseFloat(t.qty || 0), 0);

        return html`
          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">
            <input type="search" value=${txnSearch} onChange=${e => setTxnSearch(e.target.value)} placeholder="Search by item, code, reference, person, notes…" style="width:100%;padding:9px 12px;border:1px solid var(--slate-200);border-radius:8px;font-size:13px" />
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <select value=${txnTypeFilter} onChange=${e => setTxnTypeFilter(e.target.value)} style="padding:7px 10px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px;background:white">
                <option value="all">All types</option>
                <optgroup label="Inward">
                  <option value="inward">All inward</option>
                  <option value="grn">GRN only</option>
                  <option value="return">Return only</option>
                  <option value="opening">Opening only</option>
                  <option value="adjustment_in">Adj+ only</option>
                </optgroup>
                <optgroup label="Outward">
                  <option value="outward">All outward</option>
                  <option value="issue">Issue only</option>
                  <option value="consumption">Consumption only</option>
                  <option value="scrap">Scrap only</option>
                  <option value="adjustment_out">Adj− only</option>
                </optgroup>
              </select>
              <input type="date" value=${txnDateFrom} onChange=${e => setTxnDateFrom(e.target.value)} placeholder="From" style="padding:7px 10px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px" />
              <input type="date" value=${txnDateTo} onChange=${e => setTxnDateTo(e.target.value)} placeholder="To" style="padding:7px 10px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px" />
              ${(txnSearch || txnTypeFilter !== 'all' || txnDateFrom || txnDateTo) && html`
                <button class="btn small ghost" onClick=${() => { setTxnSearch(''); setTxnTypeFilter('all'); setTxnDateFrom(''); setTxnDateTo(''); }} style="padding:7px 12px;font-size:12px">Clear</button>
              `}
            </div>
          </div>

          <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">
            <div class="stat" style="padding:8px"><div class="stat-num" style="font-size:16px">${filtered.length}</div><div class="stat-label" style="font-size:10px">SHOWING</div></div>
            <div class="stat teal" style="padding:8px"><div class="stat-num" style="font-size:16px">+${fmtNum(totalIn)}</div><div class="stat-label" style="font-size:10px">TOTAL IN</div></div>
            <div class="stat amber" style="padding:8px"><div class="stat-num" style="font-size:16px">−${fmtNum(totalOut)}</div><div class="stat-label" style="font-size:10px">TOTAL OUT</div></div>
          </div>

          ${transactions.length >= 500 && html`<div class="alert info" style="font-size:11px;padding:6px 10px">Showing latest 500. Apply filters to narrow further.</div>`}

          ${filtered.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">📋</div>${transactions.length === 0 ? 'No transactions yet' : 'No matches for current filters'}</div></div>` :
            filtered.map(t => {
              const isInward = INWARD_TYPES.includes(t.txn_type);
              return html`
                <div class="list-item" key=${t.id} onClick=${() => {
                  const itm = items.find(i => i.id === t.item_id);
                  if (itm) setActiveItem(itm);
                }}>
                  <div class="list-item-row">
                    <div class="list-item-main">
                      <div class="list-item-title">${t.mcp_stocks_items?.code || '?'} · ${t.mcp_stocks_items?.name || ''}</div>
                      <div class="list-item-sub">${t.users?.full_name || '?'}${t.reference ? ' · ' + t.reference : ''} · ${fmtDate(t.created_at)}</div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
                      <span class=${'badge ' + (isInward ? 'emerald' : 'rose')}>${TYPE_LABEL[t.txn_type] || t.txn_type} ${isInward ? '+' : '−'}${fmtNum(t.qty)}</span>
                      <span style="font-size:10px;color:var(--slate-500)">→ ${fmtNum(t.qty_after || 0)} ${t.mcp_stocks_items?.uom || ''}</span>
                    </div>
                  </div>
                </div>
              `;
            })
          }
        `;
      })()}
    `}

    ${modal === 'item' && html`<${ItemModal} plant=${plant} editTarget=${editTarget} onClose=${() => { setModal(null); setEditTarget(null); }} onSaved=${() => { setModal(null); setEditTarget(null); refresh(); }} />`}
    ${modal === 'txn' && html`<${TxnModal} plant=${plant} me=${me} item=${editTarget} onClose=${() => { setModal(null); setEditTarget(null); }} onSaved=${() => { setModal(null); setEditTarget(null); refresh(); }} />`}
  `;
}

function ItemModal({ plant, editTarget, onClose, onSaved }) {
  const [form, setForm] = useState(editTarget || { code:'', name:'', category:'general', uom:'nos', current_qty:0, reorder_level:'', unit_cost:'' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const payload = {
        plant_id: plant.id,
        code: form.code, name: form.name,
        category: form.category || 'general',
        uom: form.uom,
        current_qty: parseFloat(form.current_qty) || 0,
        reorder_level: form.reorder_level ? parseFloat(form.reorder_level) : null,
        unit_cost: form.unit_cost ? parseFloat(form.unit_cost) : null,
      };
      const { error } = editTarget
        ? await sb.from('mcp_stocks_items').update(payload).eq('id', editTarget.id)
        : await sb.from('mcp_stocks_items').insert(payload);
      if (error) throw error;
      showToast(editTarget ? 'Item updated' : 'Item added');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${editTarget ? 'Edit' : 'Add'} Item</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field-row">
            <div class="field"><label>Code *</label><input type="text" required value=${form.code} onChange=${e => setForm({...form, code: e.target.value})} placeholder="ALU-ADC12" /></div>
            <div class="field"><label>UOM</label>
              <select value=${form.uom} onChange=${e => setForm({...form, uom: e.target.value})}>
                <option value="nos">Nos</option><option value="kg">Kg</option><option value="ltr">Ltr</option>
                <option value="mtr">Mtr</option><option value="set">Set</option><option value="box">Box</option>
              </select>
            </div>
          </div>
          <div class="field"><label>Name *</label><input type="text" required value=${form.name} onChange=${e => setForm({...form, name: e.target.value})} placeholder="Aluminum ADC-12 ingots" /></div>
          <div class="field"><label>Category</label>
            <select value=${form.category} onChange=${e => setForm({...form, category: e.target.value})}>
              <option value="raw_material">Raw Material</option>
              <option value="die_spares">Die Spares</option>
              <option value="consumables">Consumables</option>
              <option value="tools">Tools</option>
              <option value="packing">Packing</option>
              <option value="bought_out">Bought-out</option>
              <option value="general">General</option>
            </select>
          </div>
          <div class="field-row">
            <div class="field"><label>Current Qty</label><input type="number" step="0.001" value=${form.current_qty} onChange=${e => setForm({...form, current_qty: e.target.value})} /></div>
            <div class="field"><label>Reorder Level</label><input type="number" step="0.001" value=${form.reorder_level || ''} onChange=${e => setForm({...form, reorder_level: e.target.value})} /></div>
          </div>
          <div class="field"><label>Unit Cost (₹)</label><input type="number" step="0.01" value=${form.unit_cost || ''} onChange=${e => setForm({...form, unit_cost: e.target.value})} /></div>
          <button class="btn" disabled=${loading}>${loading ? 'Saving…' : (editTarget ? 'Update' : 'Add')}</button>
        </form>
      </div>
    </div>
  `;
}

function TxnModal({ plant, me, item, onClose, onSaved }) {
  const [form, setForm] = useState({
    txn_type: item._txnHint || 'grn',
    qty:'', reference:'', notes:''
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const TYPE_GROUPS = [
    { label: 'Inward', types: [
      { val:'grn', lbl:'GRN — Material received' },
      { val:'return', lbl:'Return — Came back from production' },
      { val:'opening', lbl:'Opening — Initial stock entry' },
      { val:'adjustment_in', lbl:'Adjustment In — Found extra' },
    ]},
    { label: 'Outward', types: [
      { val:'issue', lbl:'Issue — Sent to production' },
      { val:'consumption', lbl:'Consumption — Used / consumed' },
      { val:'scrap', lbl:'Scrap — Discarded' },
      { val:'adjustment_out', lbl:'Adjustment Out — Missing' },
    ]},
  ];

  const isInward = ['grn','return','opening','adjustment_in'].includes(form.txn_type);
  const newQty = (() => {
    const q = parseFloat(form.qty || 0);
    return parseFloat(item.current_qty || 0) + (isInward ? q : -q);
  })();

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const q = parseFloat(form.qty);
      if (!q || q <= 0) throw new Error('Quantity must be > 0');
      if (!isInward && q > parseFloat(item.current_qty || 0)) {
        if (!confirm('This will leave stock at ' + fmtNum(parseFloat(item.current_qty || 0) - q) + '. Continue?')) {
          setLoading(false); return;
        }
      }
      const { error } = await sb.from('mcp_stocks_transactions').insert({
        plant_id: plant.id,
        item_id: item.id,
        txn_type: form.txn_type,
        qty: q,
        reference: form.reference || null,
        notes: form.notes || null,
        performed_by: me.id,
      });
      if (error) throw error;
      showToast((isInward ? '+ ' : '− ') + fmtNum(q) + ' ' + item.uom + ' recorded');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${isInward ? '+ Add stock' : '− Issue stock'}</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        <div class="card" style="background:var(--slate-50);margin-bottom:14px">
          <div class="card-row"><span class="label">Item</span><span class="value">${item.code} · ${item.name}</span></div>
          <div class="card-row"><span class="label">Current</span><span class="value mono">${fmtNum(item.current_qty)} ${item.uom}</span></div>
          ${form.qty && parseFloat(form.qty) > 0 && html`
            <div class="card-row"><span class="label">After</span><span class="value mono" style="color:${isInward ? 'var(--emerald-700)' : 'var(--rose-600)'};font-weight:600">${fmtNum(newQty)} ${item.uom}</span></div>
          `}
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field"><label>Type *</label>
            <select required value=${form.txn_type} onChange=${e => setForm({...form, txn_type: e.target.value})}>
              ${TYPE_GROUPS.map(g => html`
                <optgroup key=${g.label} label=${g.label}>
                  ${g.types.map(t => html`<option key=${t.val} value=${t.val}>${t.lbl}</option>`)}
                </optgroup>
              `)}
            </select>
          </div>
          <div class="field"><label>Quantity * (${item.uom})</label><input type="number" step="0.001" min=${0.001} required value=${form.qty} onChange=${e => setForm({...form, qty: e.target.value})} autoFocus /></div>
          <div class="field"><label>Reference</label><input type="text" value=${form.reference} onChange=${e => setForm({...form, reference: e.target.value})} placeholder=${isInward ? 'GRN# / Invoice / DC#' : 'Job# / DC# / Reason'} /></div>
          <div class="field"><label>Notes</label><textarea rows=${2} value=${form.notes} onChange=${e => setForm({...form, notes: e.target.value})}></textarea></div>
          <button class="btn" disabled=${loading} style="background:${isInward ? 'var(--emerald-600)' : 'var(--rose-600)'};color:white">${loading ? 'Saving…' : (isInward ? '+ Add to stock' : '− Issue stock')}</button>
        </form>
      </div>
    </div>
  `;
}

// ============= ITEM DETAIL — full ledger per item =============
function ItemDetail({ plant, me, item: initialItem, onClose, onEdit }) {
  const [item, setItem] = useState(initialItem);
  const [txns, setTxns] = useState([]);
  const [loading, setLoading] = useState(true);
  const [txnModal, setTxnModal] = useState(null); // null | 'in' | 'out'

  const refresh = async () => {
    setLoading(true);
    const [it, t] = await Promise.all([
      sb.from('mcp_stocks_items').select('*').eq('id', initialItem.id).single(),
      sb.from('mcp_stocks_transactions').select('*, users:performed_by(full_name)').eq('item_id', initialItem.id).order('created_at', { ascending:false }).limit(200),
    ]);
    if (it.data) setItem(it.data);
    setTxns(t.data || []);
    setLoading(false);
  };
  useEffect(() => { refresh(); }, [initialItem.id]);

  // Realtime updates for this item's transactions
  useEffect(() => {
    const channel = sb.channel('item-detail-' + initialItem.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_stocks_transactions', filter:'item_id=eq.' + initialItem.id }, () => refresh())
      .on('postgres_changes', { event:'UPDATE', schema:'public', table:'mcp_stocks_items', filter:'id=eq.' + initialItem.id }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [initialItem.id]);

  if (loading && txns.length === 0) return html`<div class="loader"><div class="spinner"></div></div>`;

  const isLow = item.reorder_level && parseFloat(item.current_qty || 0) <= parseFloat(item.reorder_level || 0);
  const TYPE_LABELS = {
    grn:'GRN', return:'Return', opening:'Opening', adjustment_in:'Adj+',
    issue:'Issue', consumption:'Consumed', scrap:'Scrap', adjustment_out:'Adj−',
  };
  const isInwardType = (t) => ['grn','return','opening','adjustment_in'].includes(t);

  // Compute running balance (newest first list, so we work backwards)
  let running = parseFloat(item.current_qty || 0);
  const txnsWithRunning = txns.map(t => {
    const after = running;
    const signed = isInwardType(t.txn_type) ? Math.abs(parseFloat(t.qty)) : -Math.abs(parseFloat(t.qty));
    running = after - signed;  // before this txn, balance was after - signed
    return { ...t, balance_after: after, signed };
  });

  // Stats
  const last30 = new Date(); last30.setDate(last30.getDate() - 30);
  const recent = txns.filter(t => new Date(t.created_at) >= last30);
  const inLast30 = recent.filter(t => isInwardType(t.txn_type)).reduce((s, t) => s + Math.abs(parseFloat(t.qty || 0)), 0);
  const outLast30 = recent.filter(t => !isInwardType(t.txn_type)).reduce((s, t) => s + Math.abs(parseFloat(t.qty || 0)), 0);

  return html`
    <div class="page-header" style="display:flex;align-items:center;gap:10px">
      <button class="btn ghost small" style="padding:6px 10px" onClick=${onClose}>← Back</button>
      <div style="flex:1;min-width:0">
        <h1 style="font-size:18px">${item.code}</h1>
        <div class="sub">${item.name}</div>
      </div>
      <button class="btn small ghost" onClick=${onEdit}>Edit</button>
    </div>

    <div class="card" style=${'background:' + (isLow ? 'var(--rose-50)' : 'var(--emerald-50)') + ';border-color:' + (isLow ? 'var(--rose-200)' : 'var(--emerald-200)')}>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>
          <div style="font-size:12px;color:var(--slate-600);font-weight:600">CURRENT STOCK</div>
          <div style="font-size:28px;font-weight:700;color:${isLow ? 'var(--rose-700)' : 'var(--emerald-700)'};font-family:ui-monospace,monospace">${fmtNum(item.current_qty)} <span style="font-size:14px;color:var(--slate-500);font-weight:500">${item.uom}</span></div>
        </div>
        <div style="text-align:right">
          ${item.reorder_level && html`
            <div style="font-size:11px;color:var(--slate-500)">REORDER AT</div>
            <div style="font-size:14px;font-weight:600">${fmtNum(item.reorder_level)} ${item.uom}</div>
          `}
          ${isLow && html`<div style="font-size:11px;color:var(--rose-600);font-weight:600;margin-top:4px">⚠️ Low stock</div>`}
        </div>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin:14px 0">
      <button class="btn" style="background:var(--emerald-600);flex:1" onClick=${() => setTxnModal('in')}>+ Add stock</button>
      <button class="btn" style="background:var(--rose-600);flex:1" onClick=${() => setTxnModal('out')}>− Issue stock</button>
    </div>

    <div class="stat-grid" style="grid-template-columns:repeat(2,1fr);gap:8px">
      <div class="stat teal" style="padding:10px"><div class="stat-num" style="font-size:18px">+${fmtNum(inLast30)}</div><div class="stat-label" style="font-size:10px">IN · last 30 days</div></div>
      <div class="stat amber" style="padding:10px"><div class="stat-num" style="font-size:18px">−${fmtNum(outLast30)}</div><div class="stat-label" style="font-size:10px">OUT · last 30 days</div></div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="card-title">DETAILS</div>
      <div class="card-row"><span class="label">Category</span><span class="value">${item.category || 'general'}</span></div>
      ${item.unit_cost && html`<div class="card-row"><span class="label">Unit cost</span><span class="value">₹${item.unit_cost}/${item.uom}</span></div>`}
      ${item.unit_cost && html`<div class="card-row"><span class="label">Stock value</span><span class="value">₹${(parseFloat(item.current_qty || 0) * parseFloat(item.unit_cost || 0)).toLocaleString('en-IN', {maximumFractionDigits:0})}</span></div>`}
    </div>

    <div class="section-h">History · ${txns.length} transactions</div>
    ${txns.length === 0 ? html`
      <div class="empty"><div style="font-size:13px">No transactions yet. Tap + Add stock to record inward material.</div></div>
    ` : html`
      <div style="border:1px solid var(--slate-200);border-radius:10px;background:white;overflow:hidden">
        ${txnsWithRunning.map((t, idx) => {
          const inward = isInwardType(t.txn_type);
          return html`
            <div key=${t.id} style="display:flex;align-items:center;gap:10px;padding:12px 14px;${idx > 0 ? 'border-top:0.5px solid var(--slate-100);' : ''}">
              <div style="width:28px;height:28px;border-radius:50%;background:${inward ? 'var(--emerald-100)' : 'var(--rose-100)'};color:${inward ? 'var(--emerald-700)' : 'var(--rose-700)'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0">${inward ? '+' : '−'}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:500">
                  <span style="color:${inward ? 'var(--emerald-700)' : 'var(--rose-600)'};font-weight:600">${inward ? '+' : '−'}${fmtNum(Math.abs(parseFloat(t.qty)))} ${item.uom}</span>
                  <span style="color:var(--slate-400);margin:0 6px">·</span>
                  <span style="color:var(--slate-700)">${TYPE_LABELS[t.txn_type] || t.txn_type}</span>
                </div>
                <div style="font-size:11px;color:var(--slate-500);margin-top:2px">
                  ${new Date(t.created_at).toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' })}
                  ${t.users?.full_name ? ' · ' + t.users.full_name : ''}
                  ${t.reference ? ' · ' + t.reference : ''}
                </div>
                ${t.notes && html`<div style="font-size:11px;color:var(--slate-500);margin-top:2px;font-style:italic">${t.notes}</div>`}
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-size:11px;color:var(--slate-500)">balance</div>
                <div style="font-size:13px;font-weight:600;font-family:ui-monospace,monospace">${fmtNum(t.balance_after)}</div>
              </div>
            </div>
          `;
        })}
      </div>
    `}

    ${txnModal && html`<${TxnModal} plant=${plant} me=${me} item=${{...item, _txnHint: txnModal === 'in' ? 'grn' : 'issue'}} onClose=${() => setTxnModal(null)} onSaved=${() => { setTxnModal(null); refresh(); }} />`}
  `;
}

// ============= ACTION HUB =============
function ActionHub({ plant, me }) {
  const [actions, setActions] = useState([]);
  const [users, setUsers] = useState([]);
  const [departments, setDepartments] = useState([]);
  const [view, setView] = useState('all'); // all | mine | by_dept | by_person
  const [statusFilter, setStatusFilter] = useState('open'); // open | done | all
  const [modal, setModal] = useState(null);
  const [editTarget, setEditTarget] = useState(null);
  const [activeTask, setActiveTask] = useState(null);
  const [loading, setLoading] = useState(true);

  const refresh = useCallback(async () => {
    setLoading(true);
    let q = sb.from('actions').select('*, owner_user:owner_id(full_name, role), assigner:assigned_by(full_name)').order('created_at', { ascending:false });
    if (statusFilter === 'open') q = q.in('status', ['open','in_progress']);
    else if (statusFilter === 'done') q = q.eq('status', 'completed');
    const [a, u, d] = await Promise.all([
      q.limit(200),
      sb.from('users').select('*').order('full_name'),
      sb.from('departments').select('*').order('name')
    ]);
    setActions(a.data || []);
    setUsers(u.data || []);
    setDepartments(d.data || []);
    setLoading(false);
  }, [statusFilter]);

  useEffect(() => { refresh(); }, [refresh]);

  // Live updates — subscribe to actions table
  useEffect(() => {
    if (!plant?.id) return;
    const channel = sb.channel('actions-' + plant.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'actions', filter:'plant_id=eq.' + plant.id }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id, refresh]);

  // If a task is active, show detail screen
  if (activeTask) {
    return html`<${TaskDetail} plant=${plant} me=${me} task=${activeTask} users=${users} onClose=${() => { setActiveTask(null); refresh(); }} />`;
  }

  let filteredActions = actions;
  if (view === 'mine') filteredActions = actions.filter(a => a.owner_id === me.id);

  const myOpen = actions.filter(a => a.owner_id === me.id && (a.status === 'open' || a.status === 'in_progress')).length;
  const teamOpen = actions.filter(a => a.owner_id !== me.id && (a.status === 'open' || a.status === 'in_progress')).length;
  const overdue = actions.filter(a => (a.status === 'open' || a.status === 'in_progress') && a.due_at && new Date(a.due_at) < new Date()).length;

  // Group counters
  const byDept = {};
  const byPerson = {};
  for (const a of filteredActions) {
    const d = a.department || 'Unassigned';
    if (!byDept[d]) byDept[d] = [];
    byDept[d].push(a);
    const p = a.owner_user?.full_name || 'Unassigned';
    if (!byPerson[p]) byPerson[p] = [];
    byPerson[p].push(a);
  }

  return html`
    <div class="page-header"><div><h1>Action Hub</h1><div class="sub">Live tasks across the plant</div></div></div>

    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat ${myOpen > 0 ? 'amber' : 'teal'}"><div class="stat-num">${myOpen}</div><div class="stat-label">Mine</div></div>
      <div class="stat teal"><div class="stat-num">${teamOpen}</div><div class="stat-label">Team</div></div>
      <div class="stat ${overdue > 0 ? 'rose' : 'teal'}"><div class="stat-num">${overdue}</div><div class="stat-label">Overdue</div></div>
    </div>

    <div class="auth-tabs" style="margin-bottom:10px;overflow-x:auto;flex-wrap:nowrap">
      <button class=${'auth-tab' + (view === 'all' ? ' active' : '')} onClick=${() => setView('all')}>All</button>
      <button class=${'auth-tab' + (view === 'mine' ? ' active' : '')} onClick=${() => setView('mine')}>Mine</button>
      <button class=${'auth-tab' + (view === 'by_dept' ? ' active' : '')} onClick=${() => setView('by_dept')}>By Dept</button>
      <button class=${'auth-tab' + (view === 'by_person' ? ' active' : '')} onClick=${() => setView('by_person')}>By Person</button>
    </div>

    <div class="auth-tabs" style="margin-bottom:14px">
      <button class=${'auth-tab' + (statusFilter === 'open' ? ' active' : '')} onClick=${() => setStatusFilter('open')}>Open</button>
      <button class=${'auth-tab' + (statusFilter === 'done' ? ' active' : '')} onClick=${() => setStatusFilter('done')}>Done</button>
      <button class=${'auth-tab' + (statusFilter === 'all' ? ' active' : '')} onClick=${() => setStatusFilter('all')}>All</button>
    </div>

    <div class="section-h">Tasks · ${filteredActions.length}<button class="btn small ghost" onClick=${() => { setEditTarget(null); setModal('action'); }}>+ Add</button></div>

    ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
      filteredActions.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">✓</div>No tasks in this filter</div></div>` :
      (view === 'by_dept' || view === 'by_person') ? html`
        ${Object.entries(view === 'by_dept' ? byDept : byPerson).sort((a,b) => b[1].length - a[1].length).map(([groupKey, groupItems]) => html`
          <details key=${groupKey} open style="margin-bottom:8px">
            <summary style="cursor:pointer;padding:10px 12px;background:var(--slate-100);border-radius:10px;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center">
              <span>${view === 'by_dept' ? '🏢 ' : '👤 '}${groupKey}</span>
              <span style="background:var(--teal-600);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px">${groupItems.length}</span>
            </summary>
            <div style="margin-top:6px;padding-left:8px">
              ${groupItems.map(a => html`<${TaskRow} key=${a.id} action=${a} onTap=${() => setActiveTask(a)} />`)}
            </div>
          </details>
        `)}
      ` : html`
        ${filteredActions.map(a => html`<${TaskRow} key=${a.id} action=${a} onTap=${() => setActiveTask(a)} />`)}
      `
    }

    ${modal === 'action' && html`<${ActionModal} plant=${plant} me=${me} users=${users} departments=${departments} editTarget=${editTarget} onClose=${() => { setModal(null); setEditTarget(null); }} onSaved=${() => { setModal(null); setEditTarget(null); refresh(); }} />`}
  `;
}

// ============= TASK ROW =============
function TaskRow({ action, onTap }) {
  const overdue = action.due_at && new Date(action.due_at) < new Date() && action.status !== 'completed' && action.status !== 'cancelled';
  return html`
    <div class="list-item" onClick=${onTap}>
      <div class="list-item-row">
        <div class="list-item-main">
          <div class="list-item-title" style=${action.status === 'completed' ? 'text-decoration:line-through;color:var(--slate-500)' : ''}>${action.title}</div>
          <div class="list-item-sub">
            ${action.owner_user?.full_name || '— unassigned'}
            ${action.department ? ' · ' + action.department : ''}
            ${action.due_at ? ' · ' + (overdue ? '⚠️ ' : '') + 'due ' + fmtDate(action.due_at) : ''}
            · ${action.source_type}
          </div>
        </div>
        <span class=${'badge ' + (action.status === 'completed' ? 'emerald' : action.status === 'cancelled' ? '' : overdue ? 'rose' : 'amber')}>${action.status}</span>
      </div>
    </div>
  `;
}

// ============= TASK DETAIL =============
function TaskDetail({ plant, me, task: initialTask, users, onClose }) {
  const [task, setTask] = useState(initialTask);
  const [updates, setUpdates] = useState([]);
  const [childRequests, setChildRequests] = useState([]);
  const [comment, setComment] = useState('');
  const [posting, setPosting] = useState(false);
  const [editing, setEditing] = useState(false);
  const [showOriginalMsg, setShowOriginalMsg] = useState(null);
  const [helpModal, setHelpModal] = useState(null); // 'help' | 'approval' | null

  const refresh = useCallback(async () => {
    const [t, u, c] = await Promise.all([
      sb.from('actions').select('*, owner_user:owner_id(full_name), assigner:assigned_by(full_name), creator:assigned_by(full_name)').eq('id', task.id).maybeSingle(),
      sb.from('action_updates').select('*, author:author_id(full_name)').eq('action_id', task.id).order('created_at'),
      sb.from('actions').select('id, title, status, request_type, owner_user:owner_id(full_name)').eq('parent_action_id', task.id).order('created_at'),
    ]);
    if (t.data) setTask(t.data);
    setUpdates(u.data || []);
    setChildRequests(c.data || []);
  }, [task.id]);

  useEffect(() => {
    refresh();
    // Get original chat message if linked
    if (task.chat_message_id) {
      sb.from('chat_messages').select('body, attachments, users(full_name)').eq('id', task.chat_message_id).maybeSingle().then(({data}) => setShowOriginalMsg(data));
    }
    // Subscribe to live updates
    const channel = sb.channel('task-' + task.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'action_updates', filter:'action_id=eq.' + task.id }, () => refresh())
      .on('postgres_changes', { event:'*', schema:'public', table:'actions', filter:'id=eq.' + task.id }, () => refresh())
      .on('postgres_changes', { event:'*', schema:'public', table:'actions', filter:'parent_action_id=eq.' + task.id }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [task.id, refresh]);

  const postComment = async () => {
    const text = (comment || '').trim();
    if (!text) { console.warn('[Loglinkr] empty comment, ignoring'); return; }
    if (posting) { console.warn('[Loglinkr] already posting'); return; }
    console.log('[Loglinkr] posting comment:', text);
    setPosting(true);
    try {
      const { data, error } = await sb.from('action_updates').insert({
        plant_id: plant.id, action_id: task.id,
        author_id: me.id, update_type: 'comment', body: text
      }).select().maybeSingle();
      if (error) {
        console.error('[Loglinkr] post failed:', error);
        alert('Failed to post: ' + error.message);
        return;
      }
      console.log('[Loglinkr] posted:', data);
      setComment('');
      // Optimistic add so UI shows immediately even if realtime is slow
      if (data) {
        setUpdates(prev => {
          if (prev.some(u => u.id === data.id)) return prev;
          return [...prev, { ...data, author: { full_name: me.full_name } }];
        });
      }
    } catch (err) {
      console.error('[Loglinkr] post exception:', err);
      alert('Failed to post: ' + (err.message || err));
    } finally {
      setPosting(false);
    }
  };

  const changeStatus = async (newStatus) => {
    const updates = { status: newStatus };
    if (newStatus === 'completed') updates.completed_at = new Date().toISOString();
    const { error } = await sb.from('actions').update(updates).eq('id', task.id);
    if (error) { alert(error.message); return; }
    showToast(newStatus === 'completed' ? 'Task closed · chat notified' : 'Status updated');
  };

  const reassign = async (newOwnerId) => {
    const { error } = await sb.from('actions').update({ owner_id: newOwnerId || null }).eq('id', task.id);
    if (error) { alert(error.message); return; }
    await sb.from('action_updates').insert({
      plant_id: plant.id, action_id: task.id,
      author_id: me.id, update_type: 'comment',
      body: '👤 Reassigned to ' + (users.find(u => u.id === newOwnerId)?.full_name || 'unassigned')
    });
  };

  const isOwner = task.owner_id === me.id;
  const isClosed = task.status === 'completed' || task.status === 'cancelled';
  const overdue = task.due_at && new Date(task.due_at) < new Date() && !isClosed;

  return html`
    <div class="page-header" style="display:flex;align-items:center;gap:10px">
      <button class="btn ghost small" style="padding:6px 10px" onClick=${onClose}>← Back</button>
      <div style="flex:1;min-width:0">
        <h1 style="font-size:18px">Task</h1>
        <div class="sub">${task.source_type}${task.department ? ' · ' + task.department : ''}</div>
      </div>
      ${(isOwner || me.role === 'plant_head' || me.role === 'admin') && html`
        <button class="btn small ghost" onClick=${() => setEditing(true)}>Edit</button>
      `}
    </div>

    <div class="card">
      <h2 style="font-size:18px;margin:0 0 8px;${isClosed ? 'text-decoration:line-through;color:var(--slate-500)' : ''}">${task.title}</h2>
      ${task.description && html`<p style="font-size:14px;color:var(--slate-600);line-height:1.5;margin:0 0 12px">${task.description}</p>`}
      <div class="card-row"><span class="label">Status</span><span class="value"><span class=${'badge ' + (task.status === 'completed' ? 'emerald' : overdue ? 'rose' : 'amber')}>${task.status}</span></span></div>
      <div class="card-row"><span class="label">Owner</span><span class="value">${task.owner_user?.full_name || '— unassigned'}</span></div>
      <div class="card-row"><span class="label">Assigned by</span><span class="value">${task.assigner?.full_name || '?'}</span></div>
      ${task.due_at && html`<div class="card-row"><span class="label">Due</span><span class="value" style=${overdue ? 'color:var(--rose-500)' : ''}>${overdue ? '⚠️ ' : ''}${fmtDate(task.due_at)}</span></div>`}
      ${task.completed_at && html`<div class="card-row"><span class="label">Closed</span><span class="value">${fmtDate(task.completed_at)}</span></div>`}
    </div>

    ${showOriginalMsg && html`
      <div class="card" style="background:var(--teal-50);border-color:var(--teal-100);margin-top:14px">
        <div style="font-size:11px;color:var(--teal-700);font-weight:600;margin-bottom:6px">FROM CHAT</div>
        <div style="font-size:13px;color:var(--slate-700)"><strong>${showOriginalMsg.users?.full_name || '?'}:</strong> ${showOriginalMsg.body || '(attachment)'}</div>
      </div>
    `}

    <div class="card" style="margin-top:14px">
      <div class="card-title">Actions</div>
      ${!isClosed ? html`
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${task.status === 'open' && html`<button class="btn small" onClick=${() => changeStatus('in_progress')}>Start working</button>`}
          ${task.status === 'in_progress' && html`<button class="btn small ghost" onClick=${() => changeStatus('open')}>Pause</button>`}
          <button class="btn small" style="background:var(--emerald-600)" onClick=${() => { if (confirm('Close this task?')) changeStatus('completed'); }}>✓ Close task</button>
          <button class="btn small ghost" onClick=${() => setHelpModal('help')}>🤝 Ask for help</button>
          <button class="btn small ghost" onClick=${() => setHelpModal('approval')}>✅ Request approval</button>
          ${(me.role === 'plant_head' || me.role === 'admin' || task.assigned_by === me.id) && html`
            <button class="btn small danger" onClick=${() => { if (confirm('Cancel this task?')) changeStatus('cancelled'); }}>Cancel</button>
          `}
        </div>
        ${(me.role === 'plant_head' || me.role === 'admin' || task.assigned_by === me.id) && html`
          <div class="field" style="margin-top:14px">
            <label>Reassign to</label>
            <select value=${task.owner_id || ''} onChange=${e => reassign(e.target.value)}>
              <option value="">— Unassigned —</option>
              ${users.map(u => html`<option key=${u.id} value=${u.id}>${u.full_name}${u.id === me.id ? ' (me)' : ''}</option>`)}
            </select>
          </div>
        `}
      ` : html`
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <span class=${'badge ' + (task.status === 'completed' ? 'emerald' : 'rose')} style="font-size:13px;padding:6px 12px">${task.status === 'completed' ? '✓ Closed' : '✗ Cancelled'}</span>
          ${(isOwner || task.assigned_by === me.id || me.role === 'plant_head' || me.role === 'admin') && html`
            <button class="btn small ghost" onClick=${() => { if (confirm('Reopen this task?')) changeStatus('open'); }}>🔓 Reopen task</button>
          `}
        </div>
      `}
    </div>

    ${childRequests.length > 0 && html`
      <div class="section-h">Linked Requests · ${childRequests.length}</div>
      ${childRequests.map(r => html`
        <div class="list-item" key=${r.id} onClick=${() => onClose(r)}>
          <div class="list-item-row">
            <div class="list-item-main">
              <div class="list-item-title">${r.request_type === 'help' ? '🤝' : '✅'} ${r.title}</div>
              <div class="list-item-sub">→ ${r.owner_user?.full_name || '?'} · ${r.status}</div>
            </div>
            <span class=${'badge ' + (r.status === 'completed' ? 'emerald' : r.status === 'cancelled' ? 'rose' : 'amber')}>${r.status}</span>
          </div>
        </div>
      `)}
    `}

    <div class="section-h">Activity · ${updates.length}</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${updates.length === 0 ? html`<div class="empty"><div style="font-size:13px">No activity yet. Be the first to add an update.</div></div>` :
        updates.map(u => {
          const isComment = u.update_type === 'comment';
          const isOwn = u.author_id === me.id;
          if (!isComment) {
            return html`
              <div key=${u.id} style="text-align:center;padding:6px 0">
                <span style="background:var(--slate-100);color:var(--slate-600);padding:4px 10px;border-radius:999px;font-size:11px">
                  ${u.body || (u.update_type + ': ' + u.status_from + ' → ' + u.status_to)} · ${u.author?.full_name || '?'} · ${fmtDate(u.created_at)}
                </span>
              </div>
            `;
          }
          return html`
            <div key=${u.id} style="background:${isOwn ? 'var(--teal-50)' : 'white'};border:1px solid var(--slate-200);border-radius:12px;padding:10px 12px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <strong style="font-size:13px;color:var(--slate-700)">${u.author?.full_name || '?'}</strong>
                <span style="font-size:11px;color:var(--slate-400)">${fmtDate(u.created_at)}</span>
              </div>
              <div style="font-size:14px;line-height:1.5">${u.body}</div>
            </div>
          `;
        })
      }
    </div>

    <div style="position:sticky;bottom:calc(76px + var(--safe-bottom));background:white;padding:12px 0;margin-top:14px;display:flex;gap:8px;border-top:1px solid var(--slate-100);z-index:10">
      <input type="text" value=${comment} onInput=${e => setComment(e.target.value)} onChange=${e => setComment(e.target.value)} onKeyPress=${e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); postComment(); } }} placeholder=${isClosed ? 'Add a closing note…' : 'Add an update or comment…'} style="flex:1;padding:11px 14px;border:1px solid var(--slate-200);border-radius:999px;font-size:14px;outline:none;font-family:inherit" />
      <button type="button" class="btn" style=${'border-radius:999px;width:auto;padding:11px 22px;flex-shrink:0;font-weight:600;' + ((!comment.trim() || posting) ? 'opacity:0.5' : '')} onClick=${postComment}>${posting ? '…' : 'Post'}</button>
    </div>

    ${editing && html`<${ActionModal} plant=${plant} me=${me} users=${users} editTarget=${task} onClose=${() => setEditing(false)} onSaved=${() => { setEditing(false); refresh(); }} />`}
    ${helpModal && html`<${HelpApprovalModal} plant=${plant} me=${me} users=${users} parentTask=${task} requestType=${helpModal} onClose=${() => setHelpModal(null)} onSaved=${() => { setHelpModal(null); refresh(); }} />`}
  `;
}

function ActionModal({ plant, me, users, departments, editTarget, onClose, onSaved }) {
  const [form, setForm] = useState(editTarget ? {...editTarget, due_at: editTarget.due_at ? editTarget.due_at.slice(0,16) : ''} : {
    title:'', description:'', owner_id:'', department:'', due_at:'', source_type:'manual'
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  // Auto-fill department from owner's department if available
  const onPickOwner = (id) => {
    const u = users.find(x => x.id === id);
    setForm({...form, owner_id: id, department: form.department || (u?.role === 'qa' ? 'Quality' : u?.role === 'maintenance' ? 'Maintenance' : u?.role === 'production' ? 'Production' : form.department)});
  };

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const payload = {
        plant_id: plant.id,
        source_type: form.source_type,
        title: form.title,
        description: form.description || null,
        owner_id: form.owner_id || null,
        department: form.department || null,
        assigned_by: me.id,
        due_at: form.due_at ? new Date(form.due_at).toISOString() : null,
        status: form.status || 'open',
      };
      if (form.status === 'completed' && !editTarget?.completed_at) {
        payload.completed_at = new Date().toISOString();
      }
      const { error } = editTarget
        ? await sb.from('actions').update(payload).eq('id', editTarget.id)
        : await sb.from('actions').insert(payload);
      if (error) throw error;
      showToast(editTarget ? 'Task updated' : 'Task added');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  const deptOptions = ['Production', 'Quality', 'Maintenance', 'Stores', 'Tool Room', 'Logistics', 'Admin', 'Finance'];

  return html`

          <div class="field-row">

              <select value=${form.department || ''} onChange=${e => setForm({...form, department: e.target.value})}>

                ${deptOptions.map(d => html`<option key=${d} value=${d}>${d}</option>`)}
              </select>
            </div>
          </div>
          <div class="field"><label>Due Date</label><input type="datetime-local" value=${form.due_at} onChange=${e => setForm({...form, due_at: e.target.value})} /></div>
          ${editTarget && html`

            </div>

          <button class="btn" disabled=${loading}>${loading ? 'Saving…' : (editTarget ? 'Update' : 'Create task')}</button>
        </form>
      </div>
    </div>
  `;
}

// ============= ASSIGN TASK FROM CHAT MESSAGE =============
function AssignTaskFromMsgModal({ plant, me, message, group, onClose, onSaved }) {
  const messagePreview = message.body || (Array.isArray(message.attachments) && message.attachments.length ? '📎 ' + (message.attachments[0].name || 'attachment') : '(empty)');
  const [users, setUsers] = useState([]);
  const [form, setForm] = useState({
    title: messagePreview.slice(0, 80),
    description: messagePreview,
    owner_id: message.sender_id !== me.id ? message.sender_id : '',
    department: '',
    due_at: '',
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => {
    sb.from('users').select('*').order('full_name').then(({ data }) => setUsers(data || []));
  }, []);

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const { error } = await sb.from('actions').insert({
        plant_id: plant.id,
        source_type: 'chat',
        title: form.title,
        description: form.description || null,
        owner_id: form.owner_id || null,
        department: form.department || null,
        assigned_by: me.id,
        due_at: form.due_at ? new Date(form.due_at).toISOString() : null,
        status: 'open',
        chat_message_id: message.id,
        chat_group_id: group?.id,
      });
      if (error) throw error;
      // Send a confirmation message in chat
      const ownerName = users.find(u => u.id === form.owner_id)?.full_name;
      await sb.from('chat_messages').insert({
        plant_id: plant.id,
        group_id: group.id,
        sender_id: me.id,
        body: '✅ Task assigned' + (ownerName ? ' to ' + ownerName : '') + ': ' + form.title + (form.due_at ? ' · due ' + new Date(form.due_at).toLocaleString() : ''),
      });
      showToast('Task assigned');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  const deptOptions = ['Production', 'Quality', 'Maintenance', 'Stores', 'Tool Room', 'Logistics', 'Admin', 'Finance'];

  return html`
    <div class="modal-backdrop active" style="z-index:200" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Assign as Task</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        <div class="card" style="background:var(--teal-50);border-color:var(--teal-100);margin-bottom:14px">
          <div style="font-size:11px;color:var(--teal-700);font-weight:600;margin-bottom:4px">FROM MESSAGE</div>
          <div style="font-size:13px;color:var(--slate-700)">${messagePreview}</div>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field"><label>Task Title *</label><input type="text" required value=${form.title} onChange=${e => setForm({...form, title: e.target.value})} /></div>
          <div class="field"><label>Description</label><textarea rows=${2} value=${form.description} onChange=${e => setForm({...form, description: e.target.value})}></textarea></div>
          <div class="field-row">
            <div class="field"><label>Assign To *</label>
              <select required value=${form.owner_id} onChange=${e => setForm({...form, owner_id: e.target.value})}>
                <option value="">— Select —</option>
                ${users.map(u => html`<option key=${u.id} value=${u.id}>${u.full_name}${u.id === me.id ? ' (me)' : ''}</option>`)}
              </select>
            </div>
            <div class="field"><label>Department</label>
              <select value=${form.department} onChange=${e => setForm({...form, department: e.target.value})}>
                <option value="">— None —</option>
                ${deptOptions.map(d => html`<option key=${d} value=${d}>${d}</option>`)}
              </select>
            </div>
          </div>
          <div class="field"><label>Due Date</label><input type="datetime-local" value=${form.due_at} onChange=${e => setForm({...form, due_at: e.target.value})} /></div>
          <button class="btn" disabled=${loading}>${loading ? 'Assigning…' : 'Assign task'}</button>
        </form>
      </div>
    </div>
  `;
}

// ============= GROUP CREATE MODAL =============
function GroupCreateModal({ plant, me, user, onClose, onSaved }) {
  const [users, setUsers] = useState([]);
  const [form, setForm] = useState({ name: '', selected: [user.id] });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => {
    sb.from('users').select('*').order('full_name').then(({ data }) => setUsers(data || []));
  }, []);

  const toggle = (id) => {
    if (id === user.id) return; // can't remove self
    setForm(f => ({...f, selected: f.selected.includes(id) ? f.selected.filter(x => x !== id) : [...f.selected, id]}));
  };

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      if (form.selected.length < 2) throw new Error('Pick at least one other person');
      const { error } = await sb.from('chat_groups').insert({
        plant_id: plant.id,
        name: form.name.startsWith('#') ? form.name : '# ' + form.name,
        type: 'custom',
        members: form.selected,
        created_by: me.id,
      });
      if (error) throw error;
      showToast('Group created');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">New Chat Group</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field"><label>Group Name *</label><input type="text" required value=${form.name} onChange=${e => setForm({...form, name: e.target.value})} placeholder="Quality Team / Shift A / Vendor Call" /></div>
          <div class="field"><label>Members · ${form.selected.length}</label></div>
          <div style="max-height:300px;overflow-y:auto;border:1px solid var(--slate-200);border-radius:10px;padding:6px">
            ${users.map(u => {
              const isSelf = u.id === user.id;
              const selected = form.selected.includes(u.id);
              return html`
                <div key=${u.id} onClick=${() => toggle(u.id)} style="padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:${isSelf ? 'default' : 'pointer'};border-radius:8px;${selected ? 'background:var(--teal-50)' : ''}">
                  <div style="width:20px;height:20px;border:2px solid ${selected ? 'var(--teal-600)' : 'var(--slate-300)'};border-radius:6px;display:flex;align-items:center;justify-content:center;background:${selected ? 'var(--teal-600)' : 'transparent'};color:white;font-size:12px;flex-shrink:0">${selected ? '✓' : ''}</div>
                  <div style="flex:1">
                    <div style="font-size:14px;font-weight:500">${u.full_name} ${isSelf ? '(you)' : ''}</div>
                    <div style="font-size:11px;color:var(--slate-500)">${u.role}</div>
                  </div>
                </div>
              `;
            })}
          </div>
          <button class="btn" style="margin-top:14px" disabled=${loading}>${loading ? 'Creating…' : 'Create group'}</button>
        </form>
      </div>
    </div>
  `;
}

// ============= DOCUMENTS / BILLS / VENDORS =============
function Documents({ plant, me }) {
  const [docs, setDocs] = useState([]);
  const [vendors, setVendors] = useState([]);
  const [jobworkStock, setJobworkStock] = useState([]);
  const [view, setView] = useState('dashboard'); // dashboard | vendors | jobwork
  const [typeFilter, setTypeFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('open');
  const [search, setSearch] = useState('');
  const [activeDoc, setActiveDoc] = useState(null);
  const [activeVendor, setActiveVendor] = useState(null);
  const [loading, setLoading] = useState(true);

  const refresh = useCallback(async () => {
    setLoading(true);
    const [d, v, jw] = await Promise.all([
      sb.from('mcp_logistics_documents')
        .select('*, mcp_logistics_vendors(name, gstin, payment_terms_days)')
        .order('doc_date', { ascending: false, nullsFirst: false })
        .limit(500),
      sb.from('mcp_logistics_vendors').select('*').order('name'),
      sb.from('v_vendor_jobwork_stock').select('*').order('vendor_name'),
    ]);
    setDocs(d.data || []);
    setVendors(v.data || []);
    setJobworkStock(jw.data || []);
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  // Live updates
  useEffect(() => {
    if (!plant?.id) return;
    const channel = sb.channel('docs-' + plant.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_logistics_documents', filter:'plant_id=eq.' + plant.id }, () => refresh())
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_logistics_payments', filter:'plant_id=eq.' + plant.id }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id, refresh]);

  if (activeDoc) {
    return html`<${DocumentDetail} plant=${plant} me=${me} doc=${activeDoc} vendors=${vendors} onClose=${() => { setActiveDoc(null); refresh(); }} />`;
  }
  if (activeVendor) {
    return html`<${VendorDetail} plant=${plant} me=${me} vendor=${activeVendor} jobworkStock=${jobworkStock.filter(s => s.vendor_id === activeVendor.id)} docs=${docs.filter(d => d.vendor_id === activeVendor.id)} onClose=${() => { setActiveVendor(null); refresh(); }} />`;
  }

  // Filter docs
  let filteredDocs = docs;
  if (typeFilter !== 'all') filteredDocs = filteredDocs.filter(d => d.doc_type === typeFilter);
  if (statusFilter === 'open') filteredDocs = filteredDocs.filter(d => ['pending','approved','partial'].includes(d.status));
  else if (statusFilter === 'overdue') filteredDocs = filteredDocs.filter(d => ['pending','approved','partial'].includes(d.status) && d.due_date && new Date(d.due_date) < new Date());
  else if (statusFilter === 'paid') filteredDocs = filteredDocs.filter(d => d.status === 'paid');
  if (search.trim()) {
    const q = search.toLowerCase();
    filteredDocs = filteredDocs.filter(d =>
      (d.vendor_name_raw || '').toLowerCase().includes(q) ||
      (d.doc_number || '').toLowerCase().includes(q) ||
      (d.mcp_logistics_vendors?.name || '').toLowerCase().includes(q)
    );
  }

  // Stats
  const today = new Date();
  const totalPayable = docs.filter(d => ['invoice_in','bill'].includes(d.doc_type) && ['pending','approved','partial'].includes(d.status))
    .reduce((sum, d) => sum + (parseFloat(d.total_value || 0) - parseFloat(d.paid_amount || 0)), 0);
  const overdueCount = docs.filter(d => ['pending','approved','partial'].includes(d.status) && d.due_date && new Date(d.due_date) < today && ['invoice_in','bill'].includes(d.doc_type)).length;
  const dueIn7Days = docs.filter(d => ['pending','approved','partial'].includes(d.status) && d.due_date && new Date(d.due_date) >= today && new Date(d.due_date) <= new Date(today.getTime() + 7*86400000)).length;

  const docTypeLabels = {
    invoice_in:'Invoice (in)', invoice_out:'Invoice (out)',
    dc_in:'DC (in)', dc_out:'DC (out)',
    job_work_dc_out:'JW Out', job_work_dc_in:'JW Return',
    bill:'Bill', quote:'Quote', po:'PO', other:'Other'
  };

  return html`
    <div class="page-header"><div><h1>Documents</h1><div class="sub">Bills, DCs, payments · auto-extracted from chat</div></div></div>

    <div class="auth-tabs" style="margin-bottom:14px">
      <button class=${'auth-tab' + (view === 'dashboard' ? ' active' : '')} onClick=${() => setView('dashboard')}>Documents</button>
      <button class=${'auth-tab' + (view === 'vendors' ? ' active' : '')} onClick=${() => setView('vendors')}>Vendors · ${vendors.length}</button>
      <button class=${'auth-tab' + (view === 'jobwork' ? ' active' : '')} onClick=${() => setView('jobwork')}>Job-work</button>
    </div>

    ${view === 'dashboard' && html`
      <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat ${totalPayable > 0 ? 'amber' : 'teal'}"><div class="stat-num" style="font-size:18px">₹${(totalPayable/100000).toFixed(1)}L</div><div class="stat-label">Payable</div></div>
        <div class="stat ${overdueCount > 0 ? 'rose' : 'teal'}"><div class="stat-num">${overdueCount}</div><div class="stat-label">Overdue</div></div>
        <div class="stat ${dueIn7Days > 0 ? 'amber' : 'teal'}"><div class="stat-num">${dueIn7Days}</div><div class="stat-label">Due 7d</div></div>
      </div>

      <div style="margin-bottom:10px">
        <input type="search" value=${search} onChange=${e => setSearch(e.target.value)} placeholder="Search vendor, invoice number…" style="width:100%;padding:10px 14px;border:1px solid var(--slate-200);border-radius:8px;font-size:13px" />
      </div>

      <div class="auth-tabs" style="margin-bottom:8px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch">
        <button class=${'auth-tab' + (typeFilter === 'all' ? ' active' : '')} onClick=${() => setTypeFilter('all')}>All</button>
        ${Object.entries(docTypeLabels).map(([k,l]) => html`
          <button key=${k} class=${'auth-tab' + (typeFilter === k ? ' active' : '')} onClick=${() => setTypeFilter(k)}>${l}</button>
        `)}
      </div>

      <div class="auth-tabs" style="margin-bottom:14px">
        <button class=${'auth-tab' + (statusFilter === 'open' ? ' active' : '')} onClick=${() => setStatusFilter('open')}>Open</button>
        <button class=${'auth-tab' + (statusFilter === 'overdue' ? ' active' : '')} onClick=${() => setStatusFilter('overdue')}>Overdue</button>
        <button class=${'auth-tab' + (statusFilter === 'paid' ? ' active' : '')} onClick=${() => setStatusFilter('paid')}>Paid</button>
        <button class=${'auth-tab' + (statusFilter === 'all' ? ' active' : '')} onClick=${() => setStatusFilter('all')}>All</button>
      </div>

      <div class="section-h">${filteredDocs.length} document${filteredDocs.length !== 1 ? 's' : ''}<button class="btn small ghost" onClick=${() => setActiveDoc({ _new: true })}>+ Add manually</button></div>

      ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
        filteredDocs.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">📄</div>No documents in this filter. Post invoice/DC photos in any chat group — Loglinkr extracts automatically.</div></div>` :
        filteredDocs.map(d => {
          const overdue = d.due_date && new Date(d.due_date) < today && ['pending','approved','partial'].includes(d.status);
          const balance = (parseFloat(d.total_value || 0)) - (parseFloat(d.paid_amount || 0));
          return html`
            <div class="list-item" key=${d.id} onClick=${() => setActiveDoc(d)}>
              <div class="list-item-row">
                <div class="list-item-main">
                  <div class="list-item-title">${d.mcp_logistics_vendors?.name || d.vendor_name_raw || '?'}</div>
                  <div class="list-item-sub">
                    <span class="badge teal">${docTypeLabels[d.doc_type] || d.doc_type}</span>
                    ${d.doc_number ? ' · ' + d.doc_number : ''}
                    ${d.doc_date ? ' · ' + d.doc_date : ''}
                    ${d.due_date && ['pending','approved','partial'].includes(d.status) ? ' · ' + (overdue ? '⚠️ ' : '') + 'due ' + d.due_date : ''}
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
                  ${d.total_value && html`<span style="font-size:13px;font-weight:600">₹${fmtNum(d.total_value)}</span>`}
                  <span class=${'badge ' + (d.status === 'paid' ? 'emerald' : d.status === 'partial' ? 'amber' : overdue ? 'rose' : '')}>${d.status}</span>
                  ${d.status === 'partial' && balance > 0 && html`<span style="font-size:10px;color:var(--rose-500)">₹${fmtNum(balance)} bal</span>`}
                </div>
              </div>
            </div>
          `;
        })
      }
    `}

    ${view === 'vendors' && html`
      <div class="section-h">Vendors · ${vendors.length}<button class="btn small ghost" onClick=${() => setActiveVendor({_new:true})}>+ Add</button></div>
      ${vendors.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">🏢</div>No vendors yet. They auto-create when documents are extracted.</div></div>` :
        vendors.map(v => {
          const vDocs = docs.filter(d => d.vendor_id === v.id);
          const payable = vDocs.filter(d => ['invoice_in','bill'].includes(d.doc_type) && ['pending','approved','partial'].includes(d.status))
            .reduce((sum, d) => sum + (parseFloat(d.total_value || 0) - parseFloat(d.paid_amount || 0)), 0);
          const atVendor = jobworkStock.filter(s => s.vendor_id === v.id);
          return html`
            <div class="list-item" key=${v.id} onClick=${() => setActiveVendor(v)}>
              <div class="list-item-row">
                <div class="list-item-main">
                  <div class="list-item-title">${v.name}</div>
                  <div class="list-item-sub">
                    ${v.gstin ? v.gstin + ' · ' : ''}${v.city || ''}
                    ${v.is_jobwork_vendor ? ' · 🔧 Job-work' : ''}
                    · ${vDocs.length} doc${vDocs.length !== 1 ? 's' : ''}
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
                  ${payable > 0 && html`<span class="badge amber">₹${fmtNum(payable)} due</span>`}
                  ${atVendor.length > 0 && html`<span style="font-size:10px;color:var(--slate-500)">${atVendor.length} JW pending</span>`}
                </div>
              </div>
            </div>
          `;
        })
      }
    `}

    ${view === 'jobwork' && html`
      <div class="section-h">Job-work pending at vendors · ${jobworkStock.length}</div>
      ${jobworkStock.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">🔧</div>No pending job-work. As you send DC out and receive DC in, this view shows what's still at each vendor.</div></div>` :
        Object.entries(jobworkStock.reduce((acc, s) => {
          if (!acc[s.vendor_name]) acc[s.vendor_name] = [];
          acc[s.vendor_name].push(s);
          return acc;
        }, {})).map(([vname, list]) => html`
          <details key=${vname} open style="margin-bottom:8px">
            <summary style="cursor:pointer;padding:10px 12px;background:var(--slate-100);border-radius:10px;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center">
              <span>🏢 ${vname}</span>
              <span style="background:var(--amber-500);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px">${list.length}</span>
            </summary>
            <div style="margin-top:6px">
              ${list.map(s => html`
                <div class="list-item" key=${s.vendor_id + s.item_name}>
                  <div class="list-item-row">
                    <div class="list-item-main">
                      <div class="list-item-title">${s.item_name}</div>
                      <div class="list-item-sub">
                        ${s.process ? s.process + ' · ' : ''}
                        Sent ${fmtNum(s.total_sent)} ${s.uom || ''} · Received back ${fmtNum(s.total_received)}
                      </div>
                    </div>
                    <span class="badge amber">${fmtNum(s.pending_at_vendor)} ${s.uom || ''}</span>
                  </div>
                </div>
              `)}
            </div>
          </details>
        `)
      }
    `}
  `;
}

// ============= DOCUMENT DETAIL =============
function DocumentDetail({ plant, me, doc: initialDoc, vendors, onClose }) {
  const isNew = initialDoc?._new;
  const [doc, setDoc] = useState(isNew ? null : initialDoc);
  const [payments, setPayments] = useState([]);
  const [paymentModal, setPaymentModal] = useState(false);
  const [grnModal, setGrnModal] = useState(false);
  const [grnReception, setGrnReception] = useState(null);
  const [editing, setEditing] = useState(isNew);

  const refresh = useCallback(async () => {
    if (isNew || !doc?.id) return;
    const [d, p, g] = await Promise.all([
      sb.from('mcp_logistics_documents').select('*, mcp_logistics_vendors(name, gstin)').eq('id', doc.id).maybeSingle(),
      sb.from('mcp_logistics_payments').select('*, users:recorded_by(full_name)').eq('doc_id', doc.id).order('payment_date', { ascending: false }),
      sb.from('mcp_logistics_grn_receptions').select('*, users:received_by(full_name), mcp_quality_ncrs(ncr_number), actions(title, status)').eq('doc_id', doc.id).maybeSingle(),
    ]);
    if (d.data) setDoc(d.data);
    setPayments(p.data || []);
    setGrnReception(g.data);
  }, [doc?.id, isNew]);

  useEffect(() => { refresh(); }, [refresh]);

  if (isNew && editing) {
    return html`<${DocumentEditModal} plant=${plant} me=${me} doc=${null} vendors=${vendors} onClose=${onClose} onSaved=${(d) => { setDoc(d); setEditing(false); }} />`;
  }
  if (!doc) return html`<div class="loader"><div class="spinner"></div></div>`;

  if (editing) {
    return html`<${DocumentEditModal} plant=${plant} me=${me} doc=${doc} vendors=${vendors} onClose=${() => setEditing(false)} onSaved=${(d) => { setDoc(d); setEditing(false); refresh(); }} />`;
  }

      <div class="card-row"><span class="label">Vendor</span><span class="value">${doc.mcp_logistics_vendors?.name || doc.vendor_name_raw || '?'}</span></div>
      ${doc.vendor_gstin_raw && html`<div class="card-row"><span class="label">GSTIN</span><span class="value mono">${doc.vendor_gstin_raw}</span></div>`}
      <div class="card-row"><span class="label">Doc #</span><span class="value mono">${doc.doc_number || '—'}</span></div>
      <div class="card-row"><span class="label">Date</span><span class="value">${doc.doc_date || '—'}</span></div>
      ${doc.due_date && html`<div class="card-row"><span class="label">Due</span><span class="value" style=${overdue ? 'color:var(--rose-500)' : ''}>${overdue ? '⚠️ ' : ''}${doc.due_date}</span></div>`}
    </div>

    <div class="card" style="margin-top:14px">
      <div class="card-title">Amounts</div>
      ${doc.taxable_value && html`<div class="card-row"><span class="label">Taxable</span><span class="value">₹${fmtNum(doc.taxable_value)}</span></div>`}
      ${doc.tax_amount && html`<div class="card-row"><span class="label">Tax</span><span class="value">₹${fmtNum(doc.tax_amount)}</span></div>`}
      <div class="card-row"><span class="label" style="font-weight:700">Total</span><span class="value" style="font-weight:700;font-size:16px">₹${fmtNum(doc.total_value || 0)}</span></div>
      ${doc.paid_amount > 0 && html`
        <div class="card-row"><span class="label">Paid</span><span class="value" style="color:var(--emerald-600)">₹${fmtNum(doc.paid_amount)}</span></div>
        <div class="card-row"><span class="label">Balance</span><span class="value" style="color:${balance > 0 ? 'var(--rose-500)' : 'var(--emerald-600)'};font-weight:700">₹${fmtNum(balance)}</span></div>
      `}
    </div>

    ${doc.validation_note && html`
      <div class="alert info" style="margin-top:14px"><strong>AI Note:</strong> ${doc.validation_note}</div>
    `}

    ${['invoice_in','dc_in','job_work_dc_in','bill'].includes(doc.doc_type) && html`
      <div class="section-h">Inward / Stock</div>
      ${grnReception ? html`
        <div class="card" style="background:var(--emerald-50);border-color:var(--emerald-200)">
          <div style="font-weight:700;color:var(--emerald-700);margin-bottom:8px">✅ Stock received</div>
          <div class="card-row" style="border:none;padding:4px 0"><span class="label">Received by</span><span class="value">${grnReception.users?.full_name || '?'}</span></div>
          <div class="card-row" style="border:none;padding:4px 0"><span class="label">When</span><span class="value">${fmtDate(grnReception.received_at)}</span></div>
          ${grnReception.shortage_detected && html`
            <div class="card-row" style="border:none;padding:4px 0"><span class="label">Shortage</span><span class="value" style="color:var(--rose-500);font-weight:700">⚠️ ${grnReception.shortage_pct?.toFixed(1)}%</span></div>
            ${grnReception.mcp_quality_ncrs && html`<div class="card-row" style="border:none;padding:4px 0"><span class="label">NCR</span><span class="value mono">${grnReception.mcp_quality_ncrs.ncr_number}</span></div>`}
            ${grnReception.actions && html`<div class="card-row" style="border:none;padding:4px 0"><span class="label">Follow-up</span><span class="value">${grnReception.actions.status} · ${grnReception.actions.title}</span></div>`}
          `}
        </div>
      ` : items.length > 0 ? html`
        <div class="card" style="background:var(--teal-50);border-color:var(--teal-200)">
          <div style="font-weight:700;color:var(--teal-700);margin-bottom:6px">📦 Ready to receive into stock</div>
          <div style="font-size:13px;color:var(--slate-700);margin-bottom:10px">${items.length} item line${items.length > 1 ? 's' : ''} extracted. Confirm physical receipt and add to stock.</div>
          <button class="btn" onClick=${() => setGrnModal(true)}>📥 Receive into stock</button>
        </div>
      ` : html`
        <div class="empty"><div style="font-size:13px">No items extracted from invoice yet. Edit document to add items manually before receiving.</div></div>
      `}
    `}

    ${items.length > 0 && html`
      <div class="section-h">Items · ${items.length}</div>
      ${items.map((it, i) => html`
        <div class="list-item" key=${i}>
          <div class="list-item-row">
            <div class="list-item-main">
              <div class="list-item-title">${it.name || it.item_name || '?'}</div>
              <div class="list-item-sub">${it.qty || 0} ${it.uom || 'nos'} × ₹${fmtNum(it.rate || 0)} ${it.hsn ? '· HSN ' + it.hsn : ''} ${it.process ? '· ' + it.process : ''}</div>
            </div>
            ${it.amount && html`<span style="font-size:13px;font-weight:600">₹${fmtNum(it.amount)}</span>`}
          </div>
        </div>
      `)}
    `}

    ${['invoice_in','bill','invoice_out'].includes(doc.doc_type) && html`
      <div class="section-h">Payments · ${payments.length}<button class="btn small ghost" onClick=${() => setPaymentModal(true)} disabled=${doc.status === 'paid'}>+ Record</button></div>
