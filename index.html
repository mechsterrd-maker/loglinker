// ============= DIE MODAL =============
function DieModal({ plant, me, parts, editTarget, onClose, onSaved }) {
  const [form, setForm] = useState(editTarget || { code:'', part_number:'', customer_name:'', max_strokes:300000, corepin_count:0, ejector_pin_count:0, status:'active', default_part_id:'' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [history, setHistory] = useState([]);
  const [spares, setSpares] = useState([]);
  const [stockItems, setStockItems] = useState([]);
  const [spareModal, setSpareModal] = useState(false);
  const [replaceModal, setReplaceModal] = useState(null); // spare row to replace

  const refreshSpares = async () => {
    if (!editTarget) return;
    const { data } = await sb.from('mcp_pdc_die_spares').select('*, mcp_stocks_items(code, name, uom, current_qty, reorder_level)').eq('die_id', editTarget.id);
    setSpares(data || []);
  };

  useEffect(() => {
    if (editTarget) {
      sb.from('mcp_pdc_die_history').select('*, users:performed_by_user_id(full_name)').eq('die_id', editTarget.id).order('event_date', { ascending:false }).then(({ data }) => setHistory(data || []));
      refreshSpares();
      sb.from('mcp_stocks_items').select('*').order('name').then(({ data }) => setStockItems(data || []));
    }
  }, [editTarget]);

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const payload = {
        plant_id: plant.id,
        code: form.code,
        part_number: form.part_number,
        customer_name: form.customer_name || null,
        max_strokes: parseInt(form.max_strokes) || 300000,
        corepin_count: parseInt(form.corepin_count) || 0,
        ejector_pin_count: parseInt(form.ejector_pin_count) || 0,
        status: form.status,
        default_part_id: form.default_part_id || null,
      };
      const { error } = editTarget
        ? await sb.from('mcp_pdc_dies').update(payload).eq('id', editTarget.id)
        : await sb.from('mcp_pdc_dies').insert(payload);
      if (error) throw error;
      showToast(editTarget ? 'Die updated' : 'Die added');
      onSaved();
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  const removeSpare = async (id) => {
    if (!confirm('Unlink this spare from the die?')) return;
    await sb.from('mcp_pdc_die_spares').delete().eq('id', id);
    refreshSpares();
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${editTarget ? 'Edit' : 'Add'} Die</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        ${editTarget && html`
          <div class="card" style="background:var(--slate-50)">
            <div class="card-row"><span class="label">Strokes</span><span class="value">${fmtNum(editTarget.current_stroke_count)} / ${fmtNum(editTarget.max_strokes)}</span></div>
            <div class="life-bar" style="margin-top:0"><div class="life-bar-fill" style=${'width:' + Math.min(100,(editTarget.current_stroke_count/editTarget.max_strokes)*100) + '%'}></div></div>
          </div>
        `}
        <form onSubmit=${submit}>
          <div class="field"><label>Die Code *</label><input type="text" required value=${form.code} onChange=${e => setForm({...form, code: e.target.value})} placeholder="FH-21" /></div>
          <div class="field"><label>Part Number *</label><input type="text" required value=${form.part_number} onChange=${e => setForm({...form, part_number: e.target.value})} placeholder="Filterhead" /></div>
          <div class="field"><label>Customer</label><input type="text" value=${form.customer_name || ''} onChange=${e => setForm({...form, customer_name: e.target.value})} placeholder="Bosch" /></div>
          <div class="field"><label>Max Strokes</label><input type="number" value=${form.max_strokes} onChange=${e => setForm({...form, max_strokes: e.target.value})} placeholder="300000" /></div>
          <div class="field-row">
            <div class="field"><label>Corepins</label><input type="number" value=${form.corepin_count} onChange=${e => setForm({...form, corepin_count: e.target.value})} /></div>
            <div class="field"><label>Ejector Pins</label><input type="number" value=${form.ejector_pin_count} onChange=${e => setForm({...form, ejector_pin_count: e.target.value})} /></div>
          </div>
          <div class="field"><label>Status</label>
            <select value=${form.status} onChange=${e => setForm({...form, status: e.target.value})}>
              <option value="active">Active</option><option value="repair">Repair</option><option value="retired">Retired</option>
            </select>
          </div>
          ${parts && parts.length > 0 && html`
            <div class="field"><label>Default Part (auto-fills part on shot logging)</label>
              <select value=${form.default_part_id || ''} onChange=${e => setForm({...form, default_part_id: e.target.value})}>
                <option value="">— None —</option>
                ${parts.map(p => html`<option key=${p.id} value=${p.id}>${p.part_number} · Rev ${p.revision} · ${p.name}</option>`)}
              </select>
            </div>
          `}
          <button class="btn" disabled=${loading}>${loading ? 'Saving…' : (editTarget ? 'Update' : 'Add')}</button>
        </form>

        ${editTarget && html`
          <div style="margin-top:24px">
            <div class="section-h">Die Spares · ${spares.length}<button type="button" class="btn small ghost" onClick=${() => setSpareModal(true)}>+ Link spare</button></div>
            ${spares.length === 0 ? html`<div class="empty"><div style="font-size:13px">No spares linked yet. Link corepins, ejector pins, etc. — replacements will auto-deduct from stock.</div></div>` :
              spares.map(s => {
                const isLow = s.mcp_stocks_items?.reorder_level && s.mcp_stocks_items.current_qty <= s.mcp_stocks_items.reorder_level;
                return html`
                  <div class="list-item" key=${s.id}>
                    <div class="list-item-row">
                      <div class="list-item-main">
                        <div class="list-item-title">${s.spare_type} · ${s.mcp_stocks_items?.code || '?'} · ${s.mcp_stocks_items?.name || ''}</div>
                        <div class="list-item-sub">${s.qty_in_die} in die · stock: ${fmtNum(s.mcp_stocks_items?.current_qty || 0)} ${s.mcp_stocks_items?.uom || ''} ${isLow ? '· ⚠️ low' : ''}</div>
                      </div>
                      <div style="display:flex;gap:6px">
                        <button class="btn small" type="button" onClick=${() => setReplaceModal(s)}>Replace</button>
                        <button class="btn small danger" type="button" onClick=${() => removeSpare(s.id)}>×</button>
                      </div>
                    </div>
                  </div>
                `;
              })
            }
          </div>

          <div style="margin-top:24px">
            <div class="section-h">Die History · ${history.length}</div>
            ${history.length === 0 ? html`<div class="empty"><div style="font-size:13px">No events yet</div></div>` :
              history.slice(0, 10).map(ev => html`
                <div class="list-item" key=${ev.id}>
                  <div class="list-item-row">
                    <div class="list-item-main">
                      <div class="list-item-title">${ev.event_type.replace(/_/g, ' ')}</div>
                      <div class="list-item-sub">${ev.users?.full_name || 'Unknown'} · ${ev.notes || ''}</div>
                    </div>
                    <div class="list-item-meta">${fmtDate(ev.event_date)}<br/>${fmtNum(ev.stroke_count_at_event)} str</div>
                  </div>
                </div>
              `)
            }
          </div>
        `}

        ${spareModal && html`<${DieSpareLinkModal} plant=${plant} die=${editTarget} stockItems=${stockItems} existing=${spares} onClose=${() => setSpareModal(false)} onSaved=${() => { setSpareModal(false); refreshSpares(); }} />`}
        ${replaceModal && html`<${DieSpareReplaceModal} plant=${plant} me=${me} die=${editTarget} spare=${replaceModal} onClose=${() => setReplaceModal(null)} onSaved=${() => { setReplaceModal(null); refreshSpares(); }} />`}
      </div>
    </div>
  `;
}

// ============= DIE SPARE REPLACE MODAL =============
function DieSpareReplaceModal({ plant, me, die, spare, onClose, onSaved }) {
  const [form, setForm] = useState({
    qty_replaced: 1,
    reason: 'Broken',
    notes: ''
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const stock = spare.mcp_stocks_items?.current_qty || 0;
  const insufficient = parseInt(form.qty_replaced) > stock;

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      if (insufficient) throw new Error('Not enough stock. Available: ' + stock);
      const { error } = await sb.from('mcp_pdc_die_spare_replacements').insert({
        plant_id: plant.id,
        die_id: die.id,
        spare_id: spare.id,
        item_id: spare.item_id,
        qty_replaced: parseInt(form.qty_replaced),
        reason: form.reason || null,
        replaced_by: me.id,
        notes: form.notes || null,
      });
      if (error) throw error;
      showToast('Replaced · stock auto-deducted · die history updated');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`
    <div class="modal-backdrop active" style="z-index:200" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Replace ${spare.spare_type}</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        <div class="card" style="background:var(--slate-50);margin-bottom:14px">
          <div class="card-row"><span class="label">Item</span><span class="value">${spare.mcp_stocks_items?.code} · ${spare.mcp_stocks_items?.name}</span></div>
          <div class="card-row"><span class="label">In stock</span><span class="value">${fmtNum(stock)} ${spare.mcp_stocks_items?.uom}</span></div>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field"><label>Qty to Replace *</label><input type="number" required min=${1} value=${form.qty_replaced} onChange=${e => setForm({...form, qty_replaced: e.target.value})} />${insufficient && html`<div style="color:var(--rose-500);font-size:11px;margin-top:4px">⚠️ Only ${stock} available</div>`}</div>
          <div class="field"><label>Reason *</label>
            <select required value=${form.reason} onChange=${e => setForm({...form, reason: e.target.value})}>
              <option>Broken</option><option>Worn out</option><option>Bent</option><option>Cracked</option><option>End of life</option><option>Preventive</option><option>Other</option>

          </div>
          <div class="field"><label>Notes</label><textarea rows=${2} value=${form.notes} onChange=${e => setForm({...form, notes: e.target.value})} placeholder="What happened?"></textarea></div>
          <button class="btn" disabled=${loading || insufficient}>${loading ? 'Replacing…' : 'Replace · Deduct stock'}</button>
        </form>
      </div>
    </div>
  `;
}

function ShotModal({ plant, me, units, shifts, machines, dies, parts, users, onClose, onSaved }) {

    unit_id: units[0]?.id || '',

  const submit = async (e) => {

          <button class="btn" disabled=${loading}>${loading ? 'Logging…' : 'Submit'}</button>
        </form>
      </div>
    </div>
  `;
}

  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(true);
  const [attachment, setAttachment] = useState(null); // { file, previewUrl, type }
  const [uploading, setUploading] = useState(false);
  const [notifPerm, setNotifPerm] = useState(typeof Notification !== 'undefined' ? Notification.permission : 'unsupported');
  const [taskFromMsg, setTaskFromMsg] = useState(null);
  const [groupModal, setGroupModal] = useState(false);

  useEffect(() => { loadGroups(); }, []);
  // Global plant-wide subscription — notifications work even when not on chat tab
  useEffect(() => {
    if (!plant?.id) return;

    const channel = sb.channel('plant-msgs-' + plant.id)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'chat_messages',
        filter: 'plant_id=eq.' + plant.id
      }, async (payload) => {
        const newMsg = payload.new;
        if (newMsg.sender_id === user.id) return;

        // Refresh group list so badges + previews update
        loadGroups();

        // If we're in the active group already, per-group handler shows the message
        if (activeGroup && newMsg.group_id === activeGroup.id) return;

        // Check the user is a member of the message's group
        const { data: group } = await sb.from('chat_groups').select('name, members').eq('id', newMsg.group_id).maybeSingle();
        if (!group || !group.members?.includes(user.id)) return;

        const { data: sender } = await sb.from('users').select('full_name').eq('id', newMsg.sender_id).maybeSingle();

        playNotificationSound();
        const preview = newMsg.body || (Array.isArray(newMsg.attachments) && newMsg.attachments.length ? '📎 ' + (newMsg.attachments[0].name || 'attachment') : '');
        showNotification((sender?.full_name || 'Someone') + ' · ' + group.name, preview);
      })
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id, user.id, activeGroup?.id]);

  useEffect(() => {
    if (!activeGroup) return;
    loadMessages(activeGroup.id);

    // Ask for notification permission on first chat open
    requestNotificationPermission();

    const channel = sb.channel('messages-' + activeGroup.id)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'chat_messages',
        filter: 'group_id=eq.' + activeGroup.id
      }, async (payload) => {
        const newMsg = payload.new;
        // Don't notify for own messages
        if (newMsg.sender_id === user.id) return;

        // Get sender name
        const { data: sender } = await sb.from('users').select('full_name').eq('id', newMsg.sender_id).maybeSingle();
        setMessages(prev => {
          if (prev.some(m => m.id === newMsg.id)) return prev;
          return [...prev, { ...newMsg, users: sender }];
        });
        setTimeout(() => {
          const wrap = document.getElementById('threadMessages');
          if (wrap) wrap.scrollTop = wrap.scrollHeight;
        }, 50);

        // Mark this group as read since user is actively viewing it
        markRead(activeGroup.id);

        // Sound + notification (notification only if tab not visible)
        playNotificationSound();
        if (document.visibilityState !== 'visible') {
          const senderName = sender?.full_name || 'Someone';
          const preview = newMsg.body || (Array.isArray(newMsg.attachments) && newMsg.attachments.length ? '📎 ' + (newMsg.attachments[0].name || 'attachment') : '');
          showNotification(senderName + ' · ' + activeGroup.name, preview);
        }
      })
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [activeGroup]);

  // Live extraction status updates (refetch messages for the active group when extraction completes)
  useEffect(() => {
    if (!plant?.id || !activeGroup) return;
    const channel = sb.channel('extract-' + activeGroup.id)
      .on('postgres_changes', { event:'UPDATE', schema:'public', table:'mcp_logistics_extraction_queue', filter:'group_id=eq.' + activeGroup.id }, () => {
        loadMessages(activeGroup.id);
      })
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id, activeGroup?.id]);

  const lastReadKey = (groupId) => 'loglinkr_lastread_' + user.id + '_' + groupId;
  const getLastRead = (groupId) => parseInt(localStorage.getItem(lastReadKey(groupId)) || '0');
  const markRead = (groupId) => localStorage.setItem(lastReadKey(groupId), Date.now().toString());

  const loadGroups = async () => {
    setLoading(true);
    const { data: groupsData } = await sb.from('chat_groups').select('*').contains('members', [user.id]);
    const groupsList = groupsData || [];

    // Get unread count + last message preview for each group
    const enriched = await Promise.all(groupsList.map(async (g) => {
      const lastRead = getLastRead(g.id);
      const lastReadIso = new Date(lastRead || 0).toISOString();

      // Count unread (messages newer than lastRead, not from self)
      const { count } = await sb.from('chat_messages')
        .select('id', { count: 'exact', head: true })
        .eq('group_id', g.id)
        .gt('created_at', lastReadIso)
        .neq('sender_id', user.id);

      // Last message
      const { data: lastMsg } = await sb.from('chat_messages')
        .select('body, attachments, created_at, users(full_name)')
        .eq('group_id', g.id)
        .order('created_at', { ascending: false })
        .limit(1)
        .maybeSingle();

      return { ...g, unread: count || 0, lastMsg };
    }));

    // Sort: groups with unread first, then by last message time
    enriched.sort((a, b) => {
      if ((b.unread > 0) !== (a.unread > 0)) return (b.unread > 0) - (a.unread > 0);
      const at = a.lastMsg?.created_at || a.created_at;
      const bt = b.lastMsg?.created_at || b.created_at;
      return new Date(bt) - new Date(at);
    });

    setGroups(enriched);
    setLoading(false);
  };

  const loadMessages = async (groupId) => {
    const { data: msgs } = await sb.from('chat_messages').select('*, users(full_name)').eq('group_id', groupId).order('created_at').limit(100);
    const messages = msgs || [];

    // Fetch extraction status for these messages (if any have images)
    if (messages.length > 0) {
      const msgIds = messages.map(m => m.id);
      const { data: queue } = await sb.from('mcp_logistics_extraction_queue')
        .select('message_id, status, classification, result_doc_id')
        .in('message_id', msgIds);
      const statusMap = (queue || []).reduce((acc, q) => { acc[q.message_id] = q; return acc; }, {});

      // Fetch resulting docs
      const docIds = (queue || []).filter(q => q.result_doc_id).map(q => q.result_doc_id);
      const docMap = {};
      if (docIds.length > 0) {
        const { data: docs } = await sb.from('mcp_logistics_documents')
          .select('id, doc_type, doc_number, vendor_name_raw, total_value, status')
          .in('id', docIds);
        (docs || []).forEach(d => { docMap[d.id] = d; });
      }

      // Attach to messages
      for (const m of messages) {
        if (statusMap[m.id]) {
          m._extraction = statusMap[m.id];
          if (statusMap[m.id].result_doc_id && docMap[statusMap[m.id].result_doc_id]) {
            m._doc = docMap[statusMap[m.id].result_doc_id];
          }
        }
      }
    }

    setMessages(messages);
    markRead(groupId);
    setTimeout(() => {
      const wrap = document.getElementById('threadMessages');
      if (wrap) wrap.scrollTop = wrap.scrollHeight;
    }, 50);
  };

  const onPickFile = async (e) => {
    const original = e.target.files?.[0];
    if (!original) return;
    if (original.size > 20 * 1024 * 1024) {
      alert('File too large. Max 20 MB.');
      return;
    }
    e.target.value = '';
    const isImage = original.type.startsWith('image/');
    // Resize images to cut API + upload cost
    const file = isImage ? await resizeImageFile(original, 1600, 0.82) : original;
    setAttachment({
      file,
      previewUrl: isImage ? URL.createObjectURL(file) : null,
      type: file.type,
      name: file.name
    });
  };

  const triggerExtraction = async (msg, imageUrl) => {
    try {
      const { data: queueId, error } = await sb.rpc('enqueue_chat_image_for_extraction', {
        p_message_id: msg.id,
        p_group_id: activeGroup.id,
        p_image_url: imageUrl,
      });
      if (error) { alert(error.message); return; }
      if (!queueId) { alert('Already queued'); return; }
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        showToast('Extracting…');
        fetch(SUPABASE_URL + '/functions/v1/extract-document', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + session.access_token,
            'apikey': SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({
            queue_id: queueId,
            image_url: imageUrl,
            plant_name: plant.name,
          }),
        }).catch(e => console.warn('Extract failed:', e));
      }
    } catch (e) { alert(e.message); }
  };

  const send = async () => {
    if ((!input.trim() && !attachment) || !activeGroup || uploading) return;
    const body = input.trim();
    let attachments = [];

    if (attachment) {
      setUploading(true);
      try {
        const ext = attachment.name.split('.').pop().toLowerCase();
        const path = plant.id + '/' + activeGroup.id + '/' + user.id + '-' + Date.now() + '.' + ext;
        const { error: upErr } = await sb.storage.from('chat-attachments').upload(path, attachment.file, {
          cacheControl: '3600',
          upsert: false
        });
        if (upErr) {
          alert('Upload failed: ' + upErr.message);
          setUploading(false);
          return;
        }
        const { data: { publicUrl } } = sb.storage.from('chat-attachments').getPublicUrl(path);
        attachments = [{
          url: publicUrl,
          path: path,
          type: attachment.type,
          name: attachment.name,
          isImage: attachment.type.startsWith('image/')
        }];
      } catch (err) {
        alert('Upload failed: ' + err.message);
        setUploading(false);
        return;
      }
      setUploading(false);
    }

    const localId = 'local-' + Date.now();
    const optimisticMsg = {
      id: localId,
      plant_id: plant.id,
      group_id: activeGroup.id,
      sender_id: user.id,
      body: body || null,
      attachments,
      users: { full_name: me.full_name },
      created_at: new Date().toISOString(),
      _pending: true
    };

    // Show immediately
    setMessages(prev => [...prev, optimisticMsg]);
    setInput('');
    setAttachment(null);
    setTimeout(() => {
      const wrap = document.getElementById('threadMessages');
      if (wrap) wrap.scrollTop = wrap.scrollHeight;
    }, 30);

    // Send to server
    const { data: inserted, error } = await sb.from('chat_messages').insert({
      plant_id: plant.id,
      group_id: activeGroup.id,
      sender_id: user.id,
      body: body || null,
      attachments: attachments
    }).select().single();

    if (error) {
      // Mark as failed
      setMessages(prev => prev.map(m => m.id === localId ? {...m, _failed: true, _pending: false} : m));
      return;
    }

    // Replace optimistic with real (so realtime won't double-add)
    setMessages(prev => prev.map(m => m.id === localId ? {...inserted, users: { full_name: me.full_name }} : m));

    // Auto-extract documents — ONLY in groups marked for logistics (saves API cost on casual chat)
    const groupName = (activeGroup?.name || '').toLowerCase();
    const isLogisticsGroup = groupName.includes('logistic') || groupName.includes('bill') || groupName.includes('invoice') || groupName.includes('document');
    if (inserted && attachments.length > 0 && attachments[0].isImage && isLogisticsGroup) {
      try {
        const { data: queueId, error: enqErr } = await sb.rpc('enqueue_chat_image_for_extraction', {
          p_message_id: inserted.id,
          p_group_id: activeGroup.id,
          p_image_url: attachments[0].url,
        });
        if (queueId && !enqErr) {
          // Fire-and-forget call to Edge Function
          const { data: { session } } = await sb.auth.getSession();
          if (session) {
            fetch(SUPABASE_URL + '/functions/v1/extract-document', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + session.access_token,
                'apikey': SUPABASE_ANON_KEY,
              },
              body: JSON.stringify({
                queue_id: queueId,
                image_url: attachments[0].url,
                plant_name: plant.name,
              }),
            }).catch(e => console.warn('Extract call failed (will retry on next image):', e));
          }
        }
      } catch (e) {
        console.warn('Enqueue failed:', e);
      }
    }
  };

  if (activeGroup) {
    return html`
      <div class="chat-thread">
        <div class="thread-header">
          <button class="thread-back" onClick=${() => setActiveGroup(null)}>←</button>
          <div class="chat-avatar">${activeGroup.name[0] === '#' ? '#' : activeGroup.name[0]}</div>
          <div>
            <div style="font-weight:600;font-size:14px">${activeGroup.name}</div>
            <div style="font-size:11px;color:var(--slate-500)">${activeGroup.members.length} member${activeGroup.members.length > 1 ? 's' : ''}</div>
          </div>
        </div>
        <div class="thread-messages" id="threadMessages">
          ${messages.length === 0 ? html`<div class="empty"><div class="icon">💬</div><div style="font-size:13px">No messages yet. Say hi.</div></div>` :
            messages.map(m => {
              const isOut = m.sender_id === user.id;
              const atts = Array.isArray(m.attachments) ? m.attachments : [];
              const ex = m._extraction;
              const doc = m._doc;
              const hasImage = atts.length > 0 && atts[0].isImage;
              return html`
                <div class=${'msg ' + (isOut ? 'out' : 'in')} key=${m.id}>
                  ${!isOut && html`<div class="who">${m.users?.full_name || '?'}</div>`}
                  ${m.body && html`<div>${m.body}</div>`}
                  ${atts.map((a, i) => a.isImage
                    ? html`<a href=${a.url} target="_blank" rel="noopener" key=${i}><img class="attached-img" src=${a.url} alt=${a.name || 'image'} /></a>`
                    : html`<a href=${a.url} target="_blank" rel="noopener" class="file-attached" key=${i}>📎 ${a.name || 'file'}</a>`
                  )}
                  ${ex && html`
                    <div class="extract-badge ${ex.status}">
                      ${ex.status === 'pending' || ex.status === 'processing' ? html`<span>🔍 Reading…</span>` :
                        ex.status === 'completed' && doc ? html`
                          <span>📄 ${doc.doc_type.replace('_',' ')} · ${doc.vendor_name_raw || '?'} ${doc.total_value ? '· ₹' + fmtNum(doc.total_value) : ''}</span>
                        ` :
                        ex.status === 'duplicate' ? html`<span>⚠️ Already captured</span>` :
                        ex.status === 'skipped' ? html`<span>📷 ${ex.classification || 'skipped'}</span>` :
                        ex.status === 'failed' ? html`<span>✗ Extract failed</span>` : ''}
                    </div>
                  `}
                  ${hasImage && !ex && html`
                    <button class="msg-action-btn" style="margin-top:6px" onClick=${() => triggerExtraction(m, atts[0].url)} title="Extract document">📄 Extract as document</button>
                  `}
                  <div class="ts">
                    ${fmtDate(m.created_at)}
                    <button class="msg-action-btn" onClick=${() => setTaskFromMsg(m)} title="Assign as task">✓</button>
                  </div>
                </div>
              `;
            })
          }
        </div>
        ${attachment && html`
          <div class="thread-attach-preview">
            ${attachment.previewUrl ? html`<img src=${attachment.previewUrl} />` : html`<span>📎</span>`}
            <span>${attachment.name}</span>
            <button onClick=${() => setAttachment(null)}>×</button>
          </div>
        `}
        <div class="thread-input">
          <input type="file" id="chatFileInput" accept="image/*,video/*,audio/*,application/pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.zip,.rar,.dwg,.dxf,.step,.stp,.iges,.igs,.stl" style="display:none" onChange=${onPickFile} />
          <button class="attach" onClick=${() => document.getElementById('chatFileInput').click()} disabled=${uploading} title="Attach">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="text" value=${input} onChange=${e => setInput(e.target.value)} onKeyPress=${e => { if (e.key === 'Enter' && !e.shiftKey) send(); }} placeholder=${uploading ? 'Uploading…' : 'Message…'} disabled=${uploading} />
          <button onClick=${send} disabled=${uploading || (!input.trim() && !attachment)}>${uploading ? '…' : '→'}</button>
        </div>
        ${taskFromMsg && html`<${AssignTaskFromMsgModal} plant=${plant} me=${me} message=${taskFromMsg} group=${activeGroup} onClose=${() => setTaskFromMsg(null)} onSaved=${() => setTaskFromMsg(null)} />`}
      </div>
    `;
  }

  return html`
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start"><div><h1>Chat</h1><div class="sub">Plant communication</div></div><button class="btn small" onClick=${() => setGroupModal(true)} style="margin-top:6px">+ New Group</button></div>
    ${notifPerm === 'default' && html`
      <div class="setup-banner" style="margin-bottom:14px">
        <div class="setup-banner-title">🔔 Enable notifications</div>
        <p style="font-size:13px;color:var(--slate-700);margin-bottom:10px">Get instant alerts when teammates message you, even when Loglinkr isn't open.</p>
        <button class="btn small" onClick=${async () => {
          const ok = await requestNotificationPermission();
          setNotifPerm(Notification.permission);
          if (ok) showToast('Notifications enabled');
        }}>Enable notifications</button>
      </div>
    `}
    ${notifPerm === 'denied' && html`
      <div class="alert info" style="margin-bottom:14px">
        🔕 Notifications blocked. Enable them in your browser settings to get alerts.
      </div>
    `}
    ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
      groups.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">💬</div>No chat groups yet</div></div>` :
      html`<div class="chat-list">
        ${groups.map(g => {
          const last = g.lastMsg;
          const lastWho = last?.users?.full_name?.split(' ')[0];
          const lastBody = last?.body || (Array.isArray(last?.attachments) && last.attachments.length ? '📎 ' + (last.attachments[0].name || 'attachment') : '');
          const preview = last ? (lastWho ? lastWho + ': ' + lastBody : lastBody) : g.members.length + ' member' + (g.members.length > 1 ? 's' : '');
          return html`
            <div class="chat-item" key=${g.id} onClick=${() => setActiveGroup(g)}>
              <div class="chat-avatar">${g.name[0] === '#' ? '#' : g.name[0]}</div>
              <div class="chat-info">
                <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
                  <div class="chat-name" style=${g.unread > 0 ? 'font-weight:700' : ''}>${g.name}</div>
                  ${last && html`<div style="font-size:11px;color:var(--slate-400);flex-shrink:0">${fmtDate(last.created_at)}</div>`}
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:2px">
                  <div class="chat-preview" style=${g.unread > 0 ? 'color:var(--slate-700);font-weight:500' : ''}>${preview}</div>
                  ${g.unread > 0 && html`<span style="background:var(--teal-600);color:white;font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;min-width:20px;text-align:center;flex-shrink:0">${g.unread}</span>`}
                </div>
              </div>
            </div>
          `;
        })}
      </div>`
    }

    ${taskFromMsg && html`<${AssignTaskFromMsgModal} plant=${plant} me=${me} message=${taskFromMsg} group=${activeGroup} onClose=${() => setTaskFromMsg(null)} onSaved=${() => setTaskFromMsg(null)} />`}
    ${groupModal && html`<${GroupCreateModal} plant=${plant} me=${me} user=${user} onClose=${() => setGroupModal(false)} onSaved=${() => { setGroupModal(false); loadGroups(); }} />`}
  `;
}

// ============= PEOPLE (Units, Users, Shifts) =============
function People({ plant, me }) {
  const [view, setView] = useState('units');
  const [units, setUnits] = useState([]);
  const [users, setUsers] = useState([]);
  const [shifts, setShifts] = useState([]);
  const [invites, setInvites] = useState([]);
  const [modal, setModal] = useState(null);
  const [editTarget, setEditTarget] = useState(null);
  const [loading, setLoading] = useState(true);

  const refresh = async () => {
    setLoading(true);
    const [u, us, sh, inv] = await Promise.all([
      sb.from('units').select('*').order('created_at'),
      sb.from('users').select('*').order('created_at'),
      sb.from('shifts').select('*').order('start_time'),
      sb.from('user_invites').select('*').eq('status', 'pending').order('created_at', { ascending:false }),
    ]);
    setUnits(u.data || []);
    setUsers(us.data || []);
    setShifts(sh.data || []);
    setInvites(inv.data || []);
    setLoading(false);
  };

  useEffect(() => { refresh(); }, []);

  if (loading) return html`<div class="loader"><div class="spinner"></div></div>`;

  return html`
    <div class="page-header"><div><h1>People</h1><div class="sub">Units, team, shifts</div></div></div>

    <div class="auth-tabs" style="margin-bottom:16px">
      <button class=${'auth-tab' + (view === 'units' ? ' active' : '')} onClick=${() => setView('units')}>Units</button>
      <button class=${'auth-tab' + (view === 'users' ? ' active' : '')} onClick=${() => setView('users')}>Team</button>
      <button class=${'auth-tab' + (view === 'shifts' ? ' active' : '')} onClick=${() => setView('shifts')}>Shifts</button>
    </div>

    ${view === 'units' && html`
      <div class="section-h">Units · ${units.length}<button class="btn small ghost" onClick=${() => setModal('unit')}>+ Add</button></div>
      ${units.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">🏭</div>No units yet</div></div>` :
        units.map(u => html`
          <div class="list-item" key=${u.id} onClick=${() => { setEditTarget(u); setModal('unit'); }}>
            <div class="list-item-row">
              <div class="list-item-main">
                <div class="list-item-title">${u.name}</div>
                <div class="list-item-sub">${u.address || '—'}</div>
              </div>
            </div>
          </div>
        `)
      }
    `}

    ${view === 'users' && html`
      ${invites.length > 0 && html`
        <div class="section-h">Pending Invites · ${invites.length}</div>
        ${invites.map(i => html`
          <div class="list-item" key=${i.id} onClick=${() => { setEditTarget(i); setModal('inviteView'); }}>
            <div class="list-item-row">
              <div class="list-item-main">
                <div class="list-item-title">${i.full_name}</div>
                <div class="list-item-sub">${i.role} · code: <span class="mono" style="color:var(--teal-700);font-weight:600">${i.invite_code}</span></div>
              </div>
              <span class="badge amber">Pending</span>
            </div>
          </div>
        `)}
      `}
      <div class="section-h">Team · ${users.length}<button class="btn small ghost" onClick=${() => setModal('invite')}>+ Invite</button></div>
      ${users.map(u => html`
        <div class="list-item" key=${u.id}>
          <div class="list-item-row">
            <div class="list-item-main">
              <div class="list-item-title">${u.full_name}${u.id === me.id ? ' (you)' : ''}</div>
              <div class="list-item-sub">${u.phone} · ${u.email || 'no email'}</div>
            </div>
            <span class=${'badge ' + (u.role === 'plant_head' ? 'teal' : '')}>${u.role}</span>
          </div>
        </div>
      `)}
    `}

    ${view === 'shifts' && html`

function UnitModal({ plant, editTarget, onClose, onSaved }) {
  const [form, setForm] = useState(editTarget || { name:'', address:'' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const payload = { plant_id: plant.id, name: form.name, address: form.address || null };
      const { error } = editTarget
        ? await sb.from('units').update(payload).eq('id', editTarget.id)
        : await sb.from('units').insert(payload);
      if (error) throw error;
      showToast(editTarget ? 'Unit updated' : 'Unit added');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  const remove = async () => {
    if (!confirm('Delete this unit? All machines and dies in it will be deleted too.')) return;
    const { error } = await sb.from('units').delete().eq('id', editTarget.id);
    if (error) { setError(error.message); return; }
    showToast('Unit deleted');
    onSaved();
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${editTarget ? 'Edit' : 'Add'} Unit</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}

}

// ============= STOCK ALERTS (low stock + reorder) =============
function StockAlerts({ plant, setTab }) {
  const [alerts, setAlerts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [collapsed, setCollapsed] = useState(false);

  useEffect(() => { load(); }, [plant?.id]);

  const load = async () => {
    setLoading(true);
    const { data } = await sb.from('mcp_stocks_items')
      .select('id, code, name, current_qty, reorder_level, uom, category')
      .not('reorder_level', 'is', null)
      .order('name');
    const lows = (data || []).filter(i => i.current_qty <= i.reorder_level);
    setAlerts(lows);
    setLoading(false);
  };

  // Live updates
  useEffect(() => {
    if (!plant?.id) return;
    const channel = sb.channel('stock-alerts-' + plant.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_stocks_items', filter:'plant_id=eq.' + plant.id }, () => load())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id]);

  if (loading || alerts.length === 0) return null;

  const critical = alerts.filter(a => parseFloat(a.current_qty) === 0).length;
  const lblMap = { raw_material:'Raw', die_spares:'Die', consumables:'Cons.', tools:'Tools', packing:'Pack', bought_out:'Bought-out', general:'General' };

  return html`
    <div class="card" style="background:${critical > 0 ? 'var(--rose-50)' : 'var(--amber-50)'};border-color:${critical > 0 ? 'var(--rose-200)' : 'var(--amber-200)'};margin-bottom:14px">
      <div onClick=${() => setCollapsed(!collapsed)} style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:700;color:${critical > 0 ? 'var(--rose-700)' : 'var(--amber-700)'}">
          ${critical > 0 ? '🚨' : '⚠️'} Stock alerts · ${alerts.length} item${alerts.length > 1 ? 's' : ''}${critical > 0 ? ' · ' + critical + ' OUT OF STOCK' : ''}
        </div>
        <span style="color:var(--slate-500);font-size:18px">${collapsed ? '›' : '▼'}</span>
      </div>
      ${!collapsed && html`
        <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
          ${alerts.slice(0, 12).map(a => {
            const isOut = parseFloat(a.current_qty) === 0;
            return html`
              <div key=${a.id} onClick=${() => setTab('stocks')} style="background:white;padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px">
                <div style="flex:1;min-width:0">
                  <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.code} · ${a.name}</div>
                  <div style="font-size:11px;color:var(--slate-500)">${lblMap[a.category || 'general']} · reorder at ${a.reorder_level}</div>
                </div>
                <span class=${'badge ' + (isOut ? 'rose' : 'amber')} style="flex-shrink:0">${isOut ? 'OUT' : fmtNum(a.current_qty) + ' ' + a.uom}</span>
              </div>
            `;
          })}
          ${alerts.length > 12 && html`<div style="font-size:11px;color:var(--slate-500);text-align:center;padding:6px">+ ${alerts.length - 12} more — tap any item to manage</div>`}
          <button class="btn small ghost" style="margin-top:6px" onClick=${() => setTab('stocks')}>Open Stocks →</button>
        </div>
      `}
    </div>
  `;
}

// ============= STAGE PENDING BANNER (blocks supervisors with overdue entries) =============
function StagePendingBanner({ plant, me, setTab }) {
  const [pending, setPending] = useState([]);
  const [loading, setLoading] = useState(true);
  const [logTarget, setLogTarget] = useState(null);

  useEffect(() => { load(); }, [plant?.id]);

  const load = async () => {
    setLoading(true);
    const { data } = await sb.from('v_my_pending_stage_entries')
      .select('*')
      .eq('plant_id', plant.id)
      .order('log_date');
    setPending(data || []);
    setLoading(false);
  };

  useEffect(() => {
    if (!plant?.id) return;
    const channel = sb.channel('stage-pending-' + plant.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_pdc_stage_log', filter:'plant_id=eq.' + plant.id }, () => load())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id]);

  if (loading || pending.length === 0) return null;

  // Anything past 11am next day is escalated
  const escalated = pending.filter(p => p.hours_past_11am > 0);
  const justPending = pending.filter(p => p.hours_past_11am <= 0);

  return html`
    <div class="card" style="background:${escalated.length > 0 ? 'var(--rose-50)' : 'var(--amber-50)'};border-color:${escalated.length > 0 ? 'var(--rose-200)' : 'var(--amber-200)'};margin-bottom:14px">
      <div style="font-weight:700;color:${escalated.length > 0 ? 'var(--rose-700)' : 'var(--amber-700)'};margin-bottom:8px">
        ${escalated.length > 0 ? '🚨 OVERDUE entries · ' + escalated.length : '⏰ Pending entries · ' + pending.length}
      </div>
      <div style="font-size:12px;color:var(--slate-700);margin-bottom:10px">
        ${escalated.length > 0
          ? 'These are past 11 AM next day. System will lock at 48 hours. Log now or contact Plant Head.'
          : 'Downstream stage logged. Need your count to reconcile.'}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${pending.slice(0, 10).map(p => {
          const isEscalated = p.hours_past_11am > 0;
          const hoursToLock = 48 - p.hours_pending;
          return html`
            <div key=${p.id} onClick=${() => setLogTarget(p)} style="background:white;padding:10px 12px;border-radius:8px;cursor:pointer">
              <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
                <div style="flex:1;min-width:0">
                  <div style="font-size:13px;font-weight:600">${p.stage.toUpperCase()} · ${p.part_label}</div>
                  <div style="font-size:11px;color:var(--slate-500)">${p.shift_name} · ${p.log_date} · downstream: ${p.triggered_by_stage || 'manual'}</div>
                </div>
                <span class=${'badge ' + (isEscalated ? 'rose' : 'amber')} style="flex-shrink:0;font-size:10px">
                  ${isEscalated ? 'OVERDUE' : Math.max(0, Math.round(hoursToLock)) + 'h to lock'}
                </span>
              </div>
            </div>
          `;
        })}
      </div>
      <button class="btn small ghost" style="width:100%;margin-top:10px" onClick=${() => setTab('production')}>Open Production →</button>

      ${logTarget && html`<${StageLogModal} plant=${plant} me=${me} pendingEntry=${logTarget} onClose=${() => setLogTarget(null)} onSaved=${() => { setLogTarget(null); load(); }} />`}
    </div>
  `;
}

// ============= DAILY DIGEST (Tasks reminder) =============
function DailyDigest({ me, setTab }) {
  const [digest, setDigest] = useState([]);
  const [loading, setLoading] = useState(true);
  const [collapsed, setCollapsed] = useState(false);

  useEffect(() => { load(); }, []);

  const load = async () => {
    setLoading(true);
    const { data } = await sb.from('v_user_daily_digest')
      .select('*')
      .or('owner_id.eq.' + me.id + ',owner_id.is.null')
      .order('digest_state', { ascending: true })
      .order('due_at', { ascending: true });
    setDigest(data || []);
    setLoading(false);
  };

  const markComplete = async (id) => {
    await sb.from('actions').update({ status: 'completed', completed_at: new Date().toISOString() }).eq('id', id);
    load();
  };

  const pending = digest.filter(d => d.digest_state === 'pending' && d.owner_id === me.id);
  const completedToday = digest.filter(d => d.digest_state === 'completed_today' && d.owner_id === me.id);
  const teamPending = digest.filter(d => d.digest_state === 'pending' && d.owner_id !== me.id && (me.role === 'plant_head' || me.role === 'admin'));

  if (loading) return null;
  if (pending.length === 0 && completedToday.length === 0 && teamPending.length === 0) return null;

  return html`
    <div class="card" style="background:var(--teal-50);border-color:var(--teal-100);margin-bottom:14px">
      <div onClick=${() => setCollapsed(!collapsed)} style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:700;color:var(--teal-700)">📋 Today's Tasks · ${pending.length} pending${completedToday.length > 0 ? ' · ' + completedToday.length + ' done' : ''}</div>
        <span style="color:var(--teal-600);font-size:18px">${collapsed ? '›' : '▼'}</span>
      </div>
      ${!collapsed && html`
        <div style="margin-top:12px">
          ${pending.length > 0 && html`
            <div style="font-size:11px;color:var(--slate-600);font-weight:600;margin:8px 0 4px">PENDING (you)</div>
            ${pending.map(t => {
              const overdue = t.due_at && new Date(t.due_at) < new Date();
              return html`
                <div key=${t.id} style="background:white;padding:10px 12px;border-radius:8px;margin-bottom:6px;display:flex;align-items:center;gap:10px">
                  <button onClick=${() => markComplete(t.id)} style="width:22px;height:22px;border:2px solid var(--teal-600);border-radius:50%;background:white;cursor:pointer;flex-shrink:0;padding:0" title="Mark done"></button>
                  <div style="flex:1;min-width:0;cursor:pointer" onClick=${() => setTab('actions')}>
                    <div style="font-size:13px;font-weight:500">${t.title}</div>
                    <div style="font-size:11px;color:${overdue ? 'var(--rose-500)' : 'var(--slate-500)'}">${t.due_at ? (overdue ? '⚠️ Overdue · ' : 'Due ') + fmtDate(t.due_at) : 'No due date'} · ${t.source_type}</div>
                  </div>
                </div>
              `;
            })}
          `}
          ${completedToday.length > 0 && html`
            <div style="font-size:11px;color:var(--slate-600);font-weight:600;margin:8px 0 4px">DONE TODAY</div>
            ${completedToday.map(t => html`
              <div key=${t.id} style="background:white;padding:8px 12px;border-radius:8px;margin-bottom:6px;opacity:0.65">
                <div style="font-size:13px;text-decoration:line-through;color:var(--slate-500)">${t.title}</div>
                <div style="font-size:11px;color:var(--emerald-600)">✓ Completed ${fmtDate(t.completed_at)}</div>
              </div>
            `)}
          `}
          ${teamPending.length > 0 && html`
            <div style="font-size:11px;color:var(--slate-600);font-weight:600;margin:8px 0 4px">TEAM PENDING (${teamPending.length})</div>
            <div style="background:white;padding:10px 12px;border-radius:8px;cursor:pointer" onClick=${() => setTab('actions')}>
              <div style="font-size:13px">${teamPending.length} task${teamPending.length > 1 ? 's' : ''} assigned to your team</div>
              <div style="font-size:11px;color:var(--slate-500)">Tap to review in Action Hub</div>
            </div>
          `}
          <button class="btn small ghost" style="width:100%;margin-top:10px" onClick=${() => setTab('actions')}>Open Action Hub →</button>
        </div>
      `}
    </div>
  `;
}

// ============= QUALITY (NCRs) =============
function Quality({ plant, me }) {
  const [ncrs, setNcrs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);
  const [editTarget, setEditTarget] = useState(null);
  const [filter, setFilter] = useState('open');

  const refresh = useCallback(async () => {
    setLoading(true);
    let q = sb.from('mcp_quality_ncrs').select('*, raised_by_user:raised_by(full_name), assigned_to_user:assigned_to(full_name)').order('created_at', { ascending:false });
    if (filter === 'open') q = q.neq('status', 'closed').neq('status', 'cancelled');
    else if (filter === 'closed') q = q.eq('status', 'closed');
    const { data } = await q.limit(100);
    setNcrs(data || []);
    setLoading(false);
  }, [filter]);

  useEffect(() => { refresh(); }, [refresh]);

  const openCount = ncrs.filter(n => n.status !== 'closed' && n.status !== 'cancelled').length;
  const criticalCount = ncrs.filter(n => n.severity === 'critical' && n.status !== 'closed').length;

  return html`
    <div class="page-header"><div><h1>Quality</h1><div class="sub">NCRs and IATF records</div></div></div>

    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat ${openCount > 0 ? 'amber' : 'teal'}"><div class="stat-num">${openCount}</div><div class="stat-label">Open</div></div>
      <div class="stat rose"><div class="stat-num">${criticalCount}</div><div class="stat-label">Critical</div></div>
      <div class="stat teal"><div class="stat-num">${ncrs.filter(n => n.status === 'closed').length}</div><div class="stat-label">Closed</div></div>
    </div>

    <div class="auth-tabs" style="margin-bottom:14px">
      <button class=${'auth-tab' + (filter === 'open' ? ' active' : '')} onClick=${() => setFilter('open')}>Open</button>
      <button class=${'auth-tab' + (filter === 'closed' ? ' active' : '')} onClick=${() => setFilter('closed')}>Closed</button>
      <button class=${'auth-tab' + (filter === 'all' ? ' active' : '')} onClick=${() => setFilter('all')}>All</button>
    </div>

    <div class="section-h">NCRs · ${ncrs.length}<button class="btn small ghost" onClick=${() => { setEditTarget(null); setModal('ncr'); }}>+ Raise NCR</button></div>
    ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
      ncrs.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">✓</div>No NCRs in this filter</div></div>` :
      ncrs.map(n => html`
        <div class="list-item" key=${n.id} onClick=${() => { setEditTarget(n); setModal('ncr'); }}>
          <div class="list-item-row">
            <div class="list-item-main">
              <div class="list-item-title">${n.ncr_number} · ${n.title}</div>
              <div class="list-item-sub">${n.part_number || ''} ${n.qty_affected ? '· ' + n.qty_affected + ' pcs' : ''} · ${n.raised_by_user?.full_name || '?'}</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
              <span class=${'badge ' + (n.severity === 'critical' ? 'rose' : n.severity === 'major' ? 'amber' : '')}>${n.severity}</span>
              <span class=${'badge ' + (n.status === 'closed' ? 'emerald' : n.status === 'open' ? 'amber' : '')}>${n.status}</span>
            </div>
          </div>
        </div>
      `)
    }

    ${modal === 'ncr' && html`<${NcrModal} plant=${plant} me=${me} editTarget=${editTarget} onClose=${() => { setModal(null); setEditTarget(null); }} onSaved=${() => { setModal(null); setEditTarget(null); refresh(); }} />`}
  `;
}

function NcrModal({ plant, me, editTarget, onClose, onSaved }) {
  const [form, setForm] = useState(editTarget ? {...editTarget} : {
    title:'', description:'', severity:'minor', source:'manual',
    part_number:'', qty_affected:'', root_cause:'', corrective_action:''
  });
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => {
    sb.from('users').select('*').then(({ data }) => setUsers(data || []));
  }, []);

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      if (editTarget) {
        const updates = {
          title: form.title, description: form.description,
          severity: form.severity, status: form.status,
          part_number: form.part_number || null,
          qty_affected: form.qty_affected ? parseInt(form.qty_affected) : null,
          root_cause: form.root_cause || null,
          corrective_action: form.corrective_action || null,
          assigned_to: form.assigned_to || null,
        };
        if (form.status === 'closed' && !editTarget.closed_at) {
          updates.closed_at = new Date().toISOString();
          updates.closed_by = me.id;
        }
        const { error } = await sb.from('mcp_quality_ncrs').update(updates).eq('id', editTarget.id);
        if (error) throw error;
      } else {
        const { data: existing } = await sb.from('mcp_quality_ncrs').select('id', { count:'exact', head:true });
        const num = 'NCR-' + new Date().toISOString().slice(2,7).replace('-','') + '-' + String((existing?.count || 0) + 1).padStart(4,'0');
        const { error } = await sb.from('mcp_quality_ncrs').insert({
          plant_id: plant.id,
          ncr_number: num,
          source: form.source || 'manual',
          title: form.title,
          description: form.description || null,
          severity: form.severity,
          raised_by: me.id,
          assigned_to: form.assigned_to || null,
          part_number: form.part_number || null,
          qty_affected: form.qty_affected ? parseInt(form.qty_affected) : null,
        });
        if (error) throw error;
      }
      showToast(editTarget ? 'NCR updated' : 'NCR raised');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${editTarget ? editTarget.ncr_number : 'Raise NCR'}</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field"><label>Title *</label><input type="text" required value=${form.title} onChange=${e => setForm({...form, title: e.target.value})} placeholder="Surface defect on filterhead" /></div>
          <div class="field"><label>Description</label><textarea rows=${3} value=${form.description || ''} onChange=${e => setForm({...form, description: e.target.value})}></textarea></div>
          <div class="field-row">
            <div class="field"><label>Part Number</label><input type="text" value=${form.part_number || ''} onChange=${e => setForm({...form, part_number: e.target.value})} /></div>
            <div class="field"><label>Qty Affected</label><input type="number" value=${form.qty_affected || ''} onChange=${e => setForm({...form, qty_affected: e.target.value})} /></div>
          </div>
          <div class="field"><label>Severity</label>
            <select value=${form.severity} onChange=${e => setForm({...form, severity: e.target.value})}>
              <option value="minor">Minor</option><option value="major">Major</option><option value="critical">Critical</option>
            </select>
          </div>
          <div class="field"><label>Assigned To</label>
            <select value=${form.assigned_to || ''} onChange=${e => setForm({...form, assigned_to: e.target.value})}>
              <option value="">— Unassigned —</option>
              ${users.map(u => html`<option key=${u.id} value=${u.id}>${u.full_name}</option>`)}
            </select>
          </div>
          ${editTarget && html`
            <div class="field"><label>Status</label>
              <select value=${form.status} onChange=${e => setForm({...form, status: e.target.value})}>
                <option value="open">Open</option><option value="investigation">Investigation</option>
                <option value="containment">Containment</option><option value="corrective_action">Corrective Action</option>
                <option value="verification">Verification</option><option value="closed">Closed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div class="field"><label>Root Cause</label><textarea rows=${2} value=${form.root_cause || ''} onChange=${e => setForm({...form, root_cause: e.target.value})}></textarea></div>
            <div class="field"><label>Corrective Action</label><textarea rows=${2} value=${form.corrective_action || ''} onChange=${e => setForm({...form, corrective_action: e.target.value})}></textarea></div>
          `}
          <button class="btn" disabled=${loading}>${loading ? 'Saving…' : (editTarget ? 'Update NCR' : 'Raise NCR')}</button>
        </form>
      </div>
    </div>
  `;
}

// ============= MAINTENANCE =============
function Maintenance({ plant, me }) {
  const [breakdowns, setBreakdowns] = useState([]);
  const [machines, setMachines] = useState([]);
  const [users, setUsers] = useState([]);
  const [modal, setModal] = useState(null);
  const [editTarget, setEditTarget] = useState(null);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('open');

  const refresh = useCallback(async () => {
    setLoading(true);
    let q = sb.from('mcp_maintenance_breakdowns').select('*, mcp_pdc_machines(code), reported_by_user:reported_by(full_name), attended_by_user:attended_by(full_name)').order('reported_at', { ascending:false });
    if (filter === 'open') q = q.neq('status', 'resolved').neq('status', 'cancelled');
    else if (filter === 'resolved') q = q.eq('status', 'resolved');
    const [b, m, u] = await Promise.all([
      q.limit(100),
      sb.from('mcp_pdc_machines').select('*').order('code'),
      sb.from('users').select('*').order('full_name')
    ]);
    setBreakdowns(b.data || []);
    setMachines(m.data || []);
    setUsers(u.data || []);
    setLoading(false);
  }, [filter]);

  useEffect(() => { refresh(); }, [refresh]);

  const openCount = breakdowns.filter(b => b.status !== 'resolved' && b.status !== 'cancelled').length;
  const machinesDown = machines.filter(m => m.status === 'breakdown').length;

  return html`
    <div class="page-header"><div><h1>Maintenance</h1><div class="sub">Breakdowns, machine status</div></div></div>

    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat ${openCount > 0 ? 'rose' : 'teal'}"><div class="stat-num">${openCount}</div><div class="stat-label">Active</div></div>
      <div class="stat ${machinesDown > 0 ? 'rose' : 'teal'}"><div class="stat-num">${machinesDown}</div><div class="stat-label">Machines Down</div></div>
      <div class="stat teal"><div class="stat-num">${breakdowns.filter(b => b.status === 'resolved').length}</div><div class="stat-label">Resolved</div></div>
    </div>

    <div class="auth-tabs" style="margin-bottom:14px">
      <button class=${'auth-tab' + (filter === 'open' ? ' active' : '')} onClick=${() => setFilter('open')}>Active</button>
      <button class=${'auth-tab' + (filter === 'resolved' ? ' active' : '')} onClick=${() => setFilter('resolved')}>Resolved</button>
      <button class=${'auth-tab' + (filter === 'all' ? ' active' : '')} onClick=${() => setFilter('all')}>All</button>
    </div>

    <div class="section-h">Breakdowns · ${breakdowns.length}<button class="btn small ghost" onClick=${() => { setEditTarget(null); setModal('breakdown'); }} disabled=${machines.length === 0}>+ Report</button></div>
    ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
      breakdowns.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">✓</div>No breakdowns ${machines.length === 0 ? '— add machines first' : ''}</div></div>` :
      breakdowns.map(b => html`
        <div class="list-item" key=${b.id} onClick=${() => { setEditTarget(b); setModal('breakdown'); }}>
          <div class="list-item-row">
            <div class="list-item-main">
              <div class="list-item-title">${b.mcp_pdc_machines?.code || 'unknown'} · ${b.description.slice(0,50)}</div>
              <div class="list-item-sub">By ${b.reported_by_user?.full_name || '?'}${b.attended_by_user ? ' · attended by ' + b.attended_by_user.full_name : ''} · ${fmtDate(b.reported_at)}</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
              <span class=${'badge ' + (b.status === 'resolved' ? 'emerald' : b.status === 'attended' ? 'amber' : 'rose')}>${b.status}</span>
              ${b.downtime_minutes && html`<span style="font-size:10px;color:var(--slate-500)">${b.downtime_minutes}m down</span>`}
            </div>
          </div>
        </div>
      `)
    }

    <div class="section-h">Machine Status</div>
    ${machines.map(m => html`
      <div class="list-item" key=${m.id}>
        <div class="list-item-row">
          <div class="list-item-main">
            <div class="list-item-title">${m.code} · ${m.make || ''} ${m.tonnage ? '· ' + m.tonnage + 'T' : ''}</div>
          </div>
          <span class=${'badge ' + (m.status === 'running' ? 'emerald' : m.status === 'breakdown' ? 'rose' : m.status === 'maintenance' ? 'amber' : '')}>${m.status}</span>
        </div>
      </div>
    `)}

    ${modal === 'breakdown' && html`<${BreakdownModal} plant=${plant} me=${me} machines=${machines} users=${users} editTarget=${editTarget} onClose=${() => { setModal(null); setEditTarget(null); }} onSaved=${() => { setModal(null); setEditTarget(null); refresh(); }} />`}
  `;
}

function BreakdownModal({ plant, me, machines, users, editTarget, onClose, onSaved }) {
  const [form, setForm] = useState(editTarget ? {...editTarget} : {
    machine_id: machines[0]?.id || '',
    description: '',
    status: 'open',
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      if (editTarget) {
        const updates = {
          description: form.description,
          status: form.status,
          attended_by: form.attended_by || null,
          resolution_notes: form.resolution_notes || null,
        };
        if (form.status === 'attended' && !editTarget.attended_at) {
          updates.attended_at = new Date().toISOString();
          if (!form.attended_by) updates.attended_by = me.id;
        }
        if (form.status === 'resolved' && !editTarget.resolved_at) {
          updates.resolved_at = new Date().toISOString();
          if (!editTarget.attended_at) updates.attended_at = new Date().toISOString();
        }
        const { error } = await sb.from('mcp_maintenance_breakdowns').update(updates).eq('id', editTarget.id);
        if (error) throw error;
      } else {
        const { error } = await sb.from('mcp_maintenance_breakdowns').insert({
          plant_id: plant.id,
          machine_id: form.machine_id,
          description: form.description,
          reported_by: me.id,
          status: 'open',
        });
        if (error) throw error;
      }
      showToast(editTarget ? 'Updated' : 'Breakdown reported');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${editTarget ? 'Update Breakdown' : 'Report Breakdown'}</div>
          <button class="close-btn" onClick=${onClose}>×</button>

        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field"><label>Machine *</label>

              ${machines.map(m => html`<option key=${m.id} value=${m.id}>${m.code}</option>`)}
            </select>
          </div>
          <div class="field"><label>Description *</label><textarea required rows=${3} value=${form.description} onChange=${e => setForm({...form, description: e.target.value})} placeholder="Hydraulic leak, machine stopped" /></div>
          ${editTarget && html`
            <div class="field"><label>Status</label>
              <select value=${form.status} onChange=${e => setForm({...form, status: e.target.value})}>
                <option value="open">Open</option><option value="attended">Attended</option>
                <option value="resolved">Resolved</option><option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div class="field"><label>Attended By</label>
              <select value=${form.attended_by || ''} onChange=${e => setForm({...form, attended_by: e.target.value})}>
                <option value="">— None —</option>
                ${users.map(u => html`<option key=${u.id} value=${u.id}>${u.full_name}</option>`)}
              </select>
            </div>
            <div class="field"><label>Resolution Notes</label><textarea rows=${2} value=${form.resolution_notes || ''} onChange=${e => setForm({...form, resolution_notes: e.target.value})}></textarea></div>

// ============= STOCKS =============
function Stocks({ plant, me }) {
  const [items, setItems] = useState([]);
  const [transactions, setTransactions] = useState([]);
  const [view, setView] = useState('items'); // items | transactions
  const [layout, setLayout] = useState('list'); // list | by_category
  const [categoryFilter, setCategoryFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(null);
  const [editTarget, setEditTarget] = useState(null);
  const [loading, setLoading] = useState(true);

  const refresh = useCallback(async () => {
    setLoading(true);
    const [i, t] = await Promise.all([
      sb.from('mcp_stocks_items').select('*').order('name'),
      sb.from('mcp_stocks_transactions').select('*, mcp_stocks_items(code,name,uom,category), users:performed_by(full_name)').order('created_at', { ascending:false }).limit(100),
    ]);
    setItems(i.data || []);
    setTransactions(t.data || []);
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  // Live updates on stock changes
  useEffect(() => {
    if (!plant?.id) return;
    const channel = sb.channel('stocks-' + plant.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_stocks_items', filter:'plant_id=eq.' + plant.id }, () => refresh())
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_stocks_transactions', filter:'plant_id=eq.' + plant.id }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id, refresh]);

  const lowStockCount = items.filter(i => i.reorder_level && i.current_qty <= i.reorder_level).length;
  const totalValue = items.reduce((sum, i) => sum + (parseFloat(i.current_qty || 0) * parseFloat(i.unit_cost || 0)), 0);

  // Filter by category + search
  let filteredItems = items;
  if (categoryFilter !== 'all') filteredItems = filteredItems.filter(i => (i.category || 'general') === categoryFilter);
  if (search.trim()) {
    const q = search.toLowerCase();
    filteredItems = filteredItems.filter(i => (i.code + ' ' + i.name).toLowerCase().includes(q));
  }

  // Group by category for category view
  const byCategory = {};
  for (const i of filteredItems) {
    const c = i.category || 'general';
    if (!byCategory[c]) byCategory[c] = [];
    byCategory[c].push(i);
  }

  // Get unique category list with counts
  const categoryCounts = items.reduce((acc, i) => {
    const c = i.category || 'general';
    acc[c] = (acc[c] || 0) + 1;
    return acc;
  }, {});

  const categoryLabels = {
    raw_material: 'Raw Material',
    die_spares: 'Die Spares',
    consumables: 'Consumables',
    tools: 'Tools',
    packing: 'Packing',
    bought_out: 'Bought-out',
    general: 'General',
  };
  const lbl = (c) => categoryLabels[c] || c;

  const ItemRow = ({ i }) => {
    const isLow = i.reorder_level && i.current_qty <= i.reorder_level;
    return html`
      <div class="list-item" key=${i.id} onClick=${() => { setEditTarget(i); setModal('item'); }}>
        <div class="list-item-row">
          <div class="list-item-main">
            <div class="list-item-title">${i.code} · ${i.name}</div>
            <div class="list-item-sub">${lbl(i.category || 'general')}${i.reorder_level ? ' · reorder at ' + i.reorder_level + ' ' + i.uom : ''}${i.unit_cost ? ' · ₹' + i.unit_cost + '/' + i.uom : ''}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
            <span class=${'badge ' + (isLow ? 'rose' : 'emerald')}>${fmtNum(i.current_qty)} ${i.uom}</span>
            <button class="btn small ghost" onClick=${(e) => { e.stopPropagation(); setEditTarget(i); setModal('txn'); }}>Txn</button>
          </div>
        </div>
      </div>
    `;
  };

  return html`
    <div class="page-header"><div><h1>Stocks</h1><div class="sub">Items, GRN, issues, valuation</div></div></div>

    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat teal"><div class="stat-num">${items.length}</div><div class="stat-label">Items</div></div>
      <div class="stat ${lowStockCount > 0 ? 'amber' : 'teal'}"><div class="stat-num">${lowStockCount}</div><div class="stat-label">Low Stock</div></div>
      <div class="stat teal"><div class="stat-num" style="font-size:18px">₹${(totalValue/100000).toFixed(1)}L</div><div class="stat-label">Value</div></div>
    </div>

    <div class="auth-tabs" style="margin-bottom:10px">
      <button class=${'auth-tab' + (view === 'items' ? ' active' : '')} onClick=${() => setView('items')}>Items</button>
      <button class=${'auth-tab' + (view === 'transactions' ? ' active' : '')} onClick=${() => setView('transactions')}>Transactions</button>
    </div>

    ${view === 'items' && html`
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <input type="search" value=${search} onChange=${e => setSearch(e.target.value)} placeholder="Search items…" style="flex:1;padding:8px 12px;border:1px solid var(--slate-200);border-radius:8px;font-size:13px" />
        <button class="btn small ${layout === 'list' ? '' : 'ghost'}" onClick=${() => setLayout('list')}>List</button>
        <button class="btn small ${layout === 'by_category' ? '' : 'ghost'}" onClick=${() => setLayout('by_category')}>By Category</button>
      </div>

      ${layout === 'list' && html`
        <div class="auth-tabs" style="margin-bottom:14px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch">
          <button class=${'auth-tab' + (categoryFilter === 'all' ? ' active' : '')} onClick=${() => setCategoryFilter('all')}>All · ${items.length}</button>
          ${Object.keys(categoryLabels).map(c => categoryCounts[c] > 0 && html`
            <button key=${c} class=${'auth-tab' + (categoryFilter === c ? ' active' : '')} onClick=${() => setCategoryFilter(c)}>${lbl(c)} · ${categoryCounts[c]}</button>
          `)}
        </div>
      `}

      <div class="section-h">Items · ${filteredItems.length}<button class="btn small ghost" onClick=${() => { setEditTarget(null); setModal('item'); }}>+ Add</button></div>

      ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
        filteredItems.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">📦</div>${items.length === 0 ? 'No items yet' : 'No items match this filter'}</div></div>` :
        layout === 'by_category' ? html`
          ${Object.entries(byCategory).sort((a,b) => b[1].length - a[1].length).map(([cat, list]) => html`
            <details key=${cat} open style="margin-bottom:8px">
              <summary style="cursor:pointer;padding:10px 12px;background:var(--slate-100);border-radius:10px;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center">
                <span>📦 ${lbl(cat)}</span>
                <span style="background:var(--teal-600);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px">${list.length}</span>
              </summary>
              <div style="margin-top:6px">
                ${list.map(i => html`<${ItemRow} i=${i} />`)}
              </div>
            </details>
          `)}
        ` : html`
          ${filteredItems.map(i => html`<${ItemRow} i=${i} />`)}
        `
      }
    `}

    ${view === 'transactions' && html`
      <div class="section-h">Recent Transactions · ${transactions.length}</div>
      ${transactions.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">📋</div>No transactions yet</div></div>` :
        transactions.map(t => html`
          <div class="list-item" key=${t.id}>
            <div class="list-item-row">
              <div class="list-item-main">
                <div class="list-item-title">${t.mcp_stocks_items?.code || '?'} · ${t.mcp_stocks_items?.name || ''}</div>
                <div class="list-item-sub">${t.users?.full_name || '?'} · ${t.reference || ''} · ${fmtDate(t.created_at)}</div>
              </div>
              <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
                <span class=${'badge ' + (['grn','return','adjustment'].includes(t.txn_type) ? 'emerald' : 'rose')}>${t.txn_type} ${['grn','return','adjustment'].includes(t.txn_type) ? '+' : '-'}${fmtNum(t.qty)}</span>
                <span style="font-size:10px;color:var(--slate-500)">→ ${fmtNum(t.qty_after || 0)}</span>
              </div>
            </div>
          </div>
        `)
      }
    `}

    ${modal === 'item' && html`<${ItemModal} plant=${plant} editTarget=${editTarget} onClose=${() => { setModal(null); setEditTarget(null); }} onSaved=${() => { setModal(null); setEditTarget(null); refresh(); }} />`}
    ${modal === 'txn' && html`<${TxnModal} plant=${plant} me=${me} item=${editTarget} onClose=${() => { setModal(null); setEditTarget(null); }} onSaved=${() => { setModal(null); setEditTarget(null); refresh(); }} />`}
  `;
}

function ItemModal({ plant, editTarget, onClose, onSaved }) {
  const [form, setForm] = useState(editTarget || { code:'', name:'', category:'general', uom:'nos', current_qty:0, reorder_level:'', unit_cost:'' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const payload = {
        plant_id: plant.id,
        code: form.code, name: form.name,
        category: form.category || 'general',
        uom: form.uom,
        current_qty: parseFloat(form.current_qty) || 0,
        reorder_level: form.reorder_level ? parseFloat(form.reorder_level) : null,
        unit_cost: form.unit_cost ? parseFloat(form.unit_cost) : null,
      };
      const { error } = editTarget
        ? await sb.from('mcp_stocks_items').update(payload).eq('id', editTarget.id)
        : await sb.from('mcp_stocks_items').insert(payload);
      if (error) throw error;
      showToast(editTarget ? 'Item updated' : 'Item added');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${editTarget ? 'Edit' : 'Add'} Item</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field-row">
            <div class="field"><label>Code *</label><input type="text" required value=${form.code} onChange=${e => setForm({...form, code: e.target.value})} placeholder="ALU-ADC12" /></div>
            <div class="field"><label>UOM</label>
              <select value=${form.uom} onChange=${e => setForm({...form, uom: e.target.value})}>
                <option value="nos">Nos</option><option value="kg">Kg</option><option value="ltr">Ltr</option>
                <option value="mtr">Mtr</option><option value="set">Set</option><option value="box">Box</option>
              </select>
            </div>
          </div>
          <div class="field"><label>Name *</label><input type="text" required value=${form.name} onChange=${e => setForm({...form, name: e.target.value})} placeholder="Aluminum ADC-12 ingots" /></div>
          <div class="field"><label>Category</label>
            <select value=${form.category} onChange=${e => setForm({...form, category: e.target.value})}>
              <option value="raw_material">Raw Material</option>
              <option value="die_spares">Die Spares</option>
              <option value="consumables">Consumables</option>
              <option value="tools">Tools</option>
              <option value="packing">Packing</option>
              <option value="bought_out">Bought-out</option>
              <option value="general">General</option>
            </select>
          </div>
          <div class="field-row">
            <div class="field"><label>Current Qty</label><input type="number" step="0.001" value=${form.current_qty} onChange=${e => setForm({...form, current_qty: e.target.value})} /></div>
            <div class="field"><label>Reorder Level</label><input type="number" step="0.001" value=${form.reorder_level || ''} onChange=${e => setForm({...form, reorder_level: e.target.value})} /></div>
          </div>
          <div class="field"><label>Unit Cost (₹)</label><input type="number" step="0.01" value=${form.unit_cost || ''} onChange=${e => setForm({...form, unit_cost: e.target.value})} /></div>
          <button class="btn" disabled=${loading}>${loading ? 'Saving…' : (editTarget ? 'Update' : 'Add')}</button>
        </form>
      </div>
    </div>
  `;
}
