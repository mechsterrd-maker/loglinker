// ============= ACTION HUB =============
function ActionHub({ plant, me }) {
  const [actions, setActions] = useState([]);
  const [users, setUsers] = useState([]);
  const [departments, setDepartments] = useState([]);
  const [view, setView] = useState('all'); // all | mine | by_dept | by_person
  const [statusFilter, setStatusFilter] = useState('open'); // open | done | all
  const [modal, setModal] = useState(null);
  const [editTarget, setEditTarget] = useState(null);
  const [activeTask, setActiveTask] = useState(null);
  const [loading, setLoading] = useState(true);

  const refresh = useCallback(async () => {
    setLoading(true);
    let q = sb.from('actions').select('*, owner_user:owner_id(full_name, role), assigner:assigned_by(full_name)').order('created_at', { ascending:false });
    if (statusFilter === 'open') q = q.in('status', ['open','in_progress']);
    else if (statusFilter === 'done') q = q.eq('status', 'completed');
    const [a, u, d] = await Promise.all([
      q.limit(200),
      sb.from('users').select('*').order('full_name'),
      sb.from('departments').select('*').order('name')
    ]);
    setActions(a.data || []);
    setUsers(u.data || []);
    setDepartments(d.data || []);
    setLoading(false);
  }, [statusFilter]);

  useEffect(() => { refresh(); }, [refresh]);

  // Live updates — subscribe to actions table
  useEffect(() => {
    if (!plant?.id) return;
    const channel = sb.channel('actions-' + plant.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'actions', filter:'plant_id=eq.' + plant.id }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id, refresh]);

  // If a task is active, show detail screen
  if (activeTask) {
    return html`<${TaskDetail} plant=${plant} me=${me} task=${activeTask} users=${users} onClose=${() => { setActiveTask(null); refresh(); }} />`;
  }

  let filteredActions = actions;
  if (view === 'mine') filteredActions = actions.filter(a => a.owner_id === me.id);

  const myOpen = actions.filter(a => a.owner_id === me.id && (a.status === 'open' || a.status === 'in_progress')).length;
  const teamOpen = actions.filter(a => a.owner_id !== me.id && (a.status === 'open' || a.status === 'in_progress')).length;
  const overdue = actions.filter(a => (a.status === 'open' || a.status === 'in_progress') && a.due_at && new Date(a.due_at) < new Date()).length;

  // Group counters
  const byDept = {};
  const byPerson = {};
  for (const a of filteredActions) {
    const d = a.department || 'Unassigned';
    if (!byDept[d]) byDept[d] = [];
    byDept[d].push(a);
    const p = a.owner_user?.full_name || 'Unassigned';
    if (!byPerson[p]) byPerson[p] = [];
    byPerson[p].push(a);
  }

  return html`
    <div class="page-header"><div><h1>Action Hub</h1><div class="sub">Live tasks across the plant</div></div></div>

    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat ${myOpen > 0 ? 'amber' : 'teal'}"><div class="stat-num">${myOpen}</div><div class="stat-label">Mine</div></div>
      <div class="stat teal"><div class="stat-num">${teamOpen}</div><div class="stat-label">Team</div></div>
      <div class="stat ${overdue > 0 ? 'rose' : 'teal'}"><div class="stat-num">${overdue}</div><div class="stat-label">Overdue</div></div>
    </div>

    <div class="auth-tabs" style="margin-bottom:10px;overflow-x:auto;flex-wrap:nowrap">
      <button class=${'auth-tab' + (view === 'all' ? ' active' : '')} onClick=${() => setView('all')}>All</button>
      <button class=${'auth-tab' + (view === 'mine' ? ' active' : '')} onClick=${() => setView('mine')}>Mine</button>
      <button class=${'auth-tab' + (view === 'by_dept' ? ' active' : '')} onClick=${() => setView('by_dept')}>By Dept</button>
      <button class=${'auth-tab' + (view === 'by_person' ? ' active' : '')} onClick=${() => setView('by_person')}>By Person</button>
    </div>

    <div class="auth-tabs" style="margin-bottom:14px">
      <button class=${'auth-tab' + (statusFilter === 'open' ? ' active' : '')} onClick=${() => setStatusFilter('open')}>Open</button>
      <button class=${'auth-tab' + (statusFilter === 'done' ? ' active' : '')} onClick=${() => setStatusFilter('done')}>Done</button>
      <button class=${'auth-tab' + (statusFilter === 'all' ? ' active' : '')} onClick=${() => setStatusFilter('all')}>All</button>
    </div>

    <div class="section-h">Tasks · ${filteredActions.length}<button class="btn small ghost" onClick=${() => { setEditTarget(null); setModal('action'); }}>+ Add</button></div>

    ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
      filteredActions.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">✓</div>No tasks in this filter</div></div>` :
      (view === 'by_dept' || view === 'by_person') ? html`
        ${Object.entries(view === 'by_dept' ? byDept : byPerson).sort((a,b) => b[1].length - a[1].length).map(([groupKey, groupItems]) => html`
          <details key=${groupKey} open style="margin-bottom:8px">
            <summary style="cursor:pointer;padding:10px 12px;background:var(--slate-100);border-radius:10px;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center">
              <span>${view === 'by_dept' ? '🏢 ' : '👤 '}${groupKey}</span>
              <span style="background:var(--teal-600);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px">${groupItems.length}</span>
            </summary>
            <div style="margin-top:6px;padding-left:8px">
              ${groupItems.map(a => html`<${TaskRow} key=${a.id} action=${a} onTap=${() => setActiveTask(a)} />`)}
            </div>
          </details>
        `)}
      ` : html`
        ${filteredActions.map(a => html`<${TaskRow} key=${a.id} action=${a} onTap=${() => setActiveTask(a)} />`)}
      `
    }

    ${modal === 'action' && html`<${ActionModal} plant=${plant} me=${me} users=${users} departments=${departments} editTarget=${editTarget} onClose=${() => { setModal(null); setEditTarget(null); }} onSaved=${() => { setModal(null); setEditTarget(null); refresh(); }} />`}
  `;
}

// ============= TASK ROW =============
function TaskRow({ action, onTap }) {
  const overdue = action.due_at && new Date(action.due_at) < new Date() && action.status !== 'completed' && action.status !== 'cancelled';
  return html`
    <div class="list-item" onClick=${onTap}>

}

// ============= TASK DETAIL =============
function TaskDetail({ plant, me, task: initialTask, users, onClose }) {
  const [task, setTask] = useState(initialTask);
  const [updates, setUpdates] = useState([]);
  const [comment, setComment] = useState('');
  const [posting, setPosting] = useState(false);
  const [editing, setEditing] = useState(false);
  const [showOriginalMsg, setShowOriginalMsg] = useState(null);

  const refresh = useCallback(async () => {
    const [t, u] = await Promise.all([
      sb.from('actions').select('*, owner_user:owner_id(full_name), assigner:assigned_by(full_name), creator:assigned_by(full_name)').eq('id', task.id).maybeSingle(),
      sb.from('action_updates').select('*, author:author_id(full_name)').eq('action_id', task.id).order('created_at')
    ]);
    if (t.data) setTask(t.data);
    setUpdates(u.data || []);
  }, [task.id]);

  useEffect(() => {
    refresh();
    // Get original chat message if linked
    if (task.chat_message_id) {
      sb.from('chat_messages').select('body, attachments, users(full_name)').eq('id', task.chat_message_id).maybeSingle().then(({data}) => setShowOriginalMsg(data));
    }
    // Subscribe to live updates
    const channel = sb.channel('task-' + task.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'action_updates', filter:'action_id=eq.' + task.id }, () => refresh())
      .on('postgres_changes', { event:'*', schema:'public', table:'actions', filter:'id=eq.' + task.id }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [task.id, refresh]);

  const postComment = async () => {
    if (!comment.trim() || posting) return;
    setPosting(true);
    const body = comment.trim();
    setComment('');
    const { error } = await sb.from('action_updates').insert({
      plant_id: plant.id, action_id: task.id,
      author_id: me.id, update_type: 'comment', body
    });
    if (error) alert(error.message);
    setPosting(false);
  };

  const changeStatus = async (newStatus) => {
    const updates = { status: newStatus };
    if (newStatus === 'completed') updates.completed_at = new Date().toISOString();
    const { error } = await sb.from('actions').update(updates).eq('id', task.id);
    if (error) { alert(error.message); return; }
    showToast(newStatus === 'completed' ? 'Task closed · chat notified' : 'Status updated');
  };

  const reassign = async (newOwnerId) => {
    const { error } = await sb.from('actions').update({ owner_id: newOwnerId || null }).eq('id', task.id);
    if (error) { alert(error.message); return; }
    await sb.from('action_updates').insert({
      plant_id: plant.id, action_id: task.id,
      author_id: me.id, update_type: 'comment',
      body: '👤 Reassigned to ' + (users.find(u => u.id === newOwnerId)?.full_name || 'unassigned')
    });
  };

  const isOwner = task.owner_id === me.id;
  const isClosed = task.status === 'completed' || task.status === 'cancelled';
  const overdue = task.due_at && new Date(task.due_at) < new Date() && !isClosed;

  return html`
    <div class="page-header" style="display:flex;align-items:center;gap:10px">
      <button class="btn ghost small" style="padding:6px 10px" onClick=${onClose}>← Back</button>
      <div style="flex:1;min-width:0">
        <h1 style="font-size:18px">Task</h1>
        <div class="sub">${task.source_type}${task.department ? ' · ' + task.department : ''}</div>
      </div>
      ${(isOwner || me.role === 'plant_head' || me.role === 'admin') && html`
        <button class="btn small ghost" onClick=${() => setEditing(true)}>Edit</button>
      `}
    </div>

    <div class="card">
      <h2 style="font-size:18px;margin:0 0 8px;${isClosed ? 'text-decoration:line-through;color:var(--slate-500)' : ''}">${task.title}</h2>
      ${task.description && html`<p style="font-size:14px;color:var(--slate-600);line-height:1.5;margin:0 0 12px">${task.description}</p>`}
      <div class="card-row"><span class="label">Status</span><span class="value"><span class=${'badge ' + (task.status === 'completed' ? 'emerald' : overdue ? 'rose' : 'amber')}>${task.status}</span></span></div>
      <div class="card-row"><span class="label">Owner</span><span class="value">${task.owner_user?.full_name || '— unassigned'}</span></div>
      <div class="card-row"><span class="label">Assigned by</span><span class="value">${task.assigner?.full_name || '?'}</span></div>
      ${task.due_at && html`<div class="card-row"><span class="label">Due</span><span class="value" style=${overdue ? 'color:var(--rose-500)' : ''}>${overdue ? '⚠️ ' : ''}${fmtDate(task.due_at)}</span></div>`}
      ${task.completed_at && html`<div class="card-row"><span class="label">Closed</span><span class="value">${fmtDate(task.completed_at)}</span></div>`}
    </div>

    ${showOriginalMsg && html`
      <div class="card" style="background:var(--teal-50);border-color:var(--teal-100);margin-top:14px">
        <div style="font-size:11px;color:var(--teal-700);font-weight:600;margin-bottom:6px">FROM CHAT</div>
        <div style="font-size:13px;color:var(--slate-700)"><strong>${showOriginalMsg.users?.full_name || '?'}:</strong> ${showOriginalMsg.body || '(attachment)'}</div>
      </div>
    `}

    ${!isClosed && html`
      <div class="card" style="margin-top:14px">
        <div class="card-title">Actions</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${task.status === 'open' && html`<button class="btn small" onClick=${() => changeStatus('in_progress')}>Start working</button>`}
          ${task.status === 'in_progress' && html`<button class="btn small ghost" onClick=${() => changeStatus('open')}>Pause</button>`}
          <button class="btn small" style="background:var(--emerald-600)" onClick=${() => { if (confirm('Close this task?')) changeStatus('completed'); }}>✓ Close task</button>
          ${(me.role === 'plant_head' || me.role === 'admin' || task.assigned_by === me.id) && html`
            <button class="btn small danger" onClick=${() => { if (confirm('Cancel this task?')) changeStatus('cancelled'); }}>Cancel</button>
          `}
        </div>
        ${(me.role === 'plant_head' || me.role === 'admin' || task.assigned_by === me.id) && html`
          <div class="field" style="margin-top:14px">
            <label>Reassign to</label>
            <select value=${task.owner_id || ''} onChange=${e => reassign(e.target.value)}>
              <option value="">— Unassigned —</option>
              ${users.map(u => html`<option key=${u.id} value=${u.id}>${u.full_name}${u.id === me.id ? ' (me)' : ''}</option>`)}
            </select>
          </div>
        `}
      </div>
    `}

    <div class="section-h">Activity · ${updates.length}</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${updates.length === 0 ? html`<div class="empty"><div style="font-size:13px">No activity yet. Be the first to add an update.</div></div>` :
        updates.map(u => {
          const isComment = u.update_type === 'comment';
          const isOwn = u.author_id === me.id;
          if (!isComment) {
            return html`
              <div key=${u.id} style="text-align:center;padding:6px 0">
                <span style="background:var(--slate-100);color:var(--slate-600);padding:4px 10px;border-radius:999px;font-size:11px">
                  ${u.body || (u.update_type + ': ' + u.status_from + ' → ' + u.status_to)} · ${u.author?.full_name || '?'} · ${fmtDate(u.created_at)}
                </span>
              </div>
            `;
          }
          return html`
            <div key=${u.id} style="background:${isOwn ? 'var(--teal-50)' : 'white'};border:1px solid var(--slate-200);border-radius:12px;padding:10px 12px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <strong style="font-size:13px;color:var(--slate-700)">${u.author?.full_name || '?'}</strong>
                <span style="font-size:11px;color:var(--slate-400)">${fmtDate(u.created_at)}</span>
              </div>
              <div style="font-size:14px;line-height:1.5">${u.body}</div>
            </div>
          `;
        })
      }
    </div>

    ${!isClosed && html`
      <div style="position:sticky;bottom:0;background:white;padding:10px 0;margin-top:14px;display:flex;gap:8px">
        <input type="text" value=${comment} onChange=${e => setComment(e.target.value)} onKeyPress=${e => { if (e.key === 'Enter' && !e.shiftKey) postComment(); }} placeholder="Add an update or comment…" style="flex:1;padding:10px 14px;border:1px solid var(--slate-200);border-radius:999px;font-size:14px;outline:none" disabled=${posting} />
        <button class="btn" style="border-radius:999px;width:auto;padding:10px 18px;flex-shrink:0" onClick=${postComment} disabled=${posting || !comment.trim()}>${posting ? '…' : 'Post'}</button>
      </div>
    `}

    ${editing && html`<${ActionModal} plant=${plant} me=${me} users=${users} editTarget=${task} onClose=${() => setEditing(false)} onSaved=${() => { setEditing(false); refresh(); }} />`}
  `;
}

function ActionModal({ plant, me, users, departments, editTarget, onClose, onSaved }) {
  const [form, setForm] = useState(editTarget ? {...editTarget, due_at: editTarget.due_at ? editTarget.due_at.slice(0,16) : ''} : {
    title:'', description:'', owner_id:'', department:'', due_at:'', source_type:'manual'
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  // Auto-fill department from owner's department if available
  const onPickOwner = (id) => {
    const u = users.find(x => x.id === id);
    setForm({...form, owner_id: id, department: form.department || (u?.role === 'qa' ? 'Quality' : u?.role === 'maintenance' ? 'Maintenance' : u?.role === 'production' ? 'Production' : form.department)});
  };

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const payload = {
        plant_id: plant.id,
        source_type: form.source_type,
        title: form.title,
        description: form.description || null,
        owner_id: form.owner_id || null,
        department: form.department || null,
        assigned_by: me.id,

  return html`

        <div class="modal-header">
          <div class="modal-title">${editTarget ? 'Edit Task' : 'New Task'}</div>

          <div class="field-row">
            <div class="field"><label>Owner</label>
              <select value=${form.owner_id || ''} onChange=${e => onPickOwner(e.target.value)}>
                <option value="">— Unassigned —</option>
                ${users.map(u => html`<option key=${u.id} value=${u.id}>${u.full_name}</option>`)}
              </select>
            </div>
            <div class="field"><label>Department</label>
              <select value=${form.department || ''} onChange=${e => setForm({...form, department: e.target.value})}>
                <option value="">— None —</option>
                ${deptOptions.map(d => html`<option key=${d} value=${d}>${d}</option>`)}
              </select>
            </div>
          </div>
          <div class="field"><label>Due Date</label><input type="datetime-local" value=${form.due_at} onChange=${e => setForm({...form, due_at: e.target.value})} /></div>
          ${editTarget && html`
            <div class="field"><label>Status</label>
              <select value=${form.status} onChange=${e => setForm({...form, status: e.target.value})}>

            </div>
          `}
          <button class="btn" disabled=${loading}>${loading ? 'Saving…' : (editTarget ? 'Update' : 'Create task')}</button>
        </form>
      </div>
    </div>
  `;
}

function GroupCreateModal({ plant, me, user, onClose, onSaved }) {
  const [users, setUsers] = useState([]);

    if (id === user.id) return; // can't remove self

      showToast('Group created');
      onSaved();

  return html`

                </div>
              `;
            })}

          <button class="btn" style="margin-top:14px" disabled=${loading}>${loading ? 'Creating…' : 'Create group'}</button>
        </form>
      </div>
    </div>
  `;
}

// ============= DOCUMENTS / BILLS / VENDORS =============
function Documents({ plant, me }) {
  const [docs, setDocs] = useState([]);
  const [vendors, setVendors] = useState([]);
  const [jobworkStock, setJobworkStock] = useState([]);
  const [view, setView] = useState('dashboard'); // dashboard | vendors | jobwork
  const [typeFilter, setTypeFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('open');
  const [search, setSearch] = useState('');
  const [activeDoc, setActiveDoc] = useState(null);
  const [activeVendor, setActiveVendor] = useState(null);
  const [loading, setLoading] = useState(true);

  const refresh = useCallback(async () => {
    setLoading(true);
    const [d, v, jw] = await Promise.all([
      sb.from('mcp_logistics_documents')
        .select('*, mcp_logistics_vendors(name, gstin, payment_terms_days)')
        .order('doc_date', { ascending: false, nullsFirst: false })
        .limit(500),
      sb.from('mcp_logistics_vendors').select('*').order('name'),
      sb.from('v_vendor_jobwork_stock').select('*').order('vendor_name'),
    ]);
    setDocs(d.data || []);
    setVendors(v.data || []);
    setJobworkStock(jw.data || []);
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  // Live updates
  useEffect(() => {
    if (!plant?.id) return;
    const channel = sb.channel('docs-' + plant.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_logistics_documents', filter:'plant_id=eq.' + plant.id }, () => refresh())
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_logistics_payments', filter:'plant_id=eq.' + plant.id }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id, refresh]);

  if (activeDoc) {
    return html`<${DocumentDetail} plant=${plant} me=${me} doc=${activeDoc} vendors=${vendors} onClose=${() => { setActiveDoc(null); refresh(); }} />`;
  }
  if (activeVendor) {
    return html`<${VendorDetail} plant=${plant} me=${me} vendor=${activeVendor} jobworkStock=${jobworkStock.filter(s => s.vendor_id === activeVendor.id)} docs=${docs.filter(d => d.vendor_id === activeVendor.id)} onClose=${() => { setActiveVendor(null); refresh(); }} />`;
  }

  // Filter docs
  let filteredDocs = docs;
  if (typeFilter !== 'all') filteredDocs = filteredDocs.filter(d => d.doc_type === typeFilter);
  if (statusFilter === 'open') filteredDocs = filteredDocs.filter(d => ['pending','approved','partial'].includes(d.status));
  else if (statusFilter === 'overdue') filteredDocs = filteredDocs.filter(d => ['pending','approved','partial'].includes(d.status) && d.due_date && new Date(d.due_date) < new Date());
  else if (statusFilter === 'paid') filteredDocs = filteredDocs.filter(d => d.status === 'paid');
  if (search.trim()) {
    const q = search.toLowerCase();
    filteredDocs = filteredDocs.filter(d =>
      (d.vendor_name_raw || '').toLowerCase().includes(q) ||
      (d.doc_number || '').toLowerCase().includes(q) ||
      (d.mcp_logistics_vendors?.name || '').toLowerCase().includes(q)
    );
  }

  // Stats
  const today = new Date();
  const totalPayable = docs.filter(d => ['invoice_in','bill'].includes(d.doc_type) && ['pending','approved','partial'].includes(d.status))
    .reduce((sum, d) => sum + (parseFloat(d.total_value || 0) - parseFloat(d.paid_amount || 0)), 0);
  const overdueCount = docs.filter(d => ['pending','approved','partial'].includes(d.status) && d.due_date && new Date(d.due_date) < today && ['invoice_in','bill'].includes(d.doc_type)).length;
  const dueIn7Days = docs.filter(d => ['pending','approved','partial'].includes(d.status) && d.due_date && new Date(d.due_date) >= today && new Date(d.due_date) <= new Date(today.getTime() + 7*86400000)).length;

  const docTypeLabels = {
    invoice_in:'Invoice (in)', invoice_out:'Invoice (out)',
    dc_in:'DC (in)', dc_out:'DC (out)',
    job_work_dc_out:'JW Out', job_work_dc_in:'JW Return',
    bill:'Bill', quote:'Quote', po:'PO', other:'Other'
  };

  return html`
    <div class="page-header"><div><h1>Documents</h1><div class="sub">Bills, DCs, payments · auto-extracted from chat</div></div></div>

    <div class="auth-tabs" style="margin-bottom:14px">
      <button class=${'auth-tab' + (view === 'dashboard' ? ' active' : '')} onClick=${() => setView('dashboard')}>Documents</button>
      <button class=${'auth-tab' + (view === 'vendors' ? ' active' : '')} onClick=${() => setView('vendors')}>Vendors · ${vendors.length}</button>
      <button class=${'auth-tab' + (view === 'jobwork' ? ' active' : '')} onClick=${() => setView('jobwork')}>Job-work</button>
    </div>

    ${view === 'dashboard' && html`
      <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat ${totalPayable > 0 ? 'amber' : 'teal'}"><div class="stat-num" style="font-size:18px">₹${(totalPayable/100000).toFixed(1)}L</div><div class="stat-label">Payable</div></div>
        <div class="stat ${overdueCount > 0 ? 'rose' : 'teal'}"><div class="stat-num">${overdueCount}</div><div class="stat-label">Overdue</div></div>
        <div class="stat ${dueIn7Days > 0 ? 'amber' : 'teal'}"><div class="stat-num">${dueIn7Days}</div><div class="stat-label">Due 7d</div></div>
      </div>

      <div style="margin-bottom:10px">
        <input type="search" value=${search} onChange=${e => setSearch(e.target.value)} placeholder="Search vendor, invoice number…" style="width:100%;padding:10px 14px;border:1px solid var(--slate-200);border-radius:8px;font-size:13px" />
      </div>

      <div class="auth-tabs" style="margin-bottom:8px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch">
        <button class=${'auth-tab' + (typeFilter === 'all' ? ' active' : '')} onClick=${() => setTypeFilter('all')}>All</button>
        ${Object.entries(docTypeLabels).map(([k,l]) => html`
          <button key=${k} class=${'auth-tab' + (typeFilter === k ? ' active' : '')} onClick=${() => setTypeFilter(k)}>${l}</button>
        `)}
      </div>

      <div class="auth-tabs" style="margin-bottom:14px">
        <button class=${'auth-tab' + (statusFilter === 'open' ? ' active' : '')} onClick=${() => setStatusFilter('open')}>Open</button>
        <button class=${'auth-tab' + (statusFilter === 'overdue' ? ' active' : '')} onClick=${() => setStatusFilter('overdue')}>Overdue</button>
        <button class=${'auth-tab' + (statusFilter === 'paid' ? ' active' : '')} onClick=${() => setStatusFilter('paid')}>Paid</button>
        <button class=${'auth-tab' + (statusFilter === 'all' ? ' active' : '')} onClick=${() => setStatusFilter('all')}>All</button>
      </div>

      <div class="section-h">${filteredDocs.length} document${filteredDocs.length !== 1 ? 's' : ''}<button class="btn small ghost" onClick=${() => setActiveDoc({ _new: true })}>+ Add manually</button></div>

      ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
        filteredDocs.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">📄</div>No documents in this filter. Post invoice/DC photos in any chat group — Loglinkr extracts automatically.</div></div>` :
        filteredDocs.map(d => {
          const overdue = d.due_date && new Date(d.due_date) < today && ['pending','approved','partial'].includes(d.status);
          const balance = (parseFloat(d.total_value || 0)) - (parseFloat(d.paid_amount || 0));
          return html`
            <div class="list-item" key=${d.id} onClick=${() => setActiveDoc(d)}>
              <div class="list-item-row">
                <div class="list-item-main">
                  <div class="list-item-title">${d.mcp_logistics_vendors?.name || d.vendor_name_raw || '?'}</div>
                  <div class="list-item-sub">
                    <span class="badge teal">${docTypeLabels[d.doc_type] || d.doc_type}</span>
                    ${d.doc_number ? ' · ' + d.doc_number : ''}
                    ${d.doc_date ? ' · ' + d.doc_date : ''}
                    ${d.due_date && ['pending','approved','partial'].includes(d.status) ? ' · ' + (overdue ? '⚠️ ' : '') + 'due ' + d.due_date : ''}
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
                  ${d.total_value && html`<span style="font-size:13px;font-weight:600">₹${fmtNum(d.total_value)}</span>`}
                  <span class=${'badge ' + (d.status === 'paid' ? 'emerald' : d.status === 'partial' ? 'amber' : overdue ? 'rose' : '')}>${d.status}</span>
                  ${d.status === 'partial' && balance > 0 && html`<span style="font-size:10px;color:var(--rose-500)">₹${fmtNum(balance)} bal</span>`}
                </div>
              </div>
            </div>
          `;
        })
      }
    `}

    ${view === 'vendors' && html`
      <div class="section-h">Vendors · ${vendors.length}<button class="btn small ghost" onClick=${() => setActiveVendor({_new:true})}>+ Add</button></div>
      ${vendors.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">🏢</div>No vendors yet. They auto-create when documents are extracted.</div></div>` :
        vendors.map(v => {
          const vDocs = docs.filter(d => d.vendor_id === v.id);
          const payable = vDocs.filter(d => ['invoice_in','bill'].includes(d.doc_type) && ['pending','approved','partial'].includes(d.status))
            .reduce((sum, d) => sum + (parseFloat(d.total_value || 0) - parseFloat(d.paid_amount || 0)), 0);
          const atVendor = jobworkStock.filter(s => s.vendor_id === v.id);
          return html`
            <div class="list-item" key=${v.id} onClick=${() => setActiveVendor(v)}>
              <div class="list-item-row">
                <div class="list-item-main">
                  <div class="list-item-title">${v.name}</div>
                  <div class="list-item-sub">
                    ${v.gstin ? v.gstin + ' · ' : ''}${v.city || ''}
                    ${v.is_jobwork_vendor ? ' · 🔧 Job-work' : ''}
                    · ${vDocs.length} doc${vDocs.length !== 1 ? 's' : ''}
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
                  ${payable > 0 && html`<span class="badge amber">₹${fmtNum(payable)} due</span>`}
                  ${atVendor.length > 0 && html`<span style="font-size:10px;color:var(--slate-500)">${atVendor.length} JW pending</span>`}
                </div>
              </div>
            </div>
          `;
        })
      }
    `}

    ${view === 'jobwork' && html`
      <div class="section-h">Job-work pending at vendors · ${jobworkStock.length}</div>
      ${jobworkStock.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">🔧</div>No pending job-work. As you send DC out and receive DC in, this view shows what's still at each vendor.</div></div>` :
        Object.entries(jobworkStock.reduce((acc, s) => {
          if (!acc[s.vendor_name]) acc[s.vendor_name] = [];
          acc[s.vendor_name].push(s);
          return acc;
        }, {})).map(([vname, list]) => html`
          <details key=${vname} open style="margin-bottom:8px">
            <summary style="cursor:pointer;padding:10px 12px;background:var(--slate-100);border-radius:10px;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center">
              <span>🏢 ${vname}</span>
              <span style="background:var(--amber-500);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px">${list.length}</span>
            </summary>
            <div style="margin-top:6px">
              ${list.map(s => html`
                <div class="list-item" key=${s.vendor_id + s.item_name}>
                  <div class="list-item-row">
                    <div class="list-item-main">
                      <div class="list-item-title">${s.item_name}</div>
                      <div class="list-item-sub">
                        ${s.process ? s.process + ' · ' : ''}
                        Sent ${fmtNum(s.total_sent)} ${s.uom || ''} · Received back ${fmtNum(s.total_received)}
                      </div>
                    </div>
                    <span class="badge amber">${fmtNum(s.pending_at_vendor)} ${s.uom || ''}</span>
                  </div>
                </div>
              `)}
            </div>
          </details>
        `)
      }
    `}
  `;
}

// ============= DOCUMENT DETAIL =============
function DocumentDetail({ plant, me, doc: initialDoc, vendors, onClose }) {
  const isNew = initialDoc?._new;
  const [doc, setDoc] = useState(isNew ? null : initialDoc);
  const [payments, setPayments] = useState([]);
  const [paymentModal, setPaymentModal] = useState(false);
  const [grnModal, setGrnModal] = useState(false);
  const [grnReception, setGrnReception] = useState(null);
  const [editing, setEditing] = useState(isNew);

  const refresh = useCallback(async () => {
    if (isNew || !doc?.id) return;
    const [d, p, g] = await Promise.all([
      sb.from('mcp_logistics_documents').select('*, mcp_logistics_vendors(name, gstin)').eq('id', doc.id).maybeSingle(),
      sb.from('mcp_logistics_payments').select('*, users:recorded_by(full_name)').eq('doc_id', doc.id).order('payment_date', { ascending: false }),
      sb.from('mcp_logistics_grn_receptions').select('*, users:received_by(full_name), mcp_quality_ncrs(ncr_number), actions(title, status)').eq('doc_id', doc.id).maybeSingle(),
    ]);
    if (d.data) setDoc(d.data);
    setPayments(p.data || []);
    setGrnReception(g.data);
  }, [doc?.id, isNew]);

  useEffect(() => { refresh(); }, [refresh]);

  if (isNew && editing) {
    return html`<${DocumentEditModal} plant=${plant} me=${me} doc=${null} vendors=${vendors} onClose=${onClose} onSaved=${(d) => { setDoc(d); setEditing(false); }} />`;
  }
  if (!doc) return html`<div class="loader"><div class="spinner"></div></div>`;

  if (editing) {
    return html`<${DocumentEditModal} plant=${plant} me=${me} doc=${doc} vendors=${vendors} onClose=${() => setEditing(false)} onSaved=${(d) => { setDoc(d); setEditing(false); refresh(); }} />`;
  }

  const balance = (parseFloat(doc.total_value || 0)) - (parseFloat(doc.paid_amount || 0));
  const overdue = doc.due_date && new Date(doc.due_date) < new Date() && ['pending','approved','partial'].includes(doc.status);
  const items = Array.isArray(doc.items) ? doc.items : [];

  return html`
    <div class="page-header" style="display:flex;align-items:center;gap:10px">
      <button class="btn ghost small" style="padding:6px 10px" onClick=${onClose}>← Back</button>
      <div style="flex:1"><h1 style="font-size:18px">${doc.mcp_logistics_vendors?.name || doc.vendor_name_raw || 'Document'}</h1>
        <div class="sub">${doc.doc_type?.replace('_',' ')} · ${doc.doc_number || ''}</div>
      </div>
      <button class="btn small ghost" onClick=${() => setEditing(true)}>Edit</button>
    </div>

    ${doc.source_image_url && html`
      <div class="card" style="padding:0;overflow:hidden;margin-bottom:14px">
        <a href=${doc.source_image_url} target="_blank" rel="noopener" style="display:block">
          <img src=${doc.source_image_url} style="width:100%;display:block;max-height:400px;object-fit:contain;background:var(--slate-100)" />
        </a>
        <div style="padding:8px 12px;background:var(--slate-50);font-size:11px;color:var(--slate-500)">📎 Original document image · tap to enlarge</div>
      </div>
    `}

    <div class="card">
      <div class="card-row"><span class="label">Type</span><span class="value"><span class="badge teal">${doc.doc_type?.replace('_',' ')}</span></span></div>
      <div class="card-row"><span class="label">Status</span><span class="value"><span class=${'badge ' + (doc.status === 'paid' ? 'emerald' : doc.status === 'partial' ? 'amber' : overdue ? 'rose' : '')}>${doc.status}</span></span></div>
      <div class="card-row"><span class="label">Vendor</span><span class="value">${doc.mcp_logistics_vendors?.name || doc.vendor_name_raw || '?'}</span></div>
      ${doc.vendor_gstin_raw && html`<div class="card-row"><span class="label">GSTIN</span><span class="value mono">${doc.vendor_gstin_raw}</span></div>`}
      <div class="card-row"><span class="label">Doc #</span><span class="value mono">${doc.doc_number || '—'}</span></div>
      <div class="card-row"><span class="label">Date</span><span class="value">${doc.doc_date || '—'}</span></div>
      ${doc.due_date && html`<div class="card-row"><span class="label">Due</span><span class="value" style=${overdue ? 'color:var(--rose-500)' : ''}>${overdue ? '⚠️ ' : ''}${doc.due_date}</span></div>`}
    </div>

    <div class="card" style="margin-top:14px">
      <div class="card-title">Amounts</div>
      ${doc.taxable_value && html`<div class="card-row"><span class="label">Taxable</span><span class="value">₹${fmtNum(doc.taxable_value)}</span></div>`}
      ${doc.tax_amount && html`<div class="card-row"><span class="label">Tax</span><span class="value">₹${fmtNum(doc.tax_amount)}</span></div>`}
      <div class="card-row"><span class="label" style="font-weight:700">Total</span><span class="value" style="font-weight:700;font-size:16px">₹${fmtNum(doc.total_value || 0)}</span></div>
      ${doc.paid_amount > 0 && html`
        <div class="card-row"><span class="label">Paid</span><span class="value" style="color:var(--emerald-600)">₹${fmtNum(doc.paid_amount)}</span></div>
        <div class="card-row"><span class="label">Balance</span><span class="value" style="color:${balance > 0 ? 'var(--rose-500)' : 'var(--emerald-600)'};font-weight:700">₹${fmtNum(balance)}</span></div>
      `}
    </div>

    ${doc.validation_note && html`
      <div class="alert info" style="margin-top:14px"><strong>AI Note:</strong> ${doc.validation_note}</div>
    `}

    ${['invoice_in','dc_in','job_work_dc_in','bill'].includes(doc.doc_type) && html`
      <div class="section-h">Inward / Stock</div>
      ${grnReception ? html`
        <div class="card" style="background:var(--emerald-50);border-color:var(--emerald-200)">
          <div style="font-weight:700;color:var(--emerald-700);margin-bottom:8px">✅ Stock received</div>
          <div class="card-row" style="border:none;padding:4px 0"><span class="label">Received by</span><span class="value">${grnReception.users?.full_name || '?'}</span></div>
          <div class="card-row" style="border:none;padding:4px 0"><span class="label">When</span><span class="value">${fmtDate(grnReception.received_at)}</span></div>
          ${grnReception.shortage_detected && html`
            <div class="card-row" style="border:none;padding:4px 0"><span class="label">Shortage</span><span class="value" style="color:var(--rose-500);font-weight:700">⚠️ ${grnReception.shortage_pct?.toFixed(1)}%</span></div>
            ${grnReception.mcp_quality_ncrs && html`<div class="card-row" style="border:none;padding:4px 0"><span class="label">NCR</span><span class="value mono">${grnReception.mcp_quality_ncrs.ncr_number}</span></div>`}
            ${grnReception.actions && html`<div class="card-row" style="border:none;padding:4px 0"><span class="label">Follow-up</span><span class="value">${grnReception.actions.status} · ${grnReception.actions.title}</span></div>`}
          `}
        </div>
      ` : items.length > 0 ? html`
        <div class="card" style="background:var(--teal-50);border-color:var(--teal-200)">
          <div style="font-weight:700;color:var(--teal-700);margin-bottom:6px">📦 Ready to receive into stock</div>
          <div style="font-size:13px;color:var(--slate-700);margin-bottom:10px">${items.length} item line${items.length > 1 ? 's' : ''} extracted. Confirm physical receipt and add to stock.</div>
          <button class="btn" onClick=${() => setGrnModal(true)}>📥 Receive into stock</button>
        </div>
      ` : html`
        <div class="empty"><div style="font-size:13px">No items extracted from invoice yet. Edit document to add items manually before receiving.</div></div>
      `}
    `}

    ${items.length > 0 && html`
      <div class="section-h">Items · ${items.length}</div>
      ${items.map((it, i) => html`
        <div class="list-item" key=${i}>
          <div class="list-item-row">
            <div class="list-item-main">
              <div class="list-item-title">${it.name || it.item_name || '?'}</div>
              <div class="list-item-sub">${it.qty || 0} ${it.uom || 'nos'} × ₹${fmtNum(it.rate || 0)} ${it.hsn ? '· HSN ' + it.hsn : ''} ${it.process ? '· ' + it.process : ''}</div>
            </div>
            ${it.amount && html`<span style="font-size:13px;font-weight:600">₹${fmtNum(it.amount)}</span>`}
          </div>
        </div>
      `)}
    `}

    ${['invoice_in','bill','invoice_out'].includes(doc.doc_type) && html`
      <div class="section-h">Payments · ${payments.length}<button class="btn small ghost" onClick=${() => setPaymentModal(true)} disabled=${doc.status === 'paid'}>+ Record</button></div>
      ${payments.length === 0 ? html`<div class="empty"><div style="font-size:13px">No payments yet</div></div>` :
        payments.map(p => html`
          <div class="list-item" key=${p.id}>
            <div class="list-item-row">
              <div class="list-item-main">
                <div class="list-item-title">₹${fmtNum(p.amount)} · ${p.payment_mode}</div>
                <div class="list-item-sub">${p.payment_date} ${p.reference ? '· ' + p.reference : ''} ${p.bank_name ? '· ' + p.bank_name : ''} ${p.users?.full_name ? '· ' + p.users.full_name : ''}</div>
              </div>
              ${(me.role === 'plant_head' || me.role === 'admin' || p.recorded_by === me.id) && html`
                <button class="btn small danger" onClick=${async () => { if (confirm('Delete this payment?')) { await sb.from('mcp_logistics_payments').delete().eq('id', p.id); refresh(); } }}>×</button>
              `}
            </div>
          </div>
        `)
      }
    `}

    ${paymentModal && html`<${PaymentModal} plant=${plant} me=${me} doc=${doc} balance=${balance} onClose=${() => setPaymentModal(false)} onSaved=${() => { setPaymentModal(false); refresh(); }} />`}
    ${grnModal && html`<${GrnReceptionModal} plant=${plant} me=${me} doc=${doc} onClose=${() => setGrnModal(false)} onSaved=${() => { setGrnModal(false); refresh(); }} />`}
  `;
}

// ============= PAYMENT MODAL =============
function PaymentModal({ plant, me, doc, balance, onClose, onSaved }) {
  const [form, setForm] = useState({
    amount: balance > 0 ? balance : doc.total_value,
    payment_mode: 'upi',
    payment_date: new Date().toISOString().slice(0,10),
    reference: '', bank_name: '', notes: ''
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const { error } = await sb.from('mcp_logistics_payments').insert({
        plant_id: plant.id,
        doc_id: doc.id,
        amount: parseFloat(form.amount),
        payment_mode: form.payment_mode,
        payment_date: form.payment_date,
        reference: form.reference || null,
        bank_name: form.bank_name || null,
        notes: form.notes || null,
        recorded_by: me.id,
      });
      if (error) throw error;
      showToast('Payment recorded · status auto-updated');
      onSaved();
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Record Payment</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>
        <div class="card" style="background:var(--slate-50);margin-bottom:14px">
          <div class="card-row"><span class="label">Total</span><span class="value">₹${fmtNum(doc.total_value || 0)}</span></div>
          <div class="card-row"><span class="label">Already paid</span><span class="value">₹${fmtNum(doc.paid_amount || 0)}</span></div>
          <div class="card-row"><span class="label" style="font-weight:700">Balance</span><span class="value" style="font-weight:700">₹${fmtNum(balance)}</span></div>
        </div>
        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field"><label>Amount * (₹)</label><input type="number" step="0.01" required value=${form.amount} onChange=${e => setForm({...form, amount: e.target.value})} /></div>
          <div class="field-row">
            <div class="field"><label>Mode *</label>
              <select required value=${form.payment_mode} onChange=${e => setForm({...form, payment_mode: e.target.value})}>
                <option value="upi">UPI</option>
                <option value="neft">NEFT</option>
                <option value="rtgs">RTGS</option>
                <option value="imps">IMPS</option>
                <option value="cheque">Cheque</option>
                <option value="cash">Cash</option>
                <option value="card">Card</option>
                <option value="adjustment">Adjustment</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="field"><label>Date *</label><input type="date" required value=${form.payment_date} onChange=${e => setForm({...form, payment_date: e.target.value})} /></div>
          </div>
          <div class="field"><label>Reference / Txn ID</label><input type="text" value=${form.reference} onChange=${e => setForm({...form, reference: e.target.value})} placeholder="UTR / Cheque# / UPI ref" /></div>
          ${['neft','rtgs','imps','cheque'].includes(form.payment_mode) && html`
            <div class="field"><label>Bank</label><input type="text" value=${form.bank_name} onChange=${e => setForm({...form, bank_name: e.target.value})} placeholder="HDFC / ICICI / etc" /></div>
          `}
          <div class="field"><label>Notes</label><textarea rows=${2} value=${form.notes} onChange=${e => setForm({...form, notes: e.target.value})}></textarea></div>

function VendorDetail({ plant, me, vendor: initialVendor, jobworkStock, docs, onClose }) {
  const isNew = initialVendor?._new;

  if (isNew && editing) {
    return html`<${VendorEditModal} plant=${plant} me=${me} vendor=${null} onClose=${onClose} onSaved=${(v) => { setVendor(v); setEditing(false); }} />`;

  if (!vendor) return html`<div class="loader"><div class="spinner"></div></div>`;

    return html`<${VendorEditModal} plant=${plant} me=${me} vendor=${vendor} onClose=${() => setEditing(false)} onSaved=${(v) => { setVendor(v); setEditing(false); }} />`;

    <div class="card">
      ${vendor.gstin && html`<div class="card-row"><span class="label">GSTIN</span><span class="value mono">${vendor.gstin}</span></div>`}
      ${vendor.phone && html`<div class="card-row"><span class="label">Phone</span><span class="value mono">${vendor.phone}</span></div>`}
      ${vendor.city && html`<div class="card-row"><span class="label">Location</span><span class="value">${vendor.city}${vendor.state ? ', ' + vendor.state : ''}</span></div>`}
      <div class="card-row"><span class="label">Payment terms</span><span class="value">${vendor.payment_terms_days || 30} days</span></div>
      <div class="card-row"><span class="label">Outstanding</span><span class="value" style="color:${totalPayable > 0 ? 'var(--rose-500)' : 'var(--emerald-600)'};font-weight:700">₹${fmtNum(totalPayable)}</span></div>
    </div>

    ${jobworkStock.length > 0 && html`

        <div class="list-item" key=${s.item_name}>
          <div class="list-item-row">
            <div class="list-item-main">
              <div class="list-item-title">${s.item_name}</div>
              <div class="list-item-sub">${s.process || ''} · Sent ${fmtNum(s.total_sent)} · Got back ${fmtNum(s.total_received)}</div>
            </div>
            <span class="badge amber">${fmtNum(s.pending_at_vendor)} ${s.uom || ''}</span>
          </div>
        </div>
      `)}
    `}

    <div class="section-h">Documents · ${docs.length}</div>
    ${docs.length === 0 ? html`<div class="empty"><div style="font-size:13px">No documents yet for this vendor</div></div>` :
      docs.slice(0, 50).map(d => html`

            <div class="list-item-main">

// ============= STAGE LOG (per-stage daily log with reconciliation) =============
function StageLog({ plant, me, parts, machines, dies, units, shifts, users }) {
  const STAGES = ['pdc','trimming','cnc','vmc','lathe','press','drilling','tapping','deflashing','shot_blast','plating','painting','heat_treat','inspection','packing','dispatch','outsource','other'];
  const [logs, setLogs] = useState([]);
  const [summary, setSummary] = useState([]);
  const [filterDate, setFilterDate] = useState(new Date().toISOString().slice(0,10));
  const [filterPart, setFilterPart] = useState('all');
  const [filterStatus, setFilterStatus] = useState('all');
  const [logTarget, setLogTarget] = useState(null);
  const [overrideTarget, setOverrideTarget] = useState(null);
  const [loading, setLoading] = useState(true);

  const refresh = useCallback(async () => {
    setLoading(true);
    let q = sb.from('mcp_pdc_stage_log')
      .select('*, mcp_pdc_parts(part_number, name), shifts(name), units(name), users:operator_user_id(full_name), entered:entered_by(full_name)')
      .eq('log_date', filterDate)
      .order('part_id').order('stage');
    if (filterPart !== 'all') q = q.eq('part_id', filterPart);
    if (filterStatus !== 'all') q = q.eq('status', filterStatus);
    const { data: s } = await sb.from('v_daily_production_summary').select('*').eq('log_date', filterDate);
    const { data } = await q;
    setLogs(data || []);
    setSummary(s || []);
    setLoading(false);
  }, [filterDate, filterPart, filterStatus]);

  useEffect(() => { refresh(); }, [refresh]);

  // Live updates
  useEffect(() => {
    if (!plant?.id) return;
    const channel = sb.channel('stagelog-' + plant.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'mcp_pdc_stage_log', filter:'plant_id=eq.' + plant.id }, () => refresh())
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [plant?.id, refresh]);

  // Group logs by part for display
  const byPart = {};
  for (const l of logs) {
    const key = l.part_id;
    if (!byPart[key]) byPart[key] = { part: l.mcp_pdc_parts, stages: {} };
    if (!byPart[key].stages[l.stage]) byPart[key].stages[l.stage] = [];
    byPart[key].stages[l.stage].push(l);
  }

  const totals = summary.reduce((acc, s) => {
    acc.good += parseFloat(s.total_good || 0);
    acc.rejected += parseFloat(s.total_rejected || 0);
    acc.pending += parseInt(s.pending_count || 0);
    acc.anomaly += parseInt(s.anomaly_count || 0);
    return acc;
  }, { good:0, rejected:0, pending:0, anomaly:0 });

  return html`
    <div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat teal"><div class="stat-num">${fmtNum(totals.good)}</div><div class="stat-label">Good</div></div>
      <div class="stat amber"><div class="stat-num">${fmtNum(totals.rejected)}</div><div class="stat-label">Reject</div></div>
      <div class="stat ${totals.pending > 0 ? 'amber' : 'teal'}"><div class="stat-num">${totals.pending}</div><div class="stat-label">Pending</div></div>
      <div class="stat ${totals.anomaly > 0 ? 'rose' : 'teal'}"><div class="stat-num">${totals.anomaly}</div><div class="stat-label">Anomaly</div></div>
    </div>

    <div class="card" style="margin-bottom:10px">
      <div class="field-row">
        <div class="field"><label>Date</label><input type="date" value=${filterDate} onChange=${e => setFilterDate(e.target.value)} /></div>
        <div class="field"><label>Part</label>
          <select value=${filterPart} onChange=${e => setFilterPart(e.target.value)}>
            <option value="all">All parts</option>
            ${parts.map(p => html`<option key=${p.id} value=${p.id}>${p.part_number} · ${p.name}</option>`)}
          </select>
        </div>
      </div>
      <div class="field"><label>Status</label>
        <select value=${filterStatus} onChange=${e => setFilterStatus(e.target.value)}>
          <option value="all">All</option>
          <option value="filled">Filled</option>
          <option value="pending">Pending</option>
          <option value="anomaly">Anomaly (overdue)</option>
          <option value="locked">Locked (>48h)</option>
          <option value="overridden">Overridden</option>
        </select>
      </div>
    </div>

    <div class="section-h">Stage Log · ${filterDate}<button class="btn small" onClick=${() => setLogTarget({})} disabled=${parts.length === 0}>+ Log entry</button></div>

    ${loading ? html`<div class="loader"><div class="spinner"></div></div>` :
      logs.length === 0 ? html`<div class="card"><div class="empty"><div class="icon">📋</div>No entries for this date. Tap "+ Log entry" to record production.${parts.length === 0 ? ' Add a part first.' : ''}</div></div>` :
      Object.entries(byPart).map(([partId, info]) => html`
        <details key=${partId} open style="margin-bottom:8px">
          <summary style="cursor:pointer;padding:10px 12px;background:var(--slate-100);border-radius:10px;font-weight:600;font-size:14px">
            🔩 ${info.part?.part_number} · ${info.part?.name}
          </summary>
          <div style="margin-top:6px">
            ${Object.entries(info.stages).sort(([a],[b]) => STAGES.indexOf(a) - STAGES.indexOf(b)).map(([stage, entries]) => html`
              ${entries.map(l => {
                const isPending = l.status === 'pending';
                const isAnomaly = l.status === 'anomaly';
                const isLocked = l.status === 'locked';
                const isOverridden = l.status === 'overridden';
                const total = parseFloat(l.qty_good || 0) + parseFloat(l.qty_rejected || 0);
                return html`
                  <div class="list-item" key=${l.id} onClick=${() => isLocked ? setOverrideTarget(l) : setLogTarget(l)}>
                    <div class="list-item-row">
                      <div class="list-item-main">
                        <div class="list-item-title">
                          <span class="badge teal" style="margin-right:6px">${stage.toUpperCase()}</span>
                          ${l.shifts?.name || '?'}${l.units?.name ? ' · ' + l.units.name : ''}
                        </div>
                        <div class="list-item-sub">
                          ${isPending ? '⏰ Pending — downstream logged ' + (l.triggered_by_stage || '?') :
                            isAnomaly ? '🚨 ANOMALY · entry overdue >48h' :
                            isLocked ? '🔒 Locked · plant head can override' :
                            isOverridden ? '🔓 Overridden by plant head' :
                            (l.users?.full_name || l.entered?.full_name || '?') + (total > 0 ? ' · ' + fmtNum(total) + ' pcs' : '')}
                        </div>
                      </div>
                      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
                        ${isPending || isAnomaly ? html`<button class="btn small" onClick=${(e) => { e.stopPropagation(); setLogTarget(l); }}>Log now</button>` :
                          html`<span class="badge ${isAnomaly ? 'rose' : isLocked ? '' : isPending ? 'amber' : 'emerald'}">${fmtNum(l.qty_good || 0)}${l.qty_rejected > 0 ? ' / ' + l.qty_rejected : ''}</span>`}
                      </div>
                    </div>
                  </div>
                `;
              })}
            `)}
          </div>
        </details>
      `)
    }

    ${logTarget && html`<${StageLogModal} plant=${plant} me=${me} pendingEntry=${logTarget.id ? logTarget : null} parts=${parts} machines=${machines} dies=${dies} units=${units} shifts=${shifts} users=${users} defaultDate=${filterDate} onClose=${() => setLogTarget(null)} onSaved=${() => { setLogTarget(null); refresh(); }} />`}
    ${overrideTarget && html`<${StageOverrideModal} plant=${plant} me=${me} entry=${overrideTarget} onClose=${() => setOverrideTarget(null)} onSaved=${() => { setOverrideTarget(null); refresh(); }} />`}
  `;
}

    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>

        ${error && html`<div class="alert error">${error}</div>`}
        <form onSubmit=${submit}>
          <div class="field-row">
            <div class="field"><label>Date *</label><input type="date" required value=${form.log_date} disabled=${isReconcile} onChange=${e => setForm({...form, log_date: e.target.value})} /></div>
            <div class="field"><label>Shift *</label>
              <select required value=${form.shift_id} disabled=${isReconcile} onChange=${e => setForm({...form, shift_id: e.target.value})}>

            </div>
          </div>
          <div class="field"><label>Part *</label>
            <select required value=${form.part_id} disabled=${isReconcile} onChange=${e => setForm({...form, part_id: e.target.value})}>
              ${parts.map(p => html`<option key=${p.id} value=${p.id}>${p.part_number} · ${p.name}</option>`)}

          </div>
          <div class="field"><label>Stage *</label>
            <select required value=${form.stage} disabled=${isReconcile} onChange=${e => setForm({...form, stage: e.target.value})}>
              ${STAGE_OPTIONS.map(s => html`<option key=${s.v} value=${s.v}>${s.l}</option>`)}
            </select>
          </div>
          <div class="field"><label>Unit</label>
            <select value=${form.unit_id} onChange=${e => setForm({...form, unit_id: e.target.value})}>
              <option value="">— None —</option>
              ${units.map(u => html`<option key=${u.id} value=${u.id}>${u.name}</option>`)}
            </select>
          </div>
          ${form.stage === 'pdc' && html`
            <div class="field-row">
              <div class="field"><label>Machine</label>
                <select value=${form.machine_id} onChange=${e => setForm({...form, machine_id: e.target.value})}>
                  <option value="">— None —</option>
                  ${machines.map(m => html`<option key=${m.id} value=${m.id}>${m.code}</option>`)}

              </div>
              <div class="field"><label>Die</label>

          <div class="field"><label>Operator</label>
            <select value=${form.operator_user_id} onChange=${e => setForm({...form, operator_user_id: e.target.value})}>
              ${users.map(u => html`<option key=${u.id} value=${u.id}>${u.full_name}</option>`)}

          <div class="field-row">
            <div class="field"><label>Good * (qty)</label><input type="number" required min=${0} step="0.01" value=${form.qty_good} onChange=${e => setForm({...form, qty_good: e.target.value})} /></div>
            <div class="field"><label>Rejected</label><input type="number" min=${0} step="0.01" value=${form.qty_rejected} onChange=${e => setForm({...form, qty_rejected: e.target.value})} /></div>
          </div>
          ${parseFloat(form.qty_rejected) > 0 && html`
            <div class="field"><label>Reject reason</label>
              <select value=${form.reject_reason} onChange=${e => setForm({...form, reject_reason: e.target.value})}>
                <option value="">— Select —</option>

          <div class="field"><label>Notes</label><textarea rows=${2} value=${form.notes} onChange=${e => setForm({...form, notes: e.target.value})}></textarea></div>
          <button class="btn" disabled=${loading}>${loading ? 'Saving…' : (isReconcile ? 'Reconcile entry' : 'Log entry')}</button>
        </form>

    </div>
  `;
}

// ============= GRN RECEPTION MODAL — verify mappings, edit qty, accept into stock =============
function GrnReceptionModal({ plant, me, doc, onClose, onSaved }) {
  const [lines, setLines] = useState([]);
  const [stockItems, setStockItems] = useState([]);
  const [notes, setNotes] = useState('');
  const [loading, setLoading] = useState(true);
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');
  const [createItemModal, setCreateItemModal] = useState(null); // line index when creating new item

  // Load suggested mappings + all stock items
  useEffect(() => { load(); }, []);

  const load = async () => {
    setLoading(true);
    const [s, m] = await Promise.all([
      sb.rpc('suggest_grn_mappings', { p_doc_id: doc.id }),
      sb.from('mcp_stocks_items').select('*').order('name'),
    ]);
    if (s.error) { setError(s.error.message); setLoading(false); return; }
    const suggestions = s.data?.lines || [];
    setStockItems(m.data || []);
    setLines(suggestions.map(line => ({
      ...line,
      // mutable fields
      received_qty: line.invoice_qty,
      rejected_qty: 0,
      reject_reason: '',
      stock_item_id: line.matched_stock_id,
      notes: '',
    })));
    setLoading(false);
  };

  const updateLine = (idx, patch) => {
    setLines(prev => prev.map((l, i) => i === idx ? {...l, ...patch} : l));
  };

  const onCreateNewItem = (idx, newItem) => {
    setStockItems(prev => [...prev, newItem]);
    updateLine(idx, {
      stock_item_id: newItem.id,
      matched_stock_code: newItem.code,
      matched_stock_name: newItem.name,
      matched_stock_uom: newItem.uom,
      match_source: 'created',
      match_confidence: 'high',
    });
    setCreateItemModal(null);
  };

  const allMapped = lines.every(l => !!l.stock_item_id);
  const totalInvoice = lines.reduce((s, l) => s + parseFloat(l.invoice_qty || 0), 0);
  const totalReceived = lines.reduce((s, l) => s + parseFloat(l.received_qty || 0), 0);
  const shortagePct = totalInvoice > 0 ? ((totalInvoice - totalReceived) / totalInvoice) * 100 : 0;
  const willRaiseNcr = shortagePct > 5;

  const submit = async () => {
    setError(''); setSubmitting(true);
    try {
      // Validate
      for (let i = 0; i < lines.length; i++) {
        const l = lines[i];
        if (!l.stock_item_id) {
          throw new Error('Line ' + (i+1) + ' has no stock item mapped');
        }
        if (parseFloat(l.received_qty || 0) < 0) {
          throw new Error('Line ' + (i+1) + ': received qty cannot be negative');
        }
      }

      const payload = lines.map(l => ({
        stock_item_id: l.stock_item_id,
        vendor_item_name: l.invoice_name,
        invoice_qty: parseFloat(l.invoice_qty || 0),
        received_qty: parseFloat(l.received_qty || 0),
        rejected_qty: parseFloat(l.rejected_qty || 0),
        rate: parseFloat(l.invoice_rate || 0),
        uom: l.invoice_uom || l.matched_stock_uom || 'nos',
        reject_reason: l.reject_reason || null,
        notes: l.notes || null,
      }));

      const { data, error } = await sb.rpc('accept_grn_reception', {
        p_doc_id: doc.id,
        p_lines: payload,
        p_notes: notes || null,
      });
      if (error) throw error;
      if (!data?.success) throw new Error(data?.error || 'Failed');

      const msg = data.shortage_detected
        ? '✅ Stock added · ⚠️ Shortage NCR ' + data.ncr_number + ' raised + follow-up task created'
        : '✅ ' + data.lines_processed + ' line(s) added to stock';
      showToast(msg);
      onSaved();
    } catch (err) { setError(err.message); } finally { setSubmitting(false); }
  };

  if (loading) return html`
    <div class="modal-backdrop active"><div class="modal"><div class="loader"><div class="spinner"></div></div></div></div>
  `;

  return html`
    <div class="modal-backdrop active" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="modal" style="max-width:720px">
        <div class="modal-header">
          <div class="modal-title">📥 Receive into Stock</div>
          <button class="close-btn" onClick=${onClose}>×</button>
        </div>

        <div class="card" style="background:var(--slate-50);margin-bottom:14px">
          <div class="card-row"><span class="label">Vendor</span><span class="value">${doc.vendor_name_raw || '?'}</span></div>
          <div class="card-row"><span class="label">Invoice #</span><span class="value mono">${doc.doc_number || '—'}</span></div>
          <div class="card-row"><span class="label">Date</span><span class="value">${doc.doc_date || '—'}</span></div>
          <div class="card-row"><span class="label">Amount</span><span class="value">₹${fmtNum(doc.total_value || 0)}</span></div>
        </div>

        ${error && html`<div class="alert error">${error}</div>`}

        ${shortagePct > 5 && html`
          <div class="alert info" style="background:var(--amber-50);border-color:var(--amber-200);color:var(--amber-700)">
            ⚠️ Shortage detected: ${shortagePct.toFixed(1)}%. NCR + vendor follow-up task will be auto-raised on accept.
          </div>
        `}

        <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--slate-700)">Items to receive (${lines.length})</div>

        ${lines.map((line, idx) => html`
          <div key=${idx} class="card" style="margin-bottom:10px;padding:12px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px">
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:600;line-height:1.3">${line.invoice_name || '(no name)'}</div>
                <div style="font-size:11px;color:var(--slate-500);margin-top:2px">Invoice: ${fmtNum(line.invoice_qty)} ${line.invoice_uom} × ₹${fmtNum(line.invoice_rate)}${line.invoice_hsn ? ' · HSN ' + line.invoice_hsn : ''}</div>
              </div>
              ${line.match_confidence === 'high' && html`<span class="badge emerald" style="flex-shrink:0;font-size:10px">${line.match_source === 'memory' ? '🧠 Remembered' : line.match_source === 'created' ? '🆕 Created' : '✓ Match'}</span>`}
              ${line.match_confidence === 'low' && html`<span class="badge amber" style="flex-shrink:0;font-size:10px">~ Fuzzy</span>`}
              ${line.match_confidence === 'none' && html`<span class="badge rose" style="flex-shrink:0;font-size:10px">No match</span>`}
            </div>

            <div class="field" style="margin-bottom:8px">
              <label style="font-size:11px">Map to stock item *</label>
              <div style="display:flex;gap:6px">
                <select required value=${line.stock_item_id || ''} onChange=${e => {
                  const it = stockItems.find(s => s.id === e.target.value);
                  updateLine(idx, {
                    stock_item_id: e.target.value || null,
                    matched_stock_code: it?.code,
                    matched_stock_name: it?.name,
                    matched_stock_uom: it?.uom,
                    match_source: 'manual',
                    match_confidence: e.target.value ? 'high' : 'none',
                  });
                }} style="flex:1">
                  <option value="">— Pick stock item —</option>
                  ${stockItems.map(s => html`<option key=${s.id} value=${s.id}>${s.code} · ${s.name} (${s.uom})</option>`)}
                </select>
                <button type="button" class="btn small ghost" onClick=${() => setCreateItemModal(idx)} style="flex-shrink:0">+ New</button>
              </div>
              ${line.stock_item_id && html`<div style="font-size:11px;color:var(--slate-500);margin-top:4px">Current stock: ${fmtNum(line.matched_current_qty || stockItems.find(s => s.id === line.stock_item_id)?.current_qty || 0)} ${stockItems.find(s => s.id === line.stock_item_id)?.uom}</div>`}
            </div>

            <div class="field-row" style="margin-bottom:8px">
              <div class="field">
                <label style="font-size:11px">Received qty *</label>
                <input type="number" step="0.001" min=${0} required value=${line.received_qty} onChange=${e => updateLine(idx, { received_qty: e.target.value })} style=${parseFloat(line.received_qty) < parseFloat(line.invoice_qty) ? 'border-color:var(--amber-400)' : ''} />
                ${parseFloat(line.received_qty) < parseFloat(line.invoice_qty) && html`<div style="font-size:10px;color:var(--amber-600);margin-top:2px">⚠️ Short by ${fmtNum(line.invoice_qty - line.received_qty)}</div>`}
              </div>
              <div class="field">
                <label style="font-size:11px">Rejected (damage)</label>
                <input type="number" step="0.001" min=${0} value=${line.rejected_qty} onChange=${e => updateLine(idx, { rejected_qty: e.target.value })} />
              </div>
            </div>

            ${parseFloat(line.rejected_qty) > 0 && html`
              <div class="field" style="margin-bottom:8px">
                <label style="font-size:11px">Reject reason</label>
                <input type="text" value=${line.reject_reason} onChange=${e => updateLine(idx, { reject_reason: e.target.value })} placeholder="Damaged in transit / wrong size / etc" />
              </div>
            `}

            <div class="field" style="margin-bottom:0">
              <label style="font-size:11px">Notes</label>
              <input type="text" value=${line.notes} onChange=${e => updateLine(idx, { notes: e.target.value })} placeholder="Optional" />
            </div>
          </div>
        `)}

        <div class="field" style="margin-top:14px">
          <label>Overall notes</label>
          <textarea rows=${2} value=${notes} onChange=${e => setNotes(e.target.value)} placeholder="Receipt remarks, signing person, etc"></textarea>
        </div>

        <div class="card" style="background:var(--slate-50);margin:14px 0">
          <div class="card-row" style="border:none;padding:4px 0"><span class="label">Total invoice qty</span><span class="value">${fmtNum(totalInvoice)}</span></div>
          <div class="card-row" style="border:none;padding:4px 0"><span class="label">Total received</span><span class="value" style=${shortagePct > 0 ? 'color:var(--amber-600)' : 'color:var(--emerald-600)'}>${fmtNum(totalReceived)}</span></div>
          ${shortagePct > 0 && html`<div class="card-row" style="border:none;padding:4px 0"><span class="label">Shortage</span><span class="value" style="color:${shortagePct > 5 ? 'var(--rose-500)' : 'var(--amber-600)'};font-weight:700">${shortagePct.toFixed(1)}%</span></div>`}
        </div>

        <button class="btn" onClick=${submit} disabled=${submitting || !allMapped} style="font-size:15px;padding:14px">
          ${submitting ? 'Adding to stock…' : !allMapped ? 'Map all items first' : '✅ Accept & add to stock'}
        </button>
        <button class="btn ghost" style="margin-top:8px;width:100%" onClick=${onClose}>Cancel</button>

        ${createItemModal !== null && html`<${QuickItemCreateModal} plant=${plant} prefillName=${lines[createItemModal].invoice_name} prefillUom=${lines[createItemModal].invoice_uom} onClose=${() => setCreateItemModal(null)} onSaved=${(item) => onCreateNewItem(createItemModal, item)} />`}
      </div>
    </div>
  `;
}

  root.render(h(App));
} catch (err) {
  document.getElementById('root').innerHTML = '<div style="padding:40px;font-family:monospace;color:#be123c;background:#fff1f2;margin:20px;border-radius:12px;border:1px solid #fecdd3;"><h2 style="margin-bottom:12px;font-family:sans-serif;">Loglinkr crashed during render</h2><pre style="white-space:pre-wrap;font-size:12px;">' + (err.stack || err.message || err) + '</pre></div>';
  console.error('Loglinkr render error:', err);
}

// Global error handler to surface async errors
window.addEventListener('error', (e) => {
  console.error('Window error:', e.error);
});
window.addEventListener('unhandledrejection', (e) => {
  console.error('Unhandled rejection:', e.reason);
});
</script>
