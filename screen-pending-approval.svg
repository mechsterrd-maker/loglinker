<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1700" viewBox="0 0 900 1700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="waBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#25d366"/>
      <stop offset="100%" stop-color="#1ea958"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="btnShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#25d366" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="1700" fill="url(#bg)"/>

  <!-- Browser chrome (simulated) -->
  <rect x="0" y="0" width="900" height="60" fill="#1f2937"/>
  <circle cx="24" cy="30" r="6" fill="#ef4444"/>
  <circle cx="46" cy="30" r="6" fill="#f59e0b"/>
  <circle cx="68" cy="30" r="6" fill="#10b981"/>
  <rect x="120" y="14" width="660" height="32" rx="16" fill="#374151"/>
  <text x="450" y="34" text-anchor="middle" fill="#d1d5db" font-size="14">🔒 loglinkr.com</text>

  <!-- Wizard centered card -->
  <g transform="translate(150, 130)">
    <rect width="600" height="1480" rx="24" fill="white" filter="url(#cardShadow)"/>

    <!-- Logo header -->
    <g transform="translate(40, 60)">
      <rect width="56" height="56" rx="13" fill="#0d9488"/>
      <text x="28" y="42" text-anchor="middle" fill="white" font-size="32" font-weight="900">L</text>
      <text x="80" y="32" fill="#0f172a" font-size="26" font-weight="800">Loglinkr</text>
      <text x="80" y="54" fill="#64748b" font-size="13">Smart ERP for fab plants</text>
    </g>

    <!-- Status emoji + heading -->
    <text x="300" y="220" text-anchor="middle" font-size="56">⏳</text>
    <text x="300" y="290" text-anchor="middle" fill="#0f172a" font-size="28" font-weight="800">Almost there — one approval to go</text>

    <!-- Sub copy -->
    <text x="300" y="334" text-anchor="middle" fill="#475569" font-size="15">
      <tspan font-weight="700">Sri Lakshmi Fabrications</tspan>
      <tspan> is registered and waiting for the</tspan>
    </text>
    <text x="300" y="356" text-anchor="middle" fill="#475569" font-size="15">Loglinkr team to approve.</text>
    <text x="300" y="396" text-anchor="middle" fill="#475569" font-size="14">Pick how you'd like to get in — tap a WhatsApp option and</text>
    <text x="300" y="416" text-anchor="middle" fill="#475569" font-size="14">the founder will activate your plant right away.</text>

    <!-- Primary CTA: 15-day trial -->
    <g transform="translate(40, 460)" filter="url(#btnShadow)">
      <rect width="520" height="64" rx="14" fill="url(#waBtn)"/>
      <text x="120" y="42" font-size="26">💬</text>
      <text x="260" y="40" text-anchor="middle" fill="white" font-size="17" font-weight="800">Start 15-day free trial</text>
      <text x="260" y="58" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="12" font-weight="600">— chat now</text>
    </g>

    <!-- Secondary CTA: Pay & go live -->
    <g transform="translate(40, 548)">
      <rect width="520" height="58" rx="14" fill="white" stroke="#0d9488" stroke-width="2"/>
      <text x="120" y="38" font-size="22">💳</text>
      <text x="270" y="38" text-anchor="middle" fill="#0f766e" font-size="15" font-weight="800">Pay &amp; go live now</text>
    </g>

    <!-- Founder line -->
    <g transform="translate(0, 640)">
      <text x="300" y="0" text-anchor="middle" fill="#94a3b8" font-size="12">Founder ·
        <tspan fill="#0d9488" font-weight="700">+91 95669 79435</tspan>
      </text>
    </g>

    <!-- Divider -->
    <line x1="40" y1="700" x2="560" y2="700" stroke="#e2e8f0"/>

    <!-- Secondary actions -->
    <g transform="translate(40, 730)">
      <rect width="520" height="44" rx="10" fill="white" stroke="#cbd5e1"/>
      <text x="260" y="29" text-anchor="middle" fill="#475569" font-size="14" font-weight="600">↻ Check again</text>
    </g>
    <g transform="translate(40, 790)">
      <rect width="520" height="44" rx="10" fill="white" stroke="#cbd5e1"/>
      <text x="260" y="29" text-anchor="middle" fill="#475569" font-size="14" font-weight="600">Sign out</text>
    </g>

    <!-- WhatsApp preview window -->
    <g transform="translate(40, 880)">
      <rect width="520" height="540" rx="14" fill="#e5ddd5"/>
      <!-- WA top bar -->
      <rect x="0" y="0" width="520" height="58" rx="14" fill="#075e54"/>
      <rect x="0" y="44" width="520" height="14" fill="#075e54"/>
      <circle cx="40" cy="29" r="18" fill="#0d9488"/>
      <text x="40" y="35" text-anchor="middle" fill="white" font-size="14" font-weight="900">L</text>
      <text x="70" y="26" fill="white" font-size="14" font-weight="700">Loglinkr Founder</text>
      <text x="70" y="44" fill="#a7f3d0" font-size="11">+91 95669 79435 · online</text>
      <text x="495" y="35" text-anchor="end" fill="white" font-size="22">⋮</text>

      <!-- Pre-filled chat draft (from customer) -->
      <g transform="translate(20, 80)">
        <text x="0" y="0" fill="#65676b" font-size="10" font-weight="700">TODAY · 2:13 PM</text>
      </g>

      <!-- Customer message bubble (right side) -->
      <g transform="translate(50, 100)">
        <rect width="450" height="280" rx="14" fill="#dcf8c6"/>
        <text x="20" y="32" fill="#111827" font-size="13" font-weight="600">Hi — I want to start the 15-day FREE TRIAL</text>
        <text x="20" y="52" fill="#111827" font-size="13" font-weight="600">for Loglinkr.</text>
        <text x="20" y="92" fill="#374151" font-size="13">Plant: Sri Lakshmi Fabrications</text>
        <text x="20" y="114" fill="#374151" font-size="13">GSTIN: 33AABCS1234E1Z9</text>
        <text x="20" y="136" fill="#374151" font-size="13">City: Hosur</text>
        <text x="20" y="176" fill="#374151" font-size="13">Please activate my plant.</text>
        <text x="430" y="262" text-anchor="end" fill="#65676b" font-size="10">2:13 PM ✓</text>
      </g>

      <!-- Send hint -->
      <g transform="translate(20, 420)">
        <text x="0" y="0" fill="#475569" font-size="11" font-style="italic">↑ Pre-filled. Customer just taps Send.</text>
      </g>

      <!-- Input bar mock -->
      <rect x="0" y="478" width="520" height="62" fill="#f0f0f0"/>
      <rect x="14" y="490" width="440" height="38" rx="19" fill="white"/>
      <text x="32" y="514" fill="#9ca3af" font-size="13">Message</text>
      <circle cx="488" cy="509" r="22" fill="#25d366"/>
      <text x="488" y="516" text-anchor="middle" fill="white" font-size="18">➤</text>
    </g>
  </g>

  <!-- Annotation arrow -->
  <g>
    <text x="60" y="540" fill="#0d9488" font-size="13" font-weight="700">PRIMARY CTA</text>
    <text x="60" y="560" fill="#64748b" font-size="11">Big green WhatsApp button</text>
    <text x="60" y="576" fill="#64748b" font-size="11">opens chat → pre-filled msg</text>
  </g>
  <path d="M 158 568 Q 165 580 188 595" stroke="#0d9488" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="188,595 178,588 184,584" fill="#0d9488"/>
</svg>
