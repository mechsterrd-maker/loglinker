    <g transform="translate(260,0)">
      <rect width="240" height="58" rx="29" fill="url(#pill)" stroke="rgba(255,255,255,0.25)"/>
      <text x="22" y="38" font-size="24">🎙</text>
      <text x="62" y="36" fill="white" font-size="14" font-weight="700">Voice notes + MoM</text>
      <text x="62" y="50" fill="rgba(255,255,255,0.7)" font-size="11">AI summary + action list</text>
    </g>
    <g transform="translate(520,0)">
      <rect width="240" height="58" rx="29" fill="url(#pill)" stroke="rgba(255,255,255,0.25)"/>
      <text x="22" y="38" font-size="24">🏭</text>
      <text x="62" y="36" fill="white" font-size="14" font-weight="700">Vendor history</text>
      <text x="62" y="50" fill="rgba(255,255,255,0.7)" font-size="11">Pricing · OTP · ledger</text>
    </g>
    <g transform="translate(780,0)">
      <rect width="240" height="58" rx="29" fill="url(#pill)" stroke="rgba(255,255,255,0.25)"/>
      <text x="22" y="38" font-size="24">🛡</text>
      <text x="62" y="36" fill="white" font-size="14" font-weight="700">IATF audit ready</text>
      <text x="62" y="50" fill="rgba(255,255,255,0.7)" font-size="11">NCRs · PPAP · LPA</text>
    </g>
