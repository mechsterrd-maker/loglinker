<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <!-- Soft glow for the headline -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
    <!-- Pill background -->
    <linearGradient id="pill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <!-- Phone mock screen -->
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <!-- Chat bubble -->
    <linearGradient id="bubble-out" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <!-- Subtle dot grid texture -->
  <g opacity="0.10" fill="white">
    <circle cx="60" cy="60" r="2"/><circle cx="180" cy="60" r="2"/><circle cx="300" cy="60" r="2"/><circle cx="420" cy="60" r="2"/><circle cx="540" cy="60" r="2"/><circle cx="660" cy="60" r="2"/><circle cx="780" cy="60" r="2"/><circle cx="900" cy="60" r="2"/><circle cx="1020" cy="60" r="2"/><circle cx="1140" cy="60" r="2"/>
    <circle cx="60" cy="180" r="2"/><circle cx="180" cy="180" r="2"/><circle cx="300" cy="180" r="2"/><circle cx="420" cy="180" r="2"/><circle cx="540" cy="180" r="2"/><circle cx="660" cy="180" r="2"/><circle cx="780" cy="180" r="2"/><circle cx="900" cy="180" r="2"/><circle cx="1020" cy="180" r="2"/><circle cx="1140" cy="180" r="2"/>
    <circle cx="60" cy="1080" r="2"/><circle cx="180" cy="1080" r="2"/><circle cx="300" cy="1080" r="2"/><circle cx="420" cy="1080" r="2"/><circle cx="540" cy="1080" r="2"/><circle cx="660" cy="1080" r="2"/><circle cx="780" cy="1080" r="2"/><circle cx="900" cy="1080" r="2"/><circle cx="1020" cy="1080" r="2"/><circle cx="1140" cy="1080" r="2"/>
    <circle cx="60" cy="1140" r="2"/><circle cx="180" cy="1140" r="2"/><circle cx="300" cy="1140" r="2"/><circle cx="420" cy="1140" r="2"/><circle cx="540" cy="1140" r="2"/><circle cx="660" cy="1140" r="2"/><circle cx="780" cy="1140" r="2"/><circle cx="900" cy="1140" r="2"/><circle cx="1020" cy="1140" r="2"/><circle cx="1140" cy="1140" r="2"/>
  </g>
  <!-- Glow behind headline -->
  <circle cx="600" cy="500" r="500" fill="url(#glow)"/>

  <!-- Top brand mark -->
  <g transform="translate(80, 80)">
    <rect width="64" height="64" rx="14" fill="white"/>
    <text x="32" y="48" text-anchor="middle" fill="#0d9488" font-size="36" font-weight="900">L</text>
    <text x="84" y="32" fill="white" font-size="28" font-weight="800" letter-spacing="-0.5">Loglinkr</text>
    <text x="84" y="56" fill="rgba(255,255,255,0.75)" font-size="15" font-weight="500">Smart ERP for fab plants</text>
  </g>
  <!-- Top-right tagline -->
  <g transform="translate(1120, 100)">
    <text x="0" y="0" text-anchor="end" fill="rgba(255,255,255,0.7)" font-size="13" font-weight="600" letter-spacing="2">MADE IN INDIA</text>
    <text x="0" y="22" text-anchor="end" fill="rgba(255,255,255,0.45)" font-size="12">For SMEs · Job-work · Fabrication</text>
  </g>

  <!-- Headline block -->
  <g transform="translate(80, 230)">
    <text x="0" y="0" fill="white" font-size="76" font-weight="900" letter-spacing="-2">Run your factory</text>
    <text x="0" y="84" fill="white" font-size="76" font-weight="900" letter-spacing="-2">from</text>
    <text x="295" y="84" fill="#5eead4" font-size="76" font-weight="900" letter-spacing="-2">one app.</text>
    <text x="0" y="148" fill="rgba(255,255,255,0.85)" font-size="22" font-weight="500">WhatsApp-style chat + AI bill reading + project &amp; quality tracking</text>
    <text x="0" y="178" fill="rgba(255,255,255,0.85)" font-size="22" font-weight="500">— all in your pocket.</text>
  </g>

  <!-- Feature pills row -->
  <g transform="translate(80, 470)">
    <!-- Pill 1: chat-driven -->
    <g transform="translate(0,0)">
      <rect width="240" height="58" rx="29" fill="url(#pill)" stroke="rgba(255,255,255,0.25)"/>
      <text x="22" y="38" font-size="24">💬</text>
      <text x="62" y="36" fill="white" font-size="14" font-weight="700">Chat-first ops</text>
      <text x="62" y="50" fill="rgba(255,255,255,0.7)" font-size="11">Tasks · alerts · approvals</text>
    </g>
    <!-- Pill 2: AI OCR -->
    <g transform="translate(260,0)">
      <rect width="240" height="58" rx="29" fill="url(#pill)" stroke="rgba(255,255,255,0.25)"/>
      <text x="22" y="38" font-size="24">📷</text>
      <text x="62" y="36" fill="white" font-size="14" font-weight="700">Photo → Bill</text>
      <text x="62" y="50" fill="rgba(255,255,255,0.7)" font-size="11">AI reads DCs / invoices</text>
    </g>
    <!-- Pill 3: project tracking -->
    <g transform="translate(520,0)">
      <rect width="240" height="58" rx="29" fill="url(#pill)" stroke="rgba(255,255,255,0.25)"/>
      <text x="22" y="38" font-size="24">📐</text>
      <text x="62" y="36" fill="white" font-size="14" font-weight="700">Project tracker</text>
      <text x="62" y="50" fill="rgba(255,255,255,0.7)" font-size="11">Stages · weight · GRN</text>
    </g>
    <!-- Pill 4: cut planner -->
    <g transform="translate(780,0)">
      <rect width="240" height="58" rx="29" fill="url(#pill)" stroke="rgba(255,255,255,0.25)"/>
      <text x="22" y="38" font-size="24">✂️</text>
      <text x="62" y="36" fill="white" font-size="14" font-weight="700">Cut planner</text>
      <text x="62" y="50" fill="rgba(255,255,255,0.7)" font-size="11">1D &amp; 2D · auto-nest</text>
    </g>
  </g>

  <!-- Second row of pills -->
  <g transform="translate(80, 545)">
    <g transform="translate(0,0)">
      <rect width="240" height="58" rx="29" fill="url(#pill)" stroke="rgba(255,255,255,0.25)"/>
      <text x="22" y="38" font-size="24">📊</text>
      <text x="62" y="36" fill="white" font-size="14" font-weight="700">Live dashboards</text>
      <text x="62" y="50" fill="rgba(255,255,255,0.7)" font-size="11">People · projects · NCRs</text>
