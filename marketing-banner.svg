    <!-- App header bar -->
    <rect x="10" y="44" width="220" height="40" fill="#0d9488"/>
    <text x="120" y="68" text-anchor="middle" fill="white" font-size="12" font-weight="700">Bills &amp; expenses · OCR</text>
    <!-- Chat thread mock -->
    <g transform="translate(20, 96)">
      <!-- Their image bubble -->
      <rect x="0" y="0" width="130" height="80" rx="10" fill="white" stroke="#e2e8f0"/>
      <rect x="6" y="6" width="118" height="58" rx="6" fill="#cbd5e1"/>
      <text x="65" y="40" text-anchor="middle" font-size="22">🧾</text>
      <text x="6" y="76" fill="#475569" font-size="9" font-weight="600">Bill from Tata Steel</text>
      <!-- AI reply bubble -->
      <rect x="70" y="96" width="140" height="92" rx="10" fill="url(#bubble-out)"/>
      <text x="80" y="115" fill="white" font-size="10" font-weight="700">✨ AI processed</text>
      <text x="80" y="132" fill="white" font-size="9">Vendor: Tata Steel</text>
      <text x="80" y="146" fill="white" font-size="9">Doc#: TS-INV-9921</text>
      <text x="80" y="160" fill="white" font-size="9">Amount: ₹2,18,300</text>
      <text x="80" y="176" fill="rgba(255,255,255,0.85)" font-size="8">Tap → Documents · GRN ready</text>
      <!-- Task suggestion -->
      <rect x="0" y="204" width="200" height="70" rx="10" fill="#fef3c7" stroke="#fde68a"/>
      <text x="10" y="222" fill="#92400e" font-size="10" font-weight="700">⚠ Suggested task</text>
      <text x="10" y="238" fill="#7c2d12" font-size="9">Verify stock receipt against PO</text>
      <text x="10" y="252" fill="#7c2d12" font-size="9">before payment release.</text>
      <text x="10" y="266" fill="#92400e" font-size="9" font-weight="700">Assigned: Karthik · Due tomorrow</text>
    </g>
    <!-- Bottom nav strip -->
    <rect x="10" y="380" width="220" height="40" fill="#f1f5f9"/>
    <g font-size="9" fill="#475569" text-anchor="middle" font-weight="600">
      <text x="40" y="402">🏠</text><text x="40" y="414">Home</text>
      <text x="80" y="402">📋</text><text x="80" y="414">Tasks</text>
      <text x="120" y="402">💬</text><text x="120" y="414">Chat</text>
      <text x="160" y="402">📁</text><text x="160" y="414">Docs</text>
      <text x="200" y="402">⋯</text><text x="200" y="414">More</text>
    </g>
  </g>

  <!-- Left side stat block -->
  <g transform="translate(80, 720)">
    <rect width="290" height="120" rx="14" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)"/>
    <text x="20" y="40" fill="white" font-size="36" font-weight="900">10×</text>
    <text x="20" y="62" fill="rgba(255,255,255,0.85)" font-size="13" font-weight="600">cheaper than legacy ERP</text>
    <line x1="20" y1="76" x2="270" y2="76" stroke="rgba(255,255,255,0.18)"/>
    <text x="20" y="98" fill="white" font-size="13" font-weight="700">From ₹2,999/month</text>
    <text x="20" y="113" fill="rgba(255,255,255,0.7)" font-size="11">First 15 days · trial · no card</text>
  </g>

  <!-- Right side benefit -->
  <g transform="translate(720, 720)">
    <rect width="400" height="120" rx="14" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)"/>
    <text x="20" y="36" fill="white" font-size="15" font-weight="800">Built with Marvel Machines.</text>
    <text x="20" y="58" fill="rgba(255,255,255,0.85)" font-size="13">Tested on a real fab floor in Tamil Nadu.</text>
    <text x="20" y="80" fill="rgba(255,255,255,0.85)" font-size="13">Designed for the way Indian SMEs</text>
    <text x="20" y="96" fill="rgba(255,255,255,0.85)" font-size="13">actually run — WhatsApp-shaped, voice-first.</text>
    <text x="380" y="110" text-anchor="end" fill="#5eead4" font-size="11" font-weight="700">— 14 plants live · 6 months</text>
  </g>

  <!-- CTA strip -->
  <g transform="translate(80, 880)">
    <rect width="1040" height="120" rx="20" fill="white"/>
    <text x="40" y="48" fill="#0d9488" font-size="32" font-weight="900" letter-spacing="-1">Try it free for 15 days.</text>
    <text x="40" y="80" fill="#334155" font-size="16" font-weight="500">No card. One-tap WhatsApp invite. Go live in under an hour.</text>
    <!-- Button -->
    <rect x="730" y="35" width="280" height="56" rx="28" fill="#0d9488"/>
    <text x="870" y="70" text-anchor="middle" fill="white" font-size="18" font-weight="800">loglinkr.com →</text>
  </g>

  <!-- Footer contact -->
  <g transform="translate(80, 1060)">
    <text x="0" y="0" fill="rgba(255,255,255,0.75)" font-size="14" font-weight="600">📞 +91 95669 79435</text>
    <text x="200" y="0" fill="rgba(255,255,255,0.75)" font-size="14" font-weight="600">✉ team@loglinkr.com</text>
    <text x="440" y="0" fill="rgba(255,255,255,0.75)" font-size="14" font-weight="600">🌐 loglinkr.com</text>
    <text x="1040" y="0" text-anchor="end" fill="rgba(255,255,255,0.55)" font-size="12">Loglinkr · 2026</text>
  </g>
</svg>
