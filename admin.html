<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Loglinkr · Admin</title>
<meta name="theme-color" content="#0f172a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --teal-50:#f0fdfa;--teal-100:#ccfbf1;--teal-500:#14b8a6;--teal-600:#0d9488;--teal-700:#0f766e;--teal-800:#115e59;
  --slate-50:#f8fafc;--slate-100:#f1f5f9;--slate-200:#e2e8f0;--slate-300:#cbd5e1;--slate-400:#94a3b8;
  --slate-500:#64748b;--slate-600:#475569;--slate-700:#334155;--slate-800:#1e293b;--slate-900:#0f172a;
  --rose-50:#fff1f2;--rose-200:#fecdd3;--rose-500:#f43f5e;--rose-600:#e11d48;--rose-700:#be123c;
  --amber-50:#fffbeb;--amber-200:#fde68a;--amber-500:#f59e0b;--amber-700:#b45309;
  --emerald-50:#ecfdf5;--emerald-500:#10b981;--emerald-700:#047857;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Geist',system-ui,sans-serif;background:var(--slate-100);color:var(--slate-800);font-size:14px;line-height:1.5}
.mono{font-family:'Geist Mono',monospace}
.wrap{max-width:1100px;margin:0 auto;padding:18px 16px 60px}
.topbar{background:var(--slate-900);color:white;padding:14px 16px;position:sticky;top:0;z-index:10}
.topbar-in{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:12px}
.topbar h1{font-size:16px;font-weight:700;letter-spacing:-0.01em}
.topbar .pill{font-size:10px;font-weight:700;background:var(--teal-600);padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:0.05em}
.topbar .spacer{flex:1}
.topbar .who{font-size:12px;color:var(--slate-300)}
.btn{appearance:none;border:none;border-radius:8px;background:var(--teal-600);color:white;font-weight:600;font-size:13px;padding:9px 14px;cursor:pointer;font-family:inherit}
.btn:hover{background:var(--teal-700)}
.btn:disabled{opacity:.5;cursor:default}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.ghost{background:transparent;color:var(--slate-600);border:1px solid var(--slate-300)}
.btn.ghost:hover{background:var(--slate-100)}
.btn.danger{background:var(--rose-600)}
.btn.danger:hover{background:var(--rose-700)}
.btn.outline-danger{background:transparent;color:var(--rose-600);border:1px solid var(--rose-200)}
.card{background:white;border:1px solid var(--slate-200);border-radius:12px;padding:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.stat{background:white;border:1px solid var(--slate-200);border-radius:12px;padding:14px}
.stat .n{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.stat .l{font-size:11px;color:var(--slate-500);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px;font-weight:600}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.toolbar input[type=search]{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--slate-200);border-radius:8px;font-size:13px;font-family:inherit}
.seg{display:flex;gap:4px;background:var(--slate-200);padding:3px;border-radius:8px}
.seg button{border:none;background:transparent;font-size:12px;font-weight:600;padding:6px 11px;border-radius:6px;cursor:pointer;color:var(--slate-600);font-family:inherit}
.seg button.on{background:white;color:var(--slate-900);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.org{background:white;border:1px solid var(--slate-200);border-radius:12px;padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:border-color .12s}
.org:hover{border-color:var(--teal-300)}
.org.susp{background:var(--rose-50);border-color:var(--rose-200)}
.org-top{display:flex;align-items:center;gap:10px}
.org-name{font-weight:700;font-size:15px;color:var(--slate-900)}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:0.03em}
.badge.pro{background:var(--teal-100);color:var(--teal-800)}
.badge.unlimited{background:var(--slate-200);color:var(--slate-600)}
.badge.custom{background:var(--amber-50);color:var(--amber-700);border:1px solid var(--amber-200)}
.badge.susp{background:var(--rose-600);color:white}
.meters{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:11px}
.meter .ml{display:flex;justify-content:space-between;font-size:11px;color:var(--slate-500);margin-bottom:4px;font-weight:600}
.bar{height:6px;background:var(--slate-200);border-radius:3px;overflow:hidden}
.bar>div{height:100%;border-radius:3px}
.org-sub{font-size:11px;color:var(--slate-400);margin-top:9px;display:flex;gap:14px;flex-wrap:wrap}
.backdrop{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:0}
.sheet{background:white;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;border-radius:16px 16px 0 0;padding:20px}
@media(min-width:640px){.backdrop{align-items:center;padding:20px}.sheet{border-radius:16px}}
.sheet h2{font-size:18px;font-weight:700;margin-bottom:2px}
.sheet .close{position:absolute;top:14px;right:16px;font-size:24px;color:var(--slate-400);cursor:pointer;background:none;border:none;line-height:1}
.section{margin-top:18px}
.section-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--slate-500);margin-bottom:9px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--slate-600);margin-bottom:5px}
.field input,.field select{width:100%;padding:9px 11px;border:1px solid var(--slate-200);border-radius:8px;font-size:14px;font-family:inherit;background:white}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.urow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--slate-100);font-size:13px}
.urow:last-child{border-bottom:none}
.tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;background:var(--slate-100);color:var(--slate-600)}
.hint{font-size:11px;color:var(--slate-400);margin-top:4px}
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login{background:white;border:1px solid var(--slate-200);border-radius:16px;padding:28px;width:100%;max-width:360px}
.login h1{font-size:20px;font-weight:700;margin-bottom:4px}
.login p{color:var(--slate-500);font-size:13px;margin-bottom:18px}
.alert{padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert.err{background:var(--rose-50);color:var(--rose-700);border:1px solid var(--rose-200)}
.spin{width:26px;height:26px;border:3px solid var(--slate-200);border-top-color:var(--teal-600);border-radius:50%;animation:s .7s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--slate-400);padding:40px 0;font-size:14px}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10.19.3';
import { useState, useEffect, useMemo } from 'https://esm.sh/preact@10.19.3/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(h);

const SUPABASE_URL = 'https://wzxowvrvuecybdxymjvi.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6eG93dnJ2dWVjeWJkeHltanZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MjMzMTQsImV4cCI6MjA5MzI5OTMxNH0.GyvHnBtlJTWs8HqMvu0VyRhjme5jbTUWzz9vOAxXhO8';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const inr = (n) => '₹' + (Number(n) || 0).toLocaleString('en-IN');
const num = (n) => (Number(n) || 0).toLocaleString('en-IN');
const USD_INR = 86; // approx FX, only for showing AI cost (billed in USD) in ₹ terms
const usd = (n) => '$' + (Number(n) || 0).toFixed(2);
const usdInr = (n) => '≈₹' + Math.round((Number(n) || 0) * USD_INR).toLocaleString('en-IN');
const SUB = {
  active:    { label: 'Active',    bg: 'var(--emerald-50)', fg: 'var(--emerald-700)', bd: 'var(--emerald-500)' },
  trialing:  { label: 'Trial',     bg: 'var(--teal-50)',    fg: 'var(--teal-800)',    bd: 'var(--teal-500)' },
  past_due:  { label: 'Past due',  bg: 'var(--amber-50)',   fg: 'var(--amber-700)',   bd: 'var(--amber-500)' },
  cancelled: { label: 'Cancelled', bg: 'var(--rose-50)',    fg: 'var(--rose-700)',    bd: 'var(--rose-500)' },
};
const fmtDate = (s) => s ? new Date(s).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';
const ago = (s) => {
  if (!s) return 'never';
  const d = Math.floor((Date.now() - new Date(s).getTime()) / 86400000);
  if (d <= 0) return 'today'; if (d === 1) return 'yesterday';
  if (d < 30) return d + 'd ago'; if (d < 365) return Math.floor(d / 30) + 'mo ago';
  return Math.floor(d / 365) + 'y ago';
};
const BIZ = { fabrication:'Fabrication', manufacturing:'Manufacturing', auto_iatf:'Auto / IATF', jobwork:'Job work', other:'Other' };
// null cap = unlimited
const capPct = (used, cap) => cap == null ? 0 : Math.min(100, Math.round((used / cap) * 100));
const meterColor = (used, cap) => {
  if (cap == null) return 'var(--slate-300)';
  const p = used / cap;
  return p >= 1 ? 'var(--rose-500)' : p >= 0.85 ? 'var(--amber-500)' : 'var(--teal-500)';
};
const isCustom = (o) => o.plan_code && (o.max_ocr_per_month !== (o.plan_code === 'pro' ? 500 : null) || o.max_users !== (o.plan_code === 'pro' ? 20 : null));

function Meter({ label, used, cap }) {
  return html`
    <div class="meter">
      <div class="ml"><span>${label}</span><span class="mono">${num(used)} / ${cap == null ? '∞' : num(cap)}</span></div>
      <div class="bar"><div style=${'width:' + (cap == null ? 100 : capPct(used, cap)) + '%;background:' + (cap == null ? 'var(--slate-300)' : meterColor(used, cap))}></div></div>
    </div>`;
}

function Login() {
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);
  const go = async (e) => {
    e.preventDefault(); setErr(''); setBusy(true);
    const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password: pw });
    if (error) { setErr(error.message); setBusy(false); }
  };
  return html`
    <div class="center"><form class="login" onSubmit=${go}>
      <h1>Loglinkr Admin</h1>
      <p>Founder console. Sign in with your owner account.</p>
      ${err && html`<div class="alert err">${err}</div>`}
      <div class="field"><label>Email</label><input type="email" required value=${email} onInput=${e => setEmail(e.target.value)} placeholder="you@example.com" /></div>
      <div class="field"><label>Password</label><input type="password" required value=${pw} onInput=${e => setPw(e.target.value)} /></div>
      <button class="btn" style="width:100%" disabled=${busy}>${busy ? 'Signing in…' : 'Sign in'}</button>
    </form></div>`;
}

function NotAuthorized({ email }) {
  return html`
    <div class="center"><div class="login">
      <h1>Not authorized</h1>
      <p>The account <strong>${email}</strong> isn't a platform admin. This console is restricted to the Loglinkr owner.</p>
      <button class="btn ghost" style="width:100%" onClick=${() => sb.auth.signOut()}>Sign out</button>
    </div></div>`;
}

// Share modal for a reset link issued from the founder /admin console.
// Same UX as Loglinkr's per-plant ResetShareModal: WhatsApp pre-fill, copy
// link, expiry shown. Lives in admin.html so it can be styled with the
// admin design tokens and stay self-contained.
function AdminResetShare({ target, onClose }) {
  const { user, token, expires_at, plant_name } = target;
  // Reset links land in the user app under /app.
  const baseUrl = window.location.origin + '/app';
  const resetUrl = baseUrl + '?reset=' + encodeURIComponent(token);
  const expiresLabel = expires_at
    ? new Date(expires_at).toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })
    : 'in 24 hours';
  const wa = encodeURIComponent(
    `Hi ${user.full_name || ''}, reset your Loglinkr password here:\n\n${resetUrl}\n\nThis link works until ${expiresLabel}. — Loglinkr support${plant_name ? ' for ' + plant_name : ''}`
  );
  const waPhone = (user.phone || '').replace(/\D/g, '');
  const waUrl = waPhone ? 'https://wa.me/' + waPhone + '?text=' + wa : 'https://wa.me/?text=' + wa;

  return html`
    <div class="backdrop" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="sheet" style="max-width:440px">
        <button class="close" onClick=${onClose}>×</button>
        <h2>Reset link for ${user.full_name || 'user'}</h2>
        <p style="font-size:13px;color:var(--slate-500);margin-top:4px">
          ${user.phone ? user.phone + ' · ' : ''}${user.email || 'no email'}${plant_name ? ' · ' + plant_name : ''}
        </p>
        <p style="font-size:13px;color:var(--slate-600);margin-top:14px;line-height:1.55">
          Send this link to <strong>${user.full_name || 'the user'}</strong>. They tap it, set a new password, sign in. The link works until <strong>${expiresLabel}</strong>.
        </p>
        <div class="field" style="margin-top:14px">
          <label>Reset link</label>
          <input type="text" readOnly value=${resetUrl} style="font-size:12px;font-family:'Geist Mono',monospace" onClick=${e => e.target.select()} />
        </div>
        <a href=${waUrl} target="_blank" rel="noopener" class="btn"
           style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;background:#25D366;margin-top:8px">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.1-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4 0 1.4 1 2.7 1.2 2.9.1.2 2 3.1 4.9 4.3.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.5-.1 1.7-.7 1.9-1.3.2-.7.2-1.2.2-1.3-.1-.2-.3-.3-.6-.4zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.2-1.4c1.4.8 3.1 1.2 4.8 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18c-1.5 0-3-.4-4.3-1.2l-.3-.2-3.1.8.8-3-.2-.3C4 15.1 3.5 13.6 3.5 12 3.5 7.3 7.3 3.5 12 3.5S20.5 7.3 20.5 12 16.7 20.5 12 20.5z"/></svg>
          Send via WhatsApp
        </a>
        <button class="btn ghost" style="margin-top:8px;width:100%"
          onClick=${async () => { await navigator.clipboard.writeText(resetUrl); alert('Link copied'); }}>Copy link</button>
        <p style="font-size:11px;color:var(--slate-400);margin-top:14px;line-height:1.5">
          🔒 Anyone with this link can set a new password for ${user.full_name || 'this user'}. Send only to the verified phone / email.
        </p>
      </div>
    </div>`;
}

function OrgDrawer({ org, plans, onClose, onChanged }) {
  const [detail, setDetail] = useState(null);
  const [resetTarget, setResetTarget] = useState(null); // { user, token, expires_at, plant_name } after Issue Reset

  const [plan, setPlan] = useState(org.plan_code || 'pro');
  const [ocrCap, setOcrCap] = useState(org.max_ocr_per_month == null ? '' : String(org.max_ocr_per_month));
  const [userCap, setUserCap] = useState(org.max_users == null ? '' : String(org.max_users));
  const [subStatus, setSubStatus] = useState(org.subscription_status || 'active');
  const [paidUntil, setPaidUntil] = useState(org.paid_until || '');
  const [busy, setBusy] = useState('');
  const [err, setErr] = useState('');

  useEffect(() => {
    sb.rpc('admin_org_detail', { p_plant_id: org.id }).then(({ data }) => setDetail(data));
  }, [org.id]);

  const run = async (key, fn) => {
    setErr(''); setBusy(key);
    const { data, error } = await fn();
    setBusy('');
    if (error || (data && data.success === false)) { setErr((error && error.message) || (data && data.error) || 'Failed'); return false; }
    await onChanged();
    return true;
  };
  const savePlan = () => run('plan', () => sb.rpc('admin_set_plan', { p_plant_id: org.id, p_plan_code: plan }));
  const saveCaps = () => run('caps', () => sb.rpc('admin_set_caps', {
    p_plant_id: org.id,
    p_max_ocr: ocrCap === '' ? null : parseInt(ocrCap, 10),
    p_max_users: userCap === '' ? null : parseInt(userCap, 10),
  }));
  const saveSub = () => run('sub', () => sb.rpc('admin_set_subscription', { p_plant_id: org.id, p_status: subStatus, p_paid_until: paidUntil || null }));
  const toggleSuspend = async () => {
    const next = !org.suspended;
    let reason = null;
    if (next) { reason = window.prompt('Reason for suspending ' + org.name + '? (shown to them, optional)') ; if (reason === null) return; }
    const ok = await run('susp', () => sb.rpc('admin_set_suspended', { p_plant_id: org.id, p_suspended: next, p_reason: reason || null }));
    if (ok) onClose();
  };

  const p = detail?.plant;
  return html`
    <div class="backdrop" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="sheet">
        <button class="close" onClick=${onClose}>×</button>
        <h2>${org.name}</h2>
        <div style="font-size:12px;color:var(--slate-500)">${BIZ[org.business_type] || org.business_type || 'Unspecified'} · joined ${fmtDate(org.created_at)}${org.suspended ? ' · ' : ''}${org.suspended ? html`<span class="badge susp">Suspended</span>` : ''}</div>

        <div class="meters" style="margin-top:14px">
          <${Meter} label="OCR this month" used=${org.ocr_used} cap=${org.max_ocr_per_month} />
          <${Meter} label="User seats" used=${org.users_used} cap=${org.max_users} />
        </div>

        <div class="section">
          <div class="section-h">AI consumption cost</div>
          ${!detail ? html`<div class="hint">Loading…</div>` : html`
            <div style="display:flex;gap:18px;flex-wrap:wrap">
              <div><div style="font-size:20px;font-weight:700">${usd(detail.ai.cost_month_usd)}</div><div class="hint">this month · ${usdInr(detail.ai.cost_month_usd)}</div></div>
              <div><div style="font-size:20px;font-weight:700">${usd(detail.ai.cost_total_usd)}</div><div class="hint">lifetime · ${usdInr(detail.ai.cost_total_usd)}</div></div>
              <div><div style="font-size:20px;font-weight:700">${num(detail.ai.calls_month)}</div><div class="hint">extractions this month</div></div>
            </div>
            ${org.price_inr ? html`<div class="hint" style="margin-top:8px">Plan ${inr(org.price_inr)}/mo vs AI ${usdInr(detail.ai.cost_month_usd)} so far this month.</div>` : ''}`}
        </div>

        ${err && html`<div class="alert err" style="margin-top:14px">${err}</div>`}

        <div class="section">
          <div class="section-h">Plan</div>
          <div style="display:flex;gap:8px;align-items:flex-end">
            <div class="field" style="flex:1;margin:0">
              <select value=${plan} onChange=${e => setPlan(e.target.value)}>
                ${plans.map(pl => html`<option value=${pl.code}>${pl.name} · ${pl.price_inr ? inr(pl.price_inr) + '/mo' : 'free'} · ${pl.max_ocr_per_month == null ? '∞' : pl.max_ocr_per_month} OCR · ${pl.max_users == null ? '∞' : pl.max_users} users</option>`)}
              </select>
            </div>
            <button class="btn" disabled=${busy === 'plan' || plan === org.plan_code} onClick=${savePlan}>${busy === 'plan' ? '…' : 'Apply'}</button>
          </div>
          <div class="hint">Applying a plan resets caps to that plan's limits.</div>
        </div>

        <div class="section">
          <div class="section-h">Subscription status</div>
          <div class="row2">
            <div class="field" style="margin:0">
              <label>Status</label>
              <select value=${subStatus} onChange=${e => setSubStatus(e.target.value)}>
                <option value="active">Active (paid)</option>
                <option value="trialing">Trial</option>
                <option value="past_due">Past due</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div class="field" style="margin:0"><label>Paid until (optional)</label><input type="date" value=${paidUntil || ''} onInput=${e => setPaidUntil(e.target.value)} /></div>
          </div>
          <button class="btn sm" style="margin-top:9px" disabled=${busy === 'sub' || (subStatus === (org.subscription_status || 'active') && (paidUntil || '') === (org.paid_until || ''))} onClick=${saveSub}>${busy === 'sub' ? 'Saving…' : 'Save status'}</button>
          <div class="hint">Manual for now. When you add Razorpay, payments will set this automatically.</div>
        </div>

        <div class="section">
          <div class="section-h">Custom caps (override)</div>
          <div class="row2">
            <div class="field" style="margin:0"><label>OCR / month</label><input type="number" min="0" value=${ocrCap} onInput=${e => setOcrCap(e.target.value)} placeholder="blank = unlimited" /></div>
            <div class="field" style="margin:0"><label>Users</label><input type="number" min="0" value=${userCap} onInput=${e => setUserCap(e.target.value)} placeholder="blank = unlimited" /></div>
          </div>
          <button class="btn ghost sm" style="margin-top:9px" disabled=${busy === 'caps'} onClick=${saveCaps}>${busy === 'caps' ? 'Saving…' : 'Save custom caps'}</button>
          <div class="hint">Leave a field blank for unlimited. Overrides the plan's caps without changing the plan label.</div>
        </div>

        <div class="section">
          <div class="section-h">Access</div>
          <button class=${org.suspended ? 'btn sm' : 'btn outline-danger sm'} disabled=${busy === 'susp'} onClick=${toggleSuspend}>
            ${busy === 'susp' ? '…' : (org.suspended ? 'Reactivate company' : 'Suspend company')}
          </button>
          ${org.suspended && p?.suspended_reason && html`<div class="hint">Reason: ${p.suspended_reason}</div>`}
        </div>

        <div class="section">
          <div class="section-h">Team ${detail ? '· ' + (detail.users?.length || 0) : ''}</div>
          ${!detail ? html`<div class="hint">Loading…</div>` : html`
            <div>
              ${detail.users.map(u => html`
                <div class="urow" key=${u.id}>
                  <div style="flex:1;min-width:0">
                    <div>${u.full_name || '—'} <span style="color:var(--slate-400)">${u.phone || ''}</span></div>
                    ${u.email && html`<div style="font-size:11px;color:var(--slate-400);font-family:'Geist Mono',monospace">${u.email}</div>`}
                  </div>
                  <span class="tag">${u.role}</span>
                  ${u.login_enabled ? '' : html`<span class="tag">operator</span>`}
                  ${u.status !== 'active' ? html`<span class="tag" style="background:var(--rose-50);color:var(--rose-700)">${u.status}</span>` : ''}
                  ${u.status === 'active' && u.login_enabled !== false && html`
                    <button class="btn ghost sm" title=${'Issue a one-tap password reset link for ' + (u.full_name || u.phone || 'this user')}
                      onClick=${async () => {
                        const { data, error } = await sb.rpc('admin_issue_password_reset', { p_target_user_id: u.id });
                        if (error || !data?.token) { alert(error?.message || 'Could not generate reset link'); return; }
                        setResetTarget({ user: u, token: data.token, expires_at: data.expires_at, plant_name: org.name });
                      }}>🔑 Reset</button>
                  `}
                </div>`)}
              ${detail.invites?.length > 0 && html`<div class="hint" style="margin-top:8px">+ ${detail.invites.length} pending invite${detail.invites.length > 1 ? 's' : ''}</div>`}
              <div class="hint" style="margin-top:8px">Documents: ${num(detail.docs_total)} total · ${num(detail.docs_30d)} in last 30 days</div>
            </div>`}
        </div>
      </div>
      ${resetTarget && html`<${AdminResetShare} target=${resetTarget} onClose=${() => setResetTarget(null)} />`}
    </div>`;
}

function Console({ me }) {
  const [orgs, setOrgs] = useState(null);
  const [plans, setPlans] = useState([]);
  const [q, setQ] = useState('');
  const [filter, setFilter] = useState('all'); // all | paying | suspended
  const [sel, setSel] = useState(null);
  const [err, setErr] = useState('');

  const load = async () => {
    const [o, p] = await Promise.all([
      sb.rpc('admin_list_orgs'),
      sb.from('plans').select('*').eq('is_active', true).order('sort_order'),
    ]);
    if (o.error) { setErr(o.error.message); setOrgs([]); return; }
    setOrgs(o.data || []);
    setPlans(p.data || []);
    if (sel) setSel((o.data || []).find(x => x.id === sel.id) || null);
  };
  useEffect(() => { load(); }, []);

  const stats = useMemo(() => {
    const list = orgs || [];
    return {
      total: list.length,
      paying: list.filter(o => (o.price_inr || 0) > 0 && !o.suspended).length,
      mrr: list.filter(o => !o.suspended).reduce((s, o) => s + (o.price_inr || 0), 0),
      ocr: list.reduce((s, o) => s + (o.ocr_used || 0), 0),
      aiUsd: list.reduce((s, o) => s + (Number(o.ai_cost_usd) || 0), 0),
      users: list.reduce((s, o) => s + (o.users_used || 0), 0),
      suspended: list.filter(o => o.suspended).length,
    };
  }, [orgs]);

  const shown = useMemo(() => {
    let list = orgs || [];
    if (filter === 'paying') list = list.filter(o => (o.price_inr || 0) > 0);
    else if (filter === 'suspended') list = list.filter(o => o.suspended);
    if (q.trim()) { const s = q.toLowerCase(); list = list.filter(o => (o.name || '').toLowerCase().includes(s)); }
    return list;
  }, [orgs, filter, q]);

  return html`
    <div class="topbar"><div class="topbar-in">
      <h1>Loglinkr</h1><span class="pill">Admin</span>
      <div class="spacer"></div>
      <span class="who">${me.email}</span>
      <button class="btn ghost sm" style="border-color:var(--slate-600);color:var(--slate-200)" onClick=${() => sb.auth.signOut()}>Sign out</button>
    </div></div>
    <div class="wrap">
      ${err && html`<div class="alert err">${err}</div>`}
      ${orgs === null ? html`<div class="center"><div class="spin"></div></div>` : html`
        <div class="stat-grid">
          <div class="stat"><div class="n">${stats.total}</div><div class="l">Companies</div></div>
          <div class="stat"><div class="n">${stats.paying}</div><div class="l">Paying</div></div>
          <div class="stat"><div class="n">${inr(stats.mrr)}</div><div class="l">MRR</div></div>
          <div class="stat"><div class="n">${usd(stats.aiUsd)}</div><div class="l">AI cost · this month</div></div>
          <div class="stat"><div class="n">${num(stats.ocr)}</div><div class="l">OCR this month</div></div>
          <div class="stat"><div class="n">${num(stats.users)}</div><div class="l">Active users</div></div>
          <div class="stat"><div class="n" style=${stats.suspended ? 'color:var(--rose-600)' : ''}>${stats.suspended}</div><div class="l">Suspended</div></div>
        </div>

        <div class="toolbar">
          <input type="search" value=${q} onInput=${e => setQ(e.target.value)} placeholder="Search company…" />
          <div class="seg">
            <button class=${filter === 'all' ? 'on' : ''} onClick=${() => setFilter('all')}>All</button>
            <button class=${filter === 'paying' ? 'on' : ''} onClick=${() => setFilter('paying')}>Paying</button>
            <button class=${filter === 'suspended' ? 'on' : ''} onClick=${() => setFilter('suspended')}>Suspended</button>
          </div>
        </div>

        ${shown.length === 0 ? html`<div class="empty">No companies match.</div>` : shown.map(o => html`
          <div class=${'org' + (o.suspended ? ' susp' : '')} key=${o.id} onClick=${() => setSel(o)}>
            <div class="org-top">
              <span class="org-name">${o.name}</span>
              <span class=${'badge ' + (o.plan_code || 'unlimited')}>${o.plan_code || 'none'}</span>
              ${(() => { const s = SUB[o.subscription_status] || SUB.active; return html`<span class="badge" style=${'background:' + s.bg + ';color:' + s.fg}>${s.label}</span>`; })()}
              ${isCustom(o) && html`<span class="badge custom">custom</span>`}
              ${o.suspended && html`<span class="badge susp">Suspended</span>`}
              <div class="spacer" style="flex:1"></div>
              <span style="font-size:12px;font-weight:700;color:var(--slate-500)">${o.price_inr ? inr(o.price_inr) + '/mo' : 'free'}</span>
            </div>
            <div class="meters">
              <${Meter} label="OCR" used=${o.ocr_used} cap=${o.max_ocr_per_month} />
              <${Meter} label="Users" used=${o.users_used} cap=${o.max_users} />
            </div>
            <div class="org-sub">
              <span>${BIZ[o.business_type] || o.business_type || 'Unspecified'}</span>
              <span>AI ${usd(o.ai_cost_usd)}/mo</span>
              <span>${num(o.doc_count)} docs</span>
              <span>last bill ${ago(o.last_doc_at)}</span>
              <span>joined ${fmtDate(o.created_at)}</span>
            </div>
          </div>`)}
      `}
    </div>
    ${sel && html`<${OrgDrawer} org=${sel} plans=${plans} onClose=${() => setSel(null)} onChanged=${load} />`}`;
}

function App() {
  const [session, setSession] = useState(undefined); // undefined = checking
  const [isAdmin, setIsAdmin] = useState(null); // null = checking

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session || null));
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s || null));
    return () => sub.subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (session === undefined) return;
    if (!session) { setIsAdmin(null); return; }
    setIsAdmin(null);
    sb.rpc('is_platform_admin').then(({ data, error }) => setIsAdmin(!error && data === true));
  }, [session]);

  if (session === undefined) return html`<div class="center"><div class="spin"></div></div>`;
  if (!session) return html`<${Login} />`;
  if (isAdmin === null) return html`<div class="center"><div class="spin"></div></div>`;
  if (!isAdmin) return html`<${NotAuthorized} email=${session.user.email} />`;
  return html`<${Console} me=${session.user} />`;
}

render(html`<${App} />`, document.getElementById('root'));
</script>
</body>
</html>
